name: Build Features

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true

jobs:

  build-features:
    name: Features
    if: fromJSON(inputs.config).enabled == true
    runs-on: ubuntu-latest
    container:
      image: ${{ fromJSON(inputs.config).ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Artifacts
        run: just build-feats

      - name: Upload Source Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_src.name }}
          path: ${{ fromJSON(inputs.config).artifact_src.path }}
          include-hidden-files: true
          retention-days: ${{ fromJSON(inputs.config).artifact_src.retention_days }}

      - name: Upload Distribution Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_dist.name }}
          path: ${{ fromJSON(inputs.config).artifact_dist.path }}
          retention-days: ${{ fromJSON(inputs.config).artifact_dist.retention_days }}
