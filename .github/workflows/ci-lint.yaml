name: CI - Lint

on:
  workflow_call:

jobs:
  shell:
    name: Shell Scripts
    if: needs.setup.outputs.run_lint == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Source Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: Check Formatting
        run: just format-check

      - name: Lint
        if: always()
        run: just lint

  json-schema:
    name: Schema Validation
    needs: [setup, prepare]
    if: needs.setup.outputs.run_validate == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Source Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: Validate Feature Metadata
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          validate-only: "true"
          base-path-to-features: "./src"

  python:
    name: Python
    if: needs.setup.outputs.run_python == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Formatting
        if: always()
        run: just format-py-check

      - name: Lint
        run: just lint-py
