name: "CI"

on:
  workflow_call:
    inputs:
      run_lint:
        type: string
        default: "false"
      run_validate:
        type: string
        default: "false"
      run_unit:
        type: string
        default: "false"
      run_features:
        type: string
        default: "false"
      features:
        type: string
        default: "[]"
      run_macos:
        type: string
        default: "false"
      macos_features:
        type: string
        default: "[]"
      run_dist:
        type: string
        default: "false"
      version:
        description: "Version to stamp into built artifacts (commit SHA or release tag)."
        type: string
        default: ""
      image_tag:
        description: "Devcontainer image tag to use for container jobs."
        type: string
        default: "latest"
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run lint (shfmt + shellcheck)"
        type: boolean
        default: true
      run_validate:
        description: "Run validate (devcontainer-feature.json)"
        type: boolean
        default: true
      run_unit:
        description: "Run unit tests"
        type: boolean
        default: true
      run_features:
        description: "Run feature scenario tests"
        type: boolean
        default: true
      features:
        description: "Features to test — blank = all, or comma-separated names"
        type: string
        default: ""
      run_macos:
        description: "Run macOS native feature tests"
        type: boolean
        default: true
      macos_features:
        description: "macOS features to test — blank = all capable, or comma-separated names"
        type: string
        default: ""
      run_dist:
        description: "Run dist tests (features/get.sh, features/sysset.sh)"
        type: boolean
        default: true
      version:
        description: "Version to stamp into built artifacts (leave blank to use commit SHA)"
        type: string
        default: ""
      image_tag:
        description: "Devcontainer image tag to use for container jobs"
        type: string
        default: "latest"

jobs:
  # ── Pass through caller inputs, or resolve dispatch inputs ───────────────
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      run_lint: ${{ steps.setup.outputs.run_lint }}
      run_validate: ${{ steps.setup.outputs.run_validate }}
      run_unit: ${{ steps.setup.outputs.run_unit }}
      run_features: ${{ steps.setup.outputs.run_features }}
      features: ${{ steps.setup.outputs.features }}
      run_macos: ${{ steps.setup.outputs.run_macos }}
      macos_features: ${{ steps.setup.outputs.macos_features }}
      run_dist: ${{ steps.setup.outputs.run_dist }}
      run_prepare: ${{ steps.setup.outputs.run_prepare }}
      version: ${{ steps.setup.outputs.version }}
      ci_image: ${{ steps.setup.outputs.ci_image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Pass through inputs (workflow_call) or resolve inputs (workflow_dispatch)"
        id: setup
        env:
          INPUT_RUN_LINT: ${{ inputs.run_lint }}
          INPUT_RUN_VALIDATE: ${{ inputs.run_validate }}
          INPUT_RUN_UNIT: ${{ inputs.run_unit }}
          INPUT_RUN_FEATURES: ${{ inputs.run_features }}
          INPUT_FEATURES: ${{ inputs.features }}
          INPUT_RUN_MACOS: ${{ inputs.run_macos }}
          INPUT_MACOS_FEATURES: ${{ inputs.macos_features }}
          INPUT_RUN_DIST: ${{ inputs.run_dist }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: bash .github/workflows/scripts/ci_setup.sh

  # ── Prepare: sync src/, build dist/, upload artifacts ────────────────────
  prepare:
    name: Prepare
    needs: setup
    if: needs.setup.outputs.run_prepare == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build artifacts
        run: just build-dist "${{ needs.setup.outputs.version }}"

      - name: Upload src/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sysset-src
          path: src/
          include-hidden-files: true
          retention-days: 1

      - name: Upload dist/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sysset-dist
          path: dist/
          retention-days: 1

  # ── Lint (shfmt + shellcheck) ─────────────────────────────────────────────
  lint:
    name: "Format & lint"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_lint == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Check formatting (shfmt)"
        run: just format-check

      - name: "Lint (shellcheck)"
        if: always()
        run: just lint

  # ── Validate metadata.yaml + devcontainer-feature.json files ─────────────
  validate:
    name: "Validate feature metadata"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_validate == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Validate devcontainer-feature.json files"
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          validate-only: "true"
          base-path-to-features: "./src"

  # ── Unit tests (native: ubuntu + macOS) ───────────────────────────────────
  test-unit-native:
    name: "Unit Tests - ${{ matrix.os }} VM"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_unit == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Install bash ≥4 (macOS)"
        if: runner.os == 'macOS'
        run: brew install bash

      - name: "Run unit tests"
        run: bash test/run-unit.sh

      - name: "Run scripts/ unit tests (Python)"
        shell: bash
        run: |
          set -euo pipefail
          # PyYAML is required by compute-bundle-tag.py; some runners already
          # ship it, others don't. Try import first, then pip (with a
          # PEP 668-safe fallback for externally-managed Python, e.g. 3.12+).
          if ! python3 -c 'import yaml' >/dev/null 2>&1; then
            python3 -m pip install --disable-pip-version-check --user pyyaml \
              || python3 -m pip install --disable-pip-version-check --user --break-system-packages pyyaml
          fi
          python3 -m unittest discover -s test/scripts -t test/scripts -v

  # ── Unit tests (Linux distribution containers) ────────────────────────────
  test-unit-container:
    name: "Unit Tests - ${{ matrix.image }}"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_unit == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:24.04
            install: apt-get update -qq && apt-get install -y --no-install-recommends bash
          - image: debian:bookworm
            install: apt-get update -qq && apt-get install -y --no-install-recommends bash
          - image: fedora:latest
            install: dnf install -y bash
          - image: rockylinux:9
            install: dnf install -y bash
          - image: alpine:3.20
            install: apk add --no-cache bash
          - image: opensuse/leap:15.6
            install: zypper install -y bash
          - image: archlinux:base
            install: pacman -Sy --noconfirm bash
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Run unit tests in container"
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ${{ matrix.image }} \
            sh -c "${{ matrix.install }} && bash test/run-unit.sh"

  # ── Feature scenario tests (Linux / devcontainer) ─────────────────────────
  test-features:
    name: "Scenario Tests - ${{ matrix.feature }}"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_features == 'true' && needs.setup.outputs.features != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJSON(needs.setup.outputs.features) }}
    steps:
      # Host-only: removing preinstalled SDKs and caches only affects the runner
      # disk when this step runs on the host (not inside jobs.container). See
      # actions/runner-images#709, community#25678, jlumbroso/free-disk-space, and
      # Apache Flink's free_disk_space.sh.
      - name: Free disk space (GitHub-hosted runner)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          swap-storage: true
          docker-images: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Feature Scenarios (DinD in devcontainer image)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_IMAGE: ${{ needs.setup.outputs.ci_image }}
        run: |
          docker run --rm --privileged \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            -e GITHUB_TOKEN \
            "$CI_IMAGE" \
            bash .github/workflows/scripts/ci_test-features_dind.sh "${{ matrix.feature }}"

  # ── install-os-pkg manifest resolution (6 distros) ────────────────────────
  test-os-pkg:
    name: "Test install-os-pkg manifest resolution (${{ matrix.image }})"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_features == 'true' && contains(fromJSON(needs.setup.outputs.features), 'install-os-pkg')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:latest
          - image: ubuntu:latest
          - image: alpine:latest
          - image: fedora:latest
          - image: opensuse/leap:latest
          - image: archlinux:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Run manifest resolution tests"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -e GITHUB_TOKEN \
            "${{ matrix.image }}" \
            sh -c 'command -v bash >/dev/null 2>&1 || apk add --no-cache bash >/dev/null 2>&1; bash /repo/test/install-os-pkg/dry-run/run.sh'

  # ── Feature scenario tests (macOS native) ─────────────────────────────────
  test-macos:
    name: "Scenario Tests - ${{ matrix.feature }} (macOS)"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_macos == 'true' && needs.setup.outputs.macos_features != '[]'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJSON(needs.setup.outputs.macos_features) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Test ${{ matrix.feature }} macOS scenarios"
        run: bash test/run-macos.sh "${{ matrix.feature }}"

  # ── Dist: build artifacts ─────────────────────────────────────────────────
  test-dist-build:
    name: "Dist Tests - Build Artifacts"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Run build scenario"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash test/dist/run.sh --suite build --version v0.1.0-test

  # ── Dist: get/ scenarios ──────────────────────────────────────────────────
  test-dist-get:
    name: "Dist Tests - get/ scenarios"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: "Run get/ scenarios"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash test/dist/run.sh --suite get --no-build

  # ── Dist: sysset/ scenarios (Linux containers) ────────────────────────────
  test-dist-sysset:
    name: "Dist Tests - sysset/ scenarios (${{ matrix.distro }})"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:bookworm
            pre: "apt-get update -qq && apt-get install -y --no-install-recommends bash jq curl ca-certificates python3"
          - distro: ubuntu
            image: ubuntu:24.04
            pre: "apt-get update -qq && apt-get install -y --no-install-recommends bash jq curl ca-certificates python3"
          - distro: alpine
            image: alpine:3.20
            pre: "apk add --no-cache bash jq curl ca-certificates python3"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: "Run sysset/ scenarios inside ${{ matrix.distro }} container"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            --network host \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            -e GITHUB_TOKEN \
            "${{ matrix.image }}" \
            sh -c "${{ matrix.pre }} && bash test/dist/run.sh --suite sysset --no-build"

  # ── Dist: macOS scenarios ─────────────────────────────────────────────────
  test-dist-macos:
    name: "Dist Tests - macOS scenarios"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: "Install bash ≥4 (macOS)"
        run: brew install bash

      - name: "Run macOS dist scenarios"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash test/dist/run.sh --suite macos --no-build
