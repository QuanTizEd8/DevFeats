name: "CI"

on:
  workflow_call:
    inputs:
      run_lint:
        type: string
        default: "false"
      run_validate:
        type: string
        default: "false"
      run_unit:
        type: string
        default: "false"
      run_features:
        type: string
        default: "false"
      features:
        type: string
        default: "[]"
      run_macos:
        type: string
        default: "false"
      macos_features:
        type: string
        default: "[]"
      run_python:
        type: string
        default: "false"
      version:
        description: "Version to stamp into built artifacts (commit SHA or release tag)."
        type: string
        default: ""
      image_tag:
        description: "Devcontainer image tag to use for container jobs."
        type: string
        default: "latest"
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run lint (shfmt + shellcheck)"
        type: boolean
        default: true
      run_validate:
        description: "Run validate (devcontainer-feature.json)"
        type: boolean
        default: true
      run_unit:
        description: "Run unit tests"
        type: boolean
        default: true
      run_features:
        description: "Run feature scenario tests"
        type: boolean
        default: true
      features:
        description: "Features to test — blank = all, or comma-separated names"
        type: string
        default: ""
      run_macos:
        description: "Run macOS native feature tests"
        type: boolean
        default: true
      macos_features:
        description: "macOS features to test — blank = all capable, or comma-separated names"
        type: string
        default: ""
      run_python:
        description: "Run Python lint (ruff) and tests (pytest)"
        type: boolean
        default: true
      version:
        description: "Version to stamp into built artifacts (leave blank to use commit SHA)"
        type: string
        default: ""
      image_tag:
        description: "Devcontainer image tag to use for container jobs"
        type: string
        default: "latest"

jobs:
  # ── Pass through caller inputs, or resolve dispatch inputs ───────────────
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      run_lint: ${{ steps.setup.outputs.run_lint }}
      run_validate: ${{ steps.setup.outputs.run_validate }}
      run_unit: ${{ steps.setup.outputs.run_unit }}
      run_features: ${{ steps.setup.outputs.run_features }}
      features: ${{ steps.setup.outputs.features }}
      run_macos: ${{ steps.setup.outputs.run_macos }}
      macos_matrix: ${{ steps.setup.outputs.macos_matrix }}
      unit_macos_matrix: ${{ steps.setup.outputs.unit_macos_matrix }}
      run_prepare: ${{ steps.setup.outputs.run_prepare }}
      run_python: ${{ steps.setup.outputs.run_python }}
      version: ${{ steps.setup.outputs.version }}
      ci_image: ${{ steps.setup.outputs.ci_image }}
      unit_env_matrix: ${{ steps.setup.outputs.unit_env_matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Pass through inputs (workflow_call) or resolve inputs (workflow_dispatch)"
        id: setup
        env:
          INPUT_RUN_LINT: ${{ inputs.run_lint }}
          INPUT_RUN_VALIDATE: ${{ inputs.run_validate }}
          INPUT_RUN_UNIT: ${{ inputs.run_unit }}
          INPUT_RUN_FEATURES: ${{ inputs.run_features }}
          INPUT_FEATURES: ${{ inputs.features }}
          INPUT_RUN_MACOS: ${{ inputs.run_macos }}
          INPUT_MACOS_FEATURES: ${{ inputs.macos_features }}
          INPUT_RUN_PYTHON: ${{ inputs.run_python }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: bash .dev/scripts/ci/ci_setup.sh

  # ── Prepare: sync src/, build dist/, upload artifacts ────────────────────
  prepare:
    name: Prepare
    needs: setup
    if: needs.setup.outputs.run_prepare == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build artifacts
        run: just build-dist "${{ needs.setup.outputs.version }}"

      - name: Upload src/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devfeats-src
          path: src/
          include-hidden-files: true
          retention-days: 1

      - name: Upload dist/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devfeats-dist
          path: dist/
          retention-days: 1

  # ── Lint (shfmt + shellcheck) ─────────────────────────────────────────────
  lint:
    name: "Format & lint"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_lint == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: "Check formatting (shfmt)"
        run: just format-check

      - name: "Lint (shellcheck)"
        if: always()
        run: just lint

  # ── Validate metadata.yaml + devcontainer-feature.json files ─────────────
  validate:
    name: "Validate feature metadata"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_validate == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: "Validate devcontainer-feature.json files"
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          validate-only: "true"
          base-path-to-features: "./src"

  # ── Unit tests (macOS native, data-driven) ────────────────────────────────
  test-unit-native:
    name: "Unit Tests - macOS (${{ matrix.os.runner }})"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_unit == 'true'
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.setup.outputs.unit_macos_matrix) }}
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: "Install bash ≥4"
        run: brew install bash

      - name: "Run unit tests"
        run: bash .dev/scripts/test/run-unit.sh

  # ── Unit tests (Linux distribution containers) ────────────────────────────
  test-unit-container:
    name: "Unit Tests - ${{ matrix.env.name }}"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_unit == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(needs.setup.outputs.unit_env_matrix) }}
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: "Run unit tests in ${{ matrix.env.name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just test-unit-in-env "${{ matrix.env.name }}"

  # ── Feature scenario tests (Linux / devcontainer) ─────────────────────────
  test-features:
    name: "Scenario Tests - ${{ matrix.feature }}"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_features == 'true' && needs.setup.outputs.features != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJSON(needs.setup.outputs.features) }}
    steps:
      # Host-only: removing preinstalled SDKs and caches only affects the runner
      # disk when this step runs on the host (not inside jobs.container). See
      # actions/runner-images#709, community#25678, jlumbroso/free-disk-space, and
      # Apache Flink's free_disk_space.sh.
      - name: Free disk space (GitHub-hosted runner)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          swap-storage: true
          docker-images: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Feature Scenarios (DinD in devcontainer image)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_IMAGE: ${{ needs.setup.outputs.ci_image }}
        run: |
          docker run --rm --privileged \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            -e GITHUB_TOKEN \
            "$CI_IMAGE" \
            bash .dev/scripts/ci/ci_test-features_dind.sh "${{ matrix.feature }}"

  # ── Feature scenario tests (macOS native, data-driven) ────────────────────
  test-macos:
    name: "Scenario Tests - ${{ matrix.job.feature }} (macOS)"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_macos == 'true' && needs.setup.outputs.macos_matrix != '[]'
    runs-on: ${{ matrix.job.runner }}
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.setup.outputs.macos_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: "Test ${{ matrix.job.feature }} macOS scenarios"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .dev/scripts/test/run-feature-tests.sh "${{ matrix.job.feature }}" --mode macos

  # ── Python lint (ruff) + tests (pytest) ──────────────────────────────────
  test-python:
    name: "Python – lint & test"
    needs: [setup]
    if: needs.setup.outputs.run_python == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.setup.outputs.ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Lint (ruff check)"
        run: just lint-py

      - name: "Check formatting (ruff format)"
        if: always()
        run: just format-py-check

      - name: "Test (pytest)"
        if: always()
        run: just test-proman
