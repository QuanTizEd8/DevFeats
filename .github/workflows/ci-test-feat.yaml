name: CI - Test - Features

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true

jobs:
  linux:
    name: ${{ matrix.feature }}
    if: fromJSON(inputs.config).linux.enabled == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJSON(inputs.config).linux.features }}
    steps:
      # Host-only: removing preinstalled SDKs and caches only affects the runner
      # disk when this step runs on the host (not inside jobs.container). See
      # actions/runner-images#709, community#25678, jlumbroso/free-disk-space, and
      # Apache Flink's free_disk_space.sh.
      - name: Free disk space (GitHub-hosted runner)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: ${{ fromJSON(inputs.config).linux.free_disk_space.tool_cache }}
          swap-storage: ${{ fromJSON(inputs.config).linux.free_disk_space.swap_storage }}
          docker-images: ${{ fromJSON(inputs.config).linux.free_disk_space.docker_images }}
          android: ${{ fromJSON(inputs.config).linux.free_disk_space.android }}
          dotnet: ${{ fromJSON(inputs.config).linux.free_disk_space.dotnet }}
          haskell: ${{ fromJSON(inputs.config).linux.free_disk_space.haskell }}
          large-packages: ${{ fromJSON(inputs.config).linux.free_disk_space.large_packages }}

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Source Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_src_name }}
          path: ${{ fromJSON(inputs.config).artifact_src_path }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ fromJSON(inputs.config).linux.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Feature Scenarios (DinD in devcontainer image)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_IMAGE: ${{ fromJSON(inputs.config).linux.ci_image }}
        run: |
          docker run --rm --privileged \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            -e GITHUB_TOKEN \
            -e "HOST_REPO_ROOT=${GITHUB_WORKSPACE}" \
            "$CI_IMAGE" \
            just run-gha-dind just test-feats "${{ matrix.feature }}"

  macos:
    name: ${{ matrix.job.feature }} (macOS)
    if: fromJSON(inputs.config).macos.enabled == true
    runs-on: ${{ matrix.job.runner }}
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(inputs.config).macos.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Source Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_src_name }}
          path: ${{ fromJSON(inputs.config).artifact_src_path }}

      - name: "Test ${{ matrix.job.feature }} macOS scenarios"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just test-feats-macos "${{ matrix.job.feature }}"
