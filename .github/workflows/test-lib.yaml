name: Test Library

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true

jobs:
  test-lib-linux:
    name: ${{ matrix.env.name }}
    if: |
      fromJSON(inputs.config).enabled == true &&
      fromJSON(inputs.config).linux_enabled == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(inputs.config).linux_matrix }}
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_dist_name }}
          path: ${{ fromJSON(inputs.config).artifact_dist_path }}

      - name: Extract library tarball
        env:
          DIST_PATH: ${{ fromJSON(inputs.config).artifact_dist_path }}
        run: |
          set -euo pipefail
          mkdir -p dist/lib-test
          tar -xzf "${DIST_PATH}devfeats-bashlib.tar.gz" --strip-components=1 -C dist/lib-test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Run unit tests in ${{ matrix.env.name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            -v "/var/run/docker.sock:/var/run/docker.sock" \
            -e GITHUB_TOKEN \
            -e "HOST_REPO_ROOT=${GITHUB_WORKSPACE}" \
            -e "LIB_ROOT=/repo/dist/lib-test" \
            "${{ fromJSON(inputs.config).ci_image }}" \
            just test-lib "${{ matrix.env.name }}"

  test-lib-macos:
    name: ${{ matrix.os.env }}
    if: |
      fromJSON(inputs.config).enabled == true &&
      fromJSON(inputs.config).macos_enabled == true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.config).macos_matrix }}
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_dist_name }}
          path: ${{ fromJSON(inputs.config).artifact_dist_path }}

      - name: Extract library tarball
        env:
          DIST_PATH: ${{ fromJSON(inputs.config).artifact_dist_path }}
        run: |
          set -euo pipefail
          mkdir -p dist/lib-test
          tar -xzf "${DIST_PATH}devfeats-bashlib.tar.gz" --strip-components=1 -C dist/lib-test

      - name: "Install bash ≥4"
        run: brew install bash

      - name: "Run unit and integration tests"
        env:
          LIB_ROOT: ${{ github.workspace }}/dist/lib-test
        run: |
          args=()
          [[ "${{ matrix.os.clean_path }}" == "true" ]] && args+=(--clean-path)
          [[ -n "${{ matrix.os.path_prepend }}" ]] && args+=(--path-prepend "${{ matrix.os.path_prepend }}")
          if [[ "${{ matrix.os.integration }}" == "true" ]]; then
            # Unit tests (top-level *.bats) and integration tests (integration/*.bats).
            # Use explicit patterns to avoid recursing into the bats/ submodule.
            args+=(--paths "${GITHUB_WORKSPACE}/test/lib/*.bats")
            args+=(--paths "${GITHUB_WORKSPACE}/test/lib/integration")
          fi
          bash .dev/scripts/test/run-unit.sh "${args[@]}"
