name: "CD"

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to publish.
        type: string
        required: true
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish.
        required: true

jobs:
  publish-ghcr:
    name: GHCR Publication
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download src/ artifact (workflow_call)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: Log in to GHCR (workflow_dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build src/ (workflow_dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: docker://ghcr.io/quantized8/sysset-devcontainer:latest
        with:
          entrypoint: /bin/bash
          args: -c "just sync"

      - name: Publish Features to GHCR
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-gh-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download dist/ artifact (workflow_call)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: Log in to GHCR (workflow_dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dist/ (workflow_dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: docker://ghcr.io/quantized8/sysset-devcontainer:latest
        with:
          entrypoint: /bin/bash
          args: -c "just build-dist ${{ inputs.release_tag }}"

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ inputs.release_tag }}" > /dev/null 2>&1; then
            echo "ℹ️  Release ${{ inputs.release_tag }} already exists — uploading/replacing assets." >&2
            gh release upload "${{ inputs.release_tag }}" dist/* --clobber
          else
            gh release create "${{ inputs.release_tag }}" dist/* \
              --title "${{ inputs.release_tag }}" \
              --generate-notes
          fi
