name: Continuous Deployment

on:
  workflow_call:
    inputs:
      features_to_release:
        description: |
          JSON array of features to release, as produced by cicd_detect.py.
          Each element: {"feature":"<id>","version":"<X.Y.Z>","tag":"<id>/<X.Y.Z>"}.
        type: string
        required: true

jobs:
  ghcr:
    name: GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download Source Artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-src
          path: src/

      - name: Publish Features to GHCR
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          disable-repo-tagging: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gh-release:
    name: "GH Release: ${{ matrix.entry.feature }} ${{ matrix.entry.version }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.setup.outputs.features_to_release) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download Source Artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: devfeats-dist
          path: dist/

      - name: Create Annotated Tag and Push
        env:
          TAG: ${{ matrix.entry.tag }}
          FEATURE: ${{ matrix.entry.feature }}
          VERSION: ${{ matrix.entry.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "ℹ️  Tag '${TAG}' already exists locally; skipping create." >&2
          else
            git tag -a "${TAG}" -m "${FEATURE} ${VERSION}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Create GitHub Release
        env:
          TAG: ${{ matrix.entry.tag }}
          FEATURE: ${{ matrix.entry.feature }}
          VERSION: ${{ matrix.entry.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          _asset="dist/devfeats-${FEATURE}.tar.gz"
          if [[ ! -f "$_asset" ]]; then
            echo "⛔ Expected asset not found: $_asset" >&2
            ls -la dist/ >&2 || true
            exit 1
          fi
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "ℹ️  Release ${TAG} already exists — uploading/replacing asset." >&2
            gh release upload "${TAG}" "$_asset" --clobber
          else
            gh release create "${TAG}" "$_asset" \
              --title "${FEATURE} ${VERSION}" \
              --generate-notes
          fi

  gh-pages:
    name: GH Pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
