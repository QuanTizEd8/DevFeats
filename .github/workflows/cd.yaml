name: CD

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true

# Prevent concurrent deployments from clobbering each other.
# cancel-in-progress: false ensures an in-flight deploy is never aborted by a
# new push; the new run will queue and execute after the current one finishes.
concurrency:
  group: deploy-queue
  cancel-in-progress: false

jobs:
  ghcr:
    name: GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download Source Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_src_name }}
          path: ${{ fromJSON(inputs.config).artifact_src_path }}

      - name: Publish Features to GHCR
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: ${{ fromJSON(inputs.config).features_src_path }}
          disable-repo-tagging: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gh-release:
    name: "GH Release: ${{ matrix.entry.feature }} ${{ matrix.entry.version }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(inputs.config).features }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download Distribution Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_dist_name }}
          path: ${{ fromJSON(inputs.config).artifact_dist_path }}

      - name: Create Annotated Tag and Push
        env:
          TAG: ${{ matrix.entry.tag }}
          FEATURE: ${{ matrix.entry.feature }}
          VERSION: ${{ matrix.entry.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_BOT_NAME: ${{ fromJSON(inputs.config).git_bot_name }}
          GIT_BOT_EMAIL: ${{ fromJSON(inputs.config).git_bot_email }}
        run: |
          set -euo pipefail
          git config user.name "${GIT_BOT_NAME}"
          git config user.email "${GIT_BOT_EMAIL}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "ℹ️  Tag '${TAG}' already exists locally; skipping create." >&2
          else
            git tag -a "${TAG}" -m "${FEATURE} ${VERSION}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Create GitHub Release
        env:
          TAG: ${{ matrix.entry.tag }}
          FEATURE: ${{ matrix.entry.feature }}
          VERSION: ${{ matrix.entry.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_DIST_PATH: ${{ fromJSON(inputs.config).artifact_dist_path }}
        run: |
          set -euo pipefail
          _asset="${ARTIFACT_DIST_PATH}devfeats-${FEATURE}.tar.gz"
          if [[ ! -f "$_asset" ]]; then
            echo "⛔ Expected asset not found: $_asset" >&2
            ls -la "${ARTIFACT_DIST_PATH}" >&2 || true
            exit 1
          fi
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "ℹ️  Release ${TAG} already exists — uploading/replacing asset." >&2
            gh release upload "${TAG}" "$_asset" --clobber
          else
            gh release create "${TAG}" "$_asset" \
              --title "${FEATURE} ${VERSION}" \
              --generate-notes
          fi

  gh-pages:
    name: GH Pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: ${{ fromJSON(inputs.config).pages_environment }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
