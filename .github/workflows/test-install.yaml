name: Test Install Framework

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true

jobs:
  test-install-linux:
    name: ${{ matrix.env.name }}
    if: |
      fromJSON(inputs.config).enabled == true &&
      fromJSON(inputs.config).linux_enabled == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(inputs.config).linux_matrix }}
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact_src_name }}
          path: ${{ fromJSON(inputs.config).artifact_src_path }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Run install framework tests in ${{ matrix.env.name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            -v "/var/run/docker.sock:/var/run/docker.sock" \
            -e GITHUB_TOKEN \
            -e "HOST_REPO_ROOT=${GITHUB_WORKSPACE}" \
            "${{ fromJSON(inputs.config).ci_image }}" \
            just test-install-env "${{ matrix.env.name }}"
