# Build and push a multi-arch devcontainer image to GHCR.

name: Devcontainer Image Deployment

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to push (e.g. 'latest' or 'branch-my-feature')
        type: string
        default: latest
      config_dir:
        description: Directory containing devcontainer.json
        type: string
        default: .devcontainer/.dev
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push (e.g. 'latest' or 'branch-my-feature')
        type: string
        default: latest
      config_dir:
        description: Directory containing devcontainer.json
        type: string
        default: .devcontainer/.dev

env:
  TAG: ${{ inputs.image_tag || 'latest' }}

jobs:
  prepare:
    name: Prepare Variables
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Resolve Image Name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}-devcontainer" >>"$GITHUB_OUTPUT"

  build:
    # Build and push separate images for each platform.
    name: Build (${{ matrix.platform }})
    needs: prepare
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            platform_tag: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform_tag: linux-arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      USERDATA_DIR: /tmp/devcontainer-userdata

    steps:
      - name: Repository Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GHCR Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Setup
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          use: true

      - name: Caching
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          CACHE_KEY: devcontainer-userdata-${{ matrix.platform_tag }}
        with:
          path: ${{ env.USERDATA_DIR }}
          key: ${{ env.CACHE_KEY }}-${{ hashFiles(format('{0}/**', inputs.config_dir)) }}
          restore-keys: ${{ env.CACHE_KEY }}-

      - name: Build & Push
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        env:
          CACHE_REF: ${{ needs.prepare.outputs.image }}:cache-${{ matrix.platform_tag }}
        with:
          imageName: ${{ needs.prepare.outputs.image }}
          imageTag: "${{ env.TAG }}-${{ matrix.platform_tag }}"
          configFile: ${{ inputs.config_dir }}/devcontainer.json
          userDataFolder: ${{ env.USERDATA_DIR }}
          cacheFrom: ${{ env.CACHE_REF }}
          cacheTo: type=registry,ref=${{ env.CACHE_REF }},mode=max
          push: always

  merge:
    # Create and push a single multi-arch manifest
    # that references both platform-specific images built in the previous job.
    name: Multi-Arch Merge
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: GHCR Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Setup
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          use: true

      - name: Manifest Creation & Push
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          SHA: ${{ github.sha }}
        run: |
          ARCH_IMAGES=("${IMAGE}:${TAG}-linux-amd64" "${IMAGE}:${TAG}-linux-arm64")
          docker buildx imagetools create -t "${IMAGE}:${TAG}" "${ARCH_IMAGES[@]}"
          # Push immutable sha tag only for latest (main-branch builds)
          if [[ "${TAG}" == "latest" ]]; then
            docker buildx imagetools create -t "${IMAGE}:sha-${SHA}" "${ARCH_IMAGES[@]}"
          fi
