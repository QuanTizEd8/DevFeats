name: Main Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      rebuild_devcontainer:
        description: Force devcontainer image rebuild.
        type: boolean
        default: false
      run_lint:
        description: Shell lint (shfmt + shellcheck); includes shell format check in the same job.
        type: boolean
        default: true
      run_validate:
        description: Run validate (devcontainer-feature.json)
        type: boolean
        default: true
      run_python:
        description: Python format check, ruff lint, and pytest (lint reusable workflow + test-dev).
        type: boolean
        default: true
      run_docs:
        description: Build docs website
        type: boolean
        default: true
      run_unit:
        description: Run shell library unit tests (test-lib); use run_lib_linux / run_lib_macos to split platforms.
        type: boolean
        default: true
      run_lib_linux:
        description: Library unit tests — Linux matrix from test/lib/scenarios.yaml (Docker per env).
        type: boolean
        default: true
      run_lib_macos:
        description: Library unit tests — native macOS runners from test/environments.yaml.
        type: boolean
        default: true
      run_install:
        description: Run install framework unit tests (test-install).
        type: boolean
        default: true
      run_install_linux:
        description: Install framework tests — Linux matrix from test/install/scenarios.yaml.
        type: boolean
        default: true
      run_features:
        description: >-
          Feature integration tests: selects which features get Linux/devcontainer-side
          coverage (see features). macOS native tests are gated separately by run_macos.
        type: boolean
        default: true
      features:
        description: Features to test on Linux/devcontainer — blank = all, or comma-separated IDs.
        type: string
        default: ""
      run_features_devcontainer:
        description: Feature tests — devcontainer mode (DinD in CI image).
        type: boolean
        default: true
      run_features_linux:
        description: Feature tests — standalone Linux scenarios (ubuntu runner + DinD).
        type: boolean
        default: true
      run_macos:
        description: Feature tests — native macOS scenarios (per test/features/<id>/scenarios.yaml).
        type: boolean
        default: true
      macos_features:
        description: >-
          Subset of features for macOS native tests — blank = all macOS-capable features
          (when run_macos is true), or comma-separated IDs.
        type: string
        default: ""

jobs:
  init:
    name: Initialization
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      config: ${{ steps.detect.outputs.config }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install manager
        run: pip install .dev/lib

      - name: Detect changes
        id: detect
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: proman-cicd-detect

  build-devcontainer:
    name: Build & Deploy Devcontainer
    needs: [init]
    if: fromJSON(needs.init.outputs.config).build_devcontainer.enabled == true
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-devcontainer.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).build_devcontainer) }}
    secrets: inherit

  build-docs:
    name: Build Docs
    needs: [init, build-devcontainer]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.build-devcontainer.result == 'success' || needs.build-devcontainer.result == 'skipped')
    uses: ./.github/workflows/build-docs.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).build_docs) }}
    secrets: inherit

  build-features:
    name: Build Features
    needs: [init, build-devcontainer]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.build-devcontainer.result == 'success' || needs.build-devcontainer.result == 'skipped')
    uses: ./.github/workflows/build-features.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).build_features) }}
    secrets: inherit

  lint:
    name: Lint
    needs: [init, build-devcontainer, build-features]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.build-devcontainer.result == 'success' || needs.build-devcontainer.result == 'skipped') &&
      (needs.build-features.result == 'success' || needs.build-features.result == 'skipped')
    uses: ./.github/workflows/lint.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).lint) }}
    secrets: inherit

  test-dev:
    name: Test Development
    needs: [init, build-devcontainer]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.build-devcontainer.result == 'success' || needs.build-devcontainer.result == 'skipped')
    uses: ./.github/workflows/test-dev.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).test_dev) }}
    secrets: inherit

  test-features:
    name: Test Feature ${{ matrix.feature_cfg.feature }}
    needs: [init, build-devcontainer, build-features]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.build-devcontainer.result == 'success' || needs.build-devcontainer.result == 'skipped') &&
      (needs.build-features.result == 'success' || needs.build-features.result == 'skipped') &&
      fromJSON(needs.init.outputs.config).test_features.enabled == true
    strategy:
      fail-fast: false
      matrix:
        feature_cfg: ${{ fromJSON(needs.init.outputs.config).test_features.feature_matrix }}
    uses: ./.github/workflows/test-features.yaml
    with:
      config: ${{ toJSON(matrix.feature_cfg) }}
    secrets: inherit

  test-lib:
    name: Test Library
    needs: [init, build-devcontainer, build-features]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.build-devcontainer.result == 'success' || needs.build-devcontainer.result == 'skipped') &&
      (needs.build-features.result == 'success' || needs.build-features.result == 'skipped')
    uses: ./.github/workflows/test-lib.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).test_lib) }}
    secrets: inherit

  test-install:
    name: Test Install Framework
    needs: [init, build-devcontainer, build-features]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.build-devcontainer.result == 'success' || needs.build-devcontainer.result == 'skipped') &&
      (needs.build-features.result == 'success' || needs.build-features.result == 'skipped')
    uses: ./.github/workflows/test-install.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).test_install) }}
    secrets: inherit

  deploy:
    name: Deploy
    needs: [init, build-docs, build-features, lint, test-dev, test-features, test-lib, test-install]
    if: |
      !cancelled() &&
      fromJSON(needs.init.outputs.config).deploy.enabled == true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    permissions:
      contents: write
      pull-requests: write
      packages: write
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).deploy) }}
    secrets: inherit
