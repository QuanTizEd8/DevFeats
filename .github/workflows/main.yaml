name: Main Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      rebuild_devcontainer:
        description: "Force devcontainer image rebuild for this manual run."
        type: boolean
        default: false
      run_lint:
        description: "Run lint (shfmt + shellcheck)"
        type: boolean
        default: true
      run_validate:
        description: "Run validate (devcontainer-feature.json)"
        type: boolean
        default: true
      run_unit:
        description: "Run unit tests"
        type: boolean
        default: true
      run_features:
        description: "Run feature scenario tests"
        type: boolean
        default: true
      features:
        description: "Features to test — blank = all, or comma-separated names"
        type: string
        default: ""
      run_macos:
        description: "Run macOS native feature tests"
        type: boolean
        default: true
      macos_features:
        description: "macOS features to test — blank = all capable, or comma-separated names"
        type: string
        default: ""
      run_python:
        description: "Run Python lint (ruff) and tests (pytest)"
        type: boolean
        default: true
      run_docs:
        description: "Build docs website"
        type: boolean
        default: true

jobs:
  init:
    name: Initialization
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      config: ${{ steps.detect.outputs.config }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install manager
        run: pip install .dev/lib

      - name: Detect changes
        id: detect
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: proman-cicd-detect

  cm-devcontainer:
    name: CM - Devcontainer Image
    needs: [init]
    if: fromJSON(needs.init.outputs.config).cm_devcontainer.enabled == true
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cm-devcontainer.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).cm_devcontainer) }}
    secrets: inherit

  ci-build:
    name: CI - Build
    needs: [init, cm-devcontainer]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.cm-devcontainer.result == 'success' || needs.cm-devcontainer.result == 'skipped')
    uses: ./.github/workflows/ci-build.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).ci_build) }}
    secrets: inherit

  ci-lint:
    name: CI - Lint
    needs: [init, cm-devcontainer, ci-build]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.cm-devcontainer.result == 'success' || needs.cm-devcontainer.result == 'skipped') &&
      (needs.ci-build.result == 'success' || needs.ci-build.result == 'skipped')
    uses: ./.github/workflows/ci-lint.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).ci_lint) }}
    secrets: inherit

  ci-test-dev:
    name: CI - Test - Development
    needs: [init, cm-devcontainer]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.cm-devcontainer.result == 'success' || needs.cm-devcontainer.result == 'skipped')
    uses: ./.github/workflows/ci-test-dev.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).ci_test_dev) }}
    secrets: inherit

  ci-test-feat:
    name: CI - Test - Features (${{ matrix.feature_cfg.feature }})
    needs: [init, cm-devcontainer, ci-build]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.cm-devcontainer.result == 'success' || needs.cm-devcontainer.result == 'skipped') &&
      (needs.ci-build.result == 'success' || needs.ci-build.result == 'skipped') &&
      fromJSON(needs.init.outputs.config).ci_test_feat.enabled == true
    strategy:
      fail-fast: false
      matrix:
        feature_cfg: ${{ fromJSON(needs.init.outputs.config).ci_test_feat.feature_matrix }}
    uses: ./.github/workflows/ci-test-feat.yaml
    with:
      config: ${{ toJSON(matrix.feature_cfg) }}
    secrets: inherit

  ci-test-lib:
    name: CI - Test - Library
    needs: [init, cm-devcontainer, ci-build]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      (needs.cm-devcontainer.result == 'success' || needs.cm-devcontainer.result == 'skipped') &&
      (needs.ci-build.result == 'success' || needs.ci-build.result == 'skipped')
    uses: ./.github/workflows/ci-test-lib.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).ci_test_lib) }}
    secrets: inherit

  cd:
    name: CD
    needs: [init, ci-build, ci-lint, ci-test-dev, ci-test-feat, ci-test-lib]
    if: |
      !cancelled() &&
      needs.init.result == 'success' &&
      fromJSON(needs.init.outputs.config).cd.enabled == true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    permissions:
      contents: write
      pull-requests: write
      packages: write
      pages: write
      id-token: write
    uses: ./.github/workflows/cd.yaml
    with:
      config: ${{ toJSON(fromJSON(needs.init.outputs.config).cd) }}
    secrets: inherit
