[project]
name = "proman"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6",
    "jsonschema>=4",
    "gittidy>=0.3.1,<0.4",
]

[project.scripts]
proman-gen-docs-data = "proman.cli.gen_docs_data:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
