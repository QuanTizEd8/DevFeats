htop:
  summary: Interactive process viewer.
  description: |
    htop provides a real-time, colorized display of running processes with
    scrolling, sorting, filtering, and process management. A more ergonomic
    alternative to top(1) with mouse support.
  url:
    docs: https://htop.dev/
    source: https://github.com/htop-dev/htop

lsof:
  summary: List open files and the processes using them.
  description: |
    lsof lists every open file descriptor on the system — regular files,
    sockets, pipes, and devices — along with the owning process. Invaluable
    for debugging port conflicts, file descriptor leaks, and detecting which
    process holds a file open.
  url:
    docs: https://man7.org/linux/man-pages/man8/lsof.8.html
    source: https://github.com/lsof-org/lsof

procps:
  summary: Utilities for monitoring system processes — ps, free, vmstat, pgrep.
  description: |
    procps (procps-ng on Fedora/Arch) provides ps, top, free, vmstat, uptime,
    pgrep, pkill, slabtop, and w. These are the standard process-inspection
    tools on Linux. Linux-only — macOS ships its own implementations.
  url:
    source: https://gitlab.com/procps-ng/procps
  notes: |
    Package named 'procps-ng' on Fedora (dnf) and Arch (pacman).

psmisc:
  summary: Utilities for managing processes — killall, fuser, pstree.
  description: |
    psmisc provides killall (signal processes by name), fuser (identify
    processes using a file or socket), pstree (display process tree), and
    pmap (report memory map). Linux-only.
  url:
    docs: https://man7.org/linux/man-pages/man1/killall.1.html
    source: https://gitlab.com/psmisc/psmisc

strace:
  summary: System call and signal tracer for Linux.
  description: |
    strace intercepts and records system calls made by a process and the
    signals it receives. Indispensable for diagnosing runtime failures,
    understanding I/O behaviour, and debugging inter-process communication.
    Linux-only — macOS equivalent is dtruss/dtrace.
  url:
    docs: https://man7.org/linux/man-pages/man1/strace.1.html
    source: https://github.com/strace/strace

inotify-tools:
  summary: Command-line utilities for the Linux inotify filesystem event API.
  description: |
    inotify-tools provides inotifywait (block until filesystem events occur)
    and inotifywatch (count filesystem events). Used for file-watching in
    test runners, live-reload scripts, and CI triggers. Linux-only — macOS
    uses FSEvents.
  url:
    docs: https://github.com/inotify-tools/inotify-tools
    source: https://github.com/inotify-tools/inotify-tools

xtail:
  summary: Monitor multiple files like `tail -f`, even if they are rotated.
  description: |
    xtail allows users to watch the growth of multiple files at once,
    much like `tail -f`, but with support for files that get rotated
    (like logs). Useful for monitoring log files in debugging and
    operations environments. Linux-only.
  url:
    docs: https://manpages.ubuntu.com/manpages/noble/en/man1/xtail.1.html
    source: https://github.com/pbrady/xtail

sysstat:
  summary: System activity reporting tools — sar, iostat, mpstat, pidstat.
  description: |
    sysstat provides sar (system activity reporter), iostat (CPU and I/O
    statistics), mpstat (per-CPU statistics), and pidstat (per-process
    statistics). Essential for performance profiling, diagnosing I/O
    bottlenecks, and historical monitoring. Linux-only.
  url:
    docs: https://sysstat.github.io/
    source: https://github.com/sysstat/sysstat

iotop:
  summary: Monitor disk I/O usage by process.
  description: |
    iotop displays real-time disk I/O usage broken down by process, similar
    to top(1) but for I/O. Invaluable for identifying processes causing disk
    saturation or unexpected write amplification. Linux-only.
  url:
    docs: https://manpages.ubuntu.com/manpages/noble/en/man8/iotop.8.html
    source: https://github.com/Tomas-M/iotop

nethogs:
  summary: Monitor network bandwidth usage per process.
  description: |
    nethogs groups network traffic by process, showing which programs consume
    bandwidth in real time. Useful for identifying unexpected network activity
    or runaway upload/download processes. Linux-only.
  url:
    docs: https://manpages.ubuntu.com/manpages/noble/en/man8/nethogs.8.html
    source: https://github.com/raboof/nethogs

btop:
  summary: Resource monitor — CPU, memory, disks, network, and processes.
  description: |
    btop is a feature-rich, visually polished TUI resource monitor. Displays
    CPU usage per core, memory and swap, disk I/O, network throughput, and a
    sortable process list — all in one screen. A modern successor to htop/bpytop.
  url:
    docs: https://github.com/aristocratos/btop
    source: https://github.com/aristocratos/btop

duf:
  summary: Disk usage/free — modern df with a clean table output.
  description: |
    duf lists mounted filesystems with colored, human-readable output,
    grouping local, network, and special mounts. Provides the same information
    as df(1) but in a far more readable format with device type icons.
  url:
    docs: https://github.com/muesli/duf
    source: https://github.com/muesli/duf

glances:
  summary: Cross-platform curses system monitor with web UI and container support.
  description: |
    glances provides a real-time overview of system resources in a single
    screen: CPU (per-core), memory, swap, disk I/O, network, processes,
    temperatures, and Docker/Podman containers. Beyond the TUI, it exposes
    a web UI, REST API, and Prometheus metrics endpoint — making it useful
    for both interactive monitoring and automated collection.
  url:
    docs: https://glances.readthedocs.io/
    source: https://github.com/nicolargo/glances
