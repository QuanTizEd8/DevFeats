packages:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  - name: libpq-dev
    brew: libpq
    # apk name is also 'libpq-dev' — no override needed
    dnf: libpq-devel
    yum: postgresql-devel
    zypper: postgresql-devel
    pacman: postgresql-libs

  # ── MySQL / MariaDB ───────────────────────────────────────────────────────
  - name: default-libmysqlclient-dev
    brew: mysql-client
    apk: mariadb-dev
    dnf: mariadb-connector-c-devel
    yum: mariadb-devel
    zypper: mariadb-devel
    pacman: mariadb-libs

  # ── SQLite CLI ──────────────────────────────────────────────────────────────
  # dev headers (libsqlite3-dev) live in the dev-libs bundle
  - name: sqlite
    apt: sqlite3
    zypper: sqlite3

  # ── ODBC ──────────────────────────────────────────────────────────────────
  - name: unixodbc-dev
    brew: unixodbc
    dnf: unixODBC-devel
    yum: unixODBC-devel
    zypper: unixodbc-devel
    pacman: unixodbc
