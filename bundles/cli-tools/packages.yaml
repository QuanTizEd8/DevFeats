packages:
  # Downloading / transfer
  - curl
  - wget
  - rsync

  # Data processing
  - jq

  # Pager / editors
  - less
  - nano
  - vim

  # Terminal multiplexer / disk usage
  - tmux
  - tree
  - ncdu

  # Interactive utilities
  - dialog
  - moreutils

  # Archive utilities
  - unzip
  - zip
  - name: xz-utils
    brew: xz
    apk: xz
    dnf: xz
    zypper: xz
    pacman: xz

  # Cryptography
  - name: gnupg
    dnf: gnupg2
    zypper: gpg2

  # Secure shell client
  - name: openssh-client
    brew: openssh
    dnf: openssh-clients
    zypper: openssh
    pacman: openssh

  # Linux-only utilities
  - name: file
    when: {kernel: linux}

  # man-db: man command and manual page database
  - name: man-db
    when: {kernel: linux}
    apk: man-db
    dnf: man-db
    zypper: man
    pacman: man-db

  # manpages: Linux manual pages for user commands
  - name: manpages
    when: {kernel: linux}
    dnf: man-pages
    zypper: man-pages
    pacman: man-pages
