# Compiler toolchain equivalents per PM
apt:
  packages:
    - build-essential

apk:
  packages:
    - build-base

dnf:
  groups:
    - development-tools

yum:
  groups:
    - development-tools

# zypper: install the devel_basis pattern
# pacman: install the base-devel group
groups:
  - name: devel_basis
    when: {pm: zypper}
  - name: base-devel
    when: {pm: pacman}

packages:
  # Build system
  - cmake
  - autoconf
  - automake
  - libtool

  - meson
  - ccache

  # Static analysis
  - cppcheck

  # Wrapper/binding generators
  - swig

  # Debuggers
  - gdb
  - name: lldb
    brew: llvm

  # Compiler + LLVM toolchain (llc, opt, llvm-config, etc.)
  # On brew, 'llvm' installs everything (clang, lldb, IR tools) in one formula.
  # On Linux, 'clang' is the frontend and 'llvm' is a separate package for the IR tools.
  - name: clang
    brew: llvm
  - name: llvm
    when: {kernel: linux}

  # Patching
  - name: patch
    brew: gpatch

  # Memory analysis (Linux-only — Valgrind does not run on macOS)
  - name: valgrind
    when: {kernel: linux}

  # Build system helpers
  - name: ninja-build
    brew: ninja
    apk: ninja
    dnf: ninja-build
    zypper: ninja
    pacman: ninja

  - name: pkg-config
    apk: pkgconf
    dnf: pkgconf-pkg-config
    zypper: pkgconf
    pacman: pkgconf

