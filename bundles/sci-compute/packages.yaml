packages:

  # ── HDF5 (array/dataset storage) ─────────────────────────────────────────
  - name: hdf5-devel
    apt: libhdf5-dev
    brew: hdf5
    apk: hdf5-dev
    pacman: hdf5

  # ── Linear algebra (BLAS / LAPACK) ───────────────────────────────────────
  - name: openblas-devel
    apt: libopenblas-dev
    brew: openblas
    apk: openblas-dev
    pacman: openblas

  - name: lapack-devel
    apt: liblapack-dev
    brew: lapack
    apk: lapack-dev
    pacman: lapack

  # ── Protocol Buffers ─────────────────────────────────────────────────────
  # Both entries map to the same 'protobuf' formula on Homebrew (idempotent).
  - name: protobuf-devel
    apt: libprotobuf-dev
    brew: protobuf
    apk: protobuf-dev
    pacman: protobuf

  - name: protobuf
    apt: protobuf-compiler
    dnf: protobuf-compiler
    yum: protobuf-compiler

  # ── Fourier analysis ────────────────────────────────────────────────────
  - name: fftw-devel
    apt: libfftw3-dev
    brew: fftw
    apk: fftw-dev
    zypper: fftw3-devel
    pacman: fftw

  # ── GNU Scientific Library ────────────────────────────────────────────────
  - name: gsl-devel
    apt: libgsl-dev
    brew: gsl
    apk: gsl-dev
    pacman: gsl

  # ── Eigen (C++ linear algebra, header-only) ───────────────────────────────
  - name: eigen3-devel
    apt: libeigen3-dev
    brew: eigen
    apk: eigen-dev
    pacman: eigen

  # ── Boost C++ libraries ───────────────────────────────────────────────────
  - name: boost-devel
    apt: libboost-dev
    brew: boost
    apk: boost-dev
    pacman: boost
