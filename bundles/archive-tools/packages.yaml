packages:
  # ── Tar (fundamental archiver) ────────────────────────────────────────────
  # Linux-only: macOS ships BSD tar at /usr/bin/tar
  - name: tar
    when: {kernel: linux}

  # ── Zip archives ──────────────────────────────────────────────────────────
  - unzip
  - zip

  # ── 7-zip ─────────────────────────────────────────────────────────────────
  - name: p7zip
    apt: p7zip-full

  # ── Compression formats ────────────────────────────────────────────────────
  - gzip
  - bzip2

  - name: xz
    apt: xz-utils

  - zstd
  - lz4
