packages:
  # ── Tar (fundamental archiver) ────────────────────────────────────────────
  # Linux-only: macOS ships BSD tar at /usr/bin/tar
  - name: tar
    when: {kernel: linux}

  # ── Zip archives ──────────────────────────────────────────────────────────
  - unzip
  - zip

  # ── 7-zip ─────────────────────────────────────────────────────────────────
  - name: p7zip-full
    brew: p7zip
    apk: p7zip
    dnf: p7zip
    zypper: p7zip
    pacman: p7zip

  # ── Compression formats ────────────────────────────────────────────────────
  - gzip
  - bzip2

  - name: xz-utils
    brew: xz
    apk: xz
    dnf: xz
    zypper: xz
    pacman: xz

  - zstd
  - lz4
