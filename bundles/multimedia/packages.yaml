packages:
  # ── Swiss-army multimedia framework ──────────────────────────────────────
  - ffmpeg

  # ── Audio file I/O ────────────────────────────────────────────────────────
  - name: libsndfile-devel
    apt: libsndfile1-dev
    brew: libsndfile
    apk: libsndfile-dev
    pacman: libsndfile

  # ── Opus audio codec ─────────────────────────────────────────────────────
  - name: opus-devel
    apt: libopus-dev
    brew: opus
    apk: opus-dev
    zypper: libopus-devel
    pacman: opus

  # ── PortAudio (cross-platform audio I/O) ─────────────────────────────────
  - name: portaudio-devel
    apt: portaudio19-dev
    brew: portaudio
    apk: portaudio-dev
    pacman: portaudio

  # ── FLAC audio codec ─────────────────────────────────────────────────────
  - name: flac-devel
    apt: libflac-dev
    brew: flac
    apk: flac-dev
    pacman: flac

  # ── Ogg Vorbis audio codec ────────────────────────────────────────────────
  - name: libvorbis-devel
    apt: libvorbis-dev
    brew: libvorbis
    apk: libvorbis-dev
    pacman: libvorbis
