packages:
  # ── Compression ───────────────────────────────────────────────────────────
  - name: zlib-devel
    apt: zlib1g-dev
    brew: zlib
    apk: zlib-dev
    pacman: zlib

  - name: bzip2-devel
    apt: libbz2-dev
    brew: bzip2
    apk: bzip2-dev
    zypper: libbz2-devel
    pacman: bzip2

  - name: xz-devel
    apt: liblzma-dev
    brew: xz
    apk: xz-dev
    pacman: xz

  # ── Crypto / TLS ──────────────────────────────────────────────────────────
  - name: openssl-devel
    apt: libssl-dev
    brew: openssl@3
    apk: openssl-dev
    zypper: libopenssl-devel
    pacman: openssl

  - name: krb5-devel
    apt: libkrb5-dev
    brew: krb5
    apk: krb5-dev
    pacman: krb5

  # ── Secret storage ────────────────────────────────────────────────────────
  - name: libsecret-devel
    apt: libsecret-1-dev
    brew: libsecret
    apk: libsecret-dev
    pacman: libsecret

  # ── Network / HTTP ────────────────────────────────────────────────────────
  - name: libcurl-devel
    apt: libcurl4-openssl-dev
    brew: curl
    apk: curl-dev
    pacman: curl

  - name: libevent-devel
    apt: libevent-dev
    apk: libevent-dev
    brew: libevent
    pacman: libevent

  # ── FFI / Dynamic loading ─────────────────────────────────────────────────
  - name: libffi-devel
    apt: libffi-dev
    apk: libffi-dev
    brew: libffi
    pacman: libffi

  # ── Terminal / readline ───────────────────────────────────────────────────
  - name: readline-devel
    apt: libreadline-dev
    brew: readline
    apk: readline-dev
    pacman: readline

  - name: ncurses-devel
    apt: libncurses-dev
    brew: ncurses
    apk: ncurses-dev
    pacman: ncurses

  # ── SQLite dev headers ────────────────────────────────────────────────────
  - name: sqlite-devel
    apt: libsqlite3-dev
    brew: sqlite
    apk: sqlite-dev
    zypper: sqlite3-devel
    pacman: sqlite

  # ── UUID ──────────────────────────────────────────────────────────────────
  # macOS provides UUID in the system SDK; install only on Linux
  - name: libuuid-devel
    when: {kernel: linux}
    apt: uuid-dev
    apk: util-linux-dev
    pacman: util-linux

  # ── GLib ──────────────────────────────────────────────────────────────────
  - name: glib2-devel
    apt: libglib2.0-dev
    brew: glib
    apk: glib-dev
    pacman: glib2

  # ── XML / Parsing ─────────────────────────────────────────────────────────
  - name: libxml2-devel
    apt: libxml2-dev
    brew: libxml2
    apk: libxml2-dev
    pacman: libxml2

  - name: libxslt-devel
    apt: libxslt1-dev
    brew: libxslt
    apk: libxslt-dev
    pacman: libxslt

  - name: libyaml-devel
    apt: libyaml-dev
    brew: libyaml
    apk: yaml-dev
    pacman: libyaml

  - name: expat-devel
    apt: libexpat1-dev
    brew: expat
    apk: expat-dev
    zypper: libexpat-devel
    pacman: expat

  # ── Regular expressions ───────────────────────────────────────────────────
  - name: pcre2-devel
    apt: libpcre2-dev
    brew: pcre2
    apk: pcre2-dev
    pacman: pcre2

  # ── Arbitrary-precision arithmetic ───────────────────────────────────────
  - name: gmp-devel
    apt: libgmp-dev
    brew: gmp
    apk: gmp-dev
    pacman: gmp

  # ── Image formats ─────────────────────────────────────────────────────────
  - name: libpng-devel
    apt: libpng-dev
    brew: libpng
    apk: libpng-dev
    zypper: libpng16-compat-devel
    pacman: libpng

  - name: libjpeg-turbo-devel
    apt: libjpeg-dev
    brew: libjpeg-turbo
    apk: libjpeg-turbo-dev
    zypper: libjpeg8-devel
    pacman: libjpeg-turbo

  - name: libwebp-devel
    apt: libwebp-dev
    brew: webp
    apk: libwebp-dev
    pacman: libwebp

  # ── Tcl/Tk GUI toolkit ────────────────────────────────────────────────────
  - name: tk-devel
    apt: tk-dev
    brew: tcl-tk@8
    apk: tk-dev
    pacman: tk

  # ── Modern cryptography ──────────────────────────────────────────────────
  - name: libsodium-devel
    apt: libsodium-dev
    apk: libsodium-dev
    brew: libsodium
    pacman: libsodium

  # ── ImageMagick dev headers (apt-only; other PMs bundle headers) ───────────
  - name: libmagickcore-dev
    when: {pm: apt}
  - name: libmagickwand-dev
    when: {pm: apt}

  # ── Python development headers ──────────────────────────────────────────────
  # Required for building Python C extensions (e.g. pip-compiled packages)
  - name: python3-devel
    apt: python3-dev
    apk: python3-dev
    brew: python@3
    pacman: python

  # ── Messaging / async I/O ─────────────────────────────────────────────────
  - name: zeromq-devel
    apt: libzmq3-dev
    brew: zeromq
    apk: zeromq-dev
    pacman: zeromq

  - name: libuv-devel
    apt: libuv1-dev
    brew: libuv
    apk: libuv-dev
    pacman: libuv

  # ── Regular expressions (RE2) ─────────────────────────────────────────────
  - name: re2-devel
    apt: libre2-dev
    brew: re2
    apk: re2-dev
    pacman: re2
