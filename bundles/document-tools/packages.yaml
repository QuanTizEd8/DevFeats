packages:
  # ── PostScript / PDF ──────────────────────────────────────────────────────
  - ghostscript
  # ── Document conversion ────────────────────────────────────────────────────
  - pandoc

  # ── PDF utilities ───────────────────────────────────────────────────────
  # pdfimages, pdftotext, pdftoppm, pdfinfo, etc.
  - name: poppler-utils
    brew: poppler
    zypper: poppler-tools
    pacman: poppler

  # ── Graph / diagram rendering ─────────────────────────────────────────────
  - graphviz

  # ── Plotting ──────────────────────────────────────────────────────────────
  # On apt, gnuplot-nox is the headless (no-X11) variant; all other PMs ship
  # a single 'gnuplot' package.
  - name: gnuplot
    apt: gnuplot-nox

  # ── Image manipulation ────────────────────────────────────────────────────
  # Capital 'I' and 'M' on Fedora (dnf/yum) and openSUSE (zypper).
  - name: imagemagick
    dnf: ImageMagick
    yum: ImageMagick
    zypper: ImageMagick

  # ── Font infrastructure ───────────────────────────────────────────────────
  - fontconfig

  # ── Syntax highlighting ───────────────────────────────────────────────────
  - name: python3-pygments
    brew: pygments
    apk: py3-pygments
    zypper: python3-Pygments
    pacman: python-pygments

  # ── SVG rendering ─────────────────────────────────────────────────────────
  # rsvg-convert: SVG → PNG/PDF/PS conversion
  - name: librsvg
    apt: librsvg2-bin
    dnf: librsvg2-tools
    yum: librsvg2-tools
    zypper: rsvg-convert

  # ── OCR ───────────────────────────────────────────────────────────────────
  - name: tesseract
    apt: tesseract-ocr
    apk: tesseract-ocr
    zypper: tesseract-ocr

