packages:
  # ── PostScript / PDF ──────────────────────────────────────────────────────
  - ghostscript
  # ── Document conversion ────────────────────────────────────────────────────
  - pandoc

  # ── PDF utilities ───────────────────────────────────────────────────────
  # pdfimages, pdftotext, pdftoppm, pdfinfo, etc.
  - name: poppler-utils
    brew: poppler
    zypper: poppler-tools
    pacman: poppler

  # ── Graph / diagram rendering ─────────────────────────────────────────────
  - graphviz

  # ── Plotting ──────────────────────────────────────────────────────────────
  # On apt, gnuplot-nox is the headless (no-X11) variant; all other PMs ship
  # a single 'gnuplot' package.
  - name: gnuplot-nox
    brew: gnuplot
    apk: gnuplot
    dnf: gnuplot
    zypper: gnuplot
    pacman: gnuplot

  # ── Image manipulation ────────────────────────────────────────────────────
  # Capital 'I' and 'M' on Fedora (dnf) and openSUSE (zypper).
  - name: imagemagick
    dnf: ImageMagick
    zypper: ImageMagick

  # ── Font infrastructure ───────────────────────────────────────────────────
  - fontconfig

  # ── Syntax highlighting ───────────────────────────────────────────────────
  - name: python3-pygments
    brew: pygments
    apk: py3-pygments
    dnf: python3-pygments
    zypper: python3-Pygments
    pacman: python-pygments

  # ── SVG rendering ─────────────────────────────────────────────────────────
  # rsvg-convert: SVG → PNG/PDF/PS conversion
  - name: librsvg2-bin
    brew: librsvg
    apk: librsvg
    dnf: librsvg2-tools
    zypper: rsvg-convert
    pacman: librsvg

  # ── OCR ───────────────────────────────────────────────────────────────────
  - name: tesseract-ocr
    brew: tesseract
    apk: tesseract-ocr
    dnf: tesseract
    zypper: tesseract-ocr
    pacman: tesseract

