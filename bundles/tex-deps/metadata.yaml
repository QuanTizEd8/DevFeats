perl:
  summary: Highly capable, feature-rich programming language.
  description: |
    Perl is required by numerous TeX Live management scripts
    (fmtutil, texmf-install, updmap, etc.) and by many contributed
    TeX packages. It is pre-installed on most desktop distributions
    but frequently absent from minimal container images.
  url:
    docs: https://www.perl.org/docs.html
    source: https://github.com/Perl/perl5

python-is-python3:
  summary: Symlink /usr/bin/python to Python 3 (Debian/Ubuntu only).
  description: |
    Creates a /usr/bin/python → python3 symlink. Required by TeX Live
    tools and contributed scripts that invoke 'python' rather than
    'python3'. On all non-Debian distributions, 'python' already points
    to Python 3; this package is therefore apt-only.
  url:
    docs: https://packages.ubuntu.com/noble/python-is-python3

python3:
  summary: Python 3 interpreter.
  description: |
    Several TeX Live utilities (citeproc, pygmentize integration,
    various scripts) require Python 3. Typically pre-installed, but
    included here for completeness in minimal images.
  url:
    docs: https://docs.python.org/3/

default-jre:
  summary: Java Runtime Environment (OpenJDK).
  description: |
    Required by the arara TeX build tool and by luafindfont. On Debian/Ubuntu,
    'default-jre' is a metapackage tracking the recommended JRE (OpenJDK 21
    on Noble). On other platforms, a versioned OpenJDK headless package is
    used instead.
  url:
    docs: https://openjdk.org/
    source: https://github.com/openjdk/jdk

libfile-homedir-perl:
  summary: Perl module for locating user home directories cross-platform.
  description: |
    Provides File::HomeDir, which latexindent uses to locate per-user
    configuration files (indentconfig.yaml). apt-only — other distributions
    either bundle this with the core Perl distribution or require cpan.
  url:
    docs: https://metacpan.org/pod/File::HomeDir
    source: https://salsa.debian.org/perl-team/modules/packages/libfile-homedir-perl.git
  notes: |
    Required for latexindent. See Island of TeX Dockerfile:
    https://gitlab.com/islandoftex/images/texlive/-/blob/72240db12e00510972aeea19cd0a08edc22c4152/Dockerfile.base#L24

libunicode-linebreak-perl:
  summary: Perl module implementing the Unicode Line Breaking Algorithm.
  description: |
    Provides Unicode::LineBreak, used by latexindent when processing
    documents with non-ASCII text. Implements UAX #14.
  url:
    docs: https://metacpan.org/pod/Unicode::LineBreak
    source: https://salsa.debian.org/perl-team/modules/packages/libunicode-linebreak-perl.git
  notes: |
    Required for latexindent. See Island of TeX Dockerfile:
    https://gitlab.com/islandoftex/images/texlive/-/blob/72240db12e00510972aeea19cd0a08edc22c4152/Dockerfile.base#L24

libyaml-tiny-perl:
  summary: Read and write YAML files with as little code as possible.
  description: |
    Provides YAML::Tiny, the YAML parser used by latexindent to read
    indentation configuration files (indentconfig.yaml, localSettings.yaml).
  url:
    docs: https://metacpan.org/pod/YAML::Tiny
    source: https://salsa.debian.org/perl-team/modules/packages/libyaml-tiny-perl.git

libgetopt-long-descriptive-perl:
  summary: Perl command-line option parser with auto-generated usage text.
  description: |
    Provides Getopt::Long::Descriptive, used by latexindent for its
    command-line interface.
  url:
    docs: https://metacpan.org/pod/Getopt::Long::Descriptive
    source: https://github.com/deepin-community/libgetopt-long-descriptive-perl

libdigest-perl-md5-perl:
  summary: Pure-Perl MD5 fallback when Digest::MD5 (XS) is unavailable.
  description: |
    Provides Digest::Perl::MD5 as a pure-Perl fallback. latexindent uses
    MD5 hashing to detect unchanged files; this module ensures it works
    even in environments without a C compiler or pre-built XS modules.
  url:
    docs: https://metacpan.org/pod/Digest::Perl::MD5
    source: https://github.com/mschilli/digest-perl-md5

libglut3.12:
  summary: OpenGL Utility Toolkit runtime library (freeglut 3.4, Ubuntu Noble).
  description: |
    The asymptote vector graphics language links against libglut. Ubuntu 24.04
    (Noble) ships freeglut as libglut3.12 but does not create the expected
    libglut.so.3 compatibility symlink. The bundle's post_install step creates
    that symlink if it is absent.
  url:
    docs: https://freeglut.sourceforge.net/
  notes: |
    Required for asymptote in TeX Live. See Island of TeX Dockerfile:
    https://gitlab.com/islandoftex/images/texlive/-/blob/72240db12e00510972aeea19cd0a08edc22c4152/Dockerfile.base#L34
    Symlink workaround: https://askubuntu.com/questions/1526992

fonts-freefont-otf:
  summary: GNU FreeFont Unicode OpenType fonts.
  description: |
    FreeSerif, FreeSans, and FreeMono — three high-quality OpenType fonts
    covering a very large subset of the Unicode character set. Required by
    TeX documents that reference characters outside the Latin range, and
    used as fallback fonts in several TeX font packages.
  url:
    docs: https://www.gnu.org/software/freefont/
    source: https://savannah.gnu.org/projects/freefont/
  notes: |
    Included in the Sphinx Docker image:
    https://github.com/sphinx-doc/sphinx-docker-images/blob/master/latexpdf/Dockerfile

equivs:
  summary: Create minimal Debian packages to satisfy apt dependency checks.
  description: |
    Used during TeX Live installation to create a dummy 'texlive-local'
    metapackage. This prevents apt from trying to install the (outdated)
    distro-packaged TeX Live when other packages declare a texlive dependency,
    while the upstream TeX Live installer manages the actual installation.
  url:
    docs: https://manpages.ubuntu.com/manpages/noble/en/man1/equivs-build.1.html
    source: https://salsa.debian.org/perl-team/modules/packages/equivs.git
  notes: |
    Required for the TeX Live upstream installation approach. See Island of
    TeX Dockerfile:
    https://gitlab.com/islandoftex/images/texlive/-/blob/72240db12e00510972aeea19cd0a08edc22c4152/Dockerfile.base
