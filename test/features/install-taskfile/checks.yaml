default:
  description: Verifies default install puts a functional task on PATH.
  checks:
    - title: task is on PATH
      cmd: command -v task
    - title: task reports a version
      cmd: bash -c 'task --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'

binary_custom_prefix:
  description: Verifies method=binary installs task under a custom prefix.
  checks:
    - title: task binary is at custom prefix
      cmd: test -f /opt/task-bin/bin/task
    - title: task binary at custom prefix is executable
      cmd: test -x /opt/task-bin/bin/task
    - title: task at custom prefix reports version
      cmd: /opt/task-bin/bin/task --version
    - title: symlink exists at /usr/local/bin/task
      cmd: test -L /usr/local/bin/task
    - title: task resolves from PATH
      cmd: command -v task

if_exists_fail:
  description: "Ensures if_exists=fail exits non-zero when task already exists."
  checks:
    - title: preinstalled task remains available
      cmd: command -v task
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)

installer_dir:
  description: |
    installer_dir=/tmp/task-trace: the downloaded archive and checksums file must
    remain in installer_dir after installation completes.
  checks:
    - title: task binary installed
      cmd: test -f /usr/local/bin/task
    - title: task --version succeeds
      cmd: task --version
    - title: installer_dir exists
      cmd: test -d /tmp/task-trace
      debug: |
        echo "=== /tmp/task-trace/ contents ==="
        ls -la /tmp/task-trace/ 2>/dev/null || echo "(directory missing)"
    - title: task archive preserved in installer_dir
      cmd: bash -c 'ls /tmp/task-trace/archive/task_*.tar.gz 2>/dev/null | grep -q .'
    - title: task checksums file preserved in installer_dir
      cmd: bash -c 'ls /tmp/task-trace/sidecar/task_checksums.txt 2>/dev/null | grep -q .'

specific_version:
  description: |
    version=3.50.0 + method=binary: install a specific pinned version.
    Verifies the binary reports exactly 3.50.0.
  checks:
    - title: task binary is at /usr/local/bin/task
      cmd: test -f /usr/local/bin/task
    - title: task binary is executable
      cmd: test -x /usr/local/bin/task
    - title: task --version succeeds
      cmd: task --version
    - title: task version is 3.50.0
      cmd: bash -c '[ "$(task --version 2>/dev/null)" = "3.50.0" ]'

method_npm:
  description: |
    method=npm: install task via npm global install.
    Verifies task is on PATH and reports a version.
  checks:
    - title: task is on PATH
      cmd: command -v task
    - title: task reports a version
      cmd: bash -c 'task --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'

npm_bundled:
  description: |
    method=npm-bundled: installs task via a self-contained bundled Node.js runtime.
    Verifies task is on PATH and reports a version.
  checks:
    - title: task is on PATH
      cmd: command -v task
    - title: task --version succeeds
      cmd: task --version
    - title: task reports a version
      cmd: bash -c 'task --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'

upstream_package_default:
  shell: sh
  description: |
    method=upstream-package on Ubuntu and Alpine.
    Verifies task is on PATH and reports a version.
    Uses shell: sh because on Alpine the bootstrap bash is removed after the feature
    completes, leaving only sh available for the test checks.
  checks:
    - title: task is on PATH
      cmd: command -v task
    - title: task reports a version
      cmd: sh -c 'task --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'

macos_package_default:
  description: |
    method=package on macOS installs Task from the standard Homebrew formula.
    Verifies task is on PATH, functional, listed by brew, and records
    installed-method=package.
  pre: |
    _installed_method="${_FEAT_SHARE_DIR_ROOT}/state/installed-method"
  checks:
    - title: brew is on PATH
      cmd: command -v brew
    - title: task is on PATH
      cmd: command -v task
    - title: task reports a version
      cmd: bash -c 'task --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+$"'
    - title: brew lists the go-task formula
      cmd: brew list --formula go-task
    - title: installed-method state is package
      cmd: grep -Fqx "package" "${_installed_method}"
