default:
  envs: [ubuntu-stable+ripgrep]
  modes: [devcontainer, standalone]
  tests: [default]

package_default:
  envs: [archlinux-current]
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

install_adapters:
  envs: [ubuntu-stable+ripgrep]
  modes: [standalone]
  options:
    install_adapters: true
  tests: [install_adapters]

if_exists_fail:
  expect_install_failure: true
  envs: [ubuntu-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "ripgrep-all 99.99.99\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/rga
    chmod +x /usr/local/bin/rga
  options:
    if_exists: fail
  tests: [if_exists_fail]

if_exists_skip:
  envs: [ubuntu-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "ripgrep-all 99.99.99\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/rga
    chmod +x /usr/local/bin/rga
  options:
    if_exists: skip
  tests: [if_exists_skip]
