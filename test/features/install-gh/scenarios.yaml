default:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  tests:
  - default
binary_pinned_version:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    version: 2.67.0
    method: binary
  tests:
  - binary_pinned_version
upstream_package_default:
  envs:
  - ubuntu-stable
  - debian-stable
  - alpine-current
  - fedora-current
  - opensuse-leap-current+bash
  modes:
  - devcontainer
  options:
    method: upstream-package
  tests:
  - upstream_package_default
binary_custom_prefix:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    method: binary
    prefix: /opt/gh
    prefix_discovery: symlink
  tests:
  - binary_custom_prefix
custom_prefix_no_symlink:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    method: binary
    prefix: /opt/gh
    prefix_discovery: none
  tests:
  - custom_prefix_no_symlink
binary_no_completions:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    method: binary
    shell_completions: ''
  tests:
  - binary_no_completions
upstream_package_no_completions:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    method: upstream-package
    shell_completions: ''
  tests:
  - upstream_package_no_completions
git_protocol_https:
  envs:
  - ubuntu-stable+git+sudo+vscode
  modes:
  - devcontainer
  options:
    method: upstream-package
    add_remote_user: true
    add_current_user: false
    add_container_user: false
    git_protocol: https
  devcontainer:
    remoteUser: vscode
  tests:
  - git_protocol_https
setup_git:
  envs:
  - ubuntu-stable+git+sudo+vscode
  modes:
  - devcontainer
  options:
    method: upstream-package
    add_remote_user: true
    add_current_user: false
    add_container_user: false
    setup_git: true
  devcontainer:
    remoteUser: vscode
  tests:
  - setup_git
sign_commits_ssh:
  envs:
  - ubuntu-stable+git+sudo+vscode
  modes:
  - devcontainer
  options:
    method: upstream-package
    add_remote_user: true
    add_current_user: false
    add_container_user: false
    sign_commits: ssh
  devcontainer:
    remoteUser: vscode
  tests:
  - sign_commits_ssh
sign_commits_gpg:
  envs:
  - ubuntu-stable+git+sudo+vscode
  modes:
  - devcontainer
  options:
    method: upstream-package
    add_remote_user: true
    add_current_user: false
    add_container_user: false
    sign_commits: gpg
  devcontainer:
    remoteUser: vscode
  tests:
  - sign_commits_gpg
if_exists_skip:
  envs:
  - ubuntu-stable+gh-2.67.0
  modes:
  - devcontainer
  options:
    if_exists: skip
  tests:
  - if_exists_skip
if_exists_skip_no_mutation:
  envs:
  - ubuntu-stable+gh-2.67.0
  modes:
  - devcontainer
  setup: 'apt-get purge -y curl

    apt-get autoremove -y

    rm -rf /var/lib/apt/lists/*

    '
  options:
    if_exists: skip
  tests:
  - if_exists_skip_no_mutation
version_match_idempotency:
  expect_install_failure: true
  envs:
  - ubuntu-stable+gh-2.67.0
  modes:
  - standalone
  options:
    method: binary
    version: 2.67.0
    if_exists: fail
  tests:
  - version_match_idempotency
installer_dir:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    method: binary
    installer_dir: /tmp/gh-trace
  tests:
  - installer_dir
log_file:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    method: upstream-package
    log_file: /tmp/gh-install.log
  tests:
  - log_file
binary_custom_prefix_nonroot:
  envs:
  - ubuntu-stable+vscode
  modes:
  - devcontainer
  options:
    method: binary
    prefix: /opt/gh
    prefix_discovery: symlink
  devcontainer:
    remoteUser: vscode
  tests:
  - binary_custom_prefix_nonroot
ghes_hostname:
  envs:
  - ubuntu-stable+git+sudo+vscode
  modes:
  - devcontainer
  options:
    method: upstream-package
    add_remote_user: true
    add_current_user: false
    add_container_user: false
    setup_git: true
    git_hostname: git.corp.example.com
  devcontainer:
    remoteUser: vscode
  tests:
  - ghes_hostname
add_users:
  envs:
  - ubuntu-stable+git+sudo+vscode
  modes:
  - devcontainer
  setup: 'useradd -m -s /bin/bash -u 1001 testuser

    echo "testuser ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/testuser

    '
  options:
    method: upstream-package
    add_users: testuser
    add_current_user: false
    add_remote_user: false
    add_container_user: false
    setup_git: true
  tests:
  - add_users
extensions:
  envs:
  - ubuntu-stable+git+sudo+vscode
  modes:
  - devcontainer
  options:
    method: upstream-package
    add_remote_user: true
    add_current_user: false
    add_container_user: false
    extensions: github/gh-copilot
    log_file: /tmp/gh-ext-install.log
  devcontainer:
    remoteUser: vscode
  tests:
  - extensions
binary_symlink_user_home_prefix:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    method: binary
    prefix: /root/gh
    prefix_discovery: symlink
  tests:
  - binary_symlink_user_home_prefix
if_exists_fail_preinstalled:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  setup: 'mkdir -p /usr/local/bin

    printf ''#!/bin/sh\necho "gh version 2.67.0 (2025-01-01)"\n'' > /usr/local/bin/gh

    chmod +x /usr/local/bin/gh

    '
  options:
    if_exists: fail
  standalone:
    skip_install: false
  tests:
  - if_exists_fail_preinstalled
if_exists_fail_preinstalled_network_isolated:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  setup: 'mkdir -p /usr/local/bin

    printf ''#!/bin/sh\necho "gh version 2.67.0 (2025-01-01)"\n'' > /usr/local/bin/gh

    chmod +x /usr/local/bin/gh

    '
  options:
    if_exists: fail
  standalone:
    network: none
    skip_install: false
  tests:
  - if_exists_fail_preinstalled_network_isolated
network_isolated_version_resolution:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  standalone:
    network: none
    skip_install: false
  options:
    method: binary
  tests:
  - network_isolated_version_resolution
invalid_if_exists:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - invalid_if_exists
  options:
    if_exists: invalid
invalid_method:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - invalid_method
  options:
    method: invalid
invalid_sign_commits:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - invalid_sign_commits
  options:
    sign_commits: invalid
macos_binary_default:
  envs:
  - macos-current+brew
  tests:
  - macos_binary_default
