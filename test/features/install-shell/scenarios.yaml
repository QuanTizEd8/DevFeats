apt_default:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_default]

apt_set_shell_zsh:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    set_user_shells: zsh
    add_users: root
  tests: [apt_set_shell_zsh]

apt_user_config:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_user_config]

apt_user_config_skip:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    user_config_mode: skip
  tests: [apt_user_config_skip]

apt_zdotdir_default:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_zdotdir_default]

apt_zdotdir_custom:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    zdotdir: "~/.zsh"
  tests: [apt_zdotdir_custom]

apt_augment_mode:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_LINE' > /root/.config/zsh/.zshrc
    echo '# MY_CUSTOM_BASHRC' > /root/.bashrc
  options:
    user_config_mode: augment
  tests: [apt_augment_mode]

apt_skel_placement:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_skel_placement]

apt_remote_user:
  envs: [devcontainers-base-debian]
  modes: [devcontainer]
  options:
    add_remote_user: true
  devcontainer:
    remoteUser: vscode
  tests: [apt_remote_user]

apt_container_user:
  envs: [devcontainers-base-debian]
  modes: [devcontainer]
  options:
    add_container_user: true
  devcontainer:
    containerUser: vscode
  tests: [apt_container_user]

apt_add_users:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: useradd -m -s /bin/bash devuser
  options:
    add_users: devuser
    add_container_user: false
    add_remote_user: false
  tests: [apt_add_users]
