default:
  envs: [debian-stable]
  modes: [devcontainer]
  tests: [default]

completions_zsh_only:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    shells: zsh
  tests: [completions_zsh_only]

completions_bash_only:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    shells: bash
  tests: [completions_bash_only]

no_completions:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    shells: ""
  tests: [no_completions]

completions_all:
  envs: [ubuntu-stable+fish]
  modes: [devcontainer]
  options:
    shells: "bash\nzsh\nfish"
  tests: [completions_all]

binary_pinned_version:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    version: "1.25.1"
    method: binary
  tests: [binary_pinned_version]

binary_custom_prefix:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/starship-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

custom_prefix_no_symlink:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/starship-bin
    prefix_discovery: none
  tests: [custom_prefix_no_symlink]

package_default:
  envs:
    - alpine-current+bash
    - archlinux-current
    - opensuse-leap-current+bash
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "1.99.0"; exit 0; fi\nexit 0' \
      > /usr/local/bin/starship
    chmod +x /usr/local/bin/starship
  options:
    method: auto
    if_exists: fail
  tests: [if_exists_fail]
  standalone:
    skip_install: false

if_exists_skip:
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "1.99.0"; exit 0; fi\nexit 0' \
      > /usr/local/bin/starship
    chmod +x /usr/local/bin/starship
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

reinstall:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "1.0.0 (stub)"; exit 0; fi\nexit 0' \
      > /usr/local/bin/starship
    chmod +x /usr/local/bin/starship
  options:
    version: "1.25.1"
    method: binary
    if_exists: reinstall
  tests: [reinstall]

version_match_idempotency:
  expect_install_failure: true
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "1.25.1"; exit 0; fi\nexit 0' \
      > /usr/local/bin/starship
    chmod +x /usr/local/bin/starship
  options:
    version: "1.25.1"
    if_exists: fail
  tests: [version_match_idempotency]
  standalone:
    skip_install: false

custom_zsh_rcfile:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    shells: zsh
    zsh_rcfile: /root/.zshrc
  tests: [custom_zsh_rcfile]

custom_bash_rcfile:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    shells: bash
    bash_rcfile: /root/.bashrc
  tests: [custom_bash_rcfile]
