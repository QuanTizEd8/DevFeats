apt_default:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_default]

apt_plugins:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    plugins: "zsh-users/zsh-autosuggestions\nzsh-users/zsh-syntax-highlighting"
  tests: [apt_plugins]

apt_theme_p10k:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    theme: romkatv/powerlevel10k
  tests: [apt_theme_p10k]

apt_install_dir:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    prefix: /opt/oh-my-zsh
  tests: [apt_install_dir]

apt_custom_dir_system:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    custom_dir: /opt/zsh-custom
  tests: [apt_custom_dir_system]

apt_custom_dir_per_user:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    custom_dir: "~/.zsh-custom"
  tests: [apt_custom_dir_per_user]

apt_if_exists_skip:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    if_exists: skip
  tests: [apt_if_exists_skip]

apt_if_exists_update:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    if_exists: update
  tests: [apt_if_exists_update]
