default:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  tests: [default]

specific_version:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    version: "0.72.0"
    method: binary
  tests: [specific_version]

binary_custom_prefix:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/fzf-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

custom_prefix_no_symlink:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/fzf-bin
    prefix_discovery: none
  tests: [custom_prefix_no_symlink]

package_default:
  envs:
    - debian-12+bash
    - ubuntu-24.04
    - fedora-42+bash
    - alpine-3.21+bash
    - archlinux
    - opensuse-leap-15.6+bash
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

fish_hook:
  envs: [ubuntu-24.04+fish]
  modes: [devcontainer, standalone]
  tests: [fish_hook]

installer_dir:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    installer_dir: /tmp/fzf-trace
  tests: [installer_dir]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-12]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "0.99.0 (fake)"; exit 0; fi\nexit 0' \
      > /usr/local/bin/fzf
    chmod +x /usr/local/bin/fzf
  options:
    method: auto
    if_exists: fail
  tests: [if_exists_fail]
  standalone:
    skip_install: false

if_exists_skip:
  envs: [debian-12]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "0.99.0 (fake)"; exit 0; fi\nexit 0' \
      > /usr/local/bin/fzf
    chmod +x /usr/local/bin/fzf
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

reinstall:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "0.45.0 (stub)"; exit 0; fi\nexit 0' \
      > /usr/local/bin/fzf
    chmod +x /usr/local/bin/fzf
  options:
    version: "0.72.0"
    method: binary
    if_exists: reinstall
  tests: [reinstall]

version_match_idempotency:
  expect_install_failure: true
  envs: [debian-12]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "0.72.0 (fake)"; exit 0; fi\nexit 0' \
      > /usr/local/bin/fzf
    chmod +x /usr/local/bin/fzf
  options:
    version: "0.72.0"
    if_exists: fail
  tests: [version_match_idempotency]
  standalone:
    skip_install: false
