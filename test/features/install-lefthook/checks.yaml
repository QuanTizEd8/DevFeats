default:
  description: Verifies default install puts a functional lefthook on PATH.
  checks:
    - title: lefthook is on PATH
      cmd: command -v lefthook
    - title: lefthook reports a version
      cmd: bash -c 'lefthook version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+"'

binary_custom_prefix:
  description: Verifies method=binary installs lefthook under a custom prefix.
  checks:
    - title: lefthook binary is at custom prefix
      cmd: test -f /opt/lefthook-bin/bin/lefthook
    - title: lefthook binary at custom prefix is executable
      cmd: test -x /opt/lefthook-bin/bin/lefthook
    - title: lefthook at custom prefix reports version
      cmd: /opt/lefthook-bin/bin/lefthook version
    - title: symlink exists at /usr/local/bin/lefthook
      cmd: test -L /usr/local/bin/lefthook
    - title: lefthook resolves from PATH
      cmd: command -v lefthook

if_exists_fail:
  description: "Ensures if_exists=fail exits non-zero when lefthook already exists."
  checks:
    - title: preinstalled lefthook remains available
      cmd: command -v lefthook
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)

installer_dir:
  description: |
    installer_dir=/tmp/lefthook-trace: the downloaded binary and checksums file must
    remain in installer_dir after installation completes.
  checks:
    - title: lefthook binary installed
      cmd: test -f /usr/local/bin/lefthook
    - title: lefthook version succeeds
      cmd: lefthook version
    - title: installer_dir exists
      cmd: test -d /tmp/lefthook-trace
      debug: |
        echo "=== /tmp/lefthook-trace/ contents ==="
        ls -la /tmp/lefthook-trace/ 2>/dev/null || echo "(directory missing)"
    - title: lefthook binary asset preserved in installer_dir
      cmd: bash -c 'ls /tmp/lefthook-trace/asset/lefthook_* 2>/dev/null | grep -q .'
    - title: lefthook checksums file preserved in installer_dir
      cmd: bash -c 'ls /tmp/lefthook-trace/sidecar/lefthook_checksums.txt 2>/dev/null | grep -q .'

specific_version:
  description: |
    version=2.1.6 + method=binary: install a specific pinned version.
    Verifies the binary reports exactly 2.1.6.
  checks:
    - title: lefthook binary is at /usr/local/bin/lefthook
      cmd: test -f /usr/local/bin/lefthook
    - title: lefthook binary is executable
      cmd: test -x /usr/local/bin/lefthook
    - title: lefthook version succeeds
      cmd: lefthook version
    - title: lefthook version is 2.1.6
      cmd: bash -c '[ "$(lefthook version 2>/dev/null)" = "2.1.6" ]'

method_npm:
  description: |
    method=npm: install lefthook via npm global install.
    Verifies lefthook is on PATH and reports a version.
  checks:
    - title: lefthook is on PATH
      cmd: command -v lefthook
    - title: lefthook reports a version
      cmd: bash -c 'lefthook version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+"'

upstream_package_default:
  shell: sh
  description: |
    method=upstream-package on Ubuntu and Alpine.
    Verifies lefthook is on PATH and reports a version.
    Uses shell: sh because on Alpine the bootstrap bash is removed after the feature
    completes, leaving only sh available for the test checks.
  checks:
    - title: lefthook is on PATH
      cmd: command -v lefthook
    - title: lefthook reports a version
      cmd: sh -c 'lefthook version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+"'

macos_package_default:
  description: |
    method=package on macOS installs Lefthook from the standard Homebrew
    formula. Verifies lefthook is on PATH, functional, listed by brew, and
    records installed-method=package.
  pre: |
    _installed_method="${_FEAT_SHARE_DIR_ROOT}/state/installed-method"
  checks:
    - title: brew is on PATH
      cmd: command -v brew
    - title: lefthook is on PATH
      cmd: command -v lefthook
    - title: lefthook reports a version
      cmd: bash -c 'lefthook version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+"'
    - title: brew lists the lefthook formula
      cmd: brew list --formula lefthook
    - title: installed-method state is package
      cmd: grep -Fqx "package" "${_installed_method}"
