default:
  envs: [debian-12]
  modes: [devcontainer]
  tests: [default]

p10k_fonts:
  envs: [debian-12]
  modes: [devcontainer]
  options:
    p10k_fonts: true
  tests: [p10k_fonts]

custom_font_dir:
  envs: [debian-12]
  modes: [devcontainer]
  options:
    font_dir: /opt/fonts
  tests: [custom_font_dir]

no_nerd_fonts:
  envs: [debian-12]
  modes: [devcontainer]
  options:
    nerd_fonts: ""
  tests: [no_nerd_fonts]

font_urls:
  envs: [debian-12]
  modes: [devcontainer]
  options:
    nerd_fonts: ""
    font_urls: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/NerdFontsSymbolsOnly.tar.xz"
  tests: [font_urls]

font_url_file:
  envs: [debian-12]
  modes: [devcontainer]
  options:
    nerd_fonts: ""
    font_urls: "https://github.com/JetBrains/JetBrainsMono/raw/v2.304/fonts/ttf/JetBrainsMono-Regular.ttf"
  tests: [font_url_file]

gh_release_fonts:
  envs: [debian-12]
  modes: [devcontainer]
  options:
    nerd_fonts: ""
    gh_release_fonts: JetBrains/JetBrainsMono
  tests: [gh_release_fonts]

gh_release_fonts_pinned:
  envs: [debian-12]
  modes: [devcontainer]
  options:
    nerd_fonts: ""
    gh_release_fonts: "JetBrains/JetBrainsMono@v2.304"
  tests: [gh_release_fonts_pinned]
