default:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  tests: [default]

code_only:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    code: true
    devcontainer-info: false
    systemctl: false
  tests: [code_only]

none_enabled:
