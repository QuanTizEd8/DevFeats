defaults:
  options:
    log_level: trace

apt_default:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_default]

apt_user_config:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_user_config]

apt_install_dir:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    prefix: /opt/oh-my-bash
  tests: [apt_install_dir]

apt_if_exists_skip:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    if_exists: skip
  tests: [apt_if_exists_skip]

apt_if_exists_update:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    if_exists: update
  tests: [apt_if_exists_update]
