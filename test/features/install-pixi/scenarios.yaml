default:
  envs:
  - ubuntu-stable
  - debian-stable
  modes:
  - devcontainer
  tests:
  - default.sh
binary_pinned_version:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    version: 0.41.0
  tests:
  - binary_pinned_version.sh
custom_bin_dir:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    prefix: /opt/pixi
    prefix_discovery: shell
  tests:
  - custom_bin_dir.sh
custom_bin_dir_symlink:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    prefix: /opt/pixi
    prefix_discovery: all
  tests:
  - custom_bin_dir_symlink.sh
if_exists_skip:
  envs:
  - ubuntu-stable+pixi
  modes:
  - standalone
  args:
    PIXI_REF: latest/download
    PIXI_INSTALL_DIR: /usr/local/bin
  env_vars:
    PATH: /usr/local/bin:${PATH}
  options:
    if_exists: skip
  tests:
  - if_exists_skip.sh
if_exists_reinstall:
  envs:
  - ubuntu-stable+pixi
  modes:
  - devcontainer
  args:
    PIXI_REF: latest/download
    PIXI_INSTALL_DIR: /usr/local/bin
  env_vars:
    PATH: /usr/local/bin:${PATH}
  options:
    if_exists: reinstall
  tests:
  - if_exists_reinstall.sh
if_exists_update:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    if_exists: update
  tests:
  - if_exists_update.sh
if_exists_update_existing:
  envs:
  - ubuntu-stable+pixi
  modes:
  - devcontainer
  args:
    PIXI_REF: download/v0.41.0
    PIXI_INSTALL_DIR: /usr/local/bin
  env_vars:
    PATH: /usr/local/bin:${PATH}
  options:
    version: latest
    if_exists: update
  tests:
  - if_exists_update_existing.sh
version_match_idempotency:
  envs:
  - ubuntu-stable+pixi
  modes:
  - devcontainer
  args:
    PIXI_REF: download/v0.41.0
    PIXI_INSTALL_DIR: /usr/local/bin
  env_vars:
    PATH: /usr/local/bin:${PATH}
  options:
    version: 0.41.0
    if_exists: reinstall
  tests:
  - version_match_idempotency.sh
version_match_path_only_symlink:
  envs:
  - ubuntu-stable+pixi
  modes:
  - devcontainer
  args:
    PIXI_REF: download/v0.41.0
    PIXI_INSTALL_DIR: /usr/bin
  env_vars:
    PATH: /usr/bin:${PATH}
  options:
    if_exists: update
    version: 0.41.0
    prefix: /opt/pixi
    prefix_discovery: symlink
  tests:
  - version_match_path_only_symlink.sh
installer_dir:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    installer_dir: /tmp/pixi-trace
  tests:
  - installer_dir.sh
export_path_disabled:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    prefix: /opt/pixi
    export_path: ''
    prefix_discovery: none
  tests:
  - export_path_disabled.sh
completions_bash:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    shell_completions: bash
  tests:
  - completions_bash.sh
completions_zsh:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    shell_completions: zsh
  tests:
  - completions_zsh.sh
home_dir:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    home_dir: /var/pixi
  tests:
  - home_dir.sh
log_file:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    log_file: /tmp/pixi.log
  tests:
  - log_file.sh
custom_bin_dir_symlink_nonroot:
  envs:
  - ubuntu-stable+vscode
  modes:
  - devcontainer
  options:
    prefix: /opt/pixi
    prefix_discovery: symlink
  devcontainer:
    remoteUser: vscode
  tests:
  - custom_bin_dir_symlink_nonroot.sh
symlink_user_home_prefix:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    prefix: /root/pixi
    prefix_discovery: symlink
  tests:
  - symlink_user_home_prefix.sh
netrc_uri_file:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  setup: 'printf ''%s\n'' ''machine github.com login token password placehold'' >
    /tmp/test.netrc

    chmod 600 /tmp/test.netrc

    '
  options:
    netrc: file:///tmp/test.netrc
  tests:
  - netrc_uri_file.sh
github_api_unreachable_network_isolated:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  standalone:
    network: none
    skip_install: false
  tests:
  - github_api_unreachable_network_isolated.sh
if_exists_fail_preinstalled:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  setup: 'mkdir -p /usr/local/bin

    printf ''#!/bin/sh\necho "pixi 0.0.0"\n'' > /usr/local/bin/pixi

    chmod +x /usr/local/bin/pixi

    '
  options:
    if_exists: fail
  standalone:
    skip_install: false
  tests:
  - if_exists_fail_preinstalled.sh
invalid_version_string:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - invalid_version_string.sh
  options:
    version: not_a_semver_string
invalid_version_suffix:
  expect_install_failure: true
  envs:
  - ubuntu-stable
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - invalid_version_suffix.sh
  options:
    version: 1.2beta
global_manifest_inline:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    # devcontainer CLI writes option values as VAR="value" in an env file that is
    # then shell-sourced; any " inside the value is consumed as a shell quoting
    # delimiter and stripped. Use TOML literal strings ('...') instead of basic
    # strings ("...") to avoid this limitation.
    global_manifest: |
      version = 1

      [envs.jq]
      channels = ['conda-forge']
      dependencies = { jq = '*' }
      exposed = { jq = 'jq' }
  tests:
  - global_manifest_inline.sh
global_manifest_file:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  setup: |
    mkdir -p /tmp
    printf '%s\n' \
      'version = 1' \
      '' \
      '[envs.jq]' \
      'channels = ["conda-forge"]' \
      'dependencies = { jq = "*" }' \
      'exposed = { jq = "jq" }' \
      > /tmp/pixi-global.toml
  options:
    global_manifest: /tmp/pixi-global.toml
  tests:
  - global_manifest_file.sh
global_installs:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  options:
    global_installs:
    - --channel conda-forge jq
  tests:
  - global_installs.sh
install_all:
  envs:
  - ubuntu-stable
  modes:
  - devcontainer
  setup: |
    mkdir -p /tmp/pixi-test
    printf '%s\n' \
      '[project]' \
      'name = "test"' \
      'version = "0.1.0"' \
      'channels = ["conda-forge"]' \
      'platforms = ["linux-64"]' \
      '' \
      '[dependencies]' \
      'jq = "*"' \
      > /tmp/pixi-test/pixi.toml
  options:
    shell_completions: ''
    install: '--manifest-path /tmp/pixi-test/pixi.toml --all'
  tests:
  - install_all.sh
