defaults:
  options:
    log_level: trace

default:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  tests: [default]

no_sudo:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    sudo_access: false
  tests: [no_sudo]

custom_user:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    username: devuser
    user_id: "2000"
    group_id: "2000"
    group_name: devgroup
  tests: [custom_user]

custom_home:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    home_dir: /workspaces/myapp
  tests: [custom_home]

custom_shell:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    user_shell: /bin/sh
  tests: [custom_shell]

extra_groups:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  setup: |
    groupadd builders
    groupadd testers
  options:
    extra_groups: "builders\ntesters"
  tests: [extra_groups]

replace_existing:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  setup: |
    userdel ubuntu 2>/dev/null || true
    groupdel ubuntu 2>/dev/null || true
    useradd --uid 1000 --user-group --no-create-home --shell /bin/sh old_user
  tests: [replace_existing]

already_configured:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  setup: |
    userdel ubuntu 2>/dev/null || true
    groupdel ubuntu 2>/dev/null || true
    groupadd --gid 1000 vscode
    useradd --uid 1000 --gid 1000 \
            --home-dir /home/vscode --no-create-home \
            --shell /bin/bash vscode
    mkdir -p /home/vscode
    chown vscode:vscode /home/vscode
  options:
    replace_existing: false
    sudo_access: false
  tests: [already_configured]

alpine:
  envs: [alpine-latest]
  modes: [devcontainer, standalone]
  tests: [alpine]

log_file:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    log_file: /tmp/setup-user.log
  tests: [log_file]
