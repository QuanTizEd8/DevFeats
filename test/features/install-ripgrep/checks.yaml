default:
  description: Default install on Ubuntu puts a functional rg on PATH via binary auto-selection.
  checks:
    - title: rg is on PATH
      cmd: command -v rg
    - title: rg binary is executable
      cmd: bash -c 'test -x "$(command -v rg)"'
    - title: rg --version succeeds
      cmd: rg --version
      debug: |
        echo "=== rg --version ==="
        rg --version 2>&1 || echo "(failed)"
    - title: rg reports a semver version
      cmd: bash -c 'rg --version | grep -Eq "^ripgrep [0-9]+\.[0-9]+\.[0-9]+"'
    - title: rg searches plain text
      cmd: bash -c 'echo "hello world" | rg "hello"'

binary_pinned_version:
  description: |
    version=14.1.1 + method=binary: installs a specific pinned release and
    verifies the binary reports exactly that version.
  checks:
    - title: rg binary is at /usr/local/bin/rg
      cmd: test -f /usr/local/bin/rg
    - title: rg binary is executable
      cmd: test -x /usr/local/bin/rg
    - title: rg --version succeeds
      cmd: rg --version
      debug: |
        echo "=== rg --version ==="
        rg --version 2>&1 || echo "(failed)"
    - title: rg version is 14.1.1
      cmd: bash -c 'rg --version 2>/dev/null | grep -q "^ripgrep 14\.1\.1"'
    - title: rg searches plain text
      cmd: bash -c 'echo "hello world" | rg "hello"'

binary_custom_prefix:
  description: |
    method=binary, prefix=/opt/rg-bin, prefix_discovery=symlink: installs rg at a custom
    prefix and creates a symlink at /usr/local/bin/rg pointing to the custom binary.
  checks:
    - title: rg binary is at /opt/rg-bin/bin/rg
      cmd: test -f /opt/rg-bin/bin/rg
    - title: rg binary at custom prefix is executable
      cmd: test -x /opt/rg-bin/bin/rg
    - title: /opt/rg-bin/bin/rg --version succeeds
      cmd: /opt/rg-bin/bin/rg --version
    - title: symlink exists at /usr/local/bin/rg
      cmd: test -L /usr/local/bin/rg
    - title: symlink resolves to /opt/rg-bin/bin/rg
      cmd: bash -c '[ "$(readlink -f /usr/local/bin/rg)" = "/opt/rg-bin/bin/rg" ]'
    - title: rg resolves from PATH
      cmd: command -v rg
    - title: rg searches plain text via PATH
      cmd: bash -c 'echo "hello" | rg "hello"'

package_default:
  description: method=package installs rg via the OS package manager.
  checks:
    - title: rg is on PATH
      cmd: command -v rg
    - title: rg binary is executable
      cmd: bash -c 'test -x "$(command -v rg)"'
    - title: rg --version succeeds
      cmd: rg --version
    - title: rg reports a semver version
      cmd: bash -c 'rg --version | grep -Eq "^ripgrep [0-9]+"'
    - title: rg searches plain text
      cmd: bash -c 'echo "hello world" | rg "hello"'

if_exists_fail:
  description: |
    if_exists=fail aborts when rg is already present on PATH, leaving the
    pre-installed stub untouched.
  checks:
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)
    - title: pre-installed rg stub still present
      cmd: command -v rg
    - title: stub version is unchanged
      cmd: bash -c 'rg --version 2>/dev/null | grep -q "99\.99\.99"'

if_exists_skip:
  description: |
    if_exists=skip exits 0 when rg is already present on PATH, leaving the
    pre-installed stub and its version untouched.
  checks:
    - title: rg remains available after skip
      cmd: command -v rg
    - title: stub version is unchanged (skip did not reinstall)
      cmd: bash -c 'rg --version 2>/dev/null | grep -q "99\.99\.99"'
