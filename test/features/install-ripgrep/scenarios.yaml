default_install:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  tests: [default_install]

specific_version:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    version: "14.1.1"
    method: binary
  tests: [specific_version]

binary_custom_prefix:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/rg-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

package_install:
  envs:
    - debian-bookworm+bash
    - alpine-3.21+bash
    - fedora-latest+bash
    - arch+bash
    - opensuse-leap+bash
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_install]

if_exists_fail:
  expect_install_failure: true
  envs: [ubuntu-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "ripgrep 99.99.99\nfeatures:-simd-accel\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/rg
    chmod +x /usr/local/bin/rg
  options:
    if_exists: fail
  tests: [if_exists_fail]

if_exists_skip:
  envs: [ubuntu-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "ripgrep 99.99.99\nfeatures:-simd-accel\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/rg
    chmod +x /usr/local/bin/rg
  options:
    if_exists: skip
  tests: [if_exists_skip]
