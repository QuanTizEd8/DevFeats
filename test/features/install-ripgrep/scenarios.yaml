default:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  tests: [default]

binary_pinned_version:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    version: "14.1.1"
    method: binary
  tests: [binary_pinned_version]

binary_custom_prefix:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/rg-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

package_default:
  envs:
    - debian-12+bash
    - alpine-3.21+bash
    - fedora-42+bash
    - archlinux
    - opensuse-leap-15.6+bash
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

if_exists_fail:
  expect_install_failure: true
  envs: [ubuntu-24.04]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "ripgrep 99.99.99\nfeatures:-simd-accel\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/rg
    chmod +x /usr/local/bin/rg
  options:
    if_exists: fail
  tests: [if_exists_fail]

if_exists_skip:
  envs: [ubuntu-24.04]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "ripgrep 99.99.99\nfeatures:-simd-accel\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/rg
    chmod +x /usr/local/bin/rg
  options:
    if_exists: skip
  tests: [if_exists_skip]
