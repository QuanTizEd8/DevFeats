linux_default:
  envs: [ubuntu-stable, debian-stable]
  modes: [devcontainer]
  setup: |
    apt-get update -qq && apt-get install -y --no-install-recommends zsh
  tests: [linux_default]

discovery_disabled:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    prefix_discovery: none
  tests: [discovery_disabled]

export_path_idempotent:
  envs: [ubuntu-stable+homebrew]
  modes: [devcontainer]
  options:
    if_exists: update
    update: false
  setup: |
    mkdir -p /etc/profile.d
    printf '# >>> brew PATH (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< brew PATH (install-homebrew) <<<\n' \
        >> /etc/profile.d/98-quantized8--devfeats--install-homebrew.sh
    printf '# >>> brew PATH (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< brew PATH (install-homebrew) <<<\n' \
        >> /etc/bash.bashrc
    mkdir -p /etc/zsh
    printf '# >>> brew PATH (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< brew PATH (install-homebrew) <<<\n' \
        >> /etc/zsh/zshenv
  tests: [export_path_idempotent]

if_exists_skip:
  envs: [ubuntu-stable+homebrew]
  modes: [devcontainer]
  tests: [if_exists_skip]

linux_pacman:
  envs: [archlinux-current]
  modes: [devcontainer]
  setup: |
    pacman -Sy --noconfirm zsh
  tests: [linux_pacman]

linux_rpm:
  envs: [fedora-current+bash]
  modes: [devcontainer]
  setup: |
    dnf install -y zsh
  tests: [linux_rpm]

linux_zypper:
  envs: [opensuse-leap-current+bash]
  modes: [devcontainer]
  setup: |
    set +e
    zypper install -y zsh
    _rc=$?
    set -e
    [ "$_rc" -eq 0 ] || [ "$_rc" -eq 106 ]
  tests: [linux_zypper]

if_exists_reinstall:
  envs: [ubuntu-stable+homebrew]
  modes: [devcontainer]
  options:
    if_exists: reinstall
  tests: [if_exists_reinstall]

update_false:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    update: false
  tests: [update_false]

log_file:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    log_file: /tmp/brew.log
  tests: [log_file]

shellenv_remote_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  devcontainer:
    remoteUser: vscode
  tests: [shellenv_remote_user]

macos_default:
  envs: [macos-current+brew]
  tests: [macos_default]

macos_fresh_install:
  envs: [macos-current]
  tests: [macos_fresh_install]

macos_if_exists_fail:
  envs: [macos-current+brew]
  options:
    if_exists: fail
  expect_install_failure: true
  tests: [macos_if_exists_fail]

macos_if_exists_reinstall:
  envs: [macos-current+brew]
  options:
    if_exists: reinstall
    prefix_discovery: shell
  tests: [macos_if_exists_reinstall]

macos_discovery_disabled:
  envs: [macos-current+brew]
  options:
    prefix_discovery: none
  tests: [macos_discovery_disabled]

macos_export_path_idempotent:
  envs: [macos-current]
  setup: |
    # Pre-seed one stale discovery block per dotfile before the feature runs.
    # The fresh install discovers the new prefix and updates the stale block in
    # place (idempotent write via shell__sync_block).
    #
    # Hosted macOS images ship ~/.bash_profile lines that often omit a final
    # newline; appending with >> would fuse the first marker onto the last line
    # (e.g. POWERSHELL_DISTRIBUTION_CHANNEL=...# >>> marker >>>), breaking awk
    # block updates. Ensure the file ends with \n before appending.
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zshenv"; do
      mkdir -p "$(dirname "$f")"
      if [[ -f "$f" && -s "$f" ]] && [[ "$(tail -c1 "$f")" != $'\n' ]]; then printf '\n' >> "$f"; fi
      printf '# >>> brew PATH (install-homebrew) >>>\neval "$(/__stale_prefix__/bin/brew shellenv)"\n# <<< brew PATH (install-homebrew) <<<\n' >> "$f"
    done
  tests: [macos_export_path_idempotent]

macos_brew_git_remote:
  envs: [macos-current+brew]
  options:
    if_exists: update
    update: false
  setup: |
    BREW_PREFIX="$(brew --prefix 2> /dev/null || true)"
    if [ "$(uname -m)" = "arm64" ]; then
      BREW_REPO="$BREW_PREFIX"
    else
      BREW_REPO="$BREW_PREFIX/Homebrew"
    fi
    REMOTE_URL="$(git -C "$BREW_REPO" remote get-url origin 2> /dev/null || \
      echo "https://github.com/Homebrew/brew")"
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zshenv"; do
      mkdir -p "$(dirname "$f")"
      if [[ -f "$f" && -s "$f" ]] && [[ "$(tail -c1 "$f")" != $'\n' ]]; then printf '\n' >> "$f"; fi
      printf '# >>> HOMEBREW_BREW_GIT_REMOTE (install-homebrew) >>>\nexport HOMEBREW_BREW_GIT_REMOTE="%s"\n# <<< HOMEBREW_BREW_GIT_REMOTE (install-homebrew) <<<\n' "$REMOTE_URL" >> "$f"
    done
  tests: [macos_brew_git_remote]

macos_no_install_from_api:
  envs: [macos-current+brew]
  options:
    if_exists: update
    update: false
  setup: |
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zshenv"; do
      mkdir -p "$(dirname "$f")"
      if [[ -f "$f" && -s "$f" ]] && [[ "$(tail -c1 "$f")" != $'\n' ]]; then printf '\n' >> "$f"; fi
      printf '# >>> HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) >>>\nexport HOMEBREW_NO_INSTALL_FROM_API=1\n# <<< HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) <<<\n' >> "$f"
    done
  tests: [macos_no_install_from_api]

macos_logfile:
  envs: [macos-current+brew]
  options:
    log_file: /tmp/brew-macos-test.log
  tests: [macos_logfile]

macos_update_false:
  envs: [macos-current+brew]
  options:
    update: false
    log_file: /tmp/brew-update-false-test.log
  tests: [macos_update_false]
