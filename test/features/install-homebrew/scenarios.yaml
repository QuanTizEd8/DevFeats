defaults:
  options:
    log_level: trace

apt_default:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  tests: [apt_default.sh]

debian:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [debian.sh]

export_path_disabled:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  options:
    export_path: ""
  tests: [export_path_disabled.sh]

export_path_custom_file:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  options:
    export_path: /tmp/custom-brew.sh
  tests: [export_path_custom_file.sh]

export_path_idempotent:
  envs: [ubuntu-latest+homebrew-preinstalled]
  modes: [devcontainer]
  setup: |
    mkdir -p /etc/profile.d
    printf '# >>> brew shellenv (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< brew shellenv (install-homebrew) <<<\n' \
        >> /etc/profile.d/brew.sh
    printf '# >>> brew shellenv (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< brew shellenv (install-homebrew) <<<\n' \
        >> /etc/bash.bashrc
    mkdir -p /etc/zsh
    printf '# >>> brew shellenv (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< brew shellenv (install-homebrew) <<<\n' \
        >> /etc/zsh/zshenv
  tests: [export_path_idempotent.sh]

if_exists_skip:
  envs: [ubuntu-latest+homebrew-preinstalled]
  modes: [devcontainer]
  tests: [if_exists_skip.sh]

arch:
  envs: [archlinux-latest]
  modes: [devcontainer]
  tests: [arch.sh]

fedora:
  envs: [fedora-latest+bash]
  modes: [devcontainer]
  tests: [fedora.sh]

opensuse:
  envs: [opensuse-leap+bash]
  modes: [devcontainer]
  tests: [opensuse.sh]

if_exists_reinstall:
  envs: [ubuntu-latest+homebrew-preinstalled]
  modes: [devcontainer]
  options:
    if_exists: reinstall
  tests: [if_exists_reinstall.sh]

update_false:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  options:
    update: false
  tests: [update_false.sh]

log_file:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  options:
    log_file: /tmp/brew.log
  tests: [log_file.sh]

shellenv_remote_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: useradd -m -s /bin/bash vscode
  options:
    add_remote_user: true
  devcontainer:
    remoteUser: vscode
  tests: [shellenv_remote_user.sh]

macos_default:
  envs: [macos-latest]
  tests: [macos_default.sh]

macos_fresh_install:
  envs: [macos-latest]
  tests: [macos_fresh_install.sh]

macos_if_exists_fail:
  envs: [macos-latest]
  options:
    if_exists: fail
  expect_install_failure: true
  tests: [macos_if_exists_fail.sh]

macos_if_exists_reinstall:
  envs: [macos-latest]
  options:
    if_exists: reinstall
  tests: [macos_if_exists_reinstall.sh]

macos_export_path_disabled:
  envs: [macos-latest]
  options:
    export_path: ""
  tests: [macos_export_path_disabled.sh]

macos_export_path_custom_file:
  envs: [macos-latest]
  options:
    export_path: /tmp/test-brew-custom.sh
  tests: [macos_export_path_custom_file.sh]

macos_export_path_idempotent:
  envs: [macos-latest]
  setup: |
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zprofile" "$HOME/.zshrc"; do
      mkdir -p "$(dirname "$f")"
      printf '# >>> brew shellenv (install-homebrew) >>>\neval "$(/opt/homebrew/bin/brew shellenv 2> /dev/null || /usr/local/bin/brew shellenv)"\n# <<< brew shellenv (install-homebrew) <<<\n' >> "$f"
      printf '# >>> brew shellenv (install-homebrew) >>>\neval "$(/opt/homebrew/bin/brew shellenv 2> /dev/null || /usr/local/bin/brew shellenv)"\n# <<< brew shellenv (install-homebrew) <<<\n' >> "$f"
    done
  tests: [macos_export_path_idempotent.sh]

macos_brew_git_remote:
  envs: [macos-latest]
  setup: |
    BREW_PREFIX="$(brew --prefix 2> /dev/null || true)"
    if [ "$(uname -m)" = "arm64" ]; then
      BREW_REPO="$BREW_PREFIX"
    else
      BREW_REPO="$BREW_PREFIX/Homebrew"
    fi
    REMOTE_URL="$(git -C "$BREW_REPO" remote get-url origin 2> /dev/null || \
      echo "https://github.com/Homebrew/brew")"
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zprofile" "$HOME/.zshrc"; do
      mkdir -p "$(dirname "$f")"
      printf '# >>> HOMEBREW_BREW_GIT_REMOTE (install-homebrew) >>>\nexport HOMEBREW_BREW_GIT_REMOTE="%s"\n# <<< HOMEBREW_BREW_GIT_REMOTE (install-homebrew) <<<\n' "$REMOTE_URL" >> "$f"
    done
  tests: [macos_brew_git_remote.sh]

macos_no_install_from_api:
  envs: [macos-latest]
  setup: |
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zprofile" "$HOME/.zshrc"; do
      mkdir -p "$(dirname "$f")"
      printf '# >>> HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) >>>\nexport HOMEBREW_NO_INSTALL_FROM_API=1\n# <<< HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) <<<\n' >> "$f"
    done
  tests: [macos_no_install_from_api.sh]

macos_logfile:
  envs: [macos-latest]
  options:
    log_file: /tmp/brew-macos-test.log
  tests: [macos_logfile.sh]

macos_update_false:
  envs: [macos-latest]
  options:
    update: false
    log_file: /tmp/brew-update-false-test.log
  tests: [macos_update_false.sh]
