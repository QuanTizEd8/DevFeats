defaults:
  options:
    log_level: trace

apt_default:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  tests: [apt_default]

debian:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [debian]

export_path_disabled:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  options:
    prefix_activations: ""
  tests: [export_path_disabled]

export_path_idempotent:
  envs: [ubuntu-latest+homebrew-preinstalled]
  modes: [devcontainer]
  options:
    if_exists: update
    update: false
  setup: |
    mkdir -p /etc/profile.d
    printf '# >>> prefix activation (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< prefix activation (install-homebrew) <<<\n' \
        >> /etc/profile.d/QuanTizEd8-DevFeats-install-homebrew-prefix-activation.sh
    printf '# >>> prefix activation (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< prefix activation (install-homebrew) <<<\n' \
        >> /etc/bash.bashrc
    mkdir -p /etc/zsh
    printf '# >>> prefix activation (install-homebrew) >>>\neval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"\n# <<< prefix activation (install-homebrew) <<<\n' \
        >> /etc/zsh/zshenv
  tests: [export_path_idempotent]

if_exists_skip:
  envs: [ubuntu-latest+homebrew-preinstalled]
  modes: [devcontainer]
  tests: [if_exists_skip]

arch:
  envs: [archlinux-latest]
  modes: [devcontainer]
  tests: [arch]

fedora:
  envs: [fedora-latest+bash]
  modes: [devcontainer]
  tests: [fedora]

opensuse:
  envs: [opensuse-leap+bash]
  modes: [devcontainer]
  tests: [opensuse]

if_exists_reinstall:
  envs: [ubuntu-latest+homebrew-preinstalled]
  modes: [devcontainer]
  options:
    if_exists: reinstall
  tests: [if_exists_reinstall]

update_false:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  options:
    update: false
  tests: [update_false]

log_file:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  options:
    log_file: /tmp/brew.log
  tests: [log_file]

shellenv_remote_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: useradd -m -s /bin/bash vscode
  devcontainer:
    remoteUser: vscode
  tests: [shellenv_remote_user]

macos_default:
  envs: [macos-latest]
  tests: [macos_default]

macos_fresh_install:
  envs: [macos-latest-fresh-install]
  tests: [macos_fresh_install]

macos_if_exists_fail:
  envs: [macos-latest]
  options:
    if_exists: fail
  expect_install_failure: true
  tests: [macos_if_exists_fail]

macos_if_exists_reinstall:
  envs: [macos-latest]
  options:
    if_exists: reinstall
  tests: [macos_if_exists_reinstall]

macos_export_path_disabled:
  envs: [macos-latest]
  options:
    prefix_activations: ""
  tests: [macos_export_path_disabled]

macos_export_path_idempotent:
  envs: [macos-latest]
  options:
    if_exists: update
    update: false
  setup: |
    # One stale activation block per file (not two). `shell__write_block` updates
    # each marker span in place but does not collapse multiple duplicate blocks;
    # the old test used two installs (first write, second update). A single stale
    # block per file reproduces the "update in place" half of that story under
    # one runner-controlled install.
    #
    # Hosted macOS images ship ~/.bash_profile lines that often omit a final
    # newline; appending with >> would fuse the first marker onto the last line
    # (e.g. POWERSHELL_DISTRIBUTION_CHANNEL=...# >>> marker >>>), breaking awk
    # block updates. Ensure the file ends with \n before appending.
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zshenv"; do
      mkdir -p "$(dirname "$f")"
      if [[ -f "$f" && -s "$f" ]] && [[ "$(tail -c1 "$f")" != $'\n' ]]; then printf '\n' >> "$f"; fi
      printf '# >>> prefix activation (install-homebrew) >>>\neval "$(/__stale_prefix__/bin/brew shellenv)"\n# <<< prefix activation (install-homebrew) <<<\n' >> "$f"
    done
  tests: [macos_export_path_idempotent]

macos_brew_git_remote:
  envs: [macos-latest]
  options:
    if_exists: update
    update: false
  setup: |
    BREW_PREFIX="$(brew --prefix 2> /dev/null || true)"
    if [ "$(uname -m)" = "arm64" ]; then
      BREW_REPO="$BREW_PREFIX"
    else
      BREW_REPO="$BREW_PREFIX/Homebrew"
    fi
    REMOTE_URL="$(git -C "$BREW_REPO" remote get-url origin 2> /dev/null || \
      echo "https://github.com/Homebrew/brew")"
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zshenv"; do
      mkdir -p "$(dirname "$f")"
      if [[ -f "$f" && -s "$f" ]] && [[ "$(tail -c1 "$f")" != $'\n' ]]; then printf '\n' >> "$f"; fi
      printf '# >>> HOMEBREW_BREW_GIT_REMOTE (install-homebrew) >>>\nexport HOMEBREW_BREW_GIT_REMOTE="%s"\n# <<< HOMEBREW_BREW_GIT_REMOTE (install-homebrew) <<<\n' "$REMOTE_URL" >> "$f"
    done
  tests: [macos_brew_git_remote]

macos_no_install_from_api:
  envs: [macos-latest]
  options:
    if_exists: update
    update: false
  setup: |
    for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.zshenv"; do
      mkdir -p "$(dirname "$f")"
      if [[ -f "$f" && -s "$f" ]] && [[ "$(tail -c1 "$f")" != $'\n' ]]; then printf '\n' >> "$f"; fi
      printf '# >>> HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) >>>\nexport HOMEBREW_NO_INSTALL_FROM_API=1\n# <<< HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) <<<\n' >> "$f"
    done
  tests: [macos_no_install_from_api]

macos_logfile:
  envs: [macos-latest]
  options:
    log_file: /tmp/brew-macos-test.log
  tests: [macos_logfile]

macos_update_false:
  envs: [macos-latest]
  options:
    update: false
    log_file: /tmp/brew-update-false-test.log
  tests: [macos_update_false]
