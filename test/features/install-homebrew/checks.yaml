if_exists_reinstall:
  description: |
    if_exists_reinstall: Homebrew is pre-installed in the image (see Dockerfile).
    The feature is configured with if_exists=reinstall, which uninstalls and then
    reinstalls Homebrew fresh, then runs post-install steps (shellenv export).
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: linuxbrew prefix directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew
    - title: brew binary present
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"
    - title: discovery profile.d file written
      cmd: test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}
      debug: |
        echo "=== /etc/profile.d/${_FEAT_PROFILE_D_FILE} ==="
        cat /etc/profile.d/${_FEAT_PROFILE_D_FILE} 2>/dev/null || echo "(missing)"
        echo "=== /etc/bash.bashrc (tail) ==="
        tail -10 /etc/bash.bashrc 2>/dev/null || echo "(missing)"
    - title: discovery profile.d file has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: bash.bashrc has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/bash.bashrc

if_exists_skip:
  description: |
    if_exists_skip: Homebrew is pre-installed in the image (see Dockerfile).
    The feature detects the existing installation and exits successfully without
    running the installer or any post-install steps.
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: linuxbrew prefix directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew
    - title: brew binary present
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"

log_file:
  description: |
    log_file=/tmp/brew.log: all installer output is mirrored to the specified
    log file in addition to stdout/stderr.
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: log_file was created
      cmd: test -f /tmp/brew.log
      debug: |
        echo "===== /tmp/brew.log (last 20 lines) ====="
        tail -20 /tmp/brew.log 2>/dev/null || echo "(log_file missing)"
    - title: log_file is non-empty
      cmd: test -s /tmp/brew.log
    - title: log_file contains install-homebrew header
      cmd: grep -q 'install-homebrew' /tmp/brew.log
    - title: log_file contains success marker
      cmd: grep -q 'Homebrew Installation script finished successfully' /tmp/brew.log
    - title: log_file contains brew prefix path
      cmd: grep -q '/home/linuxbrew/.linuxbrew' /tmp/brew.log

macos_brew_git_remote:
  description: |
    brew_git_remote: with a pre-seeded HOMEBREW_BREW_GIT_REMOTE block in user
    dotfiles, a run with if_exists=update (brew_git_remote unset) must remove that block.

    Brew is pre-installed. if_exists=update re-runs the installer and enforce_options,
    which removes the stale block since brew_git_remote is unset.
  pre: |
    _HOME="$HOME"
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"
    _BASH_LOGIN_FILE="$(detect_bash_login_file)"

    if [[ "$(uname -m)" == "arm64" ]]; then
      _BREW_REPO="$_BREW_PREFIX"
    else
      _BREW_REPO="${_BREW_PREFIX}/Homebrew"
    fi

    _REMOTE_URL="$(git -C "$_BREW_REPO" remote get-url origin 2>/dev/null || echo "https://github.com/Homebrew/brew")"
    echo "ℹ️  Using brew_git_remote: ${_REMOTE_URL}"
  post: |
    block_cleanup_all "brew PATH (install-homebrew)"
    block_cleanup_all "HOMEBREW_BREW_GIT_REMOTE (install-homebrew)"
  on_failure: |
    log_install_homebrew_shell_init_diagnostics "${_HOME}" "${_BASH_LOGIN_FILE}"
    echo "" >&2
    echo "--- lines mentioning HOMEBREW_BREW_GIT_REMOTE in resolved login file ---" >&2
    grep -nF 'HOMEBREW_BREW_GIT_REMOTE' "${_BASH_LOGIN_FILE}" 2>/dev/null || echo "(no matches)" >&2
  checks:
    - title: brew binary present
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: brew git origin URL unchanged
      cmd: bash -c 'git -C "$1" remote get-url origin | grep -qF "$2"' -- "$_BREW_REPO" "$_REMOTE_URL"
    - title: BREW_GIT_REMOTE marker block absent from resolved bash login file after run
      cmd: bash -c '! grep -qF "# >>> HOMEBREW_BREW_GIT_REMOTE (install-homebrew) >>>" "$1" 2>/dev/null' -- "$_BASH_LOGIN_FILE"
    - title: BREW_GIT_REMOTE block absent from ~/.bashrc after run
      cmd: bash -c '! grep -qF "# >>> HOMEBREW_BREW_GIT_REMOTE (install-homebrew) >>>" ~/.bashrc 2>/dev/null'
    - title: BREW_GIT_REMOTE block absent from ~/.zshenv after run
      cmd: bash -c '! grep -qF "# >>> HOMEBREW_BREW_GIT_REMOTE (install-homebrew) >>>" ~/.zshenv 2>/dev/null'

macos_default:
  description: |
    default: all options at their defaults.

    macOS runners have Homebrew pre-installed → if_exists=skip (default) applies.
    Brew is already present; the script skips installation and does not modify any
    shell files.
  pre: |
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"
    _HOME="$HOME"

    echo "=== brew --version ==="
    brew --version 2>&1 || echo "(failed)"
  post: |
    for f in "${_HOME}/.bash_profile" "${_HOME}/.bash_login" "${_HOME}/.profile" \
      "${_HOME}/.bashrc" "${_HOME}/.zshenv"; do
      shellenv_block_cleanup "$f"
    done
  checks:
    - title: brew binary present
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: system discovery profile.d NOT written
      cmd: bash -c '! test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}'

macos_discovery_disabled:
  description: |
    macos_discovery_disabled: prefix_discovery=none skips all PATH discovery writes.
    Verifies that brew is intact (if_exists=skip) and that no discovery blocks
    are written to any user dotfiles.
  pre: |
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"

    echo "=== brew --version ==="
    brew --version 2>&1 || echo "(failed)"
  checks:
    - title: brew binary present
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: ~/.bash_profile has NO discovery marker
      cmd: bash -c '! grep -qF "brew PATH (install-homebrew)" ~/.bash_profile 2>/dev/null'
    - title: ~/.bashrc has NO discovery marker
      cmd: bash -c '! grep -qF "brew PATH (install-homebrew)" ~/.bashrc 2>/dev/null'
    - title: ~/.zshenv has NO discovery marker
      cmd: bash -c '! grep -qF "brew PATH (install-homebrew)" ~/.zshenv 2>/dev/null'

macos_export_path_idempotent:
  description: |
    export_path_idempotent: setup pre-seeds one stale discovery block per dotfile;
    the fresh install must update each block in place (exactly one begin marker per
    file; inner line references the resolved brew prefix, not the stale placeholder).
  pre: |
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"
    _HOME="$HOME"
    _BASH_LOGIN_FILE="$(detect_bash_login_file)"
  post: |
    for f in "${_HOME}/.bash_profile" "${_HOME}/.bash_login" "${_HOME}/.profile" \
      "${_HOME}/.bashrc" "${_HOME}/.zshenv"; do
      shellenv_block_cleanup "$f"
    done
  on_failure: |
    log_install_homebrew_shell_init_diagnostics "${_HOME}" "${_BASH_LOGIN_FILE}"
    printf 'Expected brew path fragment: %s\n' "${_BREW_PREFIX}/bin/brew" >&2
    local f
    for f in "${_HOME}/.bashrc" "${_HOME}/.zshenv"; do
      echo "" >&2
      printf -- '--- %s (cat -v) ---\n' "$f" >&2
      if [[ -f "$f" ]]; then
        cat -v "$f" >&2
      else
        echo "(missing)" >&2
      fi
    done
  checks:
    - title: brew binary present
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: resolved bash login file has exactly one begin marker
      cmd: bash -c '[[ "$({ grep -cF "# >>> brew PATH (install-homebrew) >>>" "$1" 2>/dev/null || echo 0; })" -eq 1 ]]' -- "$_BASH_LOGIN_FILE"
    - title: ~/.bashrc has exactly one begin marker
      cmd: bash -c '[[ "$({ grep -cF "# >>> brew PATH (install-homebrew) >>>" ~/.bashrc 2>/dev/null || echo 0; })" -eq 1 ]]'
    - title: ~/.zshenv has exactly one begin marker
      cmd: bash -c '[[ "$({ grep -cF "# >>> brew PATH (install-homebrew) >>>" ~/.zshenv 2>/dev/null || echo 0; })" -eq 1 ]]'
    - title: resolved bash login file block references resolved brew binary
      cmd: bash -c 'grep -qF "$2" "$1"' -- "$_BASH_LOGIN_FILE" "${_BREW_PREFIX}/bin/brew"
    - title: ~/.bashrc block references resolved brew binary
      cmd: bash -c 'grep -qF "$1/bin/brew" ~/.bashrc' -- "$_BREW_PREFIX"
    - title: ~/.zshenv block references resolved brew binary
      cmd: bash -c 'grep -qF "$1/bin/brew" ~/.zshenv' -- "$_BREW_PREFIX"
    - title: resolved bash login file has no stale placeholder
      cmd: bash -c 'awk '"'"'/# >>> brew PATH \(install-homebrew\) >>>/{in_block=1;next} /# <<< brew PATH \(install-homebrew\) <<</{in_block=0} in_block{print}'"'"' "$1" | grep -qv "__stale_prefix__"' -- "$_BASH_LOGIN_FILE"
    - title: ~/.bashrc has no stale placeholder
      cmd: bash -c 'awk '"'"'/# >>> brew PATH \(install-homebrew\) >>>/{in_block=1;next} /# <<< brew PATH \(install-homebrew\) <<</{in_block=0} in_block{print}'"'"' ~/.bashrc | grep -qv "__stale_prefix__"'
    - title: ~/.zshenv has no stale placeholder
      cmd: bash -c 'awk '"'"'/# >>> brew PATH \(install-homebrew\) >>>/{in_block=1;next} /# <<< brew PATH \(install-homebrew\) <<</{in_block=0} in_block{print}'"'"' ~/.zshenv | grep -qv "__stale_prefix__"'
      debug: |
        echo "=== ~/.zshenv ==="
        cat "${_HOME}/.zshenv" 2>/dev/null || echo "(missing)"

macos_fresh_install:
  description: |
    fresh_install: env macos-latest-fresh-install bootstraps with the official
    Homebrew uninstall (see test/environments.yaml), then the feature install runs —
    full macOS path (fetch, official install script, Case B shellenv). Tests run
    in a login shell, so brew is on PATH via the startup files the feature wrote.

    DESTRUCTIVE for the job: env bootstrap removes Homebrew; the feature reinstalls it.
  pre: |
    _HOME="$HOME"
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"

    echo "=== brew --version ==="
    brew --version 2>&1 || echo "(failed)"
    echo "=== ~/.zshenv ==="
    cat "${_HOME}/.zshenv" 2>/dev/null || echo "(missing)"

  post: "block_cleanup_all \"brew PATH (install-homebrew)\""
  checks:
    - title: brew prefix directory exists
      cmd: test -d "$_BREW_PREFIX"
    - title: brew binary installed
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: brew --version reports Homebrew
      cmd: sh -c 'brew --version | grep -q Homebrew'
    - title: a login bash file has shellenv marker
      cmd: sh -c 'grep -qF "# >>> brew PATH (install-homebrew) >>>" ~/.bash_profile 2>/dev/null || grep -qF "# >>> brew PATH (install-homebrew) >>>" ~/.bash_login 2>/dev/null || grep -qF "# >>> brew PATH (install-homebrew) >>>" ~/.profile 2>/dev/null'
    - title: ~/.bashrc has shellenv marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' "${_HOME}/.bashrc"
    - title: ~/.zshenv has shellenv marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' "${_HOME}/.zshenv"
    - title: shellenv block references correct brew prefix
      cmd: sh -c 'grep -qF "$1/bin/brew" ~/.zshenv 2>/dev/null || grep -qF "$1/bin/brew" ~/.bash_profile 2>/dev/null' -- "$_BREW_PREFIX"

macos_if_exists_fail:
  description: |
    if_exists_fail: if_exists=fail when brew is pre-installed must exit non-zero.
    No dotfiles are touched (the installer exits before export_shellenv_main).
  pre: |
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"
  checks:
    - title: brew is present (pre-condition)
      cmd: command -v brew
    - title: brew binary still present after fail
      cmd: command -v brew
    - title: brew --version still succeeds after fail
      cmd: 'brew --version'
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)
    - title: ~/.zshenv has NO brew marker
      cmd: bash -c '! grep -qF "brew PATH (install-homebrew)" ~/.zshenv 2>/dev/null'

macos_if_exists_reinstall:
  description: |
    if_exists_reinstall: Homebrew is already installed (by the runner or the
    preceding fresh_install scenario). Running the feature with if_exists=reinstall
    must uninstall then reinstall Homebrew from scratch and then run post-install
    steps (shellenv export).
  pre: |
    _HOME="$HOME"
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"

    echo "=== brew --version ==="
    brew --version 2>&1 || echo "(failed)"
    echo "=== ~/.zshenv ==="
    cat "${_HOME}/.zshenv" 2>/dev/null || echo "(missing)"
  post: "block_cleanup_all \"brew PATH (install-homebrew)\""
  checks:
    - title: brew present before reinstall (pre-condition)
      cmd: command -v brew
    - title: brew prefix directory exists after reinstall
      cmd: test -d "$_BREW_PREFIX"
    - title: brew binary present after reinstall
      cmd: command -v brew
    - title: brew --version succeeds after reinstall
      cmd: 'brew --version'
    - title: brew --version reports Homebrew
      cmd: bash -c 'brew --version | grep -q Homebrew'
    - title: a login bash file has shellenv marker
      cmd: bash -c 'grep -qF "# >>> brew PATH (install-homebrew) >>>" ~/.bash_profile 2>/dev/null || grep -qF "# >>> brew PATH (install-homebrew) >>>" ~/.bash_login 2>/dev/null || grep -qF "# >>> brew PATH (install-homebrew) >>>" ~/.profile 2>/dev/null'
    - title: ~/.bashrc has shellenv marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' "${_HOME}/.bashrc"
    - title: ~/.zshenv has shellenv marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' "${_HOME}/.zshenv"

macos_logfile:
  description: |
    log_file: log_file=/tmp/brew-macos-test.log — installer output is mirrored to
    the specified file in addition to stdout/stderr.
  pre: |
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"
    _HOME="$HOME"
    _LOG_FILE="/tmp/brew-macos-test.log"

    echo "=== brew --version ==="
    brew --version 2>&1 || echo "(failed)"
  post: |
    rm -f "$_LOG_FILE"
    for f in "${_HOME}/.bash_profile" "${_HOME}/.bash_login" "${_HOME}/.profile" \
      "${_HOME}/.bashrc" "${_HOME}/.zshenv"; do
      shellenv_block_cleanup "$f"
    done
  checks:
    - title: brew binary present
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: log_file was created
      cmd: test -f "$_LOG_FILE"
      debug: |
        echo "===== ${_LOG_FILE} (last 20 lines) ====="
        tail -20 "$_LOG_FILE" 2>/dev/null || echo "(missing)"
    - title: log_file is non-empty
      cmd: test -s "$_LOG_FILE"
    - title: log_file contains install-homebrew header
      cmd: grep -q 'install-homebrew' "$_LOG_FILE"
    - title: log_file contains success marker
      cmd: grep -q 'Homebrew Installation script finished successfully' "$_LOG_FILE"
    - title: log_file contains brew prefix path
      cmd: grep -qF "$_BREW_PREFIX" "$_LOG_FILE"

macos_no_install_from_api:
  description: |
    no_install_from_api: with a pre-seeded HOMEBREW_NO_INSTALL_FROM_API=1 block
    in user dotfiles, a run with if_exists=update (no_install_from_api=false) must remove it.

    Brew is pre-installed. if_exists=update re-runs the installer and enforce_options,
    which removes the stale block since no_install_from_api is false (the default).
  pre: |
    _HOME="$HOME"
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"
    _BASH_LOGIN_FILE="$(detect_bash_login_file)"
  post: |
    block_cleanup_all "brew PATH (install-homebrew)"
    block_cleanup_all "HOMEBREW_NO_INSTALL_FROM_API (install-homebrew)"
  on_failure: |
    log_install_homebrew_shell_init_diagnostics "${_HOME}" "${_BASH_LOGIN_FILE}"
    echo "" >&2
    echo "--- lines mentioning HOMEBREW_NO_INSTALL_FROM_API in resolved login file ---" >&2
    grep -nF 'HOMEBREW_NO_INSTALL_FROM_API' "${_BASH_LOGIN_FILE}" 2>/dev/null || echo "(no matches)" >&2
  checks:
    - title: brew binary present
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: NO_INSTALL_FROM_API marker block absent from resolved bash login file after run
      cmd: bash -c '! grep -qF "# >>> HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) >>>" "$1" 2>/dev/null' -- "$_BASH_LOGIN_FILE"
    - title: NO_INSTALL_FROM_API block absent from ~/.bashrc after run
      cmd: bash -c '! grep -qF "# >>> HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) >>>" ~/.bashrc 2>/dev/null'
    - title: NO_INSTALL_FROM_API block absent from ~/.zshenv after run
      cmd: bash -c '! grep -qF "# >>> HOMEBREW_NO_INSTALL_FROM_API (install-homebrew) >>>" ~/.zshenv 2>/dev/null'

macos_update_false:
  description: |
    update_false: update=false must skip the 'brew update' step.

    Brew is pre-installed (if_exists=skip applies). The log_file option captures
    installer output so the absence of 'brew update' can be verified.
  pre: |
    _HOME="$HOME"
    _BREW_PREFIX="$(brew --prefix 2>/dev/null)"
    _LOG_FILE="/tmp/brew-update-false-test.log"

    echo "=== brew --version ==="
    brew --version 2>&1 || echo "(failed)"
  post: |
    rm -f "$_LOG_FILE"
    block_cleanup_all "brew PATH (install-homebrew)"
  checks:
    - title: brew binary present
      cmd: command -v brew
    - title: brew --version succeeds
      cmd: 'brew --version'
    - title: log_file was created
      cmd: test -f "$_LOG_FILE"
      debug: |
        echo "===== ${_LOG_FILE} (last 30 lines) ====="
        tail -30 "$_LOG_FILE" 2>/dev/null || echo "(missing)"
    - title: log_file is non-empty
      cmd: test -s "$_LOG_FILE"
    - title: brew update NOT run
      cmd: bash -c '! grep -q "brew update completed" "$1"' -- "$_LOG_FILE"
    - title: install completed successfully
      cmd: grep -q 'Homebrew Installation script finished successfully' "$_LOG_FILE"

opensuse:
  description: |
    opensuse: all defaults on openSUSE Leap (Zypper).
    Verifies that Homebrew installs under /home/linuxbrew/.linuxbrew, brew is
    functional, and shellenv blocks are written to the appropriate system-wide
    startup files (Case A: root + Linux).

    Platform detection: ID=opensuse-leap, ID_LIKE=suse → no case matches →
    falls back to "debian" default.
    bashrc: uses first of /etc/bash.bashrc, /etc/bashrc that exists
    zshenv: /etc/zsh/zshenv (created when absent)
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: linuxbrew prefix directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew
    - title: linuxbrew bin directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew/bin
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"
    - title: discovery profile.d file written
      cmd: test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}
      debug: |
        echo "=== /etc/profile.d/${_FEAT_PROFILE_D_FILE} ==="
        cat /etc/profile.d/${_FEAT_PROFILE_D_FILE} 2>/dev/null || echo "(missing)"
        echo "=== /etc/bash.bashrc (tail) ==="
        tail -10 /etc/bash.bashrc 2>/dev/null || echo "(missing)"
        echo "=== /etc/bashrc (tail) ==="
        tail -10 /etc/bashrc 2>/dev/null || echo "(missing)"
        echo "=== /etc/zsh/zshenv ==="
        cat /etc/zsh/zshenv 2>/dev/null || echo "(missing)"
        echo "=== /etc/zshenv ==="
        cat /etc/zshenv 2>/dev/null || echo "(missing)"
    - title: discovery profile.d file has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: discovery profile.d file has shellenv eval
      cmd: grep -qF 'shellenv' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: a global bashrc has begin marker
      cmd: bash -c 'grep -qF "# >>> brew PATH (install-homebrew) >>>" /etc/bash.bashrc 2>/dev/null || grep -qF "# >>> brew PATH (install-homebrew) >>>" /etc/bashrc 2>/dev/null'
    - title: a global bashrc has shellenv eval
      cmd: bash -c 'grep -qF "shellenv" /etc/bash.bashrc 2>/dev/null || grep -qF "shellenv" /etc/bashrc 2>/dev/null'
    - title: a zshenv has begin marker
      cmd: bash -c 'grep -qF "# >>> brew PATH (install-homebrew) >>>" /etc/zsh/zshenv 2>/dev/null || grep -qF "# >>> brew PATH (install-homebrew) >>>" /etc/zshenv 2>/dev/null'
    - title: a zshenv has shellenv eval
      cmd: bash -c 'grep -qF "shellenv" /etc/zsh/zshenv 2>/dev/null || grep -qF "shellenv" /etc/zshenv 2>/dev/null'
    - title: login PATH includes linuxbrew/bin
      cmd: bash -lc 'echo "$PATH" | grep -q /home/linuxbrew/.linuxbrew/bin'
      debug: |
        echo "=== login PATH ==="
        bash -lc 'echo "$PATH"' 2>&1 || echo "(failed)"

shellenv_remote_user:
  description: |
    shellenv_remote_user: remoteUser="vscode" with default options.
    Root process installs as linuxbrew; activation is written system-wide
    (profile.d + bash.bashrc + zshenv). No per-user files are written.
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
    _MARKER='brew PATH (install-homebrew)'
    _PROFILE_D="${_FEAT_PROFILE_D_FILE}"
  checks:
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
    - title: profile.d activation file has marker
      cmd: grep -qF "$_MARKER" "/etc/profile.d/${_PROFILE_D}"
      debug: |
        echo "=== /etc/profile.d/${_PROFILE_D} ==="
        cat "/etc/profile.d/${_PROFILE_D}" 2>/dev/null || echo "(missing)"
        echo "=== /etc/bash.bashrc (tail 10) ==="
        tail -10 /etc/bash.bashrc 2>/dev/null || echo "(missing)"
    - title: profile.d activation file has brew shellenv eval
      cmd: grep -qF 'shellenv' "/etc/profile.d/${_PROFILE_D}"
    - title: bash.bashrc has activation marker
      cmd: grep -qF "$_MARKER" /etc/bash.bashrc

update_false:
  description: |
    update_false: update=false disables the post-install 'brew update' run.
    Verifies that Homebrew still installs and is functional even without the
    index update step.
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"
    - title: discovery profile.d file written
      cmd: test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: discovery profile.d file has marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
