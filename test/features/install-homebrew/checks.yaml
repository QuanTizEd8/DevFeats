apt_default:
  description: |
    apt_default: all defaults on Ubuntu.
    Verifies that Homebrew is installed under /home/linuxbrew/.linuxbrew,
    brew is executable and reports its version, and shellenv blocks are
    written to all three system-wide startup files (Case A: root + Linux).
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: linuxbrew prefix directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew
    - title: linuxbrew bin directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew/bin
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"
    - title: discovery profile.d file written
      cmd: test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}
      debug: |
        echo "=== /etc/profile.d/${_FEAT_PROFILE_D_FILE} ==="
        cat /etc/profile.d/${_FEAT_PROFILE_D_FILE} 2>/dev/null || echo "(missing)"
        echo "=== /etc/bash.bashrc (tail) ==="
        tail -10 /etc/bash.bashrc 2>/dev/null || echo "(missing)"
        echo "=== /etc/zsh/zshenv ==="
        cat /etc/zsh/zshenv 2>/dev/null || echo "(missing)"
    - title: discovery profile.d file has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: discovery profile.d file has shellenv eval
      cmd: grep -qF 'shellenv' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: bash.bashrc has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/bash.bashrc
    - title: bash.bashrc has shellenv eval
      cmd: grep -qF 'shellenv' /etc/bash.bashrc
    - title: zshenv written
      cmd: bash -c 'test -f /etc/zsh/zshenv || test -f /etc/zshenv'
    - title: zshenv has begin marker
      cmd: bash -c 'grep -qF "# >>> brew PATH (install-homebrew) >>>" /etc/zsh/zshenv 2>/dev/null || grep -qF "# >>> brew PATH (install-homebrew) >>>" /etc/zshenv'
    - title: zshenv has shellenv eval
      cmd: bash -c 'grep -qF "shellenv" /etc/zsh/zshenv 2>/dev/null || grep -qF "shellenv" /etc/zshenv'
    - title: login PATH includes linuxbrew/bin
      cmd: bash -lc 'echo "$PATH" | grep -q /home/linuxbrew/.linuxbrew/bin'
      debug: |
        echo "=== login PATH ==="
        bash -lc 'echo "$PATH"' 2>&1 || echo "(failed)"

plat.machine_release:
  description: |
    plat.machine_release: all defaults on Arch Linux (Pacman).
    Verifies that Homebrew installs under /home/linuxbrew/.linuxbrew, brew is
    functional, and shellenv blocks are written to the appropriate system-wide
    startup files (Case A: root + Linux).

    Platform detection: ID=arch, ID_LIKE not set → no case matches →
    falls back to "debian" default.
    bashrc: /etc/bash.bashrc (created when absent)
    zshenv: /etc/zsh/zshenv (created when absent)
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: linuxbrew prefix directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew
    - title: linuxbrew bin directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew/bin
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"
    - title: discovery profile.d file written
      cmd: test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}
      debug: |
        echo "=== /etc/profile.d/${_FEAT_PROFILE_D_FILE} ==="
        cat /etc/profile.d/${_FEAT_PROFILE_D_FILE} 2>/dev/null || echo "(missing)"
        echo "=== /etc/bash.bashrc (tail) ==="
        tail -10 /etc/bash.bashrc 2>/dev/null || echo "(missing)"
        echo "=== /etc/zsh/zshenv ==="
        cat /etc/zsh/zshenv 2>/dev/null || echo "(missing)"
    - title: discovery profile.d file has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: discovery profile.d file has shellenv eval
      cmd: grep -qF 'shellenv' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: bash.bashrc written
      cmd: test -f /etc/bash.bashrc
    - title: bash.bashrc has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/bash.bashrc
    - title: bash.bashrc has shellenv eval
      cmd: grep -qF 'shellenv' /etc/bash.bashrc
    - title: zsh/zshenv written
      cmd: test -f /etc/zsh/zshenv
    - title: zsh/zshenv has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/zsh/zshenv
    - title: zsh/zshenv has shellenv eval
      cmd: grep -qF 'shellenv' /etc/zsh/zshenv
    - title: login PATH includes linuxbrew/bin
      cmd: bash -lc 'echo "$PATH" | grep -q /home/linuxbrew/.linuxbrew/bin'
      debug: |
        echo "=== login PATH ==="
        bash -lc 'echo "$PATH"' 2>&1 || echo "(failed)"

debian:
  description: |
    debian: all defaults on Debian.
    Verifies brew installs successfully on Debian (apt+dpkg package manager)
    and that the brew binary is functional.
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: linuxbrew prefix directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"
    - title: discovery profile.d file written
      cmd: test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: discovery profile.d file has marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/profile.d/${_FEAT_PROFILE_D_FILE}

discovery_disabled:
  description: |
    discovery_disabled: prefix_discovery=none skips all PATH discovery writes.
    Verifies that brew installs successfully but no discovery blocks are
    written to any shell startup file.
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
    _MARKER='brew PATH (install-homebrew)'
    _PROFILE_D="${_FEAT_PROFILE_D_FILE}"
  checks:
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version via full path succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: profile.d discovery file NOT written
      cmd: bash -c '! test -f "/etc/profile.d/${_PROFILE_D}"'
      debug: |
        echo "=== /etc/profile.d/${_PROFILE_D} ==="
        cat "/etc/profile.d/${_PROFILE_D}" 2>/dev/null || echo "(missing — expected)"
        echo "=== /etc/bash.bashrc (tail) ==="
        tail -5 /etc/bash.bashrc 2>/dev/null || echo "(missing)"
        echo "=== /etc/zsh/zshenv ==="
        cat /etc/zsh/zshenv 2>/dev/null || echo "(missing)"
    - title: bash.bashrc has NO discovery marker
      cmd: bash -c '! grep -qF "brew PATH (install-homebrew)" /etc/bash.bashrc 2>/dev/null'
    - title: zshenv has NO discovery marker
      cmd: bash -c '! grep -qF "brew PATH (install-homebrew)" /etc/zsh/zshenv 2>/dev/null && ! grep -qF "brew PATH (install-homebrew)" /etc/zshenv 2>/dev/null'

export_path_idempotent:
  description: |
    export_path_idempotent: discovery blocks are pre-written in the image
    (see scenario setup). The feature re-runs with if_exists=update
    and must UPDATE each block in-place — the begin marker must appear exactly
    once per file (no duplicate appends).
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
    _MARKER='brew PATH (install-homebrew)'
    _PROFILE_D="${_FEAT_PROFILE_D_FILE}"
  checks:
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
    - title: profile.d file has begin marker
      cmd: grep -qF "# >>> ${_MARKER} >>>" "/etc/profile.d/${_PROFILE_D}"
    - title: bash.bashrc has begin marker
      cmd: grep -qF "# >>> ${_MARKER} >>>" /etc/bash.bashrc
    - title: zshenv has begin marker
      cmd: grep -qF "# >>> ${_MARKER} >>>" /etc/zsh/zshenv
    - title: profile.d file has exactly one begin marker
      cmd: bash -c '[ "$(grep -cF "# >>> brew PATH (install-homebrew) >>>" "/etc/profile.d/${_FEAT_PROFILE_D_FILE}")" -eq 1 ]'
      debug: |
        echo "=== /etc/profile.d/${_PROFILE_D} ==="
        cat "/etc/profile.d/${_PROFILE_D}" 2>/dev/null || echo "(missing)"
        echo "=== /etc/bash.bashrc (tail) ==="
        tail -15 /etc/bash.bashrc 2>/dev/null || echo "(missing)"
        echo "=== /etc/zsh/zshenv ==="
        cat /etc/zsh/zshenv 2>/dev/null || echo "(missing)"
    - title: bash.bashrc has exactly one begin marker
      cmd: bash -c '[ "$(grep -cF "# >>> brew PATH (install-homebrew) >>>" /etc/bash.bashrc)" -eq 1 ]'
    - title: zshenv has exactly one begin marker
      cmd: bash -c '[ "$(grep -cF "# >>> brew PATH (install-homebrew) >>>" /etc/zsh/zshenv)" -eq 1 ]'
    - title: profile.d block references correct brew prefix
      cmd: grep -qF '/home/linuxbrew/.linuxbrew/bin/brew' "/etc/profile.d/${_PROFILE_D}"
    - title: bash.bashrc block references correct brew prefix
      cmd: grep -qF '/home/linuxbrew/.linuxbrew/bin/brew' /etc/bash.bashrc
    - title: zshenv block references correct brew prefix
      cmd: grep -qF '/home/linuxbrew/.linuxbrew/bin/brew' /etc/zsh/zshenv

fedora:
  description: |
    fedora: all defaults on Fedora (DNF).
    Verifies that Homebrew installs under /home/linuxbrew/.linuxbrew, brew is
    functional, and shellenv blocks are written to the Fedora-specific system-wide
    startup files (Case A: root + Linux).

    Platform detection: ID=fedora → platform="rhel"
    bashrc: /etc/bashrc  (existing file, preferred over platform default)
    zshenv: /etc/zshenv  (_platform_zshenv "rhel")
  pre: |
    _BREW=/home/linuxbrew/.linuxbrew/bin/brew
  checks:
    - title: linuxbrew prefix directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew
    - title: linuxbrew bin directory exists
      cmd: test -d /home/linuxbrew/.linuxbrew/bin
    - title: brew binary installed
      cmd: test -f "$_BREW"
    - title: brew binary is executable
      cmd: test -x "$_BREW"
    - title: brew --version succeeds
      cmd: '"$_BREW" --version'
      debug: |
        echo "=== brew --version ==="
        "$_BREW" --version 2>&1 || echo "(failed)"
    - title: brew --version reports Homebrew
      cmd: bash -c '"$1" --version | grep -q Homebrew' -- "$_BREW"
    - title: discovery profile.d file written
      cmd: test -f /etc/profile.d/${_FEAT_PROFILE_D_FILE}
      debug: |
        echo "=== /etc/profile.d/${_FEAT_PROFILE_D_FILE} ==="
        cat /etc/profile.d/${_FEAT_PROFILE_D_FILE} 2>/dev/null || echo "(missing)"
        echo "=== /etc/bashrc (tail) ==="
        tail -10 /etc/bashrc 2>/dev/null || echo "(missing)"
        echo "=== /etc/zshenv ==="
        cat /etc/zshenv 2>/dev/null || echo "(missing)"
    - title: discovery profile.d file has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: discovery profile.d file has shellenv eval
      cmd: grep -qF 'shellenv' /etc/profile.d/${_FEAT_PROFILE_D_FILE}
    - title: bashrc has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/bashrc
    - title: bashrc has shellenv eval
      cmd: grep -qF 'shellenv' /etc/bashrc
    - title: zshenv written
      cmd: test -f /etc/zshenv
    - title: zshenv has begin marker
      cmd: grep -qF '# >>> brew PATH (install-homebrew) >>>' /etc/zshenv
    - title: zshenv has shellenv eval
      cmd: grep -qF 'shellenv' /etc/zshenv
    - title: login PATH includes linuxbrew/bin
      cmd: bash -lc 'echo "$PATH" | grep -q /home/linuxbrew/.linuxbrew/bin'
      debug: |
        echo "=== login PATH ==="
