defaults:
  options:
    setup_zsh: true
    setup_bash: auto
    set_user_shells: none

apt_default:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    setup_zsh: auto
  tests: [apt_default]

apt_setup_zsh_true:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_zsh: true
    setup_bash: auto
  tests: [apt_setup_zsh_true]

apt_setup_zsh_auto:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_zsh: auto
  tests: [apt_setup_zsh_auto]

apt_setup_zsh_false:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  setup: sh /repo/src/install-zsh/install.sh
  options:
    setup_zsh: false
  tests: [apt_setup_zsh_false]

apt_setup_bash_false:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_bash: false
    setup_zsh: false
  tests: [apt_setup_bash_false]

apt_with_install_zsh:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  setup: sh /repo/src/install-zsh/install.sh
  options:
    setup_zsh: auto
  tests: [apt_default_with_zsh]

apt_set_shell_zsh:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: sh /repo/src/install-zsh/install.sh
  options:
    set_user_shells: zsh
    add_users: root
    setup_zsh: auto
  tests: [apt_set_shell_zsh]

apt_user_config:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_user_config]

apt_user_config_skip:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    user_config_mode: skip
    setup_zsh: true
  tests: [apt_user_config_skip]

apt_zdotdir_default:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_zdotdir_default]

apt_zdotdir_custom:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    zdotdir: "~/.zsh"
  tests: [apt_zdotdir_custom]

apt_augment_mode:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_LINE' > /root/.config/zsh/.zshrc
    echo '# MY_CUSTOM_BASHRC' > /root/.bashrc
  options:
    user_config_mode: augment
  tests: [apt_augment_mode]

apt_skel_placement:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_skel_placement]

apt_remote_user:
  envs: [devcontainers-base-debian]
  modes: [devcontainer]
  options:
    add_remote_user: true
  devcontainer:
    remoteUser: vscode
  tests: [apt_remote_user]

apt_container_user:
  envs: [devcontainers-base-debian]
  modes: [devcontainer]
  options:
    add_container_user: true
  devcontainer:
    containerUser: vscode
  tests: [apt_container_user]

apt_add_users:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: useradd -m -s /bin/bash devuser
  options:
    add_users: devuser
    add_container_user: false
    add_remote_user: false
  tests: [apt_add_users]
