defaults:
  options:
    setup_zsh: true
    setup_bash: auto
    set_user_shells: none

apt_default:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    setup_zsh: auto
  tests: [apt_default]

apt_setup_zsh_true:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_zsh: true
    setup_bash: auto
  tests: [apt_setup_zsh_true]

apt_setup_zsh_auto:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_zsh: auto
  tests: [apt_setup_zsh_auto]

apt_setup_zsh_false:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  setup: apt-get update && apt-get install -y --no-install-recommends zsh
  options:
    setup_zsh: false
  tests: [apt_setup_zsh_false]

apt_setup_bash_false:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_bash: false
    setup_zsh: false
  tests: [apt_setup_bash_false]

apt_with_install_zsh:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  setup: apt-get update && apt-get install -y --no-install-recommends zsh
  options:
    setup_zsh: auto
  tests: [apt_default_with_zsh]

apt_set_shell_zsh:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: apt-get update && apt-get install -y --no-install-recommends zsh
  options:
    set_user_shells: zsh
    add_users: root
    setup_zsh: auto
  tests: [apt_set_shell_zsh]

apt_user_config:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_user_config]

apt_if_exists_skip:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_ZSHRC' > /root/.config/zsh/.zshrc
    echo '# MY_CUSTOM_BASHRC' > /root/.bashrc
  options:
    setup_zsh: true
  tests: [apt_if_exists_skip]

apt_if_exists_update:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_ZSHRC' > /root/.config/zsh/.zshrc
  options:
    if_exists: update
    setup_zsh: true
  tests: [apt_if_exists_update]

apt_if_exists_reinstall:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_ZSHRC' > /root/.config/zsh/.zshrc
  options:
    if_exists: reinstall
    setup_zsh: true
  tests: [apt_if_exists_reinstall]

apt_setup_system_false:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_system: false
    setup_zsh: true
  tests: [apt_setup_system_false]

apt_setup_skel:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    setup_skel: true
  tests: [apt_setup_skel]

apt_zdotdir_default:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_zdotdir_default]

apt_zdotdir_custom:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    zdotdir: "~/.zsh"
  tests: [apt_zdotdir_custom]

apt_skel_placement:
  envs: [debian-latest]
  modes: [devcontainer]
  tests: [apt_skel_placement]

apt_remote_user:
  envs: [devcontainers-base-debian]
  modes: [devcontainer]
  options:
    add_remote_user: true
  devcontainer:
    remoteUser: vscode
  tests: [apt_remote_user]

apt_container_user:
  envs: [devcontainers-base-debian]
  modes: [devcontainer]
  options:
    add_container_user: true
  devcontainer:
    containerUser: vscode
  tests: [apt_container_user]

apt_add_users:
  envs: [debian-latest]
  modes: [devcontainer]
  setup: useradd -m -s /bin/bash devuser
  options:
    add_users: devuser
    add_container_user: false
    add_remote_user: false
  tests: [apt_add_users]

apt_no_bash_env:
  envs: [debian-latest]
  modes: [devcontainer, standalone]
  options:
    setup_bash_env: false
  tests: [apt_no_bash_env]

apt_locale_custom:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    locale: C.UTF-8
  tests: [apt_locale_custom]

apt_no_locale:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    locale: ''
  tests: [apt_no_locale]

apt_editor_vim:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    default_editor: vim
  tests: [apt_editor_vim]

apt_custom_shellrc:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    user_shellrc: .config/shell/rc
  tests: [apt_custom_shellrc]

apt_custom_zsh_theme:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    zsh_theme: /tmp/mytheme
  tests: [apt_custom_zsh_theme]

apt_custom_bash_theme:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    bash_theme: /tmp/mybashtheme
  tests: [apt_custom_bash_theme]

apt_no_umask:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    umask: ''
  tests: [apt_no_umask]

apt_no_editor:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    default_editor: skip
  tests: [apt_no_editor]

apt_tilde_themes:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    zsh_theme: ~/myzshtheme
    bash_theme: ~/mybashtheme
  tests: [apt_tilde_themes]

apt_custom_bash_env_path:
  envs: [debian-latest]
  modes: [devcontainer]
  options:
    bash_env_path: /tmp/mybashenv
  tests: [apt_custom_bash_env_path]
