defaults:
  options:
    setup_zsh: true
    setup_bash: auto
    set_user_shells: none

default:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    setup_zsh: auto
  tests: [default]

setup_zsh_true:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  options:
    setup_zsh: true
    setup_bash: auto
  tests: [setup_zsh_true]

setup_zsh_auto:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  options:
    setup_zsh: auto
  tests: [setup_zsh_auto]

setup_zsh_false:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  setup: apt-get update && apt-get install -y --no-install-recommends zsh
  options:
    setup_zsh: false
  tests: [setup_zsh_false]

setup_bash_false:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  options:
    setup_bash: false
    setup_zsh: false
  tests: [setup_bash_false]

with_install_zsh:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  setup: apt-get update && apt-get install -y --no-install-recommends zsh
  options:
    setup_zsh: auto
  tests: [default_with_zsh]

set_shell_zsh:
  envs: [debian-stable]
  modes: [devcontainer]
  setup: apt-get update && apt-get install -y --no-install-recommends zsh
  options:
    set_user_shells: zsh
    add_users: root
    setup_zsh: auto
  tests: [set_shell_zsh]

user_config:
  envs: [debian-stable]
  modes: [devcontainer]
  tests: [user_config]

if_exists_skip:
  envs: [debian-stable]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_ZSHRC' > /root/.config/zsh/.zshrc
    echo '# MY_CUSTOM_BASHRC' > /root/.bashrc
  options:
    setup_zsh: true
  tests: [if_exists_skip]

if_exists_update:
  envs: [debian-stable]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_ZSHRC' > /root/.config/zsh/.zshrc
  options:
    if_exists: update
    setup_zsh: true
  tests: [if_exists_update]

if_exists_reinstall:
  envs: [debian-stable]
  modes: [devcontainer]
  setup: |
    mkdir -p /root/.config/zsh
    echo '# MY_CUSTOM_ZSHRC' > /root/.config/zsh/.zshrc
  options:
    if_exists: reinstall
    setup_zsh: true
  tests: [if_exists_reinstall]

setup_system_false:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  options:
    setup_system: false
    setup_zsh: true
  tests: [setup_system_false]

setup_skel:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    setup_skel: true
  tests: [setup_skel]

zdotdir_default:
  envs: [debian-stable]
  modes: [devcontainer]
  tests: [zdotdir_default]

zdotdir_custom:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    zdotdir: "~/.zsh"
  tests: [zdotdir_custom]

skel_placement:
  envs: [debian-stable]
  modes: [devcontainer]
  tests: [skel_placement]

remote_user:
  envs: [debian-stable+vscode]
  modes: [devcontainer]
  options:
    add_remote_user: true
  devcontainer:
    remoteUser: vscode
  tests: [remote_user]

container_user:
  envs: [debian-stable+vscode]
  modes: [devcontainer]
  options:
    add_container_user: true
  devcontainer:
    containerUser: vscode
  tests: [container_user]

add_users:
  envs: [debian-stable]
  modes: [devcontainer]
  setup: useradd -m -s /bin/bash devuser
  options:
    add_users: devuser
    add_container_user: false
    add_remote_user: false
  tests: [add_users]

no_bash_env:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  options:
    setup_bash_env: false
  tests: [no_bash_env]

locale_custom:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    locale: C.UTF-8
  tests: [locale_custom]

no_locale:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    locale: ''
  tests: [no_locale]

editor_vim:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    default_editor: vim
  tests: [editor_vim]

custom_shellrc:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    user_shellrc: .config/shell/rc
  tests: [custom_shellrc]

custom_zsh_theme:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    zsh_theme: /tmp/mytheme
  tests: [custom_zsh_theme]

custom_bash_theme:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    bash_theme: /tmp/mybashtheme
  tests: [custom_bash_theme]

no_umask:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    umask: ''
  tests: [no_umask]

no_editor:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    default_editor: skip
  tests: [no_editor]

tilde_themes:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    zsh_theme: ~/myzshtheme
    bash_theme: ~/mybashtheme
  tests: [tilde_themes]

custom_bash_env_path:
  envs: [debian-stable]
  modes: [devcontainer]
  options:
    bash_env_path: /tmp/mybashenv
  tests: [custom_bash_env_path]
