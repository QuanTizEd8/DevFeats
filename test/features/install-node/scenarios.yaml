defaults:
  options:
    log_level: trace

nvm_set_permissions:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    nvm_write_group: nvm
  tests: [nvm_set_permissions.sh]

nvm_add_users:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  setup: useradd -m -s /bin/bash -u 1001 testuser
  options:
    nvm_write_group: nvm
    nvm_write_users: testuser
  tests: [nvm_add_users.sh]

nvm_remote_user:
  envs: [devcontainers-base-ubuntu]
  modes: [devcontainer]
  options:
    nvm_write_group: nvm
  tests: [nvm_remote_user.sh]
  devcontainer:
    remoteUser: vscode

nvm_no_permissions:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    nvm_write_group: ""
  tests: [nvm_no_permissions.sh]
