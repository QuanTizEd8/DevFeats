default:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  tests: [default]

specific_version:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    version: "2.35.0"
    method: binary
  tests: [specific_version]

binary_custom_prefix:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/direnv-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

custom_prefix_no_symlink:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/direnv-bin
    prefix_discovery: none
  tests: [custom_prefix_no_symlink]

package_default:
  envs:
    - debian-stable+bash
    - ubuntu-stable
    - fedora-current+bash
    - alpine-current+bash
    - archlinux-current
    - opensuse-leap-current+bash
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

source_default:
  envs: [debian-stable+go]
  modes: [standalone]
  options:
    method: source
    version: "2.37.1"
  tests: [source_default]

fish_hook:
  envs: [ubuntu-stable+fish]
  modes: [devcontainer, standalone]
  tests: [fish_hook]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "2.99.0"; exit 0; fi\nexit 0' \
      > /usr/local/bin/direnv
    chmod +x /usr/local/bin/direnv
  options:
    method: auto
    if_exists: fail
  tests: [if_exists_fail]
  standalone:
    skip_install: false

if_exists_skip:
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "2.99.0"; exit 0; fi\nexit 0' \
      > /usr/local/bin/direnv
    chmod +x /usr/local/bin/direnv
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

reinstall:
  envs: [debian-stable+direnv]
  modes: [devcontainer, standalone]
  options:
    version: "2.37.1"
    method: binary
    if_exists: reinstall
  tests: [reinstall]

version_match_idempotency:
  expect_install_failure: true
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "2.37.1"; exit 0; fi\nexit 0' \
      > /usr/local/bin/direnv
    chmod +x /usr/local/bin/direnv
  options:
    version: "2.37.1"
    if_exists: fail
  tests: [version_match_idempotency]
  standalone:
    skip_install: false
