defaults:
  options:
    log_level: trace

default_binary:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  tests: [default]

specific_version:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    version: "2.35.0"
    method: binary
  tests: [specific_version]

binary_custom_prefix:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/direnv-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

custom_prefix_no_symlink:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/direnv-bin
    prefix_discovery: none
  tests: [custom_prefix_no_symlink]

package_install:
  envs:
    - debian-bookworm+bash
    - ubuntu-24.04
    - fedora-latest+bash
    - alpine-latest+bash
    - arch+bash
    - opensuse-leap+bash
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [default]

source_build:
  envs: [debian-bookworm+direnv-source-build-deps]
  modes: [standalone]
  options:
    method: source
    version: "2.37.1"
  tests: [source_build]

fish_hook:
  envs: [ubuntu-latest+fish]
  modes: [devcontainer, standalone]
  tests: [fish_hook]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "2.99.0"; exit 0; fi\nexit 0' \
      > /usr/local/bin/direnv
    chmod +x /usr/local/bin/direnv
  options:
    method: auto
    if_exists: fail
  tests: [if_exists_fail]
  standalone:
    skip_install: false

if_exists_skip:
  envs: [debian-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "2.99.0"; exit 0; fi\nexit 0' \
      > /usr/local/bin/direnv
    chmod +x /usr/local/bin/direnv
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

reinstall:
  envs: [debian-latest+direnv-apt]
  modes: [devcontainer, standalone]
  options:
    version: "2.37.1"
    method: binary
    if_exists: reinstall
  tests: [reinstall]

version_match_idempotency:
  expect_install_failure: true
  envs: [debian-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "2.37.1"; exit 0; fi\nexit 0' \
      > /usr/local/bin/direnv
    chmod +x /usr/local/bin/direnv
  options:
    version: "2.37.1"
    if_exists: fail
  tests: [version_match_idempotency]
  standalone:
    skip_install: false
