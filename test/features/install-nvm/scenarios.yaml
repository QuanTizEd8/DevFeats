nvm_set_permissions:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    write_group: nvm
  tests: [nvm_set_permissions]

nvm_add_users:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  setup: useradd -m -s /bin/bash -u 1001 testuser
  options:
    write_group: nvm
    write_users: testuser
  tests: [nvm_add_users]

nvm_remote_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  options:
    write_group: nvm
  tests: [nvm_remote_user]
  devcontainer:
    remoteUser: vscode

nvm_no_permissions:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    write_group: ""
  tests: [nvm_no_permissions]
