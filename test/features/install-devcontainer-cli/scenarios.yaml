defaults:
  options:
    if_exists: reinstall

npm_bundled:
  envs: [ubuntu-latest]
  modes: [devcontainer, standalone]
  options:
    method: npm-bundled
  tests: [npm_bundled]

npm:
  envs: [ubuntu-latest+nodejs]
  modes: [devcontainer, standalone]
  options:
    method: npm
  tests: [npm]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [[ "${1-}" == "--version" ]]; then echo "0.0.0"; exit 0; fi\nexit 0\n' > /usr/local/bin/devcontainer
    chmod +x /usr/local/bin/devcontainer
  options:
    method: npm-bundled
    if_exists: fail
  tests: [if_exists_fail]
  standalone:
    skip_install: false
