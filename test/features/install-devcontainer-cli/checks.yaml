npm_bundled:
  description: |
    method=npm-bundled: installs devcontainer with a self-contained Node.js
    runtime; verifies the binary is on PATH and functional.
  checks:
    - title: devcontainer command is available
      cmd: bash -lc "command -v devcontainer"
    - title: devcontainer --version succeeds
      cmd: bash -lc "devcontainer --version"

npm:
  description: |
    method=npm: installs devcontainer as a global npm package;
    verifies the binary is on PATH and functional.
  checks:
    - title: devcontainer command is available
      cmd: bash -lc "command -v devcontainer"
    - title: devcontainer --version succeeds
      cmd: bash -lc "devcontainer --version"

if_exists_fail:
  description: Ensures if_exists=fail exits non-zero when devcontainer already exists.
  checks:
    - title: preinstalled devcontainer remains available
      cmd: command -v devcontainer
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)
