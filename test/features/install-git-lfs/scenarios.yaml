defaults:
  modes: [devcontainer]

default:
  envs: [ubuntu-stable]
  tests: [default]

upstream_package:
  envs: [ubuntu-stable, rockylinux-current+bash]
  options:
    method: upstream-package
  tests: [upstream_package]

linux_zypper:
  envs: [opensuse-leap-current+bash]
  options:
    method: package
  tests: [linux_zypper]

source_prefix:
  envs: [ubuntu-stable]
  options:
    method: source
    prefix: /opt/git-lfs
  tests: [source_prefix]

global_remote_user:
  envs: [ubuntu-stable+vscode]
  devcontainer:
    remoteUser: vscode
  options:
    method: binary
    config_scope: global
    add_current_user: false
    add_remote_user: true
    add_container_user: false
  tests: [global_remote_user]

file_scope_skip_smudge_repo_hook:
  envs: [ubuntu-stable]
  setup: |
    apt-get update
    apt-get install -y git
    git init /tmp/git-lfs-file-repo
  options:
    method: binary
    config_scope: file
    config_file: .git/git-lfs-test.conf
    repo_dir: /tmp/git-lfs-file-repo
    skip_repo: false
    skip_smudge: true
  tests: [file_scope_skip_smudge_repo_hook]

worktree_manual_hooks:
  envs: [ubuntu-stable]
  setup: |
    apt-get update
    apt-get install -y git
    git init /tmp/git-lfs-worktree-repo
  options:
    method: binary
    config_scope: worktree
    repo_dir: /tmp/git-lfs-worktree-repo
    skip_repo: false
    manual_hooks: true
  tests: [worktree_manual_hooks]

auto_pull_true:
  envs: [ubuntu-stable]
  options:
    method: binary
    config_scope: none
    auto_pull: true
  tests: [auto_pull_true]

auto_pull_false:
  envs: [ubuntu-stable]
  options:
    method: binary
    config_scope: none
    auto_pull: false
  tests: [auto_pull_false]

macos_default:
  envs: [macos-current+brew]
  modes: [macos]
  setup: |
    brew list git-lfs >/dev/null 2>&1 && brew uninstall --formula git-lfs || true
  options:
    method: package
    config_scope: global
    add_remote_user: false
    add_container_user: false
  tests: [macos_default]
