default:
  envs: [fedora-current+bash, archlinux-current]
  modes: [devcontainer, standalone]
  tests: [default]

binary_pinned_version:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    version: "12.1.2"
    method: binary
  tests: [binary_pinned_version]

package_default:
  envs:
    - alpine-current+bash
    - opensuse-leap-current+bash
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

upstream_package_default:
  envs: [rockylinux-current+bash]
  modes: [devcontainer, standalone]
  options:
    method: upstream-package
  tests: [upstream_package_default]

method_cargo:
  envs: [ubuntu-current+rust]
  modes: [standalone]
  options:
    method: cargo
  tests: [method_cargo]

if_exists_fail:
  expect_install_failure: true
  envs: [ubuntu-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "tokei 99.99.99\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/tokei
    chmod +x /usr/local/bin/tokei
  options:
    if_exists: fail
  tests: [if_exists_fail]

if_exists_skip:
  envs: [ubuntu-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then printf "tokei 99.99.99\n"; exit 0; fi\nexit 0' \
      > /usr/local/bin/tokei
    chmod +x /usr/local/bin/tokei
  options:
    if_exists: skip
  tests: [if_exists_skip]
