defaults:
  options:
    log_level: trace
default_install:
  envs:
  - ubuntu-latest
  modes:
  - devcontainer
  - standalone
  tests:
  - default_install
binary_custom_prefix:
  envs:
  - ubuntu-latest
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    prefix: /opt/shfmt-bin
    if_exists: reinstall
  tests:
  - binary_custom_prefix
package_install:
  envs:
  - debian-latest
  modes:
  - devcontainer
  - standalone
  options:
    method: package
  tests:
  - package_install
if_exists_fail:
  expect_install_failure: true
  envs:
  - debian-latest
  modes:
  - standalone
  setup: 'printf ''#!/usr/bin/env bash\nif [[ "${1-}" == "--version" ]]; then echo
    "v3.0.0 (fake)"; exit 0; fi\nexec cat\n'' > /usr/local/bin/shfmt

    chmod +x /usr/local/bin/shfmt

    '
  options:
    method: auto
    if_exists: fail
  tests:
  - if_exists_fail
  standalone:
    skip_install: false
