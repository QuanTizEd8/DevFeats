package_default:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  tests:
  - package_default.sh
package_debian:
  envs:
  - debian-12
  modes:
  - devcontainer
  options:
    version: stable
  tests:
  - package_debian.sh
package_stable:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    version: stable
    prefix: /opt/git
    export_path: /tmp/install-git-path.sh
    prefix_discovery: none
    shell_completions: ''
  tests:
  - package_stable.sh
package_alpine:
  envs:
  - alpine-3.21
  modes:
  - devcontainer
  options:
    version: stable
  tests:
  - package_alpine.sh
package_fedora:
  envs:
  - fedora-41
  modes:
  - devcontainer
  options:
    version: stable
  tests:
  - package_fedora.sh
gitconfig_system:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    default_branch: trunk
    safe_directory: '*

      /workspaces/devfeats

      /tmp/repo'
    system_gitconfig: "[push]\n  default = simple\n[fetch]\n  prune = true"
  tests:
  - gitconfig_system.sh
gitconfig_user:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  setup: useradd -m -s /bin/bash vscode
  options:
    add_remote_user: true
    user_name: Dev User
    user_email: dev@example.com
    user_gitconfig: "[pull]\n  rebase = false"
  devcontainer:
    remoteUser: vscode
  tests:
  - gitconfig_user.sh
log_file:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    log_file: /tmp/git.log
  tests:
  - log_file.sh
source_stable:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    method: source
    version: stable
  tests:
  - source_stable.sh
source_pinned:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    method: source
    version: 2.47.2
  tests:
  - source_pinned.sh
source_installer_dir:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    method: source
    version: stable
    installer_dir: /tmp/git-build-trace
  tests:
  - source_installer_dir.sh
source_custom_prefix:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    method: source
    version: stable
    prefix: /opt/git
    prefix_discovery: all
  tests:
  - source_custom_prefix.sh
source_export_path_disabled:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    method: source
    version: stable
    prefix: /opt/git
    export_path: ''
    prefix_discovery: none
  tests:
  - source_export_path_disabled.sh
source_no_flags_perl:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    method: source
    version: stable
    no_flags: perl
  tests:
  - source_no_flags_perl.sh
if_exists_skip:
  envs:
  - ubuntu-24.04+git-preinstalled
  modes:
  - devcontainer
  options:
    if_exists: skip
  tests:
  - if_exists_skip.sh
if_exists_reinstall_source:
  envs:
  - ubuntu-24.04+git-preinstalled
  modes:
  - devcontainer
  options:
    method: source
    version: stable
    prefix: /opt/git
    if_exists: reinstall
    default_branch: trunk
  tests:
  - if_exists_reinstall_source.sh
if_exists_update_package:
  envs:
  - ubuntu-24.04+git-preinstalled
  modes:
  - devcontainer
  options:
    if_exists: update
    version: stable
    default_branch: trunk
  tests:
  - if_exists_update_package.sh
if_exists_fail:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  options:
    if_exists: fail
  tests:
  - if_exists_fail.sh
if_exists_fail_preinstalled:
  expect_install_failure: true
  envs:
  - ubuntu-24.04+git-preinstalled
  modes:
  - standalone
  options:
    if_exists: fail
  standalone:
    skip_install: false
  tests:
  - if_exists_fail_preinstalled.sh
source_build_network_isolated:
  expect_install_failure: true
  envs:
  - ubuntu-24.04
  modes:
  - standalone
  standalone:
    network: none
    skip_install: false
  tests:
  - source_build_network_isolated.sh
  options:
    method: source
source_custom_prefix_nonroot:
  envs:
  - ubuntu-24.04+git-source-build-deps
  modes:
  - standalone
  setup: 'useradd -m -s /bin/bash vscode

    mkdir -p /opt/git

    chown vscode:vscode /opt/git

    '
  standalone:
    user: vscode
    # Install must run as vscode (see checks pre); runner install is always root.
    skip_install: true
  tests:
  - source_custom_prefix_nonroot.sh
invalid_if_exists:
  expect_install_failure: true
  envs:
  - ubuntu-24.04
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - invalid_if_exists.sh
  options:
    if_exists: invalid
invalid_method:
  expect_install_failure: true
  envs:
  - ubuntu-24.04
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - invalid_method.sh
  options:
    method: invalid
source_build_nonexistent_version:
  expect_install_failure: true
  envs:
  - ubuntu-24.04
  modes:
  - standalone
  standalone:
    skip_install: false
  tests:
  - source_build_nonexistent_version.sh
  options:
    method: source
    version: 0.0.0
macos_package_default:
  envs:
  - macos-latest
  # Orchestrator runs install.sh with no CLI args; options are delivered as env
  # vars (see docs user-guide/options.md). if_exists must be skip so the install
  # exits before default_branch/safe_directory gitconfig writes.
  options:
    method: package
    version: stable
    if_exists: skip
  setup: |
    # Hosted runners may ship XDG git config; skip semantics do not touch it — isolate the assertion.
    rm -f "${HOME}/.config/git/config"
    rmdir "${HOME}/.config/git" 2>/dev/null || true
  tests:
  - macos_package_default.sh
