default:
  envs: [debian-stable]
  modes: [devcontainer, standalone]
  tests: [default]

package_default:
  envs: [debian-stable+bash, alpine-current+bash, fedora-current+bash]
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

source_default:
  envs: [debian-stable+build-essential+ncurses]
  modes: [standalone]
  options:
    method: source
    version: "5.9.1"
  tests: [source_default]

source_pinned_version:
  envs: [debian-stable+build-essential+ncurses]
  modes: [standalone]
  options:
    method: source
    version: "5.9"
  tests: [source_pinned_version]

source_custom_prefix:
  envs: [debian-stable+build-essential+ncurses]
  modes: [devcontainer, standalone]
  options:
    method: source
    version: "5.9.1"
    prefix: /opt/zsh
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [source_custom_prefix]

source_custom_prefix_nonroot:
  envs: [debian-stable+build-essential+ncurses+vscode]
  modes: [standalone]
  options:
    method: source
    version: "5.9.1"
    prefix: /opt/zsh
    prefix_discovery: symlink
  standalone:
    user: vscode
  tests: [source_custom_prefix_nonroot]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/bin/sh\nif [ "${1-}" = "--version" ]; then echo "zsh 9.9.9 (fake)"; exit 0; fi\nexit 0' > /usr/local/bin/zsh
    chmod +x /usr/local/bin/zsh
  options:
    method: auto
    if_exists: fail
  tests: [if_exists_fail]

if_exists_skip:
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/bin/sh\nif [ "${1-}" = "--version" ]; then echo "zsh 9.9.9 (fake)"; exit 0; fi\nexit 0' > /usr/local/bin/zsh
    chmod +x /usr/local/bin/zsh
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

invalid_method:
  expect_install_failure: true
  envs: [debian-stable]
  modes: [standalone]
  options:
    method: binary
  tests: [invalid_method]
