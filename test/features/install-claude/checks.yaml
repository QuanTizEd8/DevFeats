# ── auto method ────────────────────────────────────────────────────────────────

auto_apt:
  description: |
    method=auto on Ubuntu 24.04: __resolve_method selects upstream-package (apt)
    because apt is available.  Verifies claude is installed and functional,
    confirming the auto-resolution logic and the apt install path.
  pre: |
    echo "=== which claude ==="
    which claude 2>&1 || echo "(not on PATH)"
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'

# ── if_exists behaviour ────────────────────────────────────────────────────────

if_exists_skip:
  description: |
    method=binary + if_exists=skip + pre-installed stub (9.9.9): verifies the
    installer skips without touching the existing binary when claude is already
    present.
  checks:
    - title: claude stub still on PATH
      cmd: command -v claude
    - title: skip left the stub untouched (version still 9.9.9)
      cmd: bash -c 'claude --version 2>/dev/null | grep -Fq "9.9.9"'
      on_fail: |
        echo "=== actual claude --version output ==="
        claude --version 2>&1 || echo "(failed)"

if_exists_fail:
  description: |
    method=binary + if_exists=fail + pre-installed stub: verifies the installer
    exits non-zero when claude is already present and leaves the stub untouched.
  checks:
    - kind: install_failure
      title: if_exists=fail exits non-zero when claude is already installed
      pattern: "failing (if_exists=fail)"
    - title: claude stub still on PATH after failed install
      cmd: command -v claude
    - title: stub untouched after failed install (version still 9.9.9)
      cmd: bash -c 'claude --version 2>/dev/null | grep -Fq "9.9.9"'

# ── validation ─────────────────────────────────────────────────────────────────

invalid_method:
  description: Invalid method value causes the installer to exit non-zero.
  checks:
    - kind: install_failure
      title: invalid method rejected by the argument validator
      pattern: "Invalid value for 'method'"
