# ── binary method ──────────────────────────────────────────────────────────────

binary_stable:
  description: |
    method=binary, version=stable (default): direct binary download from the
    Anthropic CDN.  Verifies claude is installed at /usr/local/bin/claude and
    reports a valid semver.
  pre: |
    echo "=== which claude ==="
    which claude 2>&1 || echo "(not on PATH)"
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude binary is at /usr/local/bin/claude
      cmd: test -f /usr/local/bin/claude
    - title: claude binary is executable
      cmd: test -x /usr/local/bin/claude
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'
      on_fail: |
        echo "=== actual claude --version output ==="
        claude --version 2>&1 || echo "(failed)"

binary_specific_version:
  description: |
    method=binary, version=2.1.153: pinned semver from the Anthropic CDN.
    Verifies the binary reports exactly 2.1.153.
  pre: |
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude binary is at /usr/local/bin/claude
      cmd: test -f /usr/local/bin/claude
    - title: claude binary is executable
      cmd: test -x /usr/local/bin/claude
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude version is exactly 2.1.153
      cmd: bash -c '[ "$(claude --version 2>/dev/null | cut -d" " -f1)" = "2.1.153" ]'
      on_fail: |
        echo "=== actual claude --version output ==="
        claude --version 2>&1 || echo "(failed)"

binary_musl:
  description: |
    method=binary on Alpine 3.21 (musl libc): verifies that LIBC detection
    selects the musl binary variant from the CDN and it executes correctly.
  pre: |
    echo "=== which claude ==="
    which claude 2>&1 || echo "(not on PATH)"
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude binary is at /usr/local/bin/claude
      cmd: test -f /usr/local/bin/claude
    - title: claude binary is executable
      cmd: test -x /usr/local/bin/claude
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds (musl binary is functional)
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'
      on_fail: |
        echo "=== actual claude --version output ==="
        claude --version 2>&1 || echo "(failed)"

macos_package_default:
  description: |
    method=package on macOS installs the Homebrew cask.
    Verifies claude is on PATH, functional, listed by brew, and records
    installed-method=package.
  pre: |
    _installed_method="${_FEAT_SHARE_DIR_ROOT}/state/installed-method"
    echo "=== which claude ==="
    which claude 2>&1 || echo "(not on PATH)"
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: brew is on PATH
      cmd: command -v brew
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'
    - title: brew lists the claude-code cask
      cmd: brew list --cask claude-code
    - title: installed-method state is package
      cmd: grep -Fqx "package" "${_installed_method}"

# ── upstream-package method ────────────────────────────────────────────────────

upstream_package_default:
  description: |
    method=upstream-package across all supported distros (Ubuntu, Alpine, Fedora).
    Installs claude from the Anthropic package repo for each platform and verifies
    claude is callable, reports a valid semver, and is registered with the platform
    package manager.
  pre: |
    echo "=== which claude ==="
    which claude 2>&1 || echo "(not on PATH)"
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'
    - title: claude-code is package-manager-managed
      kind: multiple
      min: 1
      cmd:
        - bash -c 'dpkg -l claude-code 2>/dev/null | grep -q "^ii"'
        - bash -c 'rpm -q claude-code >/dev/null 2>&1'
        - bash -c 'apk info -e claude-code >/dev/null 2>&1'

upstream_package_apt_latest:
  description: |
    method=upstream-package, version=latest on Ubuntu 24.04: installs claude from
    the Anthropic latest apt repo.  Verifies the package is installed and functional.
  pre: |
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'
    - title: claude-code package registered with dpkg
      cmd: bash -c 'dpkg -l claude-code 2>/dev/null | grep -q "^ii"'


upstream_package_keep_repos:
  description: |
    method=upstream-package + keep_repos=true across all supported distros (Ubuntu,
    Alpine, Fedora). Verifies the Anthropic package repo is retained after installation
    (not cleaned up as in the default keep_repos=false behavior).
  pre: |
    echo "=== apt sources for claude ==="
    grep -r "downloads.claude.ai" /etc/apt/sources.list.d/ 2>/dev/null || echo "(none)"
    echo "=== apk repos for claude ==="
    grep -r "downloads.claude.ai" /etc/apk/ 2>/dev/null || echo "(none)"
    echo "=== yum repo files for claude ==="
    grep -r "downloads.claude.ai" /etc/yum.repos.d/ 2>/dev/null || echo "(none)"
  checks:
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: upstream package repo retained after installation
      kind: multiple
      min: 1
      cmd:
        - bash -c 'grep -rq "downloads.claude.ai/claude-code/apt" /etc/apt/sources.list.d/ 2>/dev/null'
        - bash -c 'grep -rq "downloads.claude.ai/claude-code/apk" /etc/apk/ 2>/dev/null'
        - bash -c 'grep -rq "downloads.claude.ai/claude-code/rpm" /etc/yum.repos.d/ 2>/dev/null'
    - title: claude-code is package-manager-managed
      kind: multiple
      min: 1
      cmd:
        - bash -c 'dpkg -l claude-code 2>/dev/null | grep -q "^ii"'
        - bash -c 'rpm -q claude-code >/dev/null 2>&1'
        - bash -c 'apk info -e claude-code >/dev/null 2>&1'

# ── npm-bundled method ─────────────────────────────────────────────────────────

npm_bundled:
  description: |
    method=npm-bundled: installs claude via a self-contained bundled Node.js
    runtime (no system Node.js required).  Verifies the binary is on PATH and
    reports a valid semver.
  pre: |
    echo "=== which claude ==="
    which claude 2>&1 || echo "(not on PATH)"
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'
      on_fail: |
        echo "=== actual claude --version output ==="
        claude --version 2>&1 || echo "(failed)"

# ── auto method ────────────────────────────────────────────────────────────────

auto_apt:
  description: |
    method=auto on Ubuntu 24.04: __resolve_method selects upstream-package (apt)
    because apt is available.  Verifies claude is installed and functional,
    confirming the auto-resolution logic and the apt install path.
  pre: |
    echo "=== which claude ==="
    which claude 2>&1 || echo "(not on PATH)"
    echo "=== claude --version ==="
    claude --version 2>&1 || echo "(failed)"
  checks:
    - title: claude is on PATH
      cmd: command -v claude
    - title: claude --version succeeds
      cmd: claude --version
    - title: claude --version reports a semver
      cmd: bash -c 'claude --version | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+ \(Claude Code\)$"'

# ── if_exists behaviour ────────────────────────────────────────────────────────

if_exists_skip:
  description: |
    method=binary + if_exists=skip + pre-installed stub (9.9.9): verifies the
    installer skips without touching the existing binary when claude is already
    present.
  checks:
    - title: claude stub still on PATH
      cmd: command -v claude
    - title: skip left the stub untouched (version still 9.9.9)
      cmd: bash -c 'claude --version 2>/dev/null | grep -Fq "9.9.9"'
      on_fail: |
        echo "=== actual claude --version output ==="
        claude --version 2>&1 || echo "(failed)"

if_exists_fail:
  description: |
    method=binary + if_exists=fail + pre-installed stub: verifies the installer
    exits non-zero when claude is already present and leaves the stub untouched.
  checks:
    - kind: install_failure
      title: if_exists=fail exits non-zero when claude is already installed
      pattern: "failing (if_exists=fail)"
    - title: claude stub still on PATH after failed install
      cmd: command -v claude
    - title: stub untouched after failed install (version still 9.9.9)
      cmd: bash -c 'claude --version 2>/dev/null | grep -Fq "9.9.9"'

# ── validation ─────────────────────────────────────────────────────────────────

invalid_method:
  description: Invalid method value causes the installer to exit non-zero.
  checks:
    - kind: install_failure
      title: invalid method rejected by the argument validator
      pattern: "Invalid value for 'method'"
