default:
  description: |
    Default install on Ubuntu puts a functional uv (and uvx) on PATH via binary
    auto-selection. Also exercises shell_completions=bash (enabled by default in this
    scenario) and verifies the cargo-dist self-update receipt is written with a
    dynamically-fetched provider version.
  checks:
    - title: uv is on PATH
      cmd: command -v uv
    - title: uvx is on PATH
      cmd: command -v uvx
    - title: uv binary is executable
      cmd: bash -c 'test -x "$(command -v uv)"'
    - title: uv --version succeeds
      cmd: uv --version
      debug: |
        echo "=== uv --version ==="
        uv --version 2>&1 || echo "(failed)"
    - title: uv reports a semver version
      cmd: bash -c 'uv --version | grep -Eq "^uv [0-9]+\.[0-9]+\.[0-9]+"'
    - title: uvx --version succeeds
      cmd: uvx --version
    - title: bash completion file exists
      cmd: test -f /etc/bash_completion.d/uv
      debug: |
        echo "=== /etc/bash_completion.d/uv ==="
        cat /etc/bash_completion.d/uv 2> /dev/null | head -5 || echo "(missing)"
    - title: bash completion file is non-empty
      cmd: bash -c 'test -s /etc/bash_completion.d/uv'
    - title: bash completion file is valid bash
      cmd: bash -n /etc/bash_completion.d/uv
    - title: uv install receipt exists
      cmd: test -f "${HOME}/.config/uv/uv-receipt.json"
      debug: |
        echo "=== uv-receipt.json ==="
        cat "${HOME}/.config/uv/uv-receipt.json" 2> /dev/null || echo "(missing)"
    - title: uv install receipt reports default install_prefix
      cmd: bash -c 'grep -q "\"install_prefix\":\"/usr/local/bin\"" "${HOME}/.config/uv/uv-receipt.json"'
    - title: uv install receipt has a dynamically-fetched cargo-dist provider version
      cmd: bash -c 'grep -Eq "\"provider\":\{\"source\":\"cargo-dist\",\"version\":\"[0-9]+\.[0-9]+\.[0-9]+\"\}" "${HOME}/.config/uv/uv-receipt.json"'

binary_pinned_version:
  description: |
    version=0.9.7 + method=binary: installs a specific pinned release and
    verifies the binary reports exactly that version.
  checks:
    - title: uv binary is at /usr/local/bin/uv
      cmd: test -f /usr/local/bin/uv
    - title: uvx binary is at /usr/local/bin/uvx
      cmd: test -f /usr/local/bin/uvx
    - title: uv binary is executable
      cmd: test -x /usr/local/bin/uv
    - title: uv --version succeeds
      cmd: uv --version
      debug: |
        echo "=== uv --version ==="
        uv --version 2>&1 || echo "(failed)"
    - title: uv version is 0.9.7
      cmd: bash -c 'uv --version 2>/dev/null | grep -q "^uv 0\.9\.7"'
    - title: uv install receipt exists
      cmd: test -f "${HOME}/.config/uv/uv-receipt.json"
    - title: uv install receipt reports version 0.9.7
      cmd: bash -c 'grep -q "\"version\":\"0.9.7\"" "${HOME}/.config/uv/uv-receipt.json"'
    - title: uv install receipt reports the exact cargo-dist version that built this release
      cmd: bash -c 'grep -q "\"provider\":\{\"source\":\"cargo-dist\",\"version\":\"0.30.1\"\}" "${HOME}/.config/uv/uv-receipt.json"'
      debug: |
        echo "=== uv-receipt.json ==="
        cat "${HOME}/.config/uv/uv-receipt.json" 2> /dev/null || echo "(missing)"

binary_custom_prefix:
  description: |
    method=binary, prefix=/opt/uv-bin, prefix_discovery=symlink: installs uv/uvx at a custom
    prefix and creates symlinks at /usr/local/bin/uv and /usr/local/bin/uvx pointing to the
    custom-prefix binaries.
  checks:
    - title: uv binary is at /opt/uv-bin/bin/uv
      cmd: test -f /opt/uv-bin/bin/uv
    - title: uvx binary is at /opt/uv-bin/bin/uvx
      cmd: test -f /opt/uv-bin/bin/uvx
    - title: uv binary at custom prefix is executable
      cmd: test -x /opt/uv-bin/bin/uv
    - title: /opt/uv-bin/bin/uv --version succeeds
      cmd: /opt/uv-bin/bin/uv --version
    - title: symlink exists at /usr/local/bin/uv
      cmd: test -L /usr/local/bin/uv
    - title: symlink resolves to /opt/uv-bin/bin/uv
      cmd: bash -c '[ "$(readlink -f /usr/local/bin/uv)" = "/opt/uv-bin/bin/uv" ]'
    - title: uv resolves from PATH
      cmd: command -v uv
    - title: uvx resolves from PATH
      cmd: command -v uvx
    - title: uv install receipt reports the custom install_prefix
      cmd: bash -c 'grep -q "\"install_prefix\":\"/opt/uv-bin/bin\"" "${HOME}/.config/uv/uv-receipt.json"'

package_default:
  description: method=package installs uv via the OS package manager.
  checks:
    - title: uv is on PATH
      cmd: command -v uv
    - title: uv binary is executable
      cmd: bash -c 'test -x "$(command -v uv)"'
    - title: uv --version succeeds
      cmd: uv --version
    - title: uv reports a semver version
      cmd: bash -c 'uv --version | grep -Eq "^uv [0-9]+"'
    - title: uv install receipt is not written for package installs
      cmd: bash -c '! test -e "${HOME}/.config/uv/uv-receipt.json"'

method_cargo:
  description: |
    method=cargo on Ubuntu with Rust pre-installed: builds uv from crates.io via
    `cargo install --locked uv` (exercising the make/gcc build dependency required
    to compile the vendored jemalloc allocator, enabled by default via uv's
    `performance` cargo feature) and verifies the installed binary.
    The cargo-dist install receipt must NOT be written for this method.
  checks:
    - title: uv binary is at /usr/local/bin/uv
      cmd: test -f /usr/local/bin/uv
    - title: uv binary is executable
      cmd: test -x /usr/local/bin/uv
    - title: uv --version succeeds
      cmd: uv --version
      debug: |
        echo "=== uv --version ==="
        uv --version 2>&1 || echo "(failed)"
    - title: uv reports a semver version
      cmd: bash -c 'uv --version | grep -Eq "^uv [0-9]+\.[0-9]+\.[0-9]+"'
    - title: uv install receipt is not written for cargo installs
      cmd: bash -c '! test -e "${HOME}/.config/uv/uv-receipt.json"'

completions_zsh:
  description: |
    shell_completions=zsh (root): Verifies uv zsh completion file is written to the
    system-wide zsh completions directory.
  checks:
    - title: uv binary installed
      cmd: command -v uv
    - title: uv --version succeeds
      cmd: uv --version
    - title: zsh completion file exists in system zsh completions dir
      cmd: bash -c 'test -f /etc/zsh/completions/_uv || test -f /usr/share/zsh/completions/_uv || test -f /etc/completions/_uv'
      debug: |
        echo "=== searching for _uv completion ==="
        ls -la /etc/zsh/completions/_uv 2> /dev/null || echo "(missing /etc/zsh/completions/_uv)"
        ls -la /usr/share/zsh/completions/_uv 2> /dev/null || echo "(missing /usr/share/zsh/completions/_uv)"
        ls -la /etc/completions/_uv 2> /dev/null || echo "(missing /etc/completions/_uv)"
    - title: zsh completion file is non-empty
      cmd: bash -c 'f=""; for p in /etc/zsh/completions/_uv /usr/share/zsh/completions/_uv /etc/completions/_uv; do [ -f "$p" ] && f="$p" && break; done; test -s "$f"'

if_exists_fail:
  description: |
    if_exists=fail aborts when uv is already present on PATH, leaving the
    pre-installed stub untouched.
  checks:
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)
    - title: pre-installed uv stub still present
      cmd: command -v uv
    - title: stub version is unchanged
      cmd: bash -c 'uv --version 2>/dev/null | grep -q "99\.99\.99"'

if_exists_skip:
  description: |
    if_exists=skip exits 0 when uv is already present on PATH, leaving the
    pre-installed stub and its version untouched.
  checks:
    - title: uv remains available after skip
      cmd: command -v uv
    - title: stub version is unchanged (skip did not reinstall)
      cmd: bash -c 'uv --version 2>/dev/null | grep -q "99\.99\.99"'
