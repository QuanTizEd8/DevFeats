default:
  envs: [debian-12]
  modes: [devcontainer, standalone]
  tests: [default]

package_default:
  envs: [alpine-3.21]
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [package_default]

source_default:
  envs: [alpine-3.21+build-base+ncurses]
  modes: [standalone]
  options:
    method: source
    version: "5.3"
  tests: [source_default]

source_pinned_version:
  envs: [alpine-3.21+build-base+ncurses]
  modes: [standalone]
  options:
    method: source
    version: "5.2"
  tests: [source_pinned_version]

source_custom_prefix:
  envs: [alpine-3.21+build-base+ncurses]
  modes: [devcontainer, standalone]
  options:
    method: source
    version: "5.3"
    prefix: /opt/bash
    prefix_discovery: symlink
  tests: [source_custom_prefix]

source_nonroot:
  envs: [alpine-3.21+build-base+ncurses+vscode]
  modes: [standalone]
  options:
    method: source
    version: "5.3"
  standalone:
    user: vscode
  tests: [source_nonroot]

bootstrap_pm_collision:
  envs: [alpine-3.21]
  modes: [standalone]
  options:
    method: package
  tests: [bootstrap_pm_collision]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-12]
  modes: [standalone]
  options:
    method: auto
    if_exists: fail
  tests: [if_exists_fail]

if_exists_skip:
  envs: [debian-12]
  modes: [standalone]
  setup: |
    printf '#!/bin/sh\nif [ "${1-}" = "--version" ]; then printf "GNU bash, version 9.9.9 (fake)\\n"; exit 0; fi\nexit 0' > /usr/local/bin/bash
    chmod +x /usr/local/bin/bash
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

invalid_method:
  expect_install_failure: true
  envs: [debian-12]
  modes: [standalone]
  options:
    method: binary
  tests: [invalid_method]
