default:
  description: |
    Verifies the default Typst installation (method=auto → binary): binary
    at /usr/local/bin/typst, functional, and bash/zsh completion files written
    to their respective system-level locations.
  checks:
    - title: typst binary is at /usr/local/bin/typst
      cmd: test -f /usr/local/bin/typst
    - title: typst binary is executable
      cmd: test -x /usr/local/bin/typst
    - title: typst is on PATH
      cmd: command -v typst
    - title: typst --version succeeds
      cmd: typst --version
    - title: typst reports a semver version
      cmd: bash -c 'typst --version | grep -Eq "[0-9]+\.[0-9]+\.[0-9]+"'
    - title: bash completion file exists
      cmd: test -f /etc/bash_completion.d/typst
      debug: |
        echo "=== /etc/bash_completion.d/typst ==="
        head -n 3 /etc/bash_completion.d/typst 2>/dev/null || echo "(missing)"
    - title: bash completion file is non-empty
      cmd: test -s /etc/bash_completion.d/typst
    - title: zsh completion file exists
      cmd: bash -c 'find /etc/zsh /usr/local/share/zsh /usr/share/zsh -name "_typst" 2>/dev/null | grep -q .'
      debug: |
        echo "=== zsh _typst search ==="
        find /etc/zsh /usr/local/share/zsh /usr/share/zsh -name "_typst" 2>/dev/null || echo "(none found)"

binary_pinned_version:
  description: |
    version=0.14.2 + method=binary: installs a specific pinned release and
    verifies the binary reports exactly that version.
  checks:
    - title: typst binary is at /usr/local/bin/typst
      cmd: test -f /usr/local/bin/typst
    - title: typst binary is executable
      cmd: test -x /usr/local/bin/typst
    - title: typst --version succeeds
      cmd: typst --version
      debug: |
        echo "=== typst --version ==="
        typst --version 2>&1 || echo "(failed)"
    - title: typst version is 0.14.2
      cmd: bash -c 'typst --version 2>/dev/null | grep -q "0\.14\.2"'
    - title: bash completion file exists
      cmd: test -f /etc/bash_completion.d/typst

binary_custom_prefix:
  description: |
    method=binary, prefix=/opt/typst-bin, prefix_discovery=symlink:
    Verifies typst is installed at the custom prefix and a symlink is created
    at /usr/local/bin/typst pointing to the custom-prefix binary.
  checks:
    - title: typst binary is at /opt/typst-bin/bin/typst
      cmd: test -f /opt/typst-bin/bin/typst
    - title: typst binary at custom prefix is executable
      cmd: test -x /opt/typst-bin/bin/typst
    - title: /opt/typst-bin/bin/typst --version succeeds
      cmd: /opt/typst-bin/bin/typst --version
    - title: symlink exists at /usr/local/bin/typst
      cmd: test -L /usr/local/bin/typst
    - title: symlink resolves to /opt/typst-bin/bin/typst
      cmd: bash -c '[ "$(readlink -f /usr/local/bin/typst)" = "/opt/typst-bin/bin/typst" ]'
    - title: typst resolves from PATH
      cmd: command -v typst

completions_fish:
  description: |
    With fish installed, verifies the typst fish completion file is written
    to /usr/share/fish/vendor_completions.d/typst.fish and is valid fish syntax.
  checks:
    - title: fish is available
      cmd: command -v fish
    - title: typst binary installed
      cmd: test -f /usr/local/bin/typst
    - title: typst --version succeeds
      cmd: typst --version
    - title: fish completion file exists
      cmd: test -f /usr/share/fish/vendor_completions.d/typst.fish
      debug: |
        echo "=== /usr/share/fish/vendor_completions.d/typst.fish ==="
        head -n 3 /usr/share/fish/vendor_completions.d/typst.fish 2>/dev/null || echo "(missing)"
    - title: fish completion file is non-empty
      cmd: test -s /usr/share/fish/vendor_completions.d/typst.fish
    - title: fish completion file is valid fish syntax
      cmd: fish -c 'source /usr/share/fish/vendor_completions.d/typst.fish'

no_completions:
  description: |
    method=binary, shell_completions="": typst is installed but no completion
    files are written to any shell completion directory.
  checks:
    - title: typst binary installed
      cmd: test -f /usr/local/bin/typst
    - title: typst --version succeeds
      cmd: typst --version
    - title: no bash completion file
      cmd: bash -c '! test -f /etc/bash_completion.d/typst'
      debug: |
        echo "=== /etc/bash_completion.d/typst (should be absent) ==="
        ls -la /etc/bash_completion.d/typst 2>/dev/null || echo "(correctly absent)"
    - title: no zsh completion file
      cmd: bash -c '! find /etc/zsh /usr/local/share/zsh /usr/share/zsh -name "_typst" 2>/dev/null | grep -q .'
      debug: |
        echo "=== zsh _typst search (should find nothing) ==="
        find /etc/zsh /usr/local/share/zsh /usr/share/zsh -name "_typst" 2>/dev/null || echo "(correctly absent)"

if_exists_fail:
  description: |
    if_exists=fail: ensures the installer exits non-zero when typst is already
    present on PATH, leaving the pre-installed stub untouched.
  checks:
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: "failing (if_exists=fail)"
    - title: pre-installed typst stub still present
      cmd: command -v typst
    - title: stub version is unchanged
      cmd: bash -c 'typst --version 2>/dev/null | grep -q "9\.9\.9"'

if_exists_skip:
  description: |
    if_exists=skip: ensures the installer exits 0 when typst is already present
    on PATH, leaving the pre-installed stub and its version untouched.
  checks:
    - title: typst remains available after skip
      cmd: command -v typst
    - title: stub version is unchanged (skip did not reinstall)
      cmd: bash -c 'typst --version 2>/dev/null | grep -q "9\.9\.9"'

reinstall:
  description: |
    if_exists=reinstall + method=binary + version=0.14.2 with a stub binary
    pre-installed: verifies the installer replaces the stub with the real binary
    and the correct version is reported.
  checks:
    - title: typst binary present at /usr/local/bin/typst
      cmd: test -f /usr/local/bin/typst
    - title: typst binary is executable
      cmd: test -x /usr/local/bin/typst
    - title: typst --version succeeds
      cmd: typst --version
      debug: |
        echo "=== typst --version ==="
        typst --version 2>&1 || echo "(failed)"
    - title: typst version is 0.14.2 (reinstalled)
      cmd: bash -c 'typst --version 2>/dev/null | grep -q "0\.14\.2"'
    - title: bash completion file exists after reinstall
      cmd: test -f /etc/bash_completion.d/typst
