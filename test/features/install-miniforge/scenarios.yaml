download_and_install:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  tests: [download_and_install]

custom_bin_dir:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    prefix: /opt/myforge
  tests: [custom_bin_dir]

specific_version:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    version: "24.7.1"
  tests: [specific_version]

set_permission:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    write_group: conda
  tests: [set_permission]

activate_bashrc:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    shell_activations: bash
  tests: [activate_bashrc]

activate_multi:
  envs: [ubuntu-stable+zsh]
  modes: [devcontainer]
  options:
    shell_activations: "bash\nzsh"
  tests: [activate_multi]

custom_active_env:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    shell_activations: bash
    activate_env: myenv
  tests: [custom_active_env]

log_file:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    log_file: /tmp/miniforge.log
  tests: [log_file]

installer_dir:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    installer_dir: /tmp/miniforge-trace
  tests: [installer_dir]

if_exists_reinstall:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: latest/download
    MINIFORGE_FILENAME: Miniforge3-Linux
  options:
    if_exists: reinstall
  tests: [if_exists_reinstall]

if_exists_skip:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: latest/download
    MINIFORGE_FILENAME: Miniforge3-Linux
  options:
    if_exists: skip
  tests: [if_exists_skip]

if_exists_fail:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    if_exists: fail
  tests: [if_exists_fail]

if_exists_update:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    if_exists: update
  tests: [if_exists_update]

debian:
  envs: [debian-stable]
  modes: [devcontainer]
  tests: [debian]

multi_user_permissions:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  setup: |
    useradd -m testuser1
    useradd -m testuser2
  options:
    write_group: conda
    write_users: "testuser1\ntestuser2"
  tests: [multi_user_permissions]

export_path_default:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  tests: [export_path_default]

prefix_discovery_symlink:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    prefix: /opt/myforge
    prefix_discovery: symlink
  tests: [prefix_discovery_symlink]

prefix_discovery_symlink_nonroot:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  options:
    prefix: /opt/myforge
    prefix_discovery: symlink
  devcontainer:
    remoteUser: vscode
  tests: [prefix_discovery_symlink_nonroot]

stable_version:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  tests: [stable_version]

version_match_idempotency:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: download/24.7.1-2
    MINIFORGE_FILENAME: Miniforge3-24.7.1-2-Linux
  options:
    version: "24.7.1"
    if_exists: reinstall
  tests: [version_match_idempotency]

preserve_envs_true:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: download/24.7.1-2
    MINIFORGE_FILENAME: Miniforge3-24.7.1-2-Linux
  setup: /opt/conda/bin/conda create -n myenv --yes
  options:
    if_exists: reinstall
    preserve_envs: true
  tests: [preserve_envs_true]

preserve_envs_false:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: download/24.7.1-2
    MINIFORGE_FILENAME: Miniforge3-24.7.1-2-Linux
  setup: /opt/conda/bin/conda create -n myenv --yes
  options:
    if_exists: reinstall
    preserve_envs: false
  tests: [preserve_envs_false]

preserve_config_true:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: download/24.7.1-2
    MINIFORGE_FILENAME: Miniforge3-24.7.1-2-Linux
  setup: |
    /opt/conda/bin/conda init bash
    echo "auto_activate_base: false" > /root/.condarc
  options:
    if_exists: reinstall
    preserve_config: true
  tests: [preserve_config_true]

preserve_config_false:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: download/24.7.1-2
    MINIFORGE_FILENAME: Miniforge3-24.7.1-2-Linux
  setup: |
    /opt/conda/bin/conda init bash
    echo "auto_activate_base: false" > /root/.condarc
  options:
    if_exists: reinstall
    preserve_config: false
  tests: [preserve_config_false]

if_exists_update_preinstall:
  envs: [ubuntu-stable+miniforge]
  modes: [devcontainer]
  args:
    MINIFORGE_PATH: download/24.7.1-2
    MINIFORGE_FILENAME: Miniforge3-24.7.1-2-Linux
  setup: /opt/conda/bin/conda create -n myenv --yes
  options:
    if_exists: update
  tests: [if_exists_update_preinstall]

symlink_user_home_prefix:
  envs: [ubuntu-stable]
  modes: [devcontainer]
  options:
    prefix: /root/myforge
    prefix_discovery: symlink
  tests: [symlink_user_home_prefix]

github_api_unreachable_network_isolated:
  expect_install_failure: true
  envs: [ubuntu-stable]
  modes: [standalone]
  standalone:
    network: none
    skip_install: false
  tests: [github_api_unreachable_network_isolated]

invalid_version:
  expect_install_failure: true
  envs: [ubuntu-stable]
  modes: [standalone]
  options:
    version: "0.0.0"
  standalone:
    skip_install: false
  tests: [invalid_version]
