binary_custom_prefix:
  description: |
    method=binary, prefix=/opt/jq-bin, symlink=true (default):
    Verifies jq is installed at the custom prefix AND a symlink is created at
    /usr/local/bin/jq pointing to the custom-prefix binary.
  checks:
    - title: jq binary is at /opt/jq-bin/bin/jq
      cmd: test -f /opt/jq-bin/bin/jq
    - title: jq binary at custom prefix is executable
      cmd: test -x /opt/jq-bin/bin/jq
    - title: /opt/jq-bin/bin/jq --version succeeds
      cmd: /opt/jq-bin/bin/jq --version
    - title: symlink exists at /usr/local/bin/jq
      cmd: test -L /usr/local/bin/jq
    - title: symlink resolves to /opt/jq-bin/bin/jq
      cmd: bash -c '[ "$(readlink -f /usr/local/bin/jq)" = "/opt/jq-bin/bin/jq" ]'
    - title: jq resolves from PATH
      cmd: command -v jq
    - title: jq processes JSON via PATH
      cmd: bash -c 'echo "{}" | jq . > /dev/null 2>&1'
    - title: jq processes JSON via custom path
      cmd: bash -c 'echo "{}" | /opt/jq-bin/bin/jq . > /dev/null 2>&1'

custom_prefix_no_symlink:
  description: |
    prefix=/opt/jq-bin, symlink=false:
    Verifies jq is installed at the custom prefix and no symlink is created.
  checks:
    - title: jq binary is at /opt/jq-bin/bin/jq
      cmd: test -f /opt/jq-bin/bin/jq
    - title: jq binary at custom prefix is executable
      cmd: test -x /opt/jq-bin/bin/jq
    - title: /opt/jq-bin/bin/jq --version succeeds
      cmd: /opt/jq-bin/bin/jq --version
    - title: jq processes JSON via custom path
      cmd: bash -c 'echo "{}" | /opt/jq-bin/bin/jq . > /dev/null 2>&1'
    - title: no symlink at /usr/local/bin/jq
      cmd: bash -c '! test -L /usr/local/bin/jq && ! test -e /usr/local/bin/jq'

default:
  description: Verifies default install puts a functional jq on PATH.
  checks:
    - title: jq is on PATH
      cmd: command -v jq
    - title: jq processes JSON
      cmd: bash -c 'echo "{}" | jq . > /dev/null 2>&1'
    - title: jq reports a version
      cmd: bash -c 'jq --version | grep -Eq "^jq-"'

if_exists_fail:
  description: "Ensures if_exists=fail exits non-zero when jq already exists."
  checks:
    - title: preinstalled jq remains available
      cmd: command -v jq
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)

if_exists_skip:
  description: |
    Ensures if_exists=skip succeeds when jq already exists and leaves it untouched.
    The runner installs via install.sh with scenario options (method=auto, if_exists=skip).
  checks:
    - title: jq remains available after skip
      cmd: command -v jq
    - title: existing jq version unchanged (skip did not reinstall)
      cmd: bash -c 'jq --version 2>&1 | grep -q "9.9.9"'

legacy_version:
  description: |
    version=1.6 + method=binary: install the legacy 1.6 release.
    jq 1.6 uses the legacy asset naming convention (jq-linux64 / jq-osx-amd64)
    instead of the modern jq-linux-amd64 form. Verifies the binary installs and
    reports exactly 1.6.
  checks:
    - title: jq binary is at /usr/local/bin/jq
      cmd: test -f /usr/local/bin/jq
    - title: jq binary is executable
      cmd: test -x /usr/local/bin/jq
    - title: jq --version succeeds
      cmd: jq --version
      debug: |
        echo "=== jq --version ==="
        jq --version 2>&1 || echo "(failed)"
    - title: jq version is 1.6
      cmd: bash -c '[ "$(jq --version 2>/dev/null | sed "s/^jq-//")" = "1.6" ]'
    - title: jq processes JSON
      cmd: bash -c 'echo "{}" | jq . > /dev/null 2>&1'

reinstall:
  description: |
    version=1.7.1 + method=binary + if_exists=reinstall + jq 1.8.1 pre-installed (see reinstall/Dockerfile).
    Verifies that if_exists=reinstall replaces the existing binary and the new
    version is reported correctly.
  checks:
    - title: jq binary present at /usr/local/bin/jq
      cmd: test -f /usr/local/bin/jq
    - title: jq binary is executable
      cmd: test -x /usr/local/bin/jq
    - title: jq --version succeeds
      cmd: jq --version
      debug: |
        echo "=== jq --version ==="
        jq --version 2>&1 || echo "(failed)"
    - title: jq version is 1.7.1 (reinstalled)
      cmd: bash -c '[ "$(jq --version 2>/dev/null | sed "s/^jq-//")" = "1.7.1" ]'
    - title: jq processes JSON
      cmd: bash -c 'echo "{}" | jq . > /dev/null 2>&1'

source_default:
  description: "Verifies that method=source builds jq from source and produces a working binary."
  checks:
    - title: jq binary present at /usr/local/bin/jq
      cmd: test -f /usr/local/bin/jq
    - title: jq binary is executable
      cmd: test -x /usr/local/bin/jq
    - title: jq --version succeeds
      cmd: /usr/local/bin/jq --version
    - title: jq version is 1.8.1
      cmd: bash -c '[ "$(/usr/local/bin/jq --version 2>/dev/null | sed "s/^jq-//")" = "1.8.1" ]'
    - title: jq processes JSON
      cmd: bash -c 'echo "{}" | /usr/local/bin/jq . > /dev/null 2>&1'

binary_pinned_version:
  description: |
    version=1.8.1 + method=binary: install a specific pinned version.
    Verifies the binary reports exactly 1.8.1.
  checks:
    - title: jq binary is at /usr/local/bin/jq
      cmd: test -f /usr/local/bin/jq
    - title: jq binary is executable
      cmd: test -x /usr/local/bin/jq
    - title: jq --version succeeds
      cmd: jq --version
      debug: |
        echo "=== jq --version ==="
        jq --version 2>&1 || echo "(failed)"
    - title: jq version is 1.8.1
      cmd: bash -c '[ "$(jq --version 2>/dev/null | sed "s/^jq-//")" = "1.8.1" ]'
    - title: jq processes JSON
      cmd: bash -c 'echo "{}" | jq . > /dev/null 2>&1'

version_match_idempotency:
  description: |
    version=1.8.1 + if_exists=fail + jq 1.8.1 pre-installed (see version_match_idempotency/Dockerfile).
    if_exists=fail always aborts when jq is already installed, regardless of version match.
    The pre-installed binary must remain untouched at 1.8.1.
  checks:
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)
    - title: jq binary still present at /usr/local/bin/jq
      cmd: test -f /usr/local/bin/jq
    - title: jq binary is still executable
      cmd: test -x /usr/local/bin/jq
    - title: jq --version succeeds
      cmd: jq --version
      debug: |
        echo "=== jq --version ==="
        jq --version 2>&1 || echo "(failed)"
    - title: jq version is still 1.8.1
      cmd: bash -c '[ "$(jq --version 2>/dev/null | sed "s/^jq-//")" = "1.8.1" ]'
    - title: jq processes JSON
      cmd: bash -c 'echo "{}" | jq . > /dev/null 2>&1'

package_manifest_override:
  description: |
    method=package with inline ospkg_manifest_method_package_run override still installs jq.
  checks:
    - title: jq is on PATH
      cmd: command -v jq
    - title: jq processes JSON
      cmd: bash -c 'echo "{}" | jq . > /dev/null 2>&1'
