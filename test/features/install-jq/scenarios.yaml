default:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  tests: [default]

binary_pinned_version:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    version: "1.8.1"
    method: binary
  tests: [binary_pinned_version]

legacy_version:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    version: "1.6"
    method: binary
  tests: [legacy_version]

binary_custom_prefix:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/jq-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

custom_prefix_no_symlink:
  envs: [ubuntu-stable]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/jq-bin
    prefix_discovery: none
  tests: [custom_prefix_no_symlink]

package_default:
  envs: [debian-stable+bash, alpine-current+bash, fedora-current+bash]
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [default]

version_match_idempotency:
  expect_install_failure: true
  envs: [ubuntu-stable+jq-1.8.1]
  modes: [standalone]
  options:
    version: "1.8.1"
    if_exists: fail
  tests: [version_match_idempotency]

reinstall:
  envs: [ubuntu-stable+jq-1.8.1]
  modes: [devcontainer, standalone]
  options:
    version: "1.7.1"
    method: binary
    if_exists: reinstall
  tests: [reinstall]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "jq-9.9.9 (fake)"; exit 0; fi\nexit 0' > /usr/local/bin/jq
    chmod +x /usr/local/bin/jq
  tests: [if_exists_fail]
  options:
    method: auto
    if_exists: fail
  standalone:
    skip_install: false

if_exists_skip:
  envs: [debian-stable]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "jq-9.9.9 (fake)"; exit 0; fi\nexit 0' > /usr/local/bin/jq
    chmod +x /usr/local/bin/jq
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

source_default:
  envs: [debian-stable+autotools]
  modes: [standalone]
  options:
    method: source
    version: "1.8.1"
  tests: [source_default]

package_manifest_override:
  envs: [ubuntu-stable]
  modes: [standalone]
  options:
    method: package
    ospkg_manifest_method_package_run: |
      packages:
        - jq
  tests: [package_manifest_override]
