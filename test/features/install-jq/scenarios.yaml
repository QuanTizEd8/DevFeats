default_install:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  tests: [default]

specific_version:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    version: "1.8.1"
    method: binary
  tests: [specific_version]

legacy_version:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    version: "1.6"
    method: binary
  tests: [legacy_version]

binary_custom_prefix:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/jq-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests: [binary_custom_prefix]

custom_prefix_no_symlink:
  envs: [ubuntu-24.04]
  modes: [devcontainer, standalone]
  options:
    method: binary
    prefix: /opt/jq-bin
    prefix_discovery: none
  tests: [custom_prefix_no_symlink]

package_install:
  envs: [debian-bookworm+bash, alpine-3.21+bash, fedora-latest+bash]
  modes: [devcontainer, standalone]
  options:
    method: package
  tests: [default]

version_match_idempotency:
  expect_install_failure: true
  envs: [ubuntu-24.04+jq-1.8.1]
  modes: [standalone]
  options:
    version: "1.8.1"
    if_exists: fail
  tests: [version_match_idempotency]

reinstall:
  envs: [ubuntu-24.04+jq-1.8.1]
  modes: [devcontainer, standalone]
  options:
    version: "1.7.1"
    method: binary
    if_exists: reinstall
  tests: [reinstall]

if_exists_fail:
  expect_install_failure: true
  envs: [debian-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "jq-9.9.9 (fake)"; exit 0; fi\nexit 0' > /usr/local/bin/jq
    chmod +x /usr/local/bin/jq
  tests: [if_exists_fail]
  options:
    method: auto
    if_exists: fail
  standalone:
    skip_install: false

if_exists_skip:
  envs: [debian-latest]
  modes: [standalone]
  setup: |
    printf '#!/usr/bin/env bash\nif [ "${1-}" = "--version" ]; then echo "jq-9.9.9 (fake)"; exit 0; fi\nexit 0' > /usr/local/bin/jq
    chmod +x /usr/local/bin/jq
  options:
    method: auto
    if_exists: skip
  tests: [if_exists_skip]

source_build:
  envs: [debian-bookworm+jq-source-build-deps]
  modes: [standalone]
  options:
    method: source
    version: "1.8.1"
  tests: [source_build]
