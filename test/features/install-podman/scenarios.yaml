defaults:
  options:
    log_level: trace

apt_default:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash vscode
    truncate -s 0 /etc/subuid /etc/subgid
  devcontainer:
    remoteUser: vscode
  tests: [apt_default]

apt_remote_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash vscode
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_remote_user: true
    add_container_user: false
    add_current_user: false
  devcontainer:
    remoteUser: vscode
  tests: [apt_remote_user]

apt_container_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash vscode
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_container_user: true
    add_remote_user: false
    add_current_user: false
  devcontainer:
    containerUser: vscode
  tests: [apt_container_user]

apt_root_user_config:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: root
  tests: [apt_root_user_config]

apt_explicit_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash devuser
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: devuser
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [apt_explicit_user]

apt_multi_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash alice
    useradd -m -s /bin/bash bob
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: "alice\nbob"
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [apt_multi_user]

apt_no_users:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [apt_no_users]

apt_nonexistent_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: ghost
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [apt_nonexistent_user]

# ---------------------------------------------------------------------------
# Functional (podman run) scenarios
# These require privileged mode (metadata.yaml: privileged: true) and
# the named volume mounted at /var/lib/containers/storage.  The feature
# entrypoint runs automatically as a postStartCommand before test scripts
# execute, so rshared mount and cgroup delegation are already in place.
# ---------------------------------------------------------------------------

apt_podman_run:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash vscode
    truncate -s 0 /etc/subuid /etc/subgid
  devcontainer:
    remoteUser: vscode
  tests: [apt_podman_run]

apt_podman_run_explicit_user:
  envs: [ubuntu-latest]
  modes: [devcontainer]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash devuser
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: devuser
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [apt_podman_run_explicit_user]

# ---------------------------------------------------------------------------
# Standalone scenarios
# Run via direct bash install.sh — no devcontainer CLI, no _REMOTE_USER.
# Devcontainer-specific artifacts (containers.conf override, graphRoot
# redirect in storage.conf, entrypoint) must NOT be written.
# ---------------------------------------------------------------------------

apt_standalone_default:
  envs: [ubuntu-latest]
  modes: [standalone]
  setup: |
    userdel ubuntu
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_remote_user: false
    add_container_user: false
  tests: [apt_standalone_default]

apt_standalone_user:
  envs: [ubuntu-latest]
  modes: [standalone]
  setup: |
    userdel ubuntu
    useradd -m -s /bin/bash devuser
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: devuser
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [apt_standalone_user]
