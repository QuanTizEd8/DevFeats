default:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  devcontainer:
    remoteUser: vscode
  tests: [default]

remote_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_remote_user: true
    add_container_user: false
    add_current_user: false
  devcontainer:
    remoteUser: vscode
  tests: [remote_user]

container_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_container_user: true
    add_remote_user: false
    add_current_user: false
  devcontainer:
    containerUser: vscode
  tests: [container_user]

root_user_config:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: root
  tests: [root_user_config]

explicit_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    useradd -m -s /bin/bash devuser
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: devuser
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [explicit_user]

multi_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    useradd -m -s /bin/bash alice
    useradd -m -s /bin/bash bob
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: "alice\nbob"
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [multi_user]

no_users:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [no_users]

nonexistent_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: ghost
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [nonexistent_user]

# ---------------------------------------------------------------------------
# Functional (podman run) scenarios
# These require privileged mode (metadata.yaml: privileged: true) and
# the named volume mounted at /var/lib/containers/storage.  The feature
# entrypoint runs automatically as a postStartCommand before test scripts
# execute, so rshared mount and cgroup delegation are already in place.
# ---------------------------------------------------------------------------

podman_run:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  devcontainer:
    remoteUser: vscode
  tests: [podman_run]

podman_run_explicit_user:
  envs: [ubuntu-stable+vscode]
  modes: [devcontainer]
  setup: |
    useradd -m -s /bin/bash devuser
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: devuser
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [podman_run_explicit_user]

# ---------------------------------------------------------------------------
# Standalone scenarios
# Run via direct bash install.sh — no devcontainer CLI, no _REMOTE_USER.
# Devcontainer-specific artifacts (containers.conf override, graphRoot
# redirect in storage.conf, entrypoint) must NOT be written.
# ---------------------------------------------------------------------------

standalone_default:
  envs: [ubuntu-stable+vscode]
  modes: [standalone]
  setup: |
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_remote_user: false
    add_container_user: false
  tests: [standalone_default]

standalone_user:
  envs: [ubuntu-stable+vscode]
  modes: [standalone]
  setup: |
    useradd -m -s /bin/bash devuser
    truncate -s 0 /etc/subuid /etc/subgid
  options:
    add_users: devuser
    add_remote_user: false
    add_container_user: false
    add_current_user: false
  tests: [standalone_user]
