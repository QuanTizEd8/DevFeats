default:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  tests:
  - default
binary_custom_prefix:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    prefix: /opt/shellcheck-bin
    if_exists: reinstall
  tests:
  - binary_custom_prefix
package_default:
  envs:
  - debian-12
  modes:
  - devcontainer
  - standalone
  options:
    method: package
  tests:
  - package_default
if_exists_fail:
  expect_install_failure: true
  envs:
  - debian-12
  modes:
  - standalone
  setup: 'printf ''#!/usr/bin/env bash\nif [[ "${1-}" == "--version" ]]; then printf
    "ShellCheck - shell script analysis tool\nversion: 0.0.0 (fake)\n"; exit 0; fi\nexit
    0\n'' > /usr/local/bin/shellcheck

    chmod +x /usr/local/bin/shellcheck

    '
  options:
    method: auto
    if_exists: fail
  tests:
  - if_exists_fail
  standalone:
    skip_install: false
installer_dir:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    installer_dir: /tmp/shellcheck-trace
  tests:
  - installer_dir
