default:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  tests:
  - default
binary_custom_prefix:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    prefix: /opt/just-bin
    if_exists: reinstall
  tests:
  - binary_custom_prefix
package_default:
  envs:
  - debian-12
  modes:
  - devcontainer
  - standalone
  options:
    method: package
    if_exists: reinstall
  tests:
  - package_default
if_exists_fail:
  expect_install_failure: true
  envs:
  - debian-12+just
  modes:
  - standalone
  tests:
  - if_exists_fail
  standalone:
    skip_install: false
  options:
    if_exists: fail
installer_dir:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    installer_dir: /tmp/just-trace
  tests:
  - installer_dir
