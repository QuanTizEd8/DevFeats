defaults:
  options:
    log_level: trace
default_install:
  envs:
  - ubuntu-latest
  modes:
  - devcontainer
  - standalone
  tests:
  - default_install
binary_custom_prefix:
  envs:
  - ubuntu-latest
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    prefix: /opt/just-bin
    if_exists: reinstall
  tests:
  - binary_custom_prefix
package_install:
  envs:
  - debian-latest
  modes:
  - devcontainer
  - standalone
  options:
    method: package
    if_exists: reinstall
  tests:
  - package_install
if_exists_fail:
  expect_install_failure: true
  envs:
  - debian-latest+just-stub
  modes:
  - standalone
  tests:
  - if_exists_fail
  standalone:
    skip_install: false
  options:
    if_exists: fail
installer_dir:
  envs:
  - ubuntu-latest
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    installer_dir: /tmp/just-trace
  tests:
  - installer_dir
