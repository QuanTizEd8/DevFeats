defaults:
  modes: [devcontainer]
  options:
    method: binary

# ── baseline ─────────────────────────────────────────────────────────────────

default:
  envs: [ubuntu-stable]
  tests: [default]

macos_package_default:
  envs: [macos-current+brew]
  modes: [macos]
  setup: |
    brew list --cask copilot-cli >/dev/null 2>&1 && brew uninstall --cask copilot-cli || true
    brew list --cask copilot-cli@prerelease >/dev/null 2>&1 && brew uninstall --cask copilot-cli@prerelease || true
  options:
    method: package
  tests: [macos_package_default]

# ── new options ───────────────────────────────────────────────────────────────

copilot_home:
  envs: [ubuntu-stable]
  options:
    copilot_home: ~/copilot-test
  tests: [copilot_home]

copilot_model:
  envs: [ubuntu-stable]
  options:
    copilot_model: claude-sonnet-4-6
  tests: [copilot_model]

plugins:
  envs: [ubuntu-stable]
  options:
    plugins: workiq@copilot-plugins
  tests: [plugins]
