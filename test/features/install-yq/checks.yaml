binary_custom_prefix:
  description: |
    method=binary, prefix=/opt/yq-bin, symlink=true (default):
    Verifies yq is installed at the custom prefix AND a symlink is created at
    /usr/local/bin/yq pointing to the custom-prefix binary.
  checks:
    - title: yq binary is at /opt/yq-bin/bin/yq
      cmd: test -f /opt/yq-bin/bin/yq
    - title: yq binary at custom prefix is executable
      cmd: test -x /opt/yq-bin/bin/yq
    - title: /opt/yq-bin/bin/yq --version succeeds
      cmd: /opt/yq-bin/bin/yq --version
    - title: symlink exists at /usr/local/bin/yq
      cmd: test -L /usr/local/bin/yq
    - title: symlink resolves to /opt/yq-bin/bin/yq
      cmd: bash -c '[ "$(readlink -f /usr/local/bin/yq)" = "/opt/yq-bin/bin/yq" ]'
    - title: yq resolves from PATH
      cmd: command -v yq
    - title: yq supports -o=json mode
      cmd: bash -c 'yq -o=json "." /dev/null > /dev/null 2>&1'
    - title: custom-prefix yq supports -o=json mode
      cmd: bash -c '/opt/yq-bin/bin/yq -o=json "." /dev/null > /dev/null 2>&1'

custom_prefix_no_symlink:
  description: |
    prefix=/opt/yq-bin, symlink=false:
    Verifies yq is installed at the custom prefix and no symlink is created.
  checks:
    - title: yq binary is at /opt/yq-bin/bin/yq
      cmd: test -f /opt/yq-bin/bin/yq
    - title: yq binary at custom prefix is executable
      cmd: test -x /opt/yq-bin/bin/yq
    - title: /opt/yq-bin/bin/yq --version succeeds
      cmd: /opt/yq-bin/bin/yq --version
    - title: yq supports -o=json mode via custom path
      cmd: bash -c '/opt/yq-bin/bin/yq -o=json "." /dev/null > /dev/null 2>&1'
    - title: no symlink at /usr/local/bin/yq
      cmd: bash -c '! test -L /usr/local/bin/yq && ! test -e /usr/local/bin/yq'

default:
  description: Verifies default install path installs a compatible yq.
  checks:
    - title: yq is on PATH
      cmd: command -v yq
    - title: yq supports -o=json mode
      cmd: bash -c 'yq -o=json "." /dev/null > /dev/null 2>&1'
    - title: yq reports a version
      cmd: bash -c 'yq --version | grep -Eiq "version|yq"'

if_exists_fail:
  description: "Ensures if_exists=fail exits non-zero when yq already exists."
  checks:
    - title: preinstalled yq remains available
      cmd: command -v yq
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)

package_default:
  description: Verifies auto mode yields a compatible yq on Linux.
  checks:
    - title: yq is on PATH
      cmd: command -v yq
    - title: yq supports -o=json mode
      cmd: bash -c 'yq -o=json "." /dev/null > /dev/null 2>&1'

completions_bash:
  description: |
    shell_completions=bash (root):
    Verifies yq bash completion file is written to the system-wide bash_completion.d.
  checks:
    - title: yq binary installed
      cmd: command -v yq
    - title: yq --version succeeds
      cmd: yq --version
    - title: bash completion file exists
      cmd: test -f /etc/bash_completion.d/yq
      debug: |
        echo "=== /etc/bash_completion.d/yq ==="
        cat /etc/bash_completion.d/yq 2> /dev/null | head -5 || echo "(missing)"
    - title: bash completion file is non-empty
      cmd: bash -c 'test -s /etc/bash_completion.d/yq'
    - title: bash completion file is valid bash
      cmd: bash -n /etc/bash_completion.d/yq

completions_zsh:
  description: |
    shell_completions=zsh (root):
    Verifies yq zsh completion file is written to the system-wide zsh completions directory.
  checks:
    - title: yq binary installed
      cmd: command -v yq
    - title: yq --version succeeds
      cmd: yq --version
    - title: zsh completion file exists in system zsh completions dir
      cmd: bash -c 'test -f /etc/zsh/completions/_yq || test -f /usr/share/zsh/completions/_yq || test -f /etc/completions/_yq'
      debug: |
        echo "=== /etc/zsh/completions/_yq ==="
        ls -la /etc/zsh/completions/_yq 2> /dev/null || echo "(missing)"
        echo "=== /usr/share/zsh/vendor-completions/_yq ==="
        ls -la /usr/share/zsh/vendor-completions/_yq 2> /dev/null || echo "(missing)"
    - title: zsh completion file is non-empty
      cmd: bash -c 'f=""; for p in /etc/zsh/completions/_yq /usr/share/zsh/completions/_yq /etc/completions/_yq; do [ -f "$p" ] && f="$p" && break; done; test -s "$f"'

binary_pinned_version:
  description: |
    version=4.44.2 + method=binary: install a specific pinned version.
    Verifies the binary reports exactly 4.44.2.
  checks:
    - title: yq binary is at /usr/local/bin/yq
      cmd: test -f /usr/local/bin/yq
    - title: yq binary is executable
      cmd: test -x /usr/local/bin/yq
    - title: yq --version succeeds
      cmd: yq --version
      debug: |
        echo "=== yq --version ==="
        yq --version 2>&1 || echo "(failed)"
    - title: yq version is 4.44.2
      cmd: bash -c '[ "$(yq --version 2>/dev/null | awk "{print \$NF}" | sed "s/^v//")" = "4.44.2" ]'

version_match_idempotency:
  description: |
    version=4.44.2 + if_exists=fail + yq 4.44.2 pre-installed (see version_match_idempotency/Dockerfile).
    if_exists=fail always aborts when yq is already installed, regardless of version match.
    The pre-installed binary must remain untouched at 4.44.2.
  checks:
    - kind: install_failure
      title: if_exists=fail exits with already-installed error
      pattern: failing (if_exists=fail)
    - title: yq binary still present at /usr/local/bin/yq
      cmd: test -f /usr/local/bin/yq
    - title: yq binary is still executable
      cmd: test -x /usr/local/bin/yq
    - title: yq --version succeeds
      cmd: yq --version
      debug: |
        echo "=== yq --version ==="
        yq --version 2>&1 || echo "(failed)"
    - title: yq version is still 4.44.2
      cmd: bash -c '[ "$(yq --version 2>/dev/null | awk "{print \$NF}" | sed "s/^v//")" = "4.44.2" ]'
