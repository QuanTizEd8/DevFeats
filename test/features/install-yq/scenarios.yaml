default:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  tests:
  - default
binary_pinned_version:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    version: 4.44.2
    method: binary
  tests:
  - binary_pinned_version
binary_custom_prefix:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    prefix: /opt/yq-bin
    prefix_discovery: symlink
    if_exists: reinstall
  tests:
  - binary_custom_prefix
custom_prefix_no_symlink:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    method: binary
    prefix: /opt/yq-bin
    prefix_discovery: none
  tests:
  - custom_prefix_no_symlink
package_default:
  envs:
  - debian-12
  modes:
  - devcontainer
  - standalone
  options:
    method: auto
    if_exists: reinstall
  tests:
  - package_default
version_match_idempotency:
  expect_install_failure: true
  envs:
  - ubuntu-24.04+yq-4.44.2
  modes:
  - standalone
  options:
    version: 4.44.2
    if_exists: fail
  tests:
  - version_match_idempotency
completions_bash:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    shell_completions: bash
  tests:
  - completions_bash
completions_zsh:
  envs:
  - ubuntu-24.04
  modes:
  - devcontainer
  - standalone
  options:
    shell_completions: zsh
  tests:
  - completions_zsh
if_exists_fail:
  expect_install_failure: true
  envs:
  - debian-12
  modes:
  - standalone
  setup: 'printf ''#!/usr/bin/env bash\nif [[ "${1-}" == "-o=json" ]]; then exit 0;
    fi\nif [[ "${1-}" == "--version" ]]; then echo "yq (fake)"; exit 0; fi\nexit 0\n''
    > /usr/local/bin/yq

    chmod +x /usr/local/bin/yq

    '
  options:
    method: auto
    if_exists: fail
  tests:
  - if_exists_fail
  standalone:
    skip_install: false
