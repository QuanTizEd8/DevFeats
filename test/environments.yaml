ubuntu-24.04:
  image: ubuntu:24.04

ubuntu-24.04+bash+git:
  image: ubuntu:24.04
  build:
    dockerfile: apt-get update -qq && apt-get install -y bash git

alpine-3.20:
  image: alpine:3.20

alpine-3.20+bash:
  image: alpine:3.20
  build:
    dockerfile: apk add --no-cache bash

debian-bookworm+bash:
  image: debian:bookworm
  build:
    dockerfile: apt-get update -qq && apt-get install -y --no-install-recommends bash

fedora-latest+bash:
  image: fedora:latest
  build:
    dockerfile: dnf install -y bash

rocky-9+bash:
  image: rockylinux:9
  build:
    dockerfile: dnf install -y bash

opensuse-leap+bash:
  image: opensuse/leap:15.6
  build:
    dockerfile: zypper install -y bash

arch+bash:
  image: archlinux:base
  build:
    dockerfile: pacman -Sy --noconfirm bash

ubuntu-24.04+build-essentials:
  image: ubuntu:24.04
  build:
    dockerfile: |
      apt-get update -qq
      apt-get install -y --no-install-recommends build-essential curl ca-certificates

ubuntu-24.04+jq-1.8.1:
  image: ubuntu:24.04
  build:
    dockerfile: |
      apt-get update -qq
      apt-get install -y --no-install-recommends curl ca-certificates
      apt-get clean
      rm -rf /var/lib/apt/lists/*
      ARCH="$(uname -m)"
      case "${ARCH}" in
        x86_64)  JQ_ARCH="amd64" ;;
        aarch64) JQ_ARCH="arm64" ;;
        *) echo "Unsupported arch: ${ARCH}" && exit 1 ;;
      esac
      curl --fail --location --retry 3 \
        "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-${JQ_ARCH}" \
        -o /usr/local/bin/jq
      chmod +x /usr/local/bin/jq

debian-bookworm+jq-source-build-deps:
  image: debian:bookworm
  build:
    dockerfile: |
      apt-get update -qq
      apt-get install -y --no-install-recommends \
        make automake autoconf libtool build-essential curl ca-certificates
      rm -rf /var/lib/apt/lists/*

