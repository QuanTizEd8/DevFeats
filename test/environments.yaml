alpine-latest:
  image: alpine:latest

# macOS environments — image matches ^macos; no Docker container is used
# clean_path: strips the GHA runner's pre-installed PATH down to the macOS
# system baseline (/usr/bin:/bin:/usr/sbin:/sbin) so test scenarios cannot
# accidentally rely on tools that happen to be pre-installed on the runner.
# path_prepend: colon-separated dirs to prepend to the clean base PATH when
# a scenario legitimately needs them (e.g. /opt/homebrew/bin).
macos-latest:
  image: macos-latest
  clean_path: true
  # Homebrew lives outside the stripped PATH; scenarios and setup scripts invoke
  # `brew --prefix` and must resolve the real binary (arm64: /opt/homebrew, Intel: /usr/local).
  path_prepend: /opt/homebrew/bin:/usr/local/bin

# Bare macOS — closest analog to a minimal Linux image on hosted runners: no Homebrew
# on disk (official uninstall), clean_path, no path_prepend, and no user configuration
# under $HOME (XDG, shell rc files, VCS/tool dirs). Does not touch ~/Library, user
# media folders, or macOS locale files (e.g. .CFUserTextEncoding). Tests cannot use
# bare `brew`/`gh` until something reinstalls them; use explicit "${prefix}/bin/brew"
# after install-homebrew runs. On native macOS, `build.dockerfile` is shell bootstrap
# (see run.py), not Docker. Extra scenario prep still belongs in scenario `setup`.
macos-latest-fresh-install:
  image: macos-latest
  clean_path: true
  build:
    dockerfile: |
      set -eux
      # Uninstall Homebrew to simulate a clean macOS environment.
      # install.sh bootstraps bash by compiling from source (Case 3 in
      # _ensure_bash4) — no pre-staged bash binary is needed here.
      _UNINSTALL_URL="https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh"
      _UNINSTALL_TMP="$(mktemp /tmp/brew_uninstall.XXXXXX.sh)"
      curl -fsSL "$_UNINSTALL_URL" -o "$_UNINSTALL_TMP"
      NONINTERACTIVE=1 bash "$_UNINSTALL_TMP" --force
      rm -f "$_UNINSTALL_TMP"
      # User configuration only (not ~/Library, Documents, .CFUserTextEncoding, …).
      rm -rf \
        "${HOME}/.config" \
        "${HOME}/.local" \
        "${HOME}/.cache" \
        "${HOME}/.docker" \
        "${HOME}/.ssh" \
        "${HOME}/.gnupg"
      rm -f \
        "${HOME}/.bash_profile" \
        "${HOME}/.bashrc" \
        "${HOME}/.bash_login" \
        "${HOME}/.profile" \
        "${HOME}/.zprofile" \
        "${HOME}/.zshrc" \
        "${HOME}/.zshenv" \
        "${HOME}/.zlogin" \
        "${HOME}/.shrc" \
        "${HOME}/.gitconfig" \
        "${HOME}/.gitignore_global" \
        "${HOME}/.gitattributes" \
        "${HOME}/.git-credentials" \
        "${HOME}/.netrc" \
        "${HOME}/.curlrc" \
        "${HOME}/.wgetrc" \
        "${HOME}/.wget-hsts" \
        "${HOME}/.inputrc" \
        "${HOME}/.vimrc" \
        "${HOME}/.npmrc" \
        "${HOME}/.yarnrc" \
        "${HOME}/.yarnrc.yml" \
        "${HOME}/.pypirc" \
        "${HOME}/.condarc"

