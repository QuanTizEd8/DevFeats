# ── git environments ─────────────────────────────────────────────────────────
ubuntu-24.04+git-preinstalled:
  image: ubuntu:24.04
  build:
    dockerfile: apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*

ubuntu-24.04+git-source-build-deps:
  image: ubuntu:24.04
  build:
    dockerfile: |
      apt-get update -qq
      apt-get install -y --no-install-recommends \
        build-essential gettext libcurl4-openssl-dev libexpat1-dev \
        libpcre2-dev libssl-dev zlib1g-dev libpcre2-posix3 \
        curl ca-certificates tar jq yq
      rm -rf /var/lib/apt/lists/*

# ── gh environments ──────────────────────────────────────────────────────────
ubuntu-latest+git+sudo:
  image: ubuntu:latest
  build:
    dockerfile: |
      (apt-get update || (sleep 15 && apt-get update))
      apt-get install -y --no-install-recommends git sudo
      rm -rf /var/lib/apt/lists/*

ubuntu-latest+gh-2.67.0-preinstalled:
  image: ubuntu:latest
  build:
    dockerfile: |
      (apt-get update || (sleep 15 && apt-get update))
      apt-get install -y --no-install-recommends curl ca-certificates
      rm -rf /var/lib/apt/lists/*
      ARCH="$(uname -m)"
      case "${ARCH}" in
        x86_64)  ASSET_ARCH="amd64" ;;
        aarch64) ASSET_ARCH="arm64" ;;
        *)       ASSET_ARCH="amd64" ;;
      esac
      GH_VERSION="2.67.0"
      curl --fail --location --retry 3 --retry-connrefused \
           -o /tmp/gh.tar.gz \
           "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ASSET_ARCH}.tar.gz"
      tar -xz -C /tmp -f /tmp/gh.tar.gz
      install -m 755 "/tmp/gh_${GH_VERSION}_linux_${ASSET_ARCH}/bin/gh" /usr/local/bin/gh
      rm /tmp/gh.tar.gz

# ── homebrew environments ─────────────────────────────────────────────────────
ubuntu-latest+homebrew-preinstalled:
  image: ubuntu:latest
  build:
    dockerfile: |
      apt-get update \
       && apt-get install -y --no-install-recommends \
              git curl file build-essential procps ca-certificates \
       && apt-get clean \
       && apt-get dist-clean 2>/dev/null || rm -rf /var/lib/apt/lists/*
      useradd -m -s /bin/bash linuxbrew
      runuser -u linuxbrew -- env NONINTERACTIVE=1 /bin/bash -c \
          "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

ubuntu-latest+curl:
  image: ubuntu:latest
  build:
    dockerfile: |
      apt-get update
      apt-get install -y --no-install-recommends curl ca-certificates bash
      rm -rf /var/lib/apt/lists/*

# ── miniforge environments ────────────────────────────────────────────────────
ubuntu-latest+zsh:
  image: ubuntu:latest
  build:
    dockerfile: |
      apt-get update \
       && apt-get install -y --no-install-recommends zsh \
       && apt-get clean \
       && apt-get dist-clean 2>/dev/null || rm -rf /var/lib/apt/lists/*

ubuntu-latest+miniforge-base:
  from: ubuntu-latest+curl
  build:
    dockerfile: |
      ARCH="$(uname -m)"
      curl --fail --location --retry 3 \
        --output /tmp/miniforge.sh \
        "https://github.com/conda-forge/miniforge/releases/${MINIFORGE_PATH}/${MINIFORGE_FILENAME}-${ARCH}.sh"
      bash /tmp/miniforge.sh -b -p /opt/conda
      rm /tmp/miniforge.sh
  env_vars:
    PATH: /opt/conda/bin:${PATH}

# ── pixi environments ────────────────────────────────────────────────────────
ubuntu-latest+pixi-base:
  from: ubuntu-latest+curl
  build:
    dockerfile: |
      ARCH="$(uname -m)"
      case "${ARCH}" in
        x86_64)  TRIPLE="x86_64-unknown-linux-musl" ;;
        aarch64) TRIPLE="aarch64-unknown-linux-musl" ;;
        *)       TRIPLE="${ARCH}-unknown-linux-musl" ;;
      esac
      curl --fail --location --retry 3 \
        "https://github.com/prefix-dev/pixi/releases/${PIXI_REF}/pixi-${TRIPLE}.tar.gz" \
        | tar -xz -C "${PIXI_INSTALL_DIR}"
      chmod +x "${PIXI_INSTALL_DIR}/pixi"
