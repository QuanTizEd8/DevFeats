opensuse-leap+bash:
  image: opensuse/leap:15.6
  build:
    # zypper exits 106 (ZYPPER_EXIT_INF_REPOS_SKIPPED) when some repos are
    # unreachable but the operation succeeds. set +e is required because
    # environments.py wraps inline dockerfiles with set -eux.
    dockerfile: |
      set +e
      zypper install -y bash
      _rc=$?
      set -e
      [ "$_rc" -eq 0 ] || [ "$_rc" -eq 106 ]

arch+bash:
  image: archlinux:base
  build:
    dockerfile: pacman -Sy --noconfirm bash

ubuntu-24.04+jq-1.8.1:
  image: ubuntu:24.04
  build:
    dockerfile: |
      apt-get update -qq
      apt-get install -y --no-install-recommends curl ca-certificates
      apt-get clean
      rm -rf /var/lib/apt/lists/*
      ARCH="$(uname -m)"
      case "${ARCH}" in
        x86_64)  JQ_ARCH="amd64" ;;
        aarch64) JQ_ARCH="arm64" ;;
        *) echo "Unsupported arch: ${ARCH}" && exit 1 ;;
      esac
      curl -fsSL --compressed --retry 60 --retry-delay 5 --retry-connrefused \
        -H 'User-Agent: devfeats' \
        "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-${JQ_ARCH}" \
        -o /usr/local/bin/jq
      chmod +x /usr/local/bin/jq

