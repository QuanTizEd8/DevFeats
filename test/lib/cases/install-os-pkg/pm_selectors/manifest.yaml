# pm_selectors — per-package PM filtering via when clause.
# Packages without a when clause are always installed.
# Packages with when: {plat.pm: X} are installed only on that package manager family.
packages:
  - always-installed
  - name: apt-only
    when: {plat.pm: apt}
  - name: apk-only
    when: {plat.pm: apk}
  - name: dnf-only
    when: {plat.pm: dnf}
  - name: zypper-only
    when: {plat.pm: zypper}
  - name: pacman-only
    when: {plat.pm: pacman}
