# or_selectors — OR logic via array of condition objects.
# when: [{plat.pm: apt}, {plat.pm: apk}] matches on both apt and apk systems.
packages:
  - name: apt-or-apk
    when: [{plat.pm: apt}, {plat.pm: apk}]
  - name: apt-only
    when: {plat.pm: apt}
  - name: apk-only
    when: {plat.pm: apk}
  - name: never
    when: {plat.pm: fake}
