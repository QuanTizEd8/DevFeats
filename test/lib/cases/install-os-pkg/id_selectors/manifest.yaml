# id_selectors — AND logic within a condition object: {plat.pm: apt, os.id: debian} requires both to match.
# Tests that Debian and Ubuntu are distinguished even though both use apt.
packages:
  - name: common-apt-pkg
    when: {plat.pm: apt}
  - name: debian-only
    when: {plat.pm: apt, os.id: debian}
  - name: ubuntu-only
    when: {plat.pm: apt, os.id: ubuntu}
