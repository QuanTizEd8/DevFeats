[workspace]
name = "devfeats"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

# ── Default Feature ───────────────────────────────────────────────────────────

[dependencies]
python = { version = "3.13.*", channel = "conda-forge" }


# ── Environments ──────────────────────────────────────────────────────────────

[environments]
default = { features = ["proman"] }
docs = { features = ["docs"] }
lint = { features = ["lint"], no-default-feature = true }
test = { features = ["proman", "test"] }


# ── ProMan Feature ────────────────────────────────────────────────────────────

[feature.proman.pypi-dependencies]
proman = { path = ".dev/lib", editable = true }

[feature.proman.tasks]
_sync-docs-data = "proman-gen-docs-data"
sync-src = "proman-sync"
sync-src-check = "proman-sync --check"
sync-docs = "proman-gen-docs"
sync-docs-check = "proman-gen-docs --check"
show-feats = "proman-show-feats"
show-feat-opts = "proman-show-feat-opts"
build-feats = "proman-build-feats"
build-docs-pkg = "proman-build-docs-pkg"
release-detect = "proman-release-detect --repo quantized8/devfeats"


# ── Lint Feature ─────────────────────────────────────────────────────────────

[feature.lint.dependencies]
ruff = "==0.15.11"

[feature.lint.tasks]
lint-py-check = "ruff check ."
lint-py = "ruff check --fix ."
format-py = "ruff format ."
format-py-check = "ruff format --check ."


# ── Test Feature ─────────────────────────────────────────────────────────────

[feature.test.dependencies]
pytest = "==9.0.3"

[feature.test.tasks]
test-py = "pytest test/proman -v"
test-feats = "proman-test-run"


# ── Docs / Website Feature ────────────────────────────────────────────────────

[feature.docs.dependencies]
sphinx = { version = "==9.1.0", channel = "conda-forge" }
pydata-sphinx-theme = { version = "==0.16.1", channel = "conda-forge" }
myst-nb = { version = "==1.4.0", channel = "conda-forge" }
sphinx-design = { version = "==0.7.0", channel = "conda-forge" }
sphinx-external-toc = { version = "==1.1.0", channel = "conda-forge" }
ablog = { version = "==0.11.13", channel = "conda-forge" }
sphinx-copybutton = { version = "==0.5.2", channel = "conda-forge" }
sphinxext-opengraph = { version = "==0.13.0", channel = "conda-forge" }
sphinxcontrib-bibtex = { version = "==2.6.5", channel = "conda-forge" }
sphinx-togglebutton = { version = "==0.3.2", channel = "conda-forge" }
sphinxcontrib-mermaid = { version = "==2.0.1", channel = "conda-forge" }
sphinx-thebe = { version = "==0.3.1", channel = "conda-forge" }
myst-parser = { version = "==5.0.0", channel = "conda-forge" }
linkify-it-py = { version = "==2.1.0", channel = "conda-forge" }
librsvg = { version = "==2.62.1", channel = "conda-forge" }
libffi = { version = "==3.5.2", channel = "conda-forge" }
cairo = { version = "==1.18.4", channel = "conda-forge" }
intersphinx-registry = { version = "==0.2603.16", channel = "conda-forge" }
pyyaml = { version = "==6.0.3", channel = "conda-forge" }

[feature.docs.pypi-dependencies]
pygments-git = { version = "==1.9.0" }
sphinx-autobuild = { version = "==2025.8.25" }
sphinx-last-updated-by-git = { version = "==0.3.8" }
sphinx-notfound-page = { version = "==1.1.0" }
sphinx-tippy = { version = "==0.4.3" }
sphinxcontrib-svg2pdfconverter = { version = "==2.1.0", extras = ["CairoSVG"] }

[feature.docs.tasks.build-docs]
depends-on = [{ task = "_sync-docs-data", environment = "default" }]
cwd = "docs"
cmd = "python -m sphinx -b $SPHINX_BUILDER $SPHINX_BUILD_OPTIONS -c . source .build"

[feature.docs.tasks.build-docs-live]
cwd = "docs"
cmd = "python -m sphinx_autobuild source .build --conf-dir . --watch ../features --watch ../.dev/ --pre-build 'pixi run --environment default _sync-docs-data' --jobs auto --write-all --nitpicky"

[feature.docs.activation.env]
SPHINX_BUILDER = "dirhtml"
SPHINX_BUILD_OPTIONS = "--verbose --show-traceback --keep-going --color --nitpicky --jobs auto"
WEBSITE_TAR_FILEPATH = "docs/.build/artifact.tar"
