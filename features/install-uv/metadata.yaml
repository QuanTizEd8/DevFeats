version: 0.1.0
name: uv Installation
description: Install [uv](https://astral.sh/uv) — an extremely fast Python package and project manager, written in Rust.
keywords:
  - uv
  - uvx
  - python
  - package manager
  - pip
  - astral
_long_description: >-
  Installs [uv](https://astral.sh/uv), an extremely fast Python package and project manager
  written in Rust by Astral. uv covers package management, lockfiles, tool execution via
  `uvx`, Python runtime installation, and pip-compatible workflows in a single CLI.
  Downloads pre-built GitHub release artifacts with SHA-256 verification and installs both
  `uv` and `uvx`. Writes a cargo-dist self-update receipt so that `uv self update` works
  out of the box.
_tool_name: uv

_options:
  verify:
    args: "--version"
    description: Verify uv is installed and working.
  gh_repo: astral-sh/uv
  version:
    resolution: github_release
    default: stable
    flag: --version
    proposals:
      - value: 0.11.8
        description: uv v0.11.8.
      - value: 0.6.0
        description: uv v0.6.0.
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{feat.tag}/uv-{plat.rust_triple}.tar.gz"
      sidecar_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{feat.tag}/uv-{plat.rust_triple}.tar.gz.sha256"
      binary_src:
        - uv
        - uvx
    package:
      when: {plat.pm: [brew, dnf, apk, pacman, zypper]}
  prefix:
    bins: [uv, uvx]
    applies_when:
      - method: [binary]
  completions:
    subcmd: "generate-shell-completion"
    shells: [bash, zsh, fish]

_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    method-package:
      packages:
        - name: uv
          version: "{feat.pm_version}"
