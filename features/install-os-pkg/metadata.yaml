id: install-os-pkg
version: 0.1.0
name: OS Package Installation
description: Install packages from the operating system's native package manager.
keywords:
- apt
- dnf
- microdnf
- yum
- zypper
- pacman
- apk
- brew
- package management
_long_description: >-
  A cross-platform package installer with support for apt (Debian/Ubuntu),
  dnf/microdnf/yum (Fedora/RHEL/CentOS), zypper (openSUSE), pacman (Arch Linux),
  apk (Alpine), and brew (macOS/Linuxbrew). Packages are declared in a single JSON or
  YAML manifest with per-environment selectors, repository configuration, key import,
  and pre/post install hooks.
options:
  install_self:
    default: false
    description: |-
      Install the `install-os-pkg` system command.
      When true, a wrapper script is written to `/usr/local/bin/install-os-pkg`
      so other features or scripts can invoke the installer directly.
      Defaults to false; set to true only when you need the system command.
    type: boolean
  interactive:
    default: false
    description: Run in interactive mode, allowing the package manager to prompt the user.
    type: boolean
  keep_repos:
    default: false
    description: |-
      Keep added repository drop-in files after installation.
      By default, any repository files written during installation are removed after the script finishes.
    type: boolean
  lifecycle_hook:
    default: ''
    description: |-
      When set, the feature registers a hook script that the devcontainer CLI calls at
      the specified lifecycle event, instead of installing packages at build time.
    enum:
    - value: ''
      description: Install packages immediately at build time.
    - value: onCreate
      description: Register an `onCreate` lifecycle hook script.
    - value: updateContent
      description: Register an `updateContent` lifecycle hook script.
    - value: postCreate
      description: Register a `postCreate` lifecycle hook script.
    type: string
  manifest:
    default: ''
    description: |
      Inline manifest content or path to a manifest file.
      Accepts YAML or JSON format.

      Manifest keys:
        packages: list of package names or objects {name, version?, flags?, when?}.
        apt / brew / dnf / apk / zypper / pacman: PM-specific package lists.
        keys: list of {url, dest} objects for signing keys (dest ending .gpg → dearmored).
        repos: list of repo strings or {content} objects added before installation.
        ppas: list of PPA identifiers (APT only, e.g. 'ppa:git-core/ppa').
        taps: list of Homebrew tap names or {name, url} objects (brew only).
        copr: list of COPR names (DNF only, e.g. 'user/repo').
        modules: list of DNF module streams (DNF only).
        groups: list of package-group names.
        casks: list of Homebrew cask names (macOS brew only).
        prescripts / scripts: shell commands run before / after package installation.
        when: condition (dict or list-of-dicts) on /etc/os-release fields plus 'pm', 'arch', 'kernel'.

      Inline content is detected when the value contains a newline;
      otherwise the value is treated as a file path.
    type: string
  update:
    default: true
    description: |-
      Refresh package lists before installing packages.
      Set to `false` to skip the update step.
    type: boolean
  lists_max_age:
    default: '300'
    description: |-
      Maximum age of package lists (in seconds) before an update is considered necessary.
      When the package lists were refreshed more recently than this threshold the update
      step is skipped automatically (unless a new repository was added by the manifest).
      Set to `0` to always update. Has no effect when `update=false`.
    type: string
  dry_run:
    default: false
    description: |-
      Print what would be installed/fetched without making any changes.
      No packages are installed, no files are written, and no scripts are executed.
      Root privilege is not required when this is set.
    type: boolean
  skip_installed:
    default: false
    description: |-
      Skip packages that are already available in PATH.
      When true, each package name is checked with `command -v` before installation.
      Packages whose binary is already present in PATH are skipped regardless of
      whether they were installed via the system package manager.
    type: boolean
  prefer_linuxbrew:
    default: false
    description: |-
      Prefer Homebrew over the native Linux package manager.
      When true and Homebrew is installed on Linux, `brew` is used instead of
      the native package manager (`apt`, `dnf`, etc.).
      Has no effect on macOS (`brew` is always used there).
    type: boolean
_dependencies: {}
installsAfter: []
# installsAfter:
#   - ghcr.io/quantized8/sysset/install-homebrew
onCreateCommand:
  sysset_install-os-pkg_install: '[ -f /usr/local/share/install-os-pkg/on-create.sh ] && sh /usr/local/share/install-os-pkg/on-create.sh || true'
updateContentCommand:
  sysset_install-os-pkg_install: '[ -f /usr/local/share/install-os-pkg/update-content.sh ] && sh /usr/local/share/install-os-pkg/update-content.sh || true'
postCreateCommand:
  sysset_install-os-pkg_install: '[ -f /usr/local/share/install-os-pkg/post-create.sh ] && sh /usr/local/share/install-os-pkg/post-create.sh || true'
