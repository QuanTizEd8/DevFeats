version: 0.1.0
name: OS Package Installation
description: Install packages from the operating system's native package manager.
keywords:
- apt
- dnf
- microdnf
- yum
- zypper
- pacman
- apk
- brew
- package management
_long_description: >-
  A cross-platform package installer
  with support for apt (Debian/Ubuntu),
  dnf/microdnf/yum (Fedora/RHEL/CentOS),
  zypper (openSUSE),
  pacman (Arch Linux),
  apk (Alpine),
  and brew (macOS/Linuxbrew).
  Packages are declared in a single JSON or YAML manifest
  with environment selectors, repository configuration,
  key import, and pre/post install hooks.
_options:
  installer_dir: false
  user_file_fetch: true
options:
  manifest:
    default: ''
    description: |
      Manifest to install packages from.
      This can be in JSON or YAML format,
      provided either as inline content or as a file/URI reference.
      Inline content is detected when the value contains a newline;
      otherwise the value is treated as a file path, `file://`,
      `http(s)://`, `oci://`, or `gh://owner/repo@ref:path` URI.
      Append `#sha256=<hex>` for integrity verification.
      Use `fetch_headers` and `fetch_netrc` for authentication.
    proposals:
    - value: |
        packages:
          - git
          - curl
      description: Inline manifest (newline in value).
    - value: ${containerWorkspaceFolder}/.devcontainer/packages.yaml
      description: >-
        Manifest file in the mounted workspace.
        This requires setting `lifecycle_hook`,
        since the file is not available at build time.
    - value: https://raw.githubusercontent.com/owner/repo/main/packages.yaml
      description: Public GitHub raw URL.
    - value: gh://owner/repo@main:.devcontainer/packages.yaml
      description: Manifest from a GitHub repository (`gh://` form).
    type: string
  lifecycle_hook:
    default: ''
    description: |-
      When set, the feature registers a hook script that the devcontainer CLI calls at
      the specified lifecycle event, instead of installing packages at build time.
    enum:
    - value: ''
      description: Install packages immediately at build time.
    - value: onCreate
      description: Register an `onCreate` lifecycle hook script.
    - value: updateContent
      description: Register an `updateContent` lifecycle hook script.
    - value: postCreate
      description: Register a `postCreate` lifecycle hook script.
    type: string
  install_self:
    default: false
    description: |-
      Install the `install-os-pkg` system command.
      When true, a wrapper script is written to `/usr/local/bin/install-os-pkg`
      so other features or scripts can invoke the installer directly.
      Defaults to false; set to true only when you need the system command.
    type: boolean
  update:
    default: true
    description: |-
      Refresh package lists before installing packages.
      Set to `false` to skip the update step.
    type: boolean
  lists_max_age:
    default: '300'
    _applies_when:
      - update: ['true']
    description: |-
      Maximum age of package lists (in seconds) before an update is considered necessary.
      When the package lists were refreshed more recently than this threshold the update
      step is skipped automatically (unless a new repository was added by the manifest).
      Set to `0` to always update.
    type: string
  keep_repos:
    default: false
    description: |-
      Keep added repository drop-in files after installation.
      By default, any repository files written during installation are removed after the script finishes.
    type: boolean
  prefer_linuxbrew:
    default: false
    description: |-
      Prefer Homebrew over the native Linux package manager.
      When true and Homebrew is installed on Linux, `brew` is used instead of
      the native package manager (`apt`, `dnf`, etc.).
      Has no effect on macOS (`brew` is always used there).
    type: boolean
  dry_run:
    default: false
    description: |-
      Print what would be installed/fetched without making any changes.
      No packages are installed, no files are written, and no scripts are executed.
      Root privilege is not required when this is set.
    type: boolean
  interactive:
    default: false
    description: Run in interactive mode, allowing the package manager to prompt the user.
    type: boolean
_dependencies: {}
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-homebrew
onCreateCommand:
  install:
    command: '[ -f ${{ _env_vars.lifecycle_script_dir }}$/on-create.sh ] && sh ${{ _env_vars.lifecycle_script_dir }}$/on-create.sh || true'
    description: When `lifecycle_hook` is set to `onCreate`, install OS packages at container creation time.
updateContentCommand:
  install:
    command: '[ -f ${{ _env_vars.lifecycle_script_dir }}$/update-content.sh ] && sh ${{ _env_vars.lifecycle_script_dir }}$/update-content.sh || true'
    description: When `lifecycle_hook` is set to `updateContent`, reinstall OS packages when workspace content changes.
postCreateCommand:
  install:
    command: '[ -f ${{ _env_vars.lifecycle_script_dir }}$/post-create.sh ] && sh ${{ _env_vars.lifecycle_script_dir }}$/post-create.sh || true'
    description: When `lifecycle_hook` is set to `postCreate`, install OS packages after the container is fully created.
