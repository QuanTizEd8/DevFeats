version: 0.1.0
name: TeX Live Installation
description: >-
  Install [TeX Live](https://www.tug.org/texlive/) via the official TeX Live installer script or the system package manager.
keywords:
  - latex
  - tex
  - texlive
  - pdflatex
  - xelatex
  - lualatex
  - typesetting
  - document
  - tlmgr
_long_description: |-
  [TeX Live](https://www.tug.org/texlive/) is the comprehensive cross-platform
  LaTeX/TeX distribution maintained by TeX user groups. It ships TeX engines
  (pdfLaTeX, XeLaTeX, LuaLaTeX, plain TeX), an extensive library of macro packages
  and fonts, and `tlmgr` — the package manager for ongoing CTAN package lifecycle.

  Two installation paths are supported:

  - **`script`** (default) — The [official TeX Live Unix installer](https://www.tug.org/texlive/quickinstall.html),
    downloaded from CTAN. Works on Linux (glibc and musl/Alpine) and macOS. Provides
    full control over the installation scheme, target directory, repository mirror, paper size, and
    whether to include documentation and source. The installer is driven by a generated
    `texlive.profile` file built from all individual profile-key options; use `profile` to supply a
    fully custom profile that takes complete precedence. Use `packages` to add individual CTAN
    packages on top of the chosen scheme.

  - **`package`** — Install distro-packaged TeX Live from the system package manager. The `scheme`
    option influences the package set selected where the distro offers multiple granularity levels.
    Version is controlled by the distribution's package policy.
_options:
  verify:
    cmd: tlmgr
    args: "version"
    description: Verify the TeX Live installation via tlmgr.
  user_file_fetch: true
  method:
    script:
      asset_uri: ''
    package:
      when: {pm: apk}
  version:
    resolution: none
    default: latest
    proposals:
      - value: latest
        description: Live CTAN mirror pool — always the current TeX Live release.
      - value: '2026'
        description: TeX Live 2026 frozen snapshot.
      - value: '2025'
        description: TeX Live 2025 frozen snapshot.
      - value: '2024'
        description: TeX Live 2024 frozen snapshot.
  prefix:
    root: /usr/local/texlive
    nonroot: ${HOME}/texlive
    bins: [tlmgr]
    symlink:
      skip: true
    exports:
      skip: true
options:
  scheme:
    type: string
    default: small
    description: |-
      TeX Live installation scheme — the bundle of packages to include. For `method=script`,
      sets the `selected_scheme scheme-<value>` key in the installer profile. Also influences
      package selection for `method=package` where distro packaging allows multiple granularity
      levels.
      Has no effect when `profile` is provided (the profile's `selected_scheme` takes precedence)
      or when `collections` is non-empty — the TeX Live installer resets the scheme's collection
      list when any `collection-*` line is present; only the explicitly listed collections are
      installed. See `collections` for details.
    enum:
      - value: full
        description: >-
          [Full scheme](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/scheme-full.tlpsrc?view=markup) –
          Complete TeX Live distribution: all packages, engines, and fonts (~7 GB).
          Choose when any LaTeX document must build without missing-package errors.
      - value: medium
        description: >-
          [Medium scheme](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/scheme-medium.tlpsrc?view=markup) –
          LaTeX plus a large set of commonly used extra packages and fonts (~2 GB). A practical
          default for general document production workflows.
      - value: small
        description: >-
          [Small scheme](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/scheme-small.tlpsrc?view=markup) –
          LaTeX plus a curated set of recommended packages (~400 MB). Good balance between
          functionality and image size for most document workflows; extend with `packages`.
      - value: basic
        description: >-
          [Basic scheme](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/scheme-basic.tlpsrc?view=markup) –
          LaTeX plus fundamental packages only (~200 MB). Suitable when you want a working base
          and will add exactly the CTAN packages needed via `packages`.
      - value: minimal
        description: >-
          [Minimal scheme](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/scheme-minimal.tlpsrc?view=markup) –
          TeX engine and bare-minimum formats only (~100 MB). Pair with `packages` to build a
          purpose-specific installation. `latex` and most macro packages are absent until added.
      - value: infraonly
        description: >-
          [Infrastructure-only scheme](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/scheme-infraonly.tlpsrc?view=markup) –
          Only `tlmgr` infrastructure, no TeX packages (~30 MB). Use when you want full control
          over exactly which packages are present by listing them in `packages`. The `latex` binary
          will not be present until you add `latex-bin` (and friends) to `packages`.

  packages:
    type: array
    default: latexmk
    description: |-
      Additional CTAN packages to install via `tlmgr install` after the base scheme or
      package-manager installation. Each line is a CTAN package name
      (e.g. `latexmk`, `biber`, `pgf`, `collection-fontsrecommended`).
      Applied for all methods that include a working `tlmgr` installation
      (`script` and `package` where `tlmgr` is writable).
    proposals:
      - value: latexmk
        description: '`latexmk` — automated LaTeX build tool; required by VS Code LaTeX Workshop.'
      - value: "latexmk\nbiber"
        description: '`latexmk` + `biber` — build automation and modern bibliography backend (BibLaTeX).'
      - value: "latexmk\nbiber\ncollection-fontsrecommended"
        description: '`latexmk` + `biber` + the recommended CTAN fonts collection.'
      - value: "latexmk\nbiber\ncollection-latexextra"
        description: '`latexmk` + `biber` + the large `collection-latexextra` package collection (~500 MB additional packages).'
      - value: "latexmk\nbiber\ncollection-fontsrecommended\nxetex\nlualatex-math"
        description: '`latexmk` + `biber` + recommended fonts + XeTeX + LuaLaTeX math support.'
      - value: ''
        description: Install no additional packages beyond the chosen scheme.

  collections:
    type: array
    default: ''
    _applies_when:
      - method: [script]
    description: |-
      TeX Live collections to install (without the `collection-` prefix). When any collections
      are listed, `scheme-infraonly` is written as the profile scheme and ONLY the specified
      collections are installed. This reflects documented TeX Live installer behaviour: the
      presence of any `collection-*` line in the profile causes the installer to reset the
      scheme's default collection list before applying the profile — meaning the scheme's
      collections are never added. `scheme-infraonly` is used explicitly to make the intent
      unambiguous. The `scheme` option is therefore ignored when `collections` is non-empty.
      Leave empty (default) to install the collections bundled with the chosen `scheme`.
      To add individual CTAN packages on top of a scheme (without replacing its collections),
      use `packages`.
      The full list of TeX Live collections is defined in the
      [TUG SVN package database](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/scheme-full.tlpsrc?view=markup).
    enum:
      - value: basic
        description: >-
          [collection-basic](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/collection-basic.tlpsrc?view=markup) –
          Essential programs and files.
      - value: bibtexextra
        description: >-
          [collection-bibtexextra](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/collection-bibtexextra.tlpsrc?view=markup) –
          BibTeX additional styles
      - value: binextra
        description: >-
          [collection-binextra](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/collection-binextra.tlpsrc?view=markup) –
          TeX auxiliary programs
      - value: context
        description: >-
          [collection-context](https://svn.tug.org:8369/texlive/trunk/Master/tlpkg/tlpsrc/collection-context.tlpsrc?view=markup) –
          ConTeXt and packages
      - value: fontsextra
