version: 0.1.0
name: TeX Live Installation
description: >-
  Install [TeX Live](https://www.tug.org/texlive/) via the official Unix installer,
  native macOS packages (MacTeX / BasicTeX), or the system package manager.
keywords:
  - latex
  - tex
  - texlive
  - pdflatex
  - xelatex
  - lualatex
  - typesetting
  - document
  - tlmgr
_long_description: |-
  [TeX Live](https://www.tug.org/texlive/) is the comprehensive cross-platform
  LaTeX/TeX distribution maintained by TeX user groups. It ships TeX engines
  (pdfLaTeX, XeLaTeX, LuaLaTeX, plain TeX), an extensive library of macro packages
  and fonts, and `tlmgr` â€” the package manager for ongoing CTAN package lifecycle.

  Three installation paths are supported:

  - **`install-tl`** (default) â€” The [official TeX Live Unix installer](https://www.tug.org/texlive/quickinstall.html),
    downloaded from CTAN. Works on Linux (glibc and musl/Alpine) and macOS. Provides
    full control over the installation scheme, target directory, repository mirror, paper size, and
    whether to include documentation and source. The installer is driven by a generated
    `texlive.profile` file built from all individual profile-key options; use `profile` to supply a
    fully custom profile that takes complete precedence. Use `packages` to add individual CTAN
    packages on top of the chosen scheme.

  - **`mactex`** â€” The [MacTeX](https://www.tug.org/mactex/) native `.pkg` installer (macOS only â€”
    exits with an error on Linux). Full TeX Live distribution plus macOS GUI helpers (TeX Live
    Utility). Installs to `/usr/local/texlive/YYYY`; the stable path `/Library/TeX/texbin` is used
    for shell access.

  - **`basictex`** â€” The [BasicTeX](https://www.tug.org/mactex/morepackages.html) `.pkg` installer
    (macOS only â€” exits with an error on Linux). A lightweight macOS-native TeX Live subset (~300 MB).
    No GUI helpers; use the `packages` option to extend via `tlmgr`.

  - **`os_pkg`** â€” Install distro-packaged TeX Live from the system package manager. The `scheme`
    option influences the package set selected where the distro offers multiple granularity levels.
    Version is controlled by the distribution's package policy.

options:
  method:
    type: string
    default: install-tl
    description: Installation method to use.
    enum:
      - value: install-tl
        description: |-
          Download and run the [official TeX Live Unix installer](https://www.tug.org/texlive/quickinstall.html).
          Supports Linux (glibc and musl/Alpine) and macOS.
          The installer is driven by a generated `texlive.profile`;
          all profile-key options (`texdir`, `texmf*`, `instopt_*`, and `tlpdbopt_*` options listed below)
          are written into the profile automatically.
          Use `profile` to bypass generation with a fully custom profile.
          After installation, `tlmgr` manages individual CTAN packages without a full reinstall.
      - value: mactex
        description: |-
          Install [MacTeX](https://www.tug.org/mactex/) via the official `.pkg` package installer
          (macOS only â€” exits with an error on Linux). Full TeX Live distribution plus macOS GUI
          helpers (TeX Live Utility). Installs to `/usr/local/texlive/YYYY`; shell access via
          `/Library/TeX/texbin`.
      - value: basictex
        description: |-
          Install [BasicTeX](https://www.tug.org/mactex/morepackages.html) via the official `.pkg`
          installer (macOS only â€” exits with an error on Linux). A lightweight macOS-native TeX Live
          subset (~300 MB). No GUI helpers; use `packages` to extend via `tlmgr`.
      - value: os_pkg
        description: |-
          Install TeX Live from the system package manager (`apt`, `dnf`, `apk`, `brew`, etc.).
          The `scheme` option influences the package set where multiple granularity levels are
          available (e.g. apt distinguishes `texlive-latex-base` vs `texlive-latex-recommended`
          vs `texlive-full`). Version is controlled by the distribution's package repository;
          `tlmgr` is typically not used for updates in this mode.

  scheme:
    type: string
    default: small
    description: |-
      TeX Live installation scheme â€” the bundle of packages to include. For `method=install-tl`,
      sets the `selected_scheme scheme-<value>` key in the installer profile. Also influences
      package selection for `method=os_pkg` where distro packaging allows multiple granularity
      levels. Ignored for `method=mactex` (always full) and `method=basictex` (always small).
      Has no effect when `profile` is provided (the profile's `selected_scheme` takes precedence).
    enum:
      - value: full
        description: >-
          Complete TeX Live distribution: all packages, engines, and fonts (~7 GB). Choose when
          any LaTeX document must build without missing-package errors.
      - value: medium
        description: >-
          LaTeX plus a large set of commonly used extra packages and fonts (~2 GB). A practical
          default for general document production workflows.
      - value: small
        description: >-
          LaTeX plus a curated set of recommended packages (~400 MB). Good balance between
          functionality and image size for most document workflows; extend with `packages`.
      - value: basic
        description: >-
          LaTeX plus fundamental packages only (~200 MB). Suitable when you want a working base
          and will add exactly the CTAN packages needed via `packages`.
      - value: minimal
        description: >-
          TeX engine and bare-minimum formats only (~100 MB). Pair with `packages` to build a
          purpose-specific installation. `latex` and most macro packages are absent until added.
      - value: infraonly
        description: >-
          Only `tlmgr` infrastructure, no TeX packages (~30 MB). Use when you want full control
          over exactly which packages are present by listing them in `packages`. The `latex` binary
          will not be present until you add `latex-bin` (and friends) to `packages`.

  packages:
    type: array
    default: latexmk
    description: |-
      Additional CTAN packages to install via `tlmgr install` after the base scheme or
      package-manager installation. Each line is a CTAN package name
      (e.g. `latexmk`, `biber`, `pgf`, `collection-fontsrecommended`).
      Applied for all methods that include a working `tlmgr` installation
      (`install-tl`, `mactex`, `basictex`, and `os_pkg` where `tlmgr` is writable).
    proposals:
      - value: latexmk
        description: '`latexmk` â€” automated LaTeX build tool; required by VS Code LaTeX Workshop.'
      - value: "latexmk\nbiber"
        description: '`latexmk` + `biber` â€” build automation and modern bibliography backend (BibLaTeX).'
      - value: "latexmk\nbiber\ncollection-fontsrecommended"
        description: '`latexmk` + `biber` + the recommended CTAN fonts collection.'
      - value: "latexmk\nbiber\ncollection-latexextra"
        description: '`latexmk` + `biber` + the large `collection-latexextra` package collection (~500 MB additional packages).'
      - value: "latexmk\nbiber\ncollection-fontsrecommended\nxetex\nlualatex-math"
        description: '`latexmk` + `biber` + recommended fonts + XeTeX + LuaLaTeX math support.'
      - value: ''
        description: Install no additional packages beyond the chosen scheme.

  profile:
    type: string
    default: ''
    description: |
      Inline `texlive.profile` content or path/URI to a profile file for `method=install-tl`.
      When non-empty, the profile is used directly as the installer profile and all individual
      profile-key options (`texdir`, `texmflocal`, `texmfsysvar`, `texmfsysconfig`, `texmfhome`,
      `texmfvar`, `texmfconfig`, `instopt_adjustpath`, `instopt_adjustrepo`, `instopt_letter`,
      `instopt_portable`, `instopt_write18_restricted`, `tlpdbopt_install_docfiles`,
      `tlpdbopt_install_srcfiles`, `tlpdbopt_sys_bin`, `tlpdbopt_sys_man`, `tlpdbopt_sys_info`,
      `tlpdbopt_create_formats`, `tlpdbopt_post_code`, `tlpdbopt_generate_updmap`,
      `tlpdbopt_autobackup`, `tlpdbopt_backupdir`) are ignored â€” the profile controls these
      settings completely. Non-profile options (`scheme`, `repository`, `verify_downloads`,
      `packages`, `export_path`, `tlmgr_update`, `tlmgr_verify_repo`, `year`, `if_exists`,
      `installer_dir`, `keep_installer`) remain active.

      A profile is a plain-text file with `key value` pairs, one per line. Unknown keys cause the
      installer to abort. If any `collection-*` key is present, the installer installs only the
      explicitly listed collections (the scheme's default collection list is NOT expanded).
      The flags `--repository` and `--no-verify-downloads` are CLI flags, not profile keys; use
      the corresponding feature options (`repository`, `verify_downloads`) instead.

      Inline content is detected when the value contains a newline; otherwise the value is treated
      as a file path, `file://` / `http(s)://` / `oci://` / `gh://owner/repo@ref:path` URI.
      Append `#sha256=<hex>` for integrity verification. Use `fetch_headers` and `fetch_netrc`
      for authentication.
    proposals:
      - value: /workspaces/${localWorkspaceFolderBasename}/.devcontainer/texlive.profile
        description: Profile file in the mounted workspace.
      - value: https://raw.githubusercontent.com/owner/repo/main/texlive.profile
        description: Public GitHub raw URL.
      - value: gh://owner/repo@main:.devcontainer/texlive.profile
        description: Profile from a GitHub repository (`gh://` form).
      - value: |
          selected_scheme scheme-small
          tlpdbopt_install_docfiles 0
          tlpdbopt_install_srcfiles 0
          instopt_adjustpath 1
          tlpdbopt_sys_bin /usr/local/bin
        description: Inline profile (newline in value).

  repository:
    type: string
    _applies_when:
      - method: [install-tl]
    default: ctan
    description: |-
      TeX Live package repository to use as the source of installation.
      Set an explicit URL to:
      - Avoid mirror-selection variability (use a specific, trusted mirror).
      - Install from a historic yearly snapshot (pin to an older TeX Live release).
      - Use a local directory or internal network cache for air-gapped environments.
    proposals:
      - value: ctan
        description: Alias for the installer default (auto-selected CTAN mirror).
      - value: https://mirror.ctan.org/systems/texlive/tlnet
        description: |
          Installer default â€” auto-selected [CTAN](https://ctan.org) mirror
          using https://mirror.ctan.org/systems/texlive/tlnet.
      - value: https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/2025/tlnet-final
        description: Explicit CTAN mirror URL. The list of CTAN mirrors is available at https://ctan.org/mirrors/.
      - value: ftp://server/path/to/tlnet
        description: Explicit mirror with `ftp://` protocol.
      - value: scp://user@machine/path/to/tlnet
        description: Remote mirror accessible via `scp` (SSH).
      - value: ssh://user@machine/path/to/tlnet
        description: Equivalent way to specify a remote mirror with `scp`.
      - value: user@machine:/path/to/tlnet
        description: Equivalent way to specify a remote mirror with `scp`.
      - value: /path/to/local/tlnet
        description: Local directory containing the TeX Live repository tree.
      - value: file:/path/to/local/tlnet
        description: Equivalent way to specify a local directory.

  year:
    type: string
    default: latest
    description: |-
      MacTeX / BasicTeX release year for `method=mactex` and `method=basictex`.
      `latest` automatically uses the current calendar year (auto-detected at install time).
      An explicit four-digit year (e.g. `2026`) downloads that year's package from the official
      MacTeX download page.
      Ignored for `method=install-tl` and `method=os_pkg`; use `repository` to pin a specific
      TeX Live year snapshot with the Unix installer.
    proposals:
      - value: latest
        description: Current year (auto-detected from the system date at install time).
      - value: '2026'
        description: MacTeX / BasicTeX 2026 (macOS 11 Big Sur or newer).
      - value: '2025'
        description: MacTeX / BasicTeX 2025.

  verify_downloads:
    type: boolean
    default: true
    description: |-
      Verify the integrity of downloaded TeX Live packages using GPG signatures. When true
      (default), `gpg` is installed as a build dependency before the installer runs and the
      installer's built-in signature verification is active. Set to false to pass
      `--no-verify-downloads` to the installer, disabling signature checks â€” useful in
      air-gapped environments where the TeX Live GPG infrastructure is unreachable.
      Only applies to `method=install-tl`.

  export_path:
    type: array
    default: ''
    description: |-
      Shell startup files to receive an explicit `PATH` export for the TeX Live binary directory
      (e.g. `/usr/local/texlive/2026/bin/x86_64-linux`). Written as a post-install step,
      independent of the profile-based `instopt_adjustpath` / `tlpdbopt_sys_bin` symlink mechanism
      â€” both can be active simultaneously.
      - `''` (empty, default) â€” no PATH writes; rely on `instopt_adjustpath=true` symlinks instead.
      - `auto` â€” writes to all relevant system-wide files (root) or user-scoped files (non-root):
        `/etc/environment`, `/etc/profile.d/install-latex.sh`, the system-wide bashrc, and the
        zsh env file.
      - A list of absolute file paths â€” writes only to the specified files.

  tlmgr_update:
    type: boolean
    default: false
    description: |-
      Run `tlmgr update --self --all` after the initial installation to pull in the latest
      package updates from the configured repository. Disabled by default to keep the
      installation reproducible and deterministic. Enable in development images where the latest
      CTAN state is always desired.
      Applies to `method=install-tl`, `method=mactex`, and `method=basictex`.

  tlmgr_verify_repo:
    type: string
    default: main
    description: |-
      Set the `tlmgr` repository-signature verification level via `tlmgr option verify-repo
      <value>` after installation. Controls which repositories must present a valid GPG signature
      before `tlmgr` will install packages from them.
      Applies to all methods that include `tlmgr` (`install-tl`, `mactex`, `basictex`).
    enum:
      - value: none
        description: No signature verification for any repository.
      - value: main
        description: Verify signatures from the main TeX Live repository only; third-party repositories are not required to be signed.
      - value: all
        description: Require valid signatures from all repositories including third-party ones.

  if_exists:
    type: string
    default: skip
    description: |-
      What to do when a TeX Live installation is already detected before installation begins.
      Detection checks for a `latex` binary in PATH or at the resolved `texdir`.
    enum:
      - value: skip
        description: Log a notice and exit successfully without making any changes (idempotent).
      - value: fail
        description: Print an error and exit non-zero.
      - value: reinstall
        description: |-
          Remove the existing TeX Live installation tree and reinstall from scratch.
          For `method=install-tl`, removes `texdir` before re-running the installer.
          All `tlmgr`-installed packages are lost; `packages` will re-add them.

  installer_dir:
    type: string
    default: /tmp/texlive-installer
    description: |-
      Temporary directory for downloading and extracting the TeX Live installer archive
      (`install-tl-unx.tar.gz`) and its extracted contents for `method=install-tl`.
      All files are removed after a successful installation unless `keep_installer=true`.
      Ignored for all other methods.

  keep_installer:
    type: boolean
    default: false
    description: |-
      Keep the installer directory and all downloaded files after a successful installation.
      By default the installer archive and extracted tree are removed to reduce image layer size.
      Set to true for debugging or to inspect the generated `texlive.profile` written to
      `installer_dir/texlive.profile`.
      Only used by `method=install-tl`.

  # â”€â”€ install-tl profile options â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # The following options map directly to keys in the texlive.profile file that
  # drives the install-tl installer. They are all ignored when `profile` is set.

  # -- directory keys --

  texdir:
    type: string
    default: ''
    description: |-
      TeX Live system installation directory.
      Specifying this option also causes the `texmflocal`, `texmfsysconfig`, and `texmfsysvar` directories
      to be set as subdirectories of `texdir`, so they don't have to be set individually.
      Leave empty (default) to use the installer's default:
      `/usr/local/texlive/YYYY` (root) or `~/texlive/YYYY` (non-root),
      where `YYYY` is the current TeX Live year.
      When set, the path is used verbatim â€”
      the installer does NOT append the year automatically (unlike `TEXLIVE_INSTALL_PREFIX`),
      so include the year explicitly if you want year-based organization (e.g. `/opt/texlive/2026`).
      Only applies to `method=install-tl`.
      Ignored when `profile` is provided (profile key `TEXDIR`).
    proposals:
      - value: ''
        description: Installer default â€” `/usr/local/texlive/YYYY` as root.
      - value: /opt/texlive/2026
        description: Custom system-wide path with explicit year.

  texmflocal:
    type: string
    default: ''
    description: |-
      System-wide tree for local additions (packages, fonts,
      styles) shared across all users and across TeX Live years. Leave empty (default) to use
      the installer default (`/usr/local/texlive/texmf-local`), which sits one level above
      `TEXDIR` and is not wiped when upgrading to a new TeX Live year.
      Only applies to `method=install-tl`.
      Ignored when `profile` is provided (profile key `TEXMFLOCAL`).
    proposals:
      - value: ''
        description: Installer default (`/usr/local/texlive/texmf-local`).
      - value: /opt/texmf-local
        description: Custom system-wide local tree outside the TeX Live prefix.

  texmfsysconfig:
    type: string
    default: ''
    description: |-
      Profile key `TEXMFSYSCONFIG` â€” the system-wide directory for configuration files
      (e.g. `updmap.cfg`, `fmtutil.cnf`) that apply to all users.
      Leave empty (default) to use the installer default (`TEXDIR/texmf-config`).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`TEXDIR/texmf-config`).

  texmfsysvar:
    type: string
    default: ''
    description: |-
      Profile key `TEXMFSYSVAR` â€” the system-wide directory where the installer writes generated
      files (format dumps, font maps, updmap output) that apply to all users.
      Leave empty (default) to use the installer default (`TEXDIR/texmf-var`).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`TEXDIR/texmf-var`).

  texmfhome:
    type: string
    default: ''
    description: |-
      Profile key `TEXMFHOME` â€” the per-user directory for personal macro files, fonts, and
      styles. Leave empty (default) to use the installer default (`~/texmf`). Useful when the
      container user's home is non-standard or a project-relative path is preferred.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`~/texmf`).
      - value: /workspaces/${localWorkspaceFolderBasename}/.texmf
        description: Project-scoped TEXMFHOME inside the mounted workspace.

  texmfconfig:
    type: string
    default: ''
    description: |-
      Profile key `TEXMFCONFIG` â€” the per-user directory for TeX Live configuration files
      (e.g. personal `updmap.cfg`).
      Leave empty (default) to use the installer default (`~/.texlive<year>/texmf-config`).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`~/.texlive<year>/texmf-config`).

  texmfvar:
    type: string
    default: ''
    description: |-
      Profile key `TEXMFVAR` â€” the per-user directory where TeX Live caches generated files
      (format dumps, font maps) for the current user.
      Leave empty (default) to use the installer default (`~/.texlive<year>/texmf-var`).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`~/.texlive<year>/texmf-var`).

  # -- instopt_* keys --

  instopt_adjustpath:
    type: boolean
    default: true
    description: |-
      Profile key `instopt_adjustpath` â€” whether the installer creates symlinks for all TeX Live
      binaries (and man/info pages) in `tlpdbopt_sys_bin` during installation. When true
      (default, `instopt_adjustpath 1`), TeX Live binaries are reachable from a stable directory
      without year- or architecture-specific path components in `containerEnv` or shell startup
      files. Set to false (`instopt_adjustpath 0`) when PATH is managed externally or via
      `export_path`. Note: `instopt_portable=true` forces this off regardless.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.

  instopt_adjustrepo:
    type: boolean
    default: true
    description: |-
      Profile key `instopt_adjustrepo` â€” whether `tlmgr` adjusts the configured repository URL
      to match the installed TeX Live year after installation. When true (default,
      `instopt_adjustrepo 1`), prevents version mismatches when the same profile is reused across
      years. Set to false only when pinning to a historic snapshot repository that must not be
      auto-adjusted.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.

  instopt_letter:
    type: string
    default: a4
    description: |-
      Profile key `instopt_letter` â€” the default paper size (`0` = A4, `1` = Letter). For
      `method=install-tl`, written into the profile. For other methods where `tlmgr` is
      available, applied via `tlmgr option paper <value>` after installation.
      Ignored when `profile` is provided (set `instopt_letter` in the profile directly).
    enum:
      - value: a4
        description: A4 paper (210 Ă— 297 mm) â€” international default (`instopt_letter 0`).
      - value: letter
        description: US Letter paper (8.5 Ă— 11 in) â€” North American default (`instopt_letter 1`).

  instopt_portable:
    type: boolean
    default: false
    description: |-
      Profile key `instopt_portable` â€” whether to produce a self-contained portable installation.
      When true (`instopt_portable 1`), the installer skips all system integration: no PATH
      symlinks (`instopt_adjustpath` is forced off), no file associations, no desktop integration,
      no multi-user Windows configuration. Use for installations that must be fully relocatable
      (e.g. embedded in a project directory). In standard container builds, leave false (default).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.

  instopt_write18_restricted:
    type: boolean
    default: true
    description: |-
      Profile key `instopt_write18_restricted` â€” whether the `\write18` shell-escape primitive is
      restricted to an approved list of commands. When true (default, `instopt_write18_restricted 1`),
      only whitelisted commands (e.g. `bibtex`, `biber`, `makeindex`) can be invoked; arbitrary
      shell commands are blocked. Set to false only for TeX documents that explicitly require
      unrestricted shell-escape (rare; consider the security implications carefully).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.

  # -- tlpdbopt_* keys --

  tlpdbopt_install_docfiles:
    type: boolean
    default: false
    description: |-
      Profile key `tlpdbopt_install_docfiles` â€” whether to install package documentation files.
      Documentation files add several hundred MB. Disable (the default, `tlpdbopt_install_docfiles 0`)
      for CI and headless container images; enable for developer workstation images that use local
      TeX docs. Only applies to `method=install-tl`. Ignored when `profile` is provided.

  tlpdbopt_install_srcfiles:
    type: boolean
    default: false
    description: |-
      Profile key `tlpdbopt_install_srcfiles` â€” whether to install package source files. Source
      files are rarely needed in container environments. Enable only for TeX package development
      or when debugging macro package internals.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.

  tlpdbopt_sys_bin:
    type: string
    default: auto
    description: |-
      Profile key `tlpdbopt_sys_bin` â€” the directory where the installer creates symlinks for
      all TeX Live binaries during installation. Only meaningful when `instopt_adjustpath=true`.
      `auto` resolves to `/usr/local/bin` as root or `~/.local/bin` as non-root at install time.
      An explicit absolute path is used verbatim; the directory is created if it does not exist.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: auto
        description: '`/usr/local/bin` as root, `~/.local/bin` as non-root.'
      - value: /usr/local/bin
        description: System-wide bin directory (root only).

  tlpdbopt_sys_man:
    type: string
    default: ''
    description: |-
      Profile key `tlpdbopt_sys_man` â€” the directory where the installer creates symlinks for
      TeX Live man pages during installation. Only meaningful when `instopt_adjustpath=true`.
      Leave empty (default) to use the installer default, which is derived from `tlpdbopt_sys_bin`
      (e.g. `/usr/local/share/man` when `tlpdbopt_sys_bin=/usr/local/bin`).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (derived from `tlpdbopt_sys_bin`).
      - value: /usr/local/share/man
        description: Conventional system-wide man directory.

  tlpdbopt_sys_info:
    type: string
    default: ''
    description: |-
      Profile key `tlpdbopt_sys_info` â€” the directory where the installer creates symlinks for
      TeX Live GNU info pages during installation. Only meaningful when `instopt_adjustpath=true`.
      Leave empty (default) to use the installer default, which is derived from `tlpdbopt_sys_bin`
      (e.g. `/usr/local/share/info` when `tlpdbopt_sys_bin=/usr/local/bin`).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (derived from `tlpdbopt_sys_bin`).
      - value: /usr/local/share/info
        description: Conventional system-wide info directory.

  tlpdbopt_create_formats:
    type: boolean
    default: true
    description: |-
      Profile key `tlpdbopt_create_formats` â€” whether to generate TeX format files (`.fmt`)
      during installation. When true (default, `tlpdbopt_create_formats 1`), format generation
      makes the first `pdflatex`/`latex` invocation significantly faster. Set to false only when
      building a base image layer where format generation will be deferred to a later layer or
      container startup. Only applies to `method=install-tl`. Ignored when `profile` is provided.

  tlpdbopt_post_code:
    type: boolean
    default: true
    description: |-
      Profile key `tlpdbopt_post_code` â€” whether to run post-installation Perl code for each
      package (e.g. generating font maps, updmap, and other post-install hooks). When true
      (default, `tlpdbopt_post_code 1`), all post-install hooks fire during installation.
      Disabling speeds up installation at the cost of requiring a manual
      `tlmgr postaction install --all` run afterwards.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.

  tlpdbopt_generate_updmap:
    type: boolean
    default: false
    description: |-
      Profile key `tlpdbopt_generate_updmap` â€” whether to regenerate `updmap.cfg` from scratch
      during installation rather than relying on per-package post-install hooks. Leave false
      (default, `tlpdbopt_generate_updmap 0`) in almost all cases; the standard post-install code
      controlled by `tlpdbopt_post_code` handles font map generation correctly. Enable only if
      directed by TeX Live documentation for a specific installation scenario.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.

  tlpdbopt_autobackup:
    type: string
    default: '1'
    description: |-
      Profile key `tlpdbopt_autobackup` â€” the number of `tlmgr` package backup copies to retain
      so that `tlmgr restore` can roll back an update. `0` â€” no backups; `1` (default) â€” keep
      one backup per package; `-1` â€” unlimited backups. Set to `0` in CI images where
      `tlmgr update` is never run to avoid accumulating backup files.
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: '0'
        description: No backups (smallest footprint; cannot roll back).
      - value: '1'
        description: One backup per package (default).
      - value: '3'
        description: Keep the last three backups per package.
      - value: '-1'
        description: Unlimited backups.

  tlpdbopt_backupdir:
    type: string
    default: ''
    description: |-
      Profile key `tlpdbopt_backupdir` â€” the directory where `tlmgr` stores package backups
      when `tlmgr update` or `tlmgr install` replaces an existing package. Leave empty (default)
      to use the installer default (`TEXDIR/tlpkg/backups`).
      Only applies to `method=install-tl`. Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`TEXDIR/tlpkg/backups`).
      - value: /var/cache/texlive/backups
        description: Custom backup directory outside the TeX Live tree.

_user_file_fetch: true

containerEnv:
  # /Library/TeX/texbin is the stable macOS path managed by MacTeX and BasicTeX.
  # Adding it here is a no-op on Linux (non-existent PATH entries are silently ignored).
  # For method=install-tl with instopt_adjustpath=true, latex is accessible via
  # tlpdbopt_sys_bin (default: /usr/local/bin), which is already on PATH.
  PATH: /Library/TeX/texbin:${PATH}

customizations:
  vscode:
    extensions:
      - james-yu.latex-workshop
    settings:
      github.copilot.chat.codeGeneration.instructions:
        - text: >-
            This dev container has TeX Live installed with `latex`, `pdflatex`, `xelatex`,
            `lualatex`, and `tlmgr` available on the PATH. For building LaTeX documents,
            prefer `latexmk` (pre-installed) which handles multi-pass compilation and
            bibliography processing automatically.

installsAfter: []

_dependencies:
  run:
    base:
      packages:
        - ca-certificates
        - fontconfig
        # macOS ships with system Perl (/usr/bin/perl); skip brew install.
        # tlmgr is a Perl script so Perl is required at runtime on Linux.
        - name: perl
          when: {kernel: linux}
  build:
    installer:
      # xz is used by the TeX Live installer to decompress .xz package archives
      # from the CTAN repository during installation.
      # Users who need to run 'tlmgr install' or 'tlmgr update' after image build
      # should set keep_build_deps=true so xz remains available.
      apt:
        packages:
          - xz-utils
      apk:
        packages:
          - xz
      dnf:
        packages:
          - xz
      brew:
        packages:
          - xz
