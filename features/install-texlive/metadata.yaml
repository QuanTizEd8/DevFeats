  profile:
    type: string
    default: ''
    description: |
      Inline `texlive.profile` content or path/URI to a profile file for `method=script`.
      When non-empty, the profile is used directly as the installer profile and all individual
      profile-key options (`prefix`, `scheme`, `collections`, `texmflocal`, `texmfsysvar`,
      `texmfsysconfig`, `texmfhome`, `texmfvar`, `texmfconfig`, `instopt_adjustpath`,
      `instopt_adjustrepo`, `instopt_letter`, `instopt_portable`, `instopt_write18_restricted`,
      `tlpdbopt_install_docfiles`, `tlpdbopt_install_srcfiles`, `tlpdbopt_sys_bin`,
      `tlpdbopt_sys_man`, `tlpdbopt_sys_info`, `tlpdbopt_create_formats`, `tlpdbopt_post_code`,
      `tlpdbopt_generate_updmap`, `tlpdbopt_autobackup`, `tlpdbopt_backupdir`) are ignored — the
      profile controls these settings completely. Non-profile options (`repository`,
      `verify_downloads`, `packages`, `generate_caches`, `tlmgr_update`, `tlmgr_verify_repo`,
      `version`, `if_exists`, `installer_dir`) remain active.

      A profile is a plain-text file with `key value` pairs, one per line. Unknown keys cause the
      installer to abort. If any `collection-*` key is present, the installer installs only the
      explicitly listed collections (the scheme's default collection list is NOT expanded).
      The flags `--repository` and `--no-verify-downloads` are CLI flags, not profile keys; use
      the corresponding feature options (`repository`, `verify_downloads`) instead.

      Inline content is detected when the value contains a newline; otherwise the value is treated
      as a file path, `file://` / `http(s)://` / `oci://` / `gh://owner/repo@ref:path` URI.
      Append `#sha256=<hex>` for integrity verification. Use `fetch_headers` and `fetch_netrc`
      for authentication.
    proposals:
      - value: /workspaces/${localWorkspaceFolderBasename}/.devcontainer/texlive.profile
        description: Profile file in the mounted workspace.
      - value: https://raw.githubusercontent.com/owner/repo/main/texlive.profile
        description: Public GitHub raw URL.
      - value: gh://owner/repo@main:.devcontainer/texlive.profile
        description: Profile from a GitHub repository (`gh://` form).
      - value: |
          selected_scheme scheme-small
          tlpdbopt_install_docfiles 0
          tlpdbopt_install_srcfiles 0
          instopt_adjustpath 1
          tlpdbopt_sys_bin /usr/local/bin
        description: Inline profile (newline in value).

  repository:
    type: string
    _applies_when:
      - method: [script]
    default: ctan
    description: |-
      TeX Live package repository to use as the source of installation.
      Set an explicit URL to:
      - Avoid mirror-selection variability (use a specific, trusted mirror).
      - Install from a historic yearly snapshot (pin to an older TeX Live release).
      - Use a local directory or internal network cache for air-gapped environments.
    proposals:
      - value: ctan
        description: Alias for the installer default (auto-selected CTAN mirror).
      - value: https://mirror.ctan.org/systems/texlive/tlnet
        description: |
          Installer default — auto-selected [CTAN](https://ctan.org) mirror
          using https://mirror.ctan.org/systems/texlive/tlnet.
      - value: https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/2025/tlnet-final
        description: Explicit CTAN mirror URL. The list of CTAN mirrors is available at https://ctan.org/mirrors/.
      - value: ftp://server/path/to/tlnet
        description: Explicit mirror with `ftp://` protocol.
      - value: scp://user@machine/path/to/tlnet
        description: Remote mirror accessible via `scp` (SSH).
      - value: ssh://user@machine/path/to/tlnet
        description: Equivalent way to specify a remote mirror with `scp`.
      - value: user@machine:/path/to/tlnet
        description: Equivalent way to specify a remote mirror with `scp`.
      - value: /path/to/local/tlnet
        description: Local directory containing the TeX Live repository tree.
      - value: file:/path/to/local/tlnet
        description: Equivalent way to specify a local directory.


  verify_downloads:
    type: boolean
    _applies_when:
      - method: [script]
    default: true
    description: |-
      Verify the integrity of downloaded TeX Live packages using GPG signatures. When true
      (default), the installer's built-in signature verification is active — it auto-detects
      `gpg` in PATH and skips verification gracefully if not found. Set to false to pass
      `--no-verify-downloads` to the installer, disabling signature checks unconditionally.
      Useful in air-gapped environments where the TeX Live GPG infrastructure is unreachable.

  tlmgr_update:
    type: boolean
    _applies_when:
      - method: [script]
    default: false
    description: |-
      Run `tlmgr update --self --all` after the initial installation to pull in the latest
      package updates from the configured repository. Disabled by default to keep the
      installation reproducible and deterministic. Enable in development images where the latest
      CTAN state is always desired.

  generate_caches:
    type: boolean
    _applies_when:
      - method: [script]
    default: false
    description: |-
      Generate ConTeXt file-database / LuaTeX cache and font caches after installation.
      Disabled by default because cache generation adds significant build time and is only
      needed when ConTeXt documents will be compiled inside the container. When enabled,
      runs `mtxrun --generate`, `context --make`, and `fc-cache -fsv`. Only meaningful
      when ConTeXt is included in the installation (e.g. `scheme=full`, `scheme=context`,
      or `context` listed in `collections`).

  tlmgr_verify_repo:
    type: string
    _applies_when:
      - method: [script]
    default: main
    description: |-
      Set the `tlmgr` repository-signature verification level via `tlmgr option verify-repo
      <value>` after installation. Controls which repositories must present a valid GPG signature
      before `tlmgr` will install packages from them.
    enum:
      - value: none
        description: No signature verification for any repository.
      - value: main
        description: Verify signatures from the main TeX Live repository only; third-party repositories are not required to be signed.
      - value: all
        description: Require valid signatures from all repositories including third-party ones.

  # ── script profile options ───────────────────────────────────────────────
  # The following options map directly to keys in the texlive.profile file that
  # drives the install-tl (TeX Live Unix installer) script. They are all ignored when `profile` is set.

  # -- directory keys --

  texmflocal:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      System-wide tree for local additions (packages, fonts, styles) shared across all users.
      Leave empty (default) to use `<prefix>/texmf-local` (e.g. `/usr/local/texlive/texmf-local`),
      kept inside the TeX Live prefix and not removed when the TeX Live tree is rebuilt.
      Ignored when `profile` is provided (profile key `TEXMFLOCAL`).
    proposals:
      - value: ''
        description: Installer default (`/usr/local/texlive/texmf-local`).
      - value: /opt/texmf-local
        description: Custom system-wide local tree outside the TeX Live prefix.

  texmfsysconfig:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `TEXMFSYSCONFIG` — the system-wide directory for configuration files
      (e.g. `updmap.cfg`, `fmtutil.cnf`) that apply to all users.
      Leave empty (default) to use `<prefix>/texmf-config` (inside the TeX Live prefix).
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Default (`<prefix>/texmf-config`).

  texmfsysvar:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `TEXMFSYSVAR` — the system-wide directory where the installer writes generated
      files (format dumps, font maps, updmap output) that apply to all users.
      Leave empty (default) to use `<prefix>/texmf-var` (inside the TeX Live prefix).
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Default (`<prefix>/texmf-var`).

  texmfhome:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `TEXMFHOME` — the per-user directory for personal macro files, fonts, and
      styles. Leave empty (default) to use the installer default (`~/texmf`). Useful when the
      container user's home is non-standard or a project-relative path is preferred.
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`~/texmf`).
      - value: /workspaces/${localWorkspaceFolderBasename}/.texmf
        description: Project-scoped TEXMFHOME inside the mounted workspace.

  texmfconfig:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `TEXMFCONFIG` — the per-user directory for TeX Live configuration files
      (e.g. personal `updmap.cfg`).
      Leave empty (default) to use the installer default (`~/.texlive<year>/texmf-config`).
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`~/.texlive<year>/texmf-config`).

  texmfvar:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `TEXMFVAR` — the per-user directory where TeX Live caches generated files
      (format dumps, font maps) for the current user.
      Leave empty (default) to use the installer default (`~/.texlive<year>/texmf-var`).
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`~/.texlive<year>/texmf-var`).

  # -- instopt_* keys --

  instopt_adjustpath:
    type: boolean
    _applies_when:
      - method: [script]
    default: true
    description: |-
      Profile key `instopt_adjustpath` — whether the installer creates symlinks for all TeX Live
      binaries (and man/info pages) in `tlpdbopt_sys_bin` during installation. When true
      (default, `instopt_adjustpath 1`), TeX Live binaries are reachable from a stable directory
      without year- or architecture-specific path components in `containerEnv` or shell startup
      files. Set to false (`instopt_adjustpath 0`) when PATH is managed externally. Note: `instopt_portable=true` forces this off regardless.
      Ignored when `profile` is provided.

  instopt_adjustrepo:
    type: boolean
    _applies_when:
      - method: [script]
    default: true
    description: |-
      Profile key `instopt_adjustrepo` — whether `tlmgr` adjusts the configured repository URL
      to match the installed TeX Live year after installation. When true (default,
      `instopt_adjustrepo 1`), prevents version mismatches when the same profile is reused across
      years. Set to false only when pinning to a historic snapshot repository that must not be
      auto-adjusted.
      Ignored when `profile` is provided.

  instopt_letter:
    type: string
    default: a4
    description: |-
      Profile key `instopt_letter` — the default paper size (`0` = A4, `1` = Letter). For
      `method=script`, written into the profile. For other methods where `tlmgr` is
      available, applied via `tlmgr option paper <value>` after installation.
      Ignored when `profile` is provided (set `instopt_letter` in the profile directly).
    enum:
      - value: a4
        description: A4 paper (210 × 297 mm) — international default (`instopt_letter 0`).
      - value: letter
        description: US Letter paper (8.5 × 11 in) — North American default (`instopt_letter 1`).

  instopt_portable:
    type: boolean
    _applies_when:
      - method: [script]
    default: false
    description: |-
      Profile key `instopt_portable` — whether to produce a self-contained portable installation.
      When true (`instopt_portable 1`), the installer skips all system integration: no PATH
      symlinks (`instopt_adjustpath` is forced off), no file associations, no desktop integration,
      no multi-user Windows configuration. Use for installations that must be fully relocatable
      (e.g. embedded in a project directory). In standard container builds, leave false (default).
      Ignored when `profile` is provided.

  instopt_write18_restricted:
    type: boolean
    _applies_when:
      - method: [script]
    default: true
    description: |-
      Profile key `instopt_write18_restricted` — whether the `\write18` shell-escape primitive is
      restricted to an approved list of commands. When true (default, `instopt_write18_restricted 1`),
      only whitelisted commands (e.g. `bibtex`, `biber`, `makeindex`) can be invoked; arbitrary
      shell commands are blocked. Set to false only for TeX documents that explicitly require
      unrestricted shell-escape (rare; consider the security implications carefully).
      Ignored when `profile` is provided.

  # -- tlpdbopt_* keys --

  tlpdbopt_install_docfiles:
    type: boolean
    _applies_when:
      - method: [script]
    default: false
    description: |-
      Profile key `tlpdbopt_install_docfiles` — whether to install package documentation files.
      Documentation files add several hundred MB. Disable (the default, `tlpdbopt_install_docfiles 0`)
      for CI and headless container images; enable for developer workstation images that use local
      TeX docs. Ignored when `profile` is provided.

  tlpdbopt_install_srcfiles:
    type: boolean
    _applies_when:
      - method: [script]
    default: false
    description: |-
      Profile key `tlpdbopt_install_srcfiles` — whether to install package source files. Source
      files are rarely needed in container environments. Enable only for TeX package development
      or when debugging macro package internals.
      Ignored when `profile` is provided.

  tlpdbopt_sys_bin:
    type: string
    _applies_when:
      - method: [script]
    default: auto
    description: |-
      Profile key `tlpdbopt_sys_bin` — the directory where the installer creates symlinks for
      all TeX Live binaries during installation. Only meaningful when `instopt_adjustpath=true`.
      `auto` resolves to `/usr/local/bin` as root or `~/.local/bin` as non-root at install time.
      An explicit absolute path is used verbatim; the directory is created if it does not exist.
      Ignored when `profile` is provided.
    proposals:
      - value: auto
        description: '`/usr/local/bin` as root, `~/.local/bin` as non-root.'
      - value: /usr/local/bin
        description: System-wide bin directory (root only).

  tlpdbopt_sys_man:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `tlpdbopt_sys_man` — the directory where the installer creates symlinks for
      TeX Live man pages during installation. Only meaningful when `instopt_adjustpath=true`.
      Leave empty (default) to use the installer default, which is derived from `tlpdbopt_sys_bin`
      (e.g. `/usr/local/share/man` when `tlpdbopt_sys_bin=/usr/local/bin`).
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (derived from `tlpdbopt_sys_bin`).
      - value: /usr/local/share/man
        description: Conventional system-wide man directory.

  tlpdbopt_sys_info:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `tlpdbopt_sys_info` — the directory where the installer creates symlinks for
      TeX Live GNU info pages during installation. Only meaningful when `instopt_adjustpath=true`.
      Leave empty (default) to use the installer default, which is derived from `tlpdbopt_sys_bin`
      (e.g. `/usr/local/share/info` when `tlpdbopt_sys_bin=/usr/local/bin`).
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (derived from `tlpdbopt_sys_bin`).
      - value: /usr/local/share/info
        description: Conventional system-wide info directory.

  tlpdbopt_create_formats:
    type: boolean
    _applies_when:
      - method: [script]
    default: true
    description: |-
      Profile key `tlpdbopt_create_formats` — whether to generate TeX format files (`.fmt`)
      during installation. When true (default, `tlpdbopt_create_formats 1`), format generation
      makes the first `pdflatex`/`latex` invocation significantly faster. Set to false only when
      building a base image layer where format generation will be deferred to a later layer or
      container startup. Ignored when `profile` is provided.

  tlpdbopt_post_code:
    type: boolean
    _applies_when:
      - method: [script]
    default: true
    description: |-
      Profile key `tlpdbopt_post_code` — whether to run post-installation Perl code for each
      package (e.g. generating font maps, updmap, and other post-install hooks). When true
      (default, `tlpdbopt_post_code 1`), all post-install hooks fire during installation.
      Disabling speeds up installation at the cost of requiring a manual
      `tlmgr postaction install --all` run afterwards.
      Ignored when `profile` is provided.

  tlpdbopt_generate_updmap:
    type: boolean
    _applies_when:
      - method: [script]
    default: false
    description: |-
      Profile key `tlpdbopt_generate_updmap` — whether to regenerate `updmap.cfg` from scratch
      during installation rather than relying on per-package post-install hooks. Leave false
      (default, `tlpdbopt_generate_updmap 0`) in almost all cases; the standard post-install code
      controlled by `tlpdbopt_post_code` handles font map generation correctly. Enable only if
      directed by TeX Live documentation for a specific installation scenario.
      Ignored when `profile` is provided.

  tlpdbopt_autobackup:
    type: string
    _applies_when:
      - method: [script]
    default: '0'
    description: |-
      Profile key `tlpdbopt_autobackup` — the number of `tlmgr` package backup copies to retain
      so that `tlmgr restore` can roll back an update. `0` (default) — no backups; `1` — keep
      one backup per package; `-1` — unlimited backups. Defaults to `0` because container images
      rarely run `tlmgr update`, so backup files only waste space.
      Ignored when `profile` is provided.
    proposals:
      - value: '0'
        description: No backups (default; smallest footprint; cannot roll back).
      - value: '1'
        description: One backup per package.
      - value: '3'
        description: Keep the last three backups per package.
      - value: '-1'
        description: Unlimited backups.

  tlpdbopt_backupdir:
    type: string
    _applies_when:
      - method: [script]
    default: ''
    description: |-
      Profile key `tlpdbopt_backupdir` — the directory where `tlmgr` stores package backups
      when `tlmgr update` or `tlmgr install` replaces an existing package. Leave empty (default)
      to use the installer default (`TEXDIR/tlpkg/backups`).
      Ignored when `profile` is provided.
    proposals:
      - value: ''
        description: Installer default (`TEXDIR/tlpkg/backups`).
      - value: /var/cache/texlive/backups
        description: Custom backup directory outside the TeX Live tree.
customizations:
  vscode:
    extensions:
      - james-yu.latex-workshop
    settings:
      github.copilot.chat.codeGeneration.instructions:
        - text: >-
            This dev container has TeX Live installed with `latex`, `pdflatex`, `xelatex`,
            `lualatex`, and `tlmgr` available on the PATH. For building LaTeX documents,
            prefer `latexmk` (pre-installed) which handles multi-pass compilation and
            bibliography processing automatically.

# installsAfter: []

_dependencies:
  run:
    base:
      packages:
        - ca-certificates
        - fontconfig

        # Perl: tlmgr and many TL tools are Perl scripts.
        # macOS ships with system Perl; skip brew install.
        - name: perl
          when: {kernel: linux}

        # GnuPG: required at runtime for 'tlmgr key add/remove/list'.
        # gnupg (apt/apk/brew) pulls in gpg, gpg-agent, and dirmngr; dnf uses gnupg2.
        - name: gnupg
          dnf: gnupg2

        # PostScript/PDF interpreter: epstopdf, ps2pdf, pdfcrop, dvips → pdf, etc.
        - ghostscript

        # ncurses: texconfig TUI and xindy require the shared library.
        - name: libncurses6
          apk: ncurses-libs
          dnf: ncurses-libs
          brew: ncurses

        # Python Pygments: required by the minted LaTeX package for syntax highlighting.
        # python3 is a transitive dependency pulled in automatically.
        - name: python3-pygments
          apk: py3-pygments
          brew: pygments

        # Gnuplot (headless): pgfplots gnuplot terminal backend.
        # apt: gnuplot-nox excludes Qt/X11 deps; dnf: gnuplot-minimal is the headless build.
        - name: gnuplot
          apt: gnuplot-nox
          dnf: gnuplot-minimal

        # GNU FreeFont: broad Unicode coverage for documents using non-Latin characters.
        # dnf ships these as split packages (gnu-free-{mono,sans,serif}-fonts) and TL
        # itself includes texlive-gnu-freefont, so we only need to declare it for apt/apk.
        - name: fonts-freefont-otf
          when: {pm: [apt, apk]}
          apk: font-freefont

        # zip + tidy: required by tex4ebook (HTML/epub output from LaTeX).
        - zip
        - name: tidy
          apk: tidyhtml
          brew: tidy-html5

        # ── latexindent Perl module dependencies ──────────────────────────────────
        # ref: https://latexindent.pl/documentation/
        # These modules are not part of the core Perl distribution on Linux.
        # On macOS they are provided by the system Perl or cpan; no brew formulae exist.
        - name: perl-unicode-linebreak
          when: {kernel: linux}
          apt: libunicode-linebreak-perl
          apk: perl-unicode-linebreak
          dnf: perl-Unicode-LineBreak
        - name: perl-file-homedir
          when: {kernel: linux}
          apt: libfile-homedir-perl
          apk: perl-file-homedir
          dnf: perl-File-HomeDir
        - name: perl-yaml-tiny
          when: {kernel: linux}
          apt: libyaml-tiny-perl
          apk: perl-yaml-tiny
          dnf: perl-YAML-Tiny
        # Not in Alpine stable (edge/testing only); skip apk.
        - name: perl-getopt-long-descriptive
          when: {pm: [apt, dnf]}
          apt: libgetopt-long-descriptive-perl
          dnf: perl-Getopt-Long-Descriptive
        # Digest::MD5 ships with perl itself on Fedora; explicit package needed on apt/apk.
        - name: perl-digest-md5
          when: [{pm: apt}, {pm: apk}]
          apt: libdigest-perl-md5-perl
          apk: perl-digest-md5
        # PDF::API2: required by the LaTeX memoize package.
        - name: perl-pdf-api2
          when: {kernel: linux}
          apt: libpdf-api2-perl
          apk: perl-pdf-api2
          dnf: perl-PDF-API2

        # ── Linux-only X11 / OpenGL / RPC runtime libraries ───────────────────────
        # libsm6: X Session Management; required by MetaFont.
        - name: libsm
          when: {kernel: linux}
          apt: libsm6
          apk: libsm
          dnf: libSM

        # freeglut / libtirpc / libcurl: required by asymptote.
        # apt names are version-dependent (time_t64 ABI transition in Debian trixie /
        # Ubuntu 24.04+) — handled in the apt: block below.
        # apk and dnf use stable names across versions.
        - name: freeglut
          when: {pm: [apk, dnf]}
        - name: libtirpc
          when: {pm: [apk, dnf]}
        - name: libcurl
          when: {pm: [apk, dnf]}

        # ── Alpine-only runtime libraries ────────────────────────────────────────
        # On musl/Alpine, shared libraries that TL binaries link against are not
        # pulled in transitively by higher-level packages (unlike on glibc systems
        # where e.g. ghostscript or luatex drag them in automatically). Declare
        # them explicitly. Sourced from production Alpine TL Docker images.
        - name: cairo
          when: {pm: apk}
        - name: icu-libs
          when: {pm: apk}
        - name: libgcc
          when: {pm: apk}
        - name: libpaper
          when: {pm: apk}
        - name: libpng
          when: {pm: apk}
        - name: libstdc++
          when: {pm: apk}
        - name: libx11
          when: {pm: apk}
        - name: pixman
          when: {pm: apk}
        - name: zlib
          when: {pm: apk}

      # apt-specific packages — handled here rather than in the cross-PM list above
      # because Debian bookworm+ / Ubuntu 22.04+ renamed several packages via the
      # time_t64 (64-bit time_t ABI) transition and OpenGL library reorganisation:
      #   libcurl4   → libcurl4t64    (jammy/bookworm → noble/trixie)
      #   freeglut3  → libglut3.12    (jammy/bullseye → bookworm/noble)
      #   libtirpc3  → libtirpc3t64   (jammy/bookworm → noble/trixie)
      apt:
        packages:
          # libcurl
          - name: libcurl4t64
            when: {version_codename: [noble, trixie, oracular, plucky, questing]}
          - name: libcurl4
            when: {version_codename: [bookworm, jammy, focal, bullseye]}
          # freeglut: renamed to libglut3.12 starting with bookworm/noble
          - name: libglut3.12
            when: {version_codename: [bookworm, noble, trixie, oracular, plucky, questing]}
          - name: freeglut3
            when: {version_codename: [jammy, focal, bullseye]}
          # libtirpc
          - name: libtirpc3t64
            when: {version_codename: [noble, trixie, oracular, plucky, questing]}
          - name: libtirpc3
            when: {version_codename: [bookworm, jammy, focal, bullseye]}
          # python-is-python3: creates /usr/bin/python → python3 symlink so that tools
          # invoking 'python' (older minted, some helper scripts) work out of the box.
          - python-is-python3
        # Asymptote links against libglut.so.3 but Debian/Ubuntu ships libglut.so.3.12.
        # Create the missing symlink so asymptote can load the library.
        scripts: |
          _libdir="$(find /usr/lib -type d -name '*-linux-*' 2>/dev/null | head -1)"
          if [[ -n "${_libdir}" && -f "${_libdir}/libglut.so.3.12" && ! -e "${_libdir}/libglut.so.3" ]]; then
            ln -sf "${_libdir}/libglut.so.3.12" "${_libdir}/libglut.so.3"
          fi

    option-jre:
      # Installed on-demand by _tl_maybe_install_jre when Java tool scripts (arara,
      # bib2gls, texplate, albatross, latex2nemeth, …) are found in the TL tree.
      packages:
        - name: default-jre-headless
          apk: openjdk21-jre-headless
          dnf: java-21-openjdk-headless
          yum: java-21-openjdk-headless
          zypper: java-21-openjdk-headless
          pacman: jre-openjdk-headless
          brew: openjdk

  build:
    method-script:
      # xz is required by the TeX Live installer to decompress .xz package archives
      # downloaded from CTAN during installation.
      # Users who need to run 'tlmgr install' or 'tlmgr update' after image build
      # should set keep_build_deps=true so xz remains available at runtime.
      # GPG is NOT listed here: the installer auto-detects gpg in PATH and skips
      # signature verification gracefully when not found; the verify_downloads option
      # passes --no-verify-downloads to disable it unconditionally.
      packages:
        - name: xz
          apt: xz-utils
