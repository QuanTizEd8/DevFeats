version: 0.1.0
name: Codex CLI Installation
description: Install [Codex](https://github.com/openai/codex) – OpenAI's AI coding agent for the terminal.
keywords:
  - codex
  - openai
  - ai
  - llm
  - coding-agent
_long_description: |-
  Installs the Codex CLI (`codex`), OpenAI's AI coding agent for the terminal.
  Supports npm global install (requires Node.js), npm-bundled (self-contained, no
  system Node.js required), a minimal direct binary download from GitHub releases,
  and Homebrew cask on macOS.

  In devcontainer environments, optionally symlinks a workspace `.codex` directory
  to `~/.codex` at container creation time so that Codex configuration and auth state
  are persisted with the project rather than lost on container rebuild.

  Optional configuration keys (`model`, `approval_policy`, `sandbox_mode`) are written
  to `.codex/config.toml` the first time the lifecycle hook runs (skipped when the file
  already exists so user edits are not overwritten).

_tool_name: codex
_options:
  verify:
    args: "--version"
    description: Verify the Codex CLI is installed and working.
  installer_dir: false
  gh_repo: openai/codex
  version:
    resolution: github_release
    default: stable
    inputs: [stable, latest, semver]
    proposals:
      - value: 0.130.0
        description: Codex CLI v0.130.0.
  method:
    binary:
      asset_uri: "https://github.com/openai/codex/releases/download/{TAG}/codex-{RUST_TRIPLE}.tar.gz"
      when: {arch: [amd64, arm64]}
    npm-bundled:
      package: "@openai/codex"
      cmd: codex
    npm:
      package: "@openai/codex"
    package:
      when: {pm: brew}
  prefix:
    bins: [codex]
    applies_when:
      - method: [binary, npm-bundled, npm]

options:
  config_dir:
    type: string
    default: .codex
    description: |-
      Path within `${containerWorkspaceFolder}` to the `.codex` configuration directory.
      At container creation (via `onCreateCommand`), `~/.codex` is symlinked to this
      workspace path so that Codex configuration and state are persisted with the project.
      Set to an empty string to skip symlink creation.

  model:
    type: string
    default: ''
    description: |-
      Default model written to `.codex/config.toml` when the file does not yet exist.
      Leave empty to use the Codex CLI built-in default.
    proposals:
      - value: ''
        description: Use Codex CLI built-in default.
      - value: o4-mini
        description: OpenAI o4-mini.
      - value: o3
        description: OpenAI o3.
      - value: codex-mini-latest
        description: Latest Codex mini model.

  approval_policy:
    type: string
    default: ''
    description: |-
      Default `approval_policy` written to `.codex/config.toml` when the file does not yet exist.
      Leave empty to use the Codex CLI default.
    enum:
      - value: ''
        description: Use Codex CLI default.
      - value: suggest
        description: Ask for approval before each action (safest).
      - value: auto-edit
        description: Auto-approve file edits; prompt for shell commands.
      - value: full-auto
        description: Auto-approve all actions (least restrictive).

  sandbox_mode:
    type: string
    default: ''
    description: |-
      Default `sandbox_mode` written to `.codex/config.toml` when the file does not yet exist.
      Leave empty to use the Codex CLI default.
    enum:
      - value: ''
        description: Use Codex CLI default.
      - value: workspace-write
        description: Writes restricted to workspace files.
      - value: danger-full-access
        description: Disable sandbox — use only in isolated container environments.

onCreateCommand:
  symlink-codex-dir:
    description: Symlink the specified workspace `.codex` directory to `~/.codex`.
    args: "${containerWorkspaceFolder}"
    _conf_vars: [CONFIG_DIR, MODEL, APPROVAL_POLICY, SANDBOX_MODE]

customizations:
  vscode:
    extensions:
      - openai.chatgpt

_dependencies:
  run:
    base:
      packages:
        - ca-certificates
        - ripgrep
        - name: bubblewrap
          when:
            kernel: linux
    method-package:
      brew:
        casks:
          - codex
