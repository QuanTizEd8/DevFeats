python3-pip:
  summary: Python package installer for Python 3.
  description: |
    The standard package manager for Python 3, providing the `pip3`
    command-line tool for installing, upgrading, and removing Python packages
    from PyPI and other indexes. Linux-only — on macOS, pip is bundled with
    `brew install python@3`.
  url:
    docs: https://pip.pypa.io/en/stable/
    source: https://github.com/pypa/pip

python3-venv:
  summary: Module for creating isolated Python 3 virtual environments.
  description: |
    Provides the `venv` module for creating lightweight Python virtual
    environments. On Ubuntu Noble, this module is not bundled with `python3`
    and must be installed separately. Required for any workflow that uses
    `python -m venv`, including pip-based toolchains and many CI/CD pipelines.
    Apt-only — other distros and macOS bundle venv with python3.
  url:
    docs: https://docs.python.org/3/library/venv.html
    source: https://github.com/python/cpython
