packages:
  # ── File type identification ───────────────────────────────────────────────
  # Linux-only: macOS provides /usr/bin/file as part of the OS
  - name: file
    when: {kernel: linux}

  # ── Directory listing ─────────────────────────────────────────────────────
  - tree

  # ── Disk usage analysis ───────────────────────────────────────────────────
  - ncdu

  # ── Fast find replacement ─────────────────────────────────────────────────
  # apt installs binary as 'fdfind'; all other PMs install as 'fd'
  - name: fd-find
    brew: fd
    apk: fd
    dnf: fd-find
    zypper: fd
    pacman: fd

  # ── Modern cat with syntax highlighting ───────────────────────────────────
  # apt installs binary as 'batcat'; all other PMs install as 'bat'
  - bat

  # ── Fuzzy finder ──────────────────────────────────────────────────────────
  - fzf

  # ── Terminal file managers ────────────────────────────────────────────────
  - ranger
  - name: mc
    brew: midnight-commander

  # ── Modern ls replacement ─────────────────────────────────────────────────
  - eza

  # ── Hex viewer ────────────────────────────────────────────────────────────
  - hexyl
