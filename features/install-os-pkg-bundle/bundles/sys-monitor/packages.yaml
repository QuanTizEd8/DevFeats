packages:
  # ── Cross-platform ────────────────────────────────────────────────────────
  - htop
  - btop
  - lsof

  # ── Linux-only ────────────────────────────────────────────────────────────
  # procps: ps, top, free, vmstat, uptime, pgrep, pkill
  - name: procps
    when: {kernel: linux}
    dnf: procps-ng
    yum: procps-ng
    pacman: procps-ng

  # psmisc: killall, fuser, pstree, pmap
  - name: psmisc
    when: {kernel: linux}

  # strace: system call tracer
  - name: strace
    when: {kernel: linux}

  # inotify-tools: inotifywait / inotifywatch (filesystem events)
  - name: inotify-tools
    when: {kernel: linux}

  # xtail: tail multiple files simultaneously, survives log rotation
  - name: xtail
    when: {kernel: linux}

  # sysstat: sar, iostat, mpstat, pidstat — system activity reporting
  - name: sysstat
    when: {kernel: linux}

  # iotop: per-process I/O monitoring
  - name: iotop
    when: {kernel: linux}

  # nethogs: per-process network bandwidth monitoring
  - name: nethogs
    when: {kernel: linux}

  # duf: modern df — disk usage/free with clean table output
  - duf

  # glances: cross-platform curses system monitor with web UI and container support
  - glances
