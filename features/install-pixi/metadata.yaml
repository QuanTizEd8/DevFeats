version: 0.1.0
name: Pixi Installation
description: Install the [Pixi](https://pixi.sh/) package and project manager.
keywords:
- pixi
- conda
- package manager
- environment
- python
_long_description: >-
  [Pixi](https://pixi.sh/) is an open-source, cross-platform package and project manager
  for conda and PyPI packages, providing fast, reproducible environments for Python, C++,
  R, and any language distributed via conda channels. The installer is downloaded from
  the official Pixi release channel, with optional version pinning and checksum
  verification. Shell activation is configured for the specified users after installation.
_tool_name: Pixi

_options:
  verify:
    args: "info --extended"
    description: |-
      Verify pixi is installed and working by running
      [`pixi info --extended`](https://pixi.prefix.dev/latest/reference/cli/pixi/info/).
  completions:
    subcmd: "completion --shell"
    shells: [bash, zsh, fish, nushell, elvish]
  gh_repo: prefix-dev/pixi
  user_file_fetch: true
  version:
    resolution: github_release
    default: stable
    flag: --version
    proposals:
      - value: 0.67.0
        description: Pixi v0.67.0.
      - value: 0.66.0
        description: Pixi v0.66.0.
      - value: 0.65.0
        description: Pixi v0.65.0.
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/pixi-{RUST_TRIPLE}.tar.gz"
      sidecar_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/pixi-{RUST_TRIPLE}.tar.gz.sha256"
      binary_src: pixi

  prefix:
    bins: [pixi]
    activation:
      shells: [bash, zsh]
      description: |-
        The activation snippet writes `export PIXI_HOME=<path>` (using `home_dir`
        when set, otherwise `$HOME/.pixi`) to all-context files so the variable is
        available in both interactive and non-interactive shells.
options:
  global_manifest:
    type: string
    default: ''
    description: |-
      [Global manifest](https://pixi.prefix.dev/latest/global_tools/manifest/) file
      to place in `$PIXI_HOME/manifests/pixi-global.toml`.
      Can be either inline content or a file/URI reference.
      Inline content is detected when the value contains a newline;
      otherwise the value is treated as a file path, `file://`,
      `http(s)://`, `oci://`, or `gh://owner/repo@ref:path` URI.
      Append `#sha256=<hex>` for integrity verification.
      Use `fetch_headers` and `fetch_netrc` for authentication.
  global_sync:
    type: string
    default: ''
    description: |-
      Additional arguments to [`pixi global sync`](https://pixi.prefix.dev/latest/reference/cli/pixi/global/sync/)
      to run after writing the global manifest (if provided).
      When `global_manifest` is set, the installer runs `pixi global sync` with this value as extra arguments.
  global_installs:
    type: array
    default: ''
    description: |-
      Additional `pixi global install` commands to run.
      Each item is a space-separated string of arguments to `pixi global install`
      (e.g. `--channel conda-forge --channel bioconda snakemake`).
      These are run after writing the global manifest (if provided).
      They can be used in place of or in addition to the `global_manifest` option.
  home_dir:
    type: string
    default: ''
    description: |-
      Set `PIXI_HOME` — the directory where pixi stores global environments (`pixi global install`) and configuration.
      When empty (default), the upstream default (`$HOME/.pixi`) is used.
      `PIXI_HOME` is a runtime variable read by pixi on every invocation; the installer always
      writes it to shell startup files (controlled by `prefix_activations`).

mounts:
- source: ${localWorkspaceFolderBasename}-pixi
  target: ${containerWorkspaceFolder}/.pixi
  type: volume
entrypoint:
  args: "${containerWorkspaceFolder}/.pixi"
  description: Fix ownership of the .pixi named volume mount so the remote user can write to it.
  _conf_vars: [_REMOTE_USER]
# installsAfter: []
customizations:
  vscode:
    extensions:
      - ms-python.python
      - renan-r-santos.pixi-code
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
