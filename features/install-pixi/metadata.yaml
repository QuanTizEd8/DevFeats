version: 0.1.0
name: Pixi Installation
description: Install the [Pixi](https://pixi.sh/) package and project manager.
keywords:
- pixi
- conda
- package manager
- environment
- python
_long_description: >-
  [Pixi](https://pixi.sh/) is an open-source, cross-platform package and project manager
  for conda and PyPI packages, providing fast, reproducible environments for Python, C++,
  R, and any language distributed via conda channels. The installer is downloaded from
  the official Pixi release channel, with optional version pinning and checksum
  verification. Shell activation is configured for the specified users after installation.
_user_file_fetch: true
options:
  version:
    type: string
    default: latest
    description: |-
      Version of Pixi to install. Accepts `latest` (resolved via the GitHub Releases API)
      or any `X.Y.Z`, `X.Y`, `vX.Y.Z`, or `vX.Y` version string.
      If the installed Pixi version already matches the resolved version, the install is
      skipped silently regardless of the `if_exists` setting.
    proposals:
    - value: latest
      description: Resolve the latest release via the GitHub Releases API.
    - value: 0.67.0
      description: Pixi v0.67.0.
    - value: 0.66.0
      description: Pixi v0.66.0.
    - value: 0.65.0
      description: Pixi v0.65.0.
  if_exists:
    type: string
    default: skip
    description: |-
      What to do when a pixi binary already exists at `$prefix/bin`.
      If the installed version already equals the resolved target version, the install is always skipped silently regardless of this setting.
    enum:
    - value: skip
      description: Log a warning and continue to post-install steps (idempotent).
    - value: fail
      description: Print an error and exit non-zero.
    - value: reinstall
      description: Remove the existing binary then install fresh.
    - value: update
      description: |-
        Run `pixi self-update --version <resolved>` to update in-place.
        Only works for installer-managed pixi (not Homebrew/conda/mamba).
  installer_dir:
    type: string
    default: /tmp/pixi-installer
    description: |-
      Directory to download the pixi `.tar.gz` archive and its `.tar.gz.sha256` sidecar to.
      Both files are removed after installation unless `keep_installer=true`.
  arch:
    type: string
    default: ''
    description: |-
      Override the detected CPU architecture when selecting a release asset.
      Accepted values: `x86_64`, `aarch64`, `riscv64`.
      When empty (default), the architecture is detected automatically from `uname -m`.
      Useful for cross-arch image builds or forced emulation only.
  home_dir:
    type: string
    default: ''
    description: |-
      Set `PIXI_HOME` — the directory where pixi stores global environments (`pixi global install`) and configuration.
      When empty (default), the upstream default (`$HOME/.pixi`) is used.
      `PIXI_HOME` is a runtime variable read by pixi on every invocation; the installer always
      writes it to shell startup files (controlled by `prefix_activations`).
  download_url:
    type: string
    default: ''
    description: |-
      Override the binary download URL for the pixi `.tar.gz` archive.
      When set, the standard GitHub Releases URL is not used and checksum
      verification is skipped with a warning.
      Useful for air-gapped environments, internal mirrors, or custom builds.
  netrc:
    type: string
    default: ''
    description: |-
      Path to a `.netrc` file for authenticating the download request.
      Passed to `curl` / `wget` via `--netrc-file`.
      Also accepts `file://` / `http(s)://` / `oci://` / `gh://` URIs; content is fetched to a temporary file with mode 0600 before download.
      Use `fetch_headers` and `fetch_netrc` (shared options) when the netrc itself must be fetched with extra auth.
      Use when downloading from a private mirror that requires credentials.
      See [pixi docs: authentication](https://pixi.prefix.dev/latest/installation/#using-netrc-for-authentication).
    proposals:
    - value: /run/secrets/netrc
      description: Docker BuildKit secret mounted at `/run/secrets/netrc`.
    - value: file:///etc/pixi-netrc
      description: Explicit path via `file://`.
    - value: https://internal.example.com/secrets/netrc
      description: HTTPS URL (use `fetch_headers` if the endpoint needs a bearer token).
  shell_completions:
    type: array
    default: ''
    description: |-
      Shell names to write pixi completion eval blocks for. Set to `''` to skip all completions.
    enum:
    - value: bash
      description: Write an idempotent `eval "$(pixi completion --shell bash)"` block to the Bash RC file.
    - value: zsh
      description: Write an idempotent `eval "$(pixi completion --shell zsh)"` block to the Zsh RC file.
    - value: fish
      description: Write an idempotent `eval "$(pixi completion --shell fish)"` block to the Fish RC file.
    - value: nushell
      description: Write an idempotent `eval "$(pixi completion --shell nushell)"` block to the Nushell RC file.
    - value: elvish
      description: Write an idempotent `eval "$(pixi completion --shell elvish)"` block to the Elvish RC file.
  keep_installer:
    type: boolean
    default: false
    description: |-
      Keep the downloaded `.tar.gz` archive and `.tar.gz.sha256` sidecar file after installation.
      By default both files are removed from `installer_dir` on exit.
mounts:
- source: ${localWorkspaceFolderBasename}-pixi
  target: ${containerWorkspaceFolder}/.pixi
  type: volume
entrypoint: "@@_FEAT_SHARE_DIR@@/entrypoint.sh ${containerWorkspaceFolder}/.pixi"
onCreateCommand:
  verification:
    description: Verify pixi is installed and working by running [`pixi info`](https://pixi.prefix.dev/latest/reference/cli/pixi/info/).
    command: '@@_FEAT_SHARE_DIR@@/lifecycle--on-create--verification.sh'
# installsAfter: []
customizations:
  vscode:
    extensions:
      - ms-python.python
      - renan-r-santos.pixi-code
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
        - sudo
_prefix_groups:
  "":
    prefix:
      bins: [pixi]
    activation:
      shells: [bash, zsh]
      description: |-
        Shells to write `export PIXI_HOME=<path>` to startup files for.
        Uses `home_dir` when set, otherwise the upstream default (`$HOME/.pixi`).
        Written to all-context files so the variable is available in both
        interactive and non-interactive shells.
        Set to `''` to skip all activation writes.
