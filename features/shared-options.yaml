# Derived Feature Options
#
# Canonical definitions for options that are auto-injected
# into every feature's generated code and devcontainer-feature.json.
# These keys must NOT be declared manually in any metadata.yaml file.
#
# _apply_when: optional condition evaluated against the feature's raw metadata to
#              decide whether to inject this option. If absent, always injected.
#
#   jsonpath:   JSONPath expression resolved against the full feature metadata dict.
#               Supported syntax: root ($) and dot-notation ($.key.subkey).
#   condition:  exists | not_exists | equals | not_equals
#   value:      required for equals / not_equals — the value to compare against

keep_cache:
  type: boolean
  default: false
  description: >-
    Keep the package manager cache after installation.
    By default, the package manager cache is removed after installation to reduce image layer size.
    Set this flag to true to keep the cache, which may speed up subsequent installations at the cost of larger image layers.

keep_build_deps:
  type: boolean
  default: false
  description: >-
    Keep install-time-only packages (build tools, download utilities) after installation.
    By default these are removed to reduce image layer size.
    Set to true if you need them at runtime (e.g. compiling native Node.js modules).

log_file:
  type: string
  default: ""
  description: Log all output (stdout + stderr) to this file in addition to console.

fetch_headers:
  _apply_when:
    jsonpath: $._user_file_fetch
    condition: equals
    value: true
  type: array
  default: ''
  description: >-
    Additional HTTP headers (one per line, "Name: value") sent with every
    URI fetch performed by this feature (remote environment files, manifests,
    netrc, etc.). Useful for "Authorization: Bearer …" against private GitHub
    raw URLs, OCI registries, or internal mirrors.

fetch_netrc:
  _apply_when:
    jsonpath: $._user_file_fetch
    condition: equals
    value: true
  type: string
  default: ''
  description: >-
    Path to a .netrc file used for HTTP basic authentication on URI fetches
    that use netrc (curl/wget --netrc-file). Ignored when empty.
    Does not replace feature-specific credential options (e.g. install-pixi `netrc`
    for the pixi binary download); use together when both apply.

log_level:
  type: string
  default: info
  description: >-
    Control installer log verbosity (emoji-prefixed lines printed to stderr).
  enum:
    - value: silent
      description: Only fatal (e.g. non-zero exit summary).
    - value: error
      description: fatal and error (⛔).
    - value: warn
      description: fatal, error, and warning (⚠️).
    - value: info
      description: Above plus info, success, and phase helpers (default).
    - value: debug
      description: Above plus debug (🐞).
    - value: trace
      description: Above plus bash xtrace (`set -x`) for command-level tracing.
