version: 0.1.0
name: Git Installation
description: Install [Git](https://git-scm.com/) via the OS package manager or build from a kernel.org source tarball.
keywords:
- git
- vcs
- version-control
- source-control
- devtool
_long_description: >-
  Git can be installed from the OS native package manager — with the git-core PPA available
  on Ubuntu for the latest upstream stable release — or compiled from a kernel.org tarball,
  supporting every Linux distribution and macOS. After installation, Git configuration is
  written to the system-level gitconfig (`/etc/gitconfig` as root, `~/.config/git/config`
  as non-root). Shell completions are installed following source builds.
options:
  shell_completions:
    _applies_when:
      - method: [source]
  sysconfdir:
    type: string
    default: auto
    description: |-
      System configuration directory for source builds (passed as `sysconfdir=` to `make`). Git reads `<sysconfdir>/gitconfig` as its system-level config file.
      `auto` (default) — resolves to `/etc` when running as root, or `$HOME/.config` when running as non-root.
      An explicit path — used as-is; the script exits with an error if the path is not writable and cannot be created.
  no_flags:
    type: array
    _applies_when:
      - method: [source]
    default: ''
    description: |-
      Components to exclude from the source build.
      Each value maps (case-insensitive) to the corresponding `NO_<FLAG>=YesPlease` make variable.
    proposals:
    - value: perl
      description: >-
        Disable Perl scripts (`git-svn`, `git-send-email`, `git-archimport`,
        `git-cvsimport`, gitweb) and remove the Perl runtime requirement.
    - value: python
      description: Disable Python scripts (`git-p4`) and remove the Python runtime requirement.
    - value: tcltk
      description: Disable Tcl/Tk GUI tools (`gitk`, `git-gui`) and remove the Tcl/Tk requirement.
    - value: gettext
      description: >-
        Disable i18n/translation support; git output is English-only and the
        gettext/libintl build dependency is removed.
        On Alpine Linux gettext is always disabled regardless of this setting.
    - value: rust
      description: >-
        Disable Rust components in the build (`NO_RUST=YesPlease`); Git 2.55+
        enables Rust by default. Use when you prefer the C fallbacks and want to
        skip the optional `cargo` build dependency.
  default_branch:
    type: string
    default: main
    description: |-
      Sets `init.defaultBranch` in the gitconfig file (`/etc/gitconfig` as root; `~/.config/git/config` as non-root).
      Applies to all newly initialised repositories.
      Set to `''` to skip writing this setting.
  safe_directory:
    type: array
    default: '*'
    description: |-
      Sets `safe.directory` in the gitconfig file (`/etc/gitconfig` as root; `~/.config/git/config` as non-root).
      Use `*` (default) to trust all directories (useful in containers where the working directory may be owned by a different UID), or a list of specific absolute paths.
      Set to `''` to skip writing this setting.
  user_name:
    type: string
    default: ''
    description: Sets `user.name` in the gitconfig file (`/etc/gitconfig` as root; `~/.config/git/config` as non-root). Set to `''` to skip writing this setting.
  user_email:
    type: string
    default: ''
    description: Sets `user.email` in the gitconfig file (`/etc/gitconfig` as root; `~/.config/git/config` as non-root). Set to `''` to skip writing this setting.
  gitconfig:
    type: string
    default: ''
    description: |-
      Freeform content for the gitconfig file (`/etc/gitconfig` as root; `~/.config/git/config` as non-root) — the same file that receives `default_branch`, `safe_directory`, `user_name`, and `user_email`.
      Accepts standard gitconfig format.

      Inline content is detected when the value contains a newline; otherwise the value is treated as a file path, `file://`, `http(s)://`, `oci://`, or `gh://owner/repo@ref:path` URI.
      Append `#sha256=<hex>` to the URI for integrity verification.
      Use `fetch_headers` and `fetch_netrc` for authenticated fetches.

      Written before `default_branch`, `safe_directory`, `user_name`, and `user_email`, so those named options take precedence over any conflicting entries in this block.
      Set to `''` to skip.
_options:
  user_file_fetch: true
  verify:
    args: "--version"
    description: Verify git is installed and working.
  gh_repo: git/git
  version:
    resolution: github_tag
  completions:
    shells: [bash, zsh]
    source_files:
      bash: "share/git-core/contrib/completion/git-completion.bash"
      zsh: "share/git-core/contrib/completion/git-completion.zsh"
  method:
    package:
      registers_as: git
    upstream-package:
      when: {os.id: ubuntu, plat.pm: apt}
    source:
      asset_uri: "https://www.kernel.org/pub/software/scm/git/git-{feat.version}.tar.gz"
      sidecar_uri: "https://www.kernel.org/pub/software/scm/git/sha256sums.asc"
  prefix:
    bins: [git]
    exports:
      description: >-
        Also writes `export MANPATH="${feat.prefix}/share/man:${MANPATH}"` to the same startup files.
    applies_when:
      - method:
        - source
# installsAfter:
#   - ghcr.io/quantized8/devfeats/setup-user
#   - ghcr.io/quantized8/devfeats/install-jq
#   - ghcr.io/quantized8/devfeats/install-yq
#   - ghcr.io/quantized8/devfeats/setup-shell
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    method-package:
      packages:
        - name: git
          version: "{feat.pm_version}"
    method-upstream-package:
      when:
        os.id: ubuntu
        plat.pm: apt
      keys:
        - fingerprint: "F911AB184317630C59970973E363C90F8F1B6217"
          dest: /usr/share/keyrings/git-core-ppa.gpg
      repos:
        - "deb [signed-by=/usr/share/keyrings/git-core-ppa.gpg] https://ppa.launchpadcontent.net/git-core/ppa/ubuntu {os.version_codename} main"
      packages:
        - git
  build:
    method-source:
      apt:
        packages:
          - build-essential
          - equivs
          - gettext
          - libcurl4-openssl-dev
          - libexpat1-dev
          - libpcre2-dev
          - libssl-dev
          - zlib1g-dev
          # libpcre2-posix package name varies by Debian/Ubuntu release.
          - name: libpcre2-posix3
            when:
              os.version_codename: [bookworm, trixie, jammy, noble, plucky, oracular]
          - name: libpcre2-posix2
            when:
              os.version_codename: [focal, bullseye]
          - name: libpcre2-posix0
            when:
              os.version_codename: [bionic, buster]
          - name: cargo
            when:
              feat.version: {gte: "2.55"}

      brew:
        packages:
          - make
          - openssl
          - pcre2
          - gettext
          - name: rust
            when:
              feat.version: {gte: "2.55"}

      dnf:
        packages:
          - gcc
          - make
          - gettext-devel
          - libcurl-devel
          - expat-devel
          - openssl-devel
          - pcre2-devel
          - perl-devel
          - zlib-devel
          - name: cargo
            when:
              feat.version: {gte: "2.55"}

      apk:
        packages:
          - make
          - gcc
          - g++
          - musl-dev
          - curl-dev
          - expat-dev
          - openssl-dev
          - pcre2-dev
          - perl-dev
          - zlib-dev
          - name: cargo
            when:
              feat.version: {gte: "2.55"}

      zypper:
        packages:
          - gcc
          - make
          - gettext-tools
          - libcurl-devel
          - libexpat-devel
          - libopenssl-devel
          - libpcre2-devel
          - zlib-devel
          - name: cargo
            when:
              feat.version: {gte: "2.55"}

      pacman:
        packages:
          - base-devel
          - pcre2
          - curl
          - expat
          - openssl
          - zlib
          - name: rust
            when:
              feat.version: {gte: "2.55"}
