id: install-git
version: 0.0.0
name: Git Installation
description: Install [Git](https://git-scm.com/) via the OS package manager or build from a kernel.org source tarball.
keywords:
- git
- vcs
- version-control
- source-control
- devtool
_long_description: >-
  Git can be installed from the OS native package manager — with the git-core PPA available
  on Ubuntu for the latest upstream stable release — or compiled from a kernel.org tarball,
  supporting every Linux distribution and macOS. After installation, system-level Git
  configuration and per-user identity settings are written for all resolved users. Shell
  completions are installed following source builds.
options:
  method:
    type: string
    default: package
    description: Installation method to use.
    enum:
    - value: package
      description: >-
        Install via the OS package manager. On Ubuntu with `version=latest`,
        activates the git-core PPA (`ppa:git-core/ppa`) for the newest upstream
        stable release; all other platforms use their native package manager directly.
        On macOS, delegates to Homebrew.
    - value: source
      description: >-
        Build from a kernel.org source tarball. Requires a C toolchain and build
        dependencies (installed automatically). Version is controlled by the `version`
        option. Works on all supported Linux distributions and macOS (requires Xcode CLT).
  version:
    type: string
    default: latest
    description: |-
      Version of git to install. Either "latest", "stable", or a specific version string.
    proposals:
    - value: latest
      description: |-
        Install the latest available version.
        - When `method=package`, activates the git-core PPA on Ubuntu for the newest upstream stable release, and uses the default package manager's version on all other platforms (including Homebrew on macOS, which already tracks the latest).
        - When `method=source`, queries the GitHub Tags API for the newest tag (including release candidates).
    - value: stable
      description: |-
        Install the latest stable version.
        - When `method=package`, uses the default package manager's version.
        - When `method=source`, builds the newest stable release (no release candidates).
    - value: 2.54.0
      description: |-
        Install a specific version.
        - When `method=package`, passes the version to the package manager (user is responsible for availability).
        - When `method=source`, builds exactly that version from the kernel.org tarball.
  prefix:
    type: string
    default: auto
    description: |-
      Installation prefix for source builds (passed as `prefix=` to `make install`).
      `auto` (default) — resolves to `/usr/local` when running as root, or `$HOME/.local` when running as non-root.
      An explicit path — used as-is; the script exits with an error if the path is not writable and cannot be created.
  sysconfdir:
    type: string
    default: auto
    description: |-
      System configuration directory for source builds (passed as `sysconfdir=` to `make`). Git reads `<sysconfdir>/gitconfig` as its system-level config file.
      `auto` (default) — resolves to `/etc` when running as root, or `$HOME/.config` when running as non-root.
      An explicit path — used as-is; the script exits with an error if the path is not writable and cannot be created.
  installer_dir:
    type: string
    default: /tmp/git-build
    description: |-
      Working directory for the source build: tarball download, extraction, and compilation happen here.
      Removed after a successful build unless `keep_installer=true`.
      Ignored when `method=package`.
  keep_installer:
    type: boolean
    default: false
    description: |-
      Keep the source build directory (`installer_dir`) after a successful install.
      Useful for debugging build failures or inspecting the compiled binaries.
      Ignored when `method=package`.
  no_flags:
    type: array
    default: ''
    description: |-
      Components to exclude from the source build. Silently ignored when `method=package`.
      Each value maps (case-insensitive) to the corresponding `NO_<FLAG>=YesPlease` make variable.
    proposals:
    - value: perl
      description: >-
        Disable Perl scripts (`git-svn`, `git-send-email`, `git-archimport`,
        `git-cvsimport`, gitweb) and remove the Perl runtime requirement.
    - value: python
      description: Disable Python scripts (`git-p4`) and remove the Python runtime requirement.
    - value: tcltk
      description: Disable Tcl/Tk GUI tools (`gitk`, `git-gui`) and remove the Tcl/Tk requirement.
    - value: gettext
      description: >-
        Disable i18n/translation support; git output is English-only and the
        gettext/libintl build dependency is removed.
        On Alpine Linux gettext is always disabled regardless of this setting.
  make_flags:
    type: string
    default: ''
    description: |-
      Additional flags to append verbatim to the `make` invocation for source builds (space-separated `KEY=VALUE` pairs, e.g. `NO_CURL=YesPlease OPENSSL_SHA256=YesPlease`).
      Appended after all computed flags including `no_flags`, so last-position values take effect.
      No validation — unknown flags are silently ignored by `make`. Silently ignored when `method=package`.
  export_path:
    type: array
    default: auto
    description: |-
      Controls PATH and MANPATH export for source builds.
      - `auto` (default) — writes idempotent export blocks to all system-wide shell startup files: the `BASH_ENV` file (non-login non-interactive bash, registered in `/etc/environment`), `/etc/profile.d/install-git.sh` (login shells), the system-wide bashrc (non-login interactive bash), and `<zshdir>/zshenv` (all zsh). Covers login, interactive, non-interactive, Docker RUN, SSH exec, and PAM invocation scenarios.
      - `''` (empty) — skips all PATH/MANPATH writes.
      - A list of absolute file paths — writes only to those files.
      Ignored when `method=package` (git lands in `/usr/bin` which is universally on PATH).
  shell_completions:
    type: array
    default: "bash\nzsh"
    description: |-
      Shell names to install completion scripts for after a source build.
      Ignored when `method=package` (completions are installed by the package manager).
      The source files are taken from `$PREFIX/share/git-core/contrib/completion/` which is populated by make install.
      Set to `''` to skip all completions.
    enum:
    - value: bash
      description: Install Bash completion to `/etc/bash_completion.d/git` (root) or `~/.local/share/bash-completion/completions/git` (non-root).
    - value: zsh
      description: Install Zsh completion to `<zshdir>/completions/_git` (root) or `~/.zfunc/_git` (non-root).
  if_exists:
    type: string
    default: update
    description: |-
      What to do when git is already present in PATH before installation begins.
      If the installed version already matches the resolved target version,
      installation is always skipped silently regardless of this setting.
    enum:
    - value: skip
      description: Log a notice and exit successfully without making any changes (idempotent).
    - value: fail
      description: Print an error and exit non-zero.
    - value: reinstall
      description: |-
        Detect and uninstall the existing git (via dpkg/apk/rpm/brew), then install fresh.
        - If the existing git is package-managed, it is removed via the package manager.
        - If source-installed, all files under `prefix` and the equivs dummy package (Debian/Ubuntu only) are removed before reinstalling.
    - value: update
      description: |-
        Upgrade to the resolved target version.
        Same-method updates proceed in place: the package manager re-runs natively for `method=package`; for `method=source`, binaries are overwritten if the prefix matches, or the old prefix is removed first if it differs.
        Method-switch updates behave identically to `reinstall`.
  default_branch:
    type: string
    default: main
    description: |-
      Sets `init.defaultBranch` in the system-level gitconfig (`/etc/gitconfig` as root; `$HOME/.config/git/config` as non-root).
      Applies to all newly initialised repositories.
      Set to `''` to skip writing this setting.
  safe_directory:
    type: array
    default: '*'
    description: |-
      Sets `safe.directory` in the system-level gitconfig.
      Use `*` (default) to trust all directories (useful in containers where the working directory may be owned by a different UID), or a list of specific absolute paths.
      Set to `''` to skip writing this setting.
  system_gitconfig:
    type: string
    default: ''
    description: |-
      Freeform content to append to the system-level gitconfig (`/etc/gitconfig` as root; `$HOME/.config/git/config` as non-root).
      Accepts standard gitconfig format. Example:

      ```ini
      [core]
        autocrlf = input
      [push]
        default = simple
      ```

      Written after `default_branch` and `safe_directory` settings. Set to `''` to skip.
  add_current_user:
    type: boolean
    default: true
    description: |-
      Include the current user (the user running the installer, or SUDO_USER if set) in the resolved user list for per-user gitconfig writes.
      Root is deferred: only included as a fallback when no other non-root user is resolved.
  add_remote_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer remoteUser (from the _REMOTE_USER env var) in the resolved user list for per-user gitconfig writes.
      Ignored when _REMOTE_USER is unset or empty. Root is excluded from this path.
  add_container_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer containerUser (from the _CONTAINER_USER env var) in the resolved user list for per-user gitconfig writes.
      Ignored when _CONTAINER_USER is unset or empty. Root is excluded from this path.
  add_users:
    type: array
    default: ''
    description: |-
      Additional usernames to include in the resolved user list for per-user gitconfig writes.
      Root is accepted here (unlike the auto-detected paths above).
  user_name:
    type: string
    default: ''
    description: Sets `user.name` in the per-user gitconfig (`~/.gitconfig`) for all resolved users. Set to `''` to skip writing this setting.
  user_email:
    type: string
    default: ''
    description: Sets `user.email` in the per-user gitconfig (`~/.gitconfig`) for all resolved users. Set to `''` to skip writing this setting.
  user_gitconfig:
    type: string
    default: ''
    description: Freeform content to append to the per-user gitconfig (`~/.gitconfig`) for all resolved users. Accepts standard gitconfig format. Written after `user_name` and `user_email` settings. Set to `''` to skip.
  symlink:
    type: boolean
    default: true
    description: |-
      Create a symlink from the canonical bin directory to `$prefix/bin/git` when prefix resolves to a non-default path (source builds only).
      The symlink location is determined by whether `$prefix` falls under any user's home directory (as listed in `/etc/passwd`):
      - System-wide (prefix is not under any user home): creates `/usr/local/bin/git` → `$prefix/bin/git`.
      - User-scoped (prefix is under a user home): creates `$HOME/.local/bin/git` → `$prefix/bin/git`.
      Ensures the containerEnv PATH entries always resolve to the installed binary regardless of the chosen prefix.
      No-op when `method=package` (git is already in `/usr/bin`), or when prefix already resolves to the canonical path (`/usr/local` for root, `$HOME/.local` for non-root).
containerEnv:
  PATH: ${HOME}/.local/bin:${PATH}
installsAfter: []
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    os-pkg:
      packages:
        - git
  build:
    source-build:
      packages:
        - curl
        - tar

      apt:
        packages:
          - build-essential
          - gettext
          - libcurl4-openssl-dev
          - libexpat1-dev
          - libpcre2-dev
          - libssl-dev
          - zlib1g-dev
          # libpcre2-posix package name varies by Debian/Ubuntu release.
          - name: libpcre2-posix3
            when:
              version_codename: [bookworm, trixie, jammy, noble, plucky, oracular]
          - name: libpcre2-posix2
            when:
              version_codename: [focal, bullseye]
          - name: libpcre2-posix0
            when:
              version_codename: [bionic, buster]

      brew:
        packages:
          - make
          - openssl
          - pcre2
          - gettext

      dnf:
        packages:
          - gcc
          - make
          - gettext-devel
          - libcurl-devel
          - expat-devel
          - openssl-devel
          - pcre2-devel
          - perl-devel
          - zlib-devel

      apk:
        packages:
          - make
          - gcc
          - g++
          - musl-dev
          - curl-dev
          - expat-dev
          - openssl-dev
          - pcre2-dev
          - perl-dev
          - zlib-dev

      zypper:
        packages:
          - gcc
          - make
          - gettext-tools
          - libcurl-devel
          - libexpat-devel
          - libopenssl-devel
          - libpcre2-devel
          - zlib-devel

      pacman:
        packages:
          - base-devel
          - pcre2
          - curl
          - expat
          - openssl
          - zlib
