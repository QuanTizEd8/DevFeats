name: ORAS Installation
version: 0.1.0
description: Install [ORAS](https://oras.land/) – an OCI registry client.
keywords:
  - oras
  - oci
  - registry
  - artifact
_long_description: |-
  ORAS (OCI Registry As Storage) is a CLI for working with OCI artifacts in container registries
  beyond container images. It is useful for publishing and consuming artifacts such as Helm charts,
  SBOMs, provenance/signature payloads, WASM modules, and other build outputs in registries like
  GHCR, Docker Hub, and private OCI-compliant registries.

  This feature installs the `oras` binary and makes it available on PATH so it can be used from
  build scripts, CI tasks, and interactive shell sessions. By default, the latest stable ORAS version is
  installed, or you can pin a specific release. The installer supports release-based installation
  and package-manager installation, with `auto` preferring the release path first.
_tool_name: ORAS
_options:
  gh_repo: oras-project/oras
  version:
    resolution: github_release
    default: stable
    flag: --version
    proposals:
      - value: 1.3.2
        description: ORAS v1.3.2.
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/oras_{VERSION}_{OS}_{ARCH}.tar.gz"
      binary_src: oras
      gpg_key_uri: "https://raw.githubusercontent.com/${{ _options.gh_repo }}$/refs/heads/main/KEYS"
    package: {}
  prefix:
    bins: [oras]
    applies_when:
      - method: [binary]
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    os-pkg:
      # This manifest is consumed by the generated `_os_pkg_deps__install` helper.
      # Keep this aligned with upstream package availability.
      apt:
        packages:
          # Debian repositories provide `oras`.
          - name: oras
            when:
              id: debian
          # Ubuntu repositories provide `oras` starting from 25.04.
          - name: oras
            when:
              id: ubuntu
              version_id:
                - "25.04"
                - "25.10"
                - "26.04"
      apk:
        packages:
          # Alpine package name differs (`oras-cli` provides cmd:oras).
          - name: oras-cli
      dnf:
        packages:
          # Fedora package name differs (`golang-oras` installs /usr/bin/oras).
          - name: golang-oras
            when:
              id: fedora
      yum:
        packages:
          - name: golang-oras
            when:
              id: fedora
      zypper:
        packages:
          - name: oras
            when:
              id:
                - opensuse-tumbleweed
                - opensuse-slowroll
      brew:
        packages:
          - name: oras
      pacman:
        scripts: |-
          logging__error "install-oras: method=package is unsupported on pacman because ORAS is not available in official Arch repositories."
          return 1
# installsAfter: []
