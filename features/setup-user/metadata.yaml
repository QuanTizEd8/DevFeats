name: System User Setup
version: 0.1.0
description: Create and configure a system user account with optional sudo access.
keywords:
- user
- account
- sudo
- uid
- gid
_long_description: >-
  The user is created with the specified UID and GID,
  a home directory seeded from /etc/skel,
  and a configurable login shell.
  Passwordless sudo access and supplementary group membership can be granted.
_options:
  installer_dir: false
_system_requirements:
  platforms:
    - kernel: linux
  root: true
options:
  username:
    default: vscode
    description: Username to create.
    type: string
  user_id:
    default: '1000'
    description: UID to assign to the user. Must be a non-negative integer.
    type: integer
    _minimum: 0
  group_id:
    default: '1000'
    description: GID to assign to the user's primary group. Must be a non-negative integer.
    type: integer
    _minimum: 0
  group_name:
    default: ''
    _default: $USERNAME
    description: Name for the user's primary group. Defaults to `username` when left empty.
    type: string
  home_dir:
    default: ''
    _default: /home/$USERNAME
    description: Home directory for the user. Defaults to `/home/<username>` when left empty.
    type: string
  user_shell:
    default: /bin/bash
    description: Login shell for the user. The path must exist and be executable on the image.
    type: string
    _path: [-x]
  sudo_access:
    default: true
    description: Grant the user passwordless `sudo` access. Installs `sudo` if not already present.
    type: boolean
  extra_groups:
    default: ''
    description: Supplementary groups to add the user to. Groups must already exist.
    type: array
  replace_existing:
    default: true
    description: |-
      When `true`, any user or group occupying the requested UID/GID is removed first (home directories are preserved).
      When `false`, a conflict causes the script to fail unless the user is already correctly configured.
    type: boolean
  sudoers_dir:
    default: /etc/sudoers.d
    description: Directory for the sudoers drop-in file.
    type: string
_dependencies:
  run:
    base:
      # useradd/userdel/groupadd/groupdel/usermod — pre-installed on apt distros,
      # but requires the shadow package on Alpine/zypper/pacman and shadow-utils on dnf/yum.
      packages:
        - when: {pm: [apk, zypper, pacman]}
          packages: [shadow]
        - when: {pm: [dnf, yum]}
          packages: [shadow-utils]
    sudo:
      # Installed only when sudo_access=true.
      packages:
        - sudo
_devcontainer:
  remoteUser: vscode
