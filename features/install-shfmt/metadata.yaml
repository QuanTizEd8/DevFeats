version: 0.1.0
name: shfmt Installation
description: Install [mvdan/shfmt](https://github.com/mvdan/sh) — a shell script formatter.
keywords:
  - shfmt
  - shell
  - format
  - bash
  - cli
_long_description: |-
  Installs `shfmt`, the shell script formatter from the mvdan/sh project.
  Supports formatting sh, bash, and mksh scripts.
_tool_name: shfmt
_options:
  verify:
    args: "--version"
    description: Verify shfmt is installed and working.
  gh_repo: mvdan/sh
  version:
    resolution: github_release
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{feat.tag}/shfmt_v{feat.version}_{plat.kernel:lower}_{plat.machine_release}"
      when:
        - {plat.kernel: linux, plat.machine_release: amd64}
        - {plat.kernel: linux, plat.machine_release: arm64}
        - {plat.kernel: darwin, plat.machine_release: amd64}
        - {plat.kernel: darwin, plat.machine_release: arm64}
    package: {}
  prefix:
    bins: [shfmt]
    applies_when:
      - method: [binary]
customizations:
  vscode:
    extensions:
      - foxundermoon.shell-format
_dependencies:
  run:
    method-package:
      packages:
        - name: shfmt
          version: "{feat.pm_version}"
# installsAfter: []
