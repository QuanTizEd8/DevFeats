version: 0.1.0
name: shfmt Installation
description: Install [mvdan/shfmt](https://github.com/mvdan/sh) â€” a shell script formatter.
keywords:
  - shfmt
  - shell
  - format
  - bash
  - cli
_long_description: |-
  Installs `shfmt`, the shell script formatter from the mvdan/sh project.
  Supports formatting sh, bash, and mksh scripts.

  `method=auto` prefers a verified upstream release binary and falls back to
  the OS package manager. Use `version` to pin an exact release, `prefix` to
  control the installation destination for the release method, and `if_exists`
  to control behaviour when `shfmt` is already available.
options:
  method:
    type: string
    default: auto
    description: Installation method to use.
    enum:
      - value: auto
        description: Prefer release binary, then fall back to package manager.
      - value: release
        description: Install from GitHub release binaries with SHA-256 verification.
      - value: repos
        description: Install from the operating system package manager.
  version:
    type: string
    default: latest
    description: Version to install (`latest` or a concrete version like `3.10.0`).
    proposals:
      - value: latest
        description: Resolve and install the latest release.
      - value: 3.10.0
        description: Install shfmt v3.10.0.
  prefix:
    type: string
    default: auto
    description: |-
      Installation prefix for `method=release` (`$prefix/bin/shfmt`).
      `auto` resolves to `/usr/local` as root, or `$HOME/.local` as non-root.
      Ignored for `method=repos`.
  symlink:
    type: boolean
    default: true
    description: |-
      Create a symlink from the canonical bin directory to `$prefix/bin/shfmt` when prefix
      resolves to a non-default path (`method=release` only).
      - System-wide (prefix not under any user home): creates `/usr/local/bin/shfmt` â†’ `$prefix/bin/shfmt`.
      - User-scoped (prefix under a user home): creates `$HOME/.local/bin/shfmt` â†’ `$prefix/bin/shfmt`.
      Ensures the binary is always reachable on PATH regardless of the chosen prefix.
      No-op when `$prefix/bin/shfmt` is already the chosen target path, or when `method=repos`.
  if_exists:
    type: string
    default: skip
    description: Behavior when `shfmt` already exists in PATH.
    enum:
      - value: skip
        description: Reuse the existing install and exit successfully.
      - value: fail
        description: Exit with an error when `shfmt` already exists.
      - value: reinstall
        description: Reinstall using the selected method.
customizations:
  vscode:
    extensions:
      - foxundermoon.shell-format
_dependencies:
  run:
    os-pkg:
      packages:
        - shfmt
  build:
    download:
      packages:
        - curl
installsAfter: []
