version: 0.1.0
name: shfmt Installation
description: Install [mvdan/shfmt](https://github.com/mvdan/sh) — a shell script formatter.
keywords:
  - shfmt
  - shell
  - format
  - bash
  - cli
_long_description: |-
  Installs `shfmt`, the shell script formatter from the mvdan/sh project.
  Supports formatting sh, bash, and mksh scripts.
_tool_name: shfmt
_options:
  verify:
    args: "--version"
    description: Verify shfmt is installed and working.
  gh_repo: mvdan/sh
  version:
    resolution: github_release
    default: stable
    inputs: [stable, latest, semver]
    proposals:
      - value: 3.10.0
        description: Install shfmt v3.10.0.
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/shfmt_v{VERSION}_{OS}_{ARCH}"
      when:
        - {kernel: linux, arch: amd64}
        - {kernel: linux, arch: arm64}
        - {kernel: darwin, arch: amd64}
        - {kernel: darwin, arch: arm64}
    package: {}
  prefix:
    bins: [shfmt]
    applies_when:
      - method: [binary]
customizations:
  vscode:
    extensions:
      - foxundermoon.shell-format
_dependencies:
  run:
    os-pkg:
      packages:
        - shfmt
# installsAfter: []
