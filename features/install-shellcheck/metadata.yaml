version: 0.1.0
name: ShellCheck Installation
description: Install [ShellCheck](https://github.com/koalaman/shellcheck) — a static analysis tool for shell scripts.
keywords:
  - shellcheck
  - shell
  - lint
  - static-analysis
  - bash
  - cli
_long_description: |-
  Installs ShellCheck, the static analysis tool for shell scripts.

  Note: upstream releases do not provide an ARM64 macOS binary; on Apple
  Silicon `method=binary` is unavailable and `method=auto` falls back to
  the package manager automatically.
_tool_name: ShellCheck
_options:
  verify:
    args: "--version"
    description: Verify shellcheck is installed and working.
  gh_repo: koalaman/shellcheck
  version:
    resolution: github_release
    default: stable
    inputs: [stable, latest, semver]
    proposals:
      - value: 0.10.0
        description: Install shellcheck v0.10.0.
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/shellcheck-v{VERSION}.{OS}.{OS_ARCH}.tar.xz"
      binary_src:
        - shellcheck
      when:
        - {kernel: linux, arch: amd64}
        - {kernel: linux, arch: arm64}
        - {kernel: darwin, arch: amd64}
    package: {}
  prefix:
    bins: [shellcheck]
    applies_when:
      - method: [binary]
customizations:
  vscode:
    extensions:
      - timonwong.shellcheck  # https://github.com/vscode-shellcheck/vscode-shellcheck
      - mads-hartmann.bash-ide-vscode
_dependencies:
  run:
    method-package:
      packages:
        - shellcheck
# installsAfter: []
