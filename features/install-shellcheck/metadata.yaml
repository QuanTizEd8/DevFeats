version: 0.1.0
name: ShellCheck Installation
description: Install [ShellCheck](https://github.com/koalaman/shellcheck) — a static analysis tool for shell scripts.
keywords:
  - shellcheck
  - shell
  - lint
  - static-analysis
  - bash
  - cli
_long_description: |-
  Installs ShellCheck, the static analysis tool for shell scripts.

  `method=auto` prefers a verified upstream release archive and falls back to
  the OS package manager. Use `version` to pin
  an exact release, `prefix` to control the installation destination for the
  binary method, and `if_exists` to control behaviour when `shellcheck` is
  already available.

  Note: upstream releases do not provide an ARM64 macOS binary; on Apple
  Silicon `method=binary` is unavailable and `method=auto` falls back to
  the package manager automatically.
options:
  method:
    type: string
    default: auto
    description: Installation method to use.
    enum:
      - value: auto
        description: Prefer release binary, then fall back to package manager.
      - value: binary
        description: Install from GitHub release archives with checksum verification.
      - value: package
        description: Install from the operating system package manager.
  version:
    type: string
    default: stable
    description: Version to install. `stable` for the latest stable release, `latest` for the most recently published (may include pre-releases), or a concrete version like `0.10.0`.
    proposals:
      - value: stable
        description: Resolve and install the latest stable (non-pre-release) release.
      - value: latest
        description: Resolve and install the most recently published release, potentially including pre-releases.
      - value: 0.10.0
        description: Install shellcheck v0.10.0.
  if_exists:
    type: string
    default: skip
    description: Behavior when `shellcheck` already exists in PATH.
    enum:
      - value: skip
        description: Reuse the existing install and exit successfully.
      - value: fail
        description: Exit with an error when `shellcheck` already exists.
      - value: reinstall
        description: Reinstall using the selected method.
  installer_dir:
    type: string
    _applies_when:
      - method: [binary]
    default: ''
    description: |-
      Working directory for download and archive extraction when `method=binary`.
      When empty (default), a private temporary directory is used and removed automatically on exit.
      When set, the directory and its contents are retained after installation.
customizations:
  vscode:
    extensions:
      - timonwong.shellcheck  # https://github.com/vscode-shellcheck/vscode-shellcheck
      - mads-hartmann.bash-ide-vscode
_dependencies:
  run:
    os-pkg:
      packages:
        - shellcheck
# installsAfter: []
_prefix_groups:
  "":
    prefix:
      bins: [shellcheck]
    applies_when:
      - method: [binary]
