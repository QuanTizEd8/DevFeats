version: 0.1.0
name: Shell Setup
description: Configure system-wide and per-user shell environment files for Bash and Zsh.
keywords:
- shell
- zsh
- bash
- config
_long_description: >-
  Deploys a layered set of system-wide and per-user configuration files to ensure
  correct shell behavior across all invocation modes — login, interactive,
  non-interactive, scripts, cron, devcontainer exec, CI runners, and VS Code tasks.
  Deploys shared shell files (`/etc/shellenv`, `/etc/shellrc`, `/etc/shellaliases`,
  `/etc/profile`) and shell-specific system configs (bashrc, bashenv, zshenv,
  zprofile, zshrc), copies per-user dotfiles from a skeleton directory, and injects
  `ZDOTDIR` into each user's `~/.zshenv`. Optionally sets the default login shell
  for all resolved users via `chsh`. Install shells separately with `install-zsh`.
  Use `setup_bash` and `setup_zsh` to control which shell-specific files are deployed.
options:
  setup_bash:
    type: string
    default: auto
    description: |-
      Whether to deploy Bash-specific system and per-user configuration files
      (`/etc/bashrc`, `bashenv`, `BASH_ENV`, user `.bashrc`, etc.).
    enum:
    - value: auto
      description: Deploy when `bash` is on PATH.
    - value: 'true'
      description: Always deploy Bash configuration, even when `bash` is not installed yet.
    - value: 'false'
      description: Skip Bash-specific configuration.
  setup_zsh:
    type: string
    default: auto
    description: |-
      Whether to deploy Zsh-specific system and per-user configuration files
      (`/etc/zsh/*`, user `.zshenv`, `ZDOTDIR`, `.zshrc`, etc.).
    enum:
    - value: auto
      description: Deploy when `zsh` is on PATH.
    - value: 'true'
      description: Always deploy Zsh configuration, even when `zsh` is not installed yet.
    - value: 'false'
      description: Skip Zsh-specific configuration.
  add_current_user:
    default: true
    description: Whether to add configuration for the current non-root user (`SUDO_USER` if run via `sudo`, otherwise `whoami`). No effect when the current user is root.
    type: boolean
  add_container_user:
    default: true
    description: Whether to add configuration for the `containerUser` set in the devcontainer.json file, which becomes the `_CONTAINER_USER` environment variable set by the devcontainer tooling. No effect when `_CONTAINER_USER` is not set.
    type: boolean
  add_remote_user:
    default: true
    description: Whether to add configuration for the `remoteUser` set in the devcontainer.json file, which becomes the `_REMOTE_USER` environment variable set by the devcontainer tooling. No effect when `_REMOTE_USER` is not set.
    type: boolean
  add_users:
    default: ''
    description: |-
      Additional usernames to add shell configuration for, in addition to the users resolved by
      `add_current_user`, `add_remote_user`, and `add_container_user`.
    type: array
  set_user_shells:
    type: string
    default: zsh
    description: |-
      Whether to set users' default login shell via `chsh`.
      Applies to all users resolved by `add_current_user`, `add_remote_user`, `add_container_user`, and `add_users`.
      Raises an error if `zsh` is selected but Zsh is not available.
    enum:
    - value: zsh
      description: Set all resolved users' default login shell to Zsh.
    - value: bash
      description: Set all resolved users' default login shell to Bash.
    - value: none
      description: Do not change any user's default login shell.
  zdotdir:
    default: ''
    description: |-
      Directory where Zsh looks for its per-user config files (`.zshrc`, `.zprofile`, `.zlogin`).
      Corresponds to the `ZDOTDIR` environment variable set in `~/.zshenv`.
      Leave empty to use the default: `${XDG_CONFIG_HOME}/zsh` (i.e. `~/.config/zsh`).
      Accepts paths prefixed with `~` or `$HOME`.
      Only applies when `setup_zsh` is not `false`.
    type: string
  user_config_mode:
    default: overwrite
    description: How to handle existing user dotfiles when configuring users.
    enum:
    - value: overwrite
      description: Overwrite skel dotfiles from templates; always re-inject ZDOTDIR block.
    - value: augment
      description: Copy skel files only if absent; always re-inject ZDOTDIR block.
    - value: skip
      description: Skip all user configuration if dotfiles already exist.
    type: string
_options:
  installer_dir: false
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-zsh
#   - ghcr.io/quantized8/devfeats/setup-user
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
        - when: {pm: apt}
          packages: [locales]
        - when: {pm: apk}
          packages: [musl-locales, musl-locales-lang]
        - when: {pm: [dnf, yum]}
          packages: [glibc-langpack-en]
        - when: {pm: zypper}
          packages: [glibc-i18ndata]
        - when: {pm: pacman}
          packages: [glibc]

      scripts: |
        if command -v dpkg > /dev/null 2>&1; then
          sed -i 's/^# \(en_US\.UTF-8\)/\1/' /etc/locale.gen
          locale-gen
        fi
