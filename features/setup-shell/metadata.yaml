version: 0.1.0
name: Shell Setup
description: Configure system-wide and per-user shell environment files for Bash and Zsh.
keywords:
- shell
- zsh
- bash
- config
_long_description: >-
  Deploys a layered set of system-wide and per-user configuration files to ensure
  correct shell behavior across all invocation modes — login, interactive,
  non-interactive, scripts, cron, devcontainer exec, CI runners, and VS Code tasks.
  Deploys shared shell files (`/etc/shellenv`, `/etc/shellrc`, `/etc/shellaliases`,
  `/etc/profile`) and shell-specific system configs (bashrc, bashenv, zshenv,
  zprofile, zshrc), copies per-user dotfiles from a skeleton directory, and injects
  `ZDOTDIR` into each user's `~/.zshenv`. Optionally sets the default login shell
  for all resolved users via `chsh`. Install shells separately with `install-zsh`.
  Use `setup_bash` and `setup_zsh` to control which shell-specific files are deployed.
options:
  setup_bash:
    type: string
    default: auto
    description: |-
      Whether to deploy Bash-specific system and per-user configuration files
      (`/etc/bashrc`, `bashenv`, `BASH_ENV`, user `.bashrc`, etc.).
    enum:
    - value: auto
      description: Deploy when `bash` is on PATH.
    - value: 'true'
      description: Always deploy Bash configuration, even when `bash` is not installed yet.
    - value: 'false'
      description: Skip Bash-specific configuration.
  setup_zsh:
    type: string
    default: auto
    description: |-
      Whether to deploy Zsh-specific system and per-user configuration files
      (`/etc/zsh/*`, user `.zshenv`, `ZDOTDIR`, `.zshrc`, etc.).
    enum:
    - value: auto
      description: Deploy when `zsh` is on PATH.
    - value: 'true'
      description: Always deploy Zsh configuration, even when `zsh` is not installed yet.
    - value: 'false'
      description: Skip Zsh-specific configuration.
  setup_system:
    type: string
    default: auto
    description: Whether to deploy system-wide configuration files (to `/etc/`).
    enum:
    - value: auto
      description: Deploy when the current process has root privileges or passwordless sudo.
    - value: 'true'
      description: Always deploy system-wide files (fails if insufficient privilege).
    - value: 'false'
      description: Never deploy system-wide files.
  setup_skel:
    type: string
    default: auto
    description: |-
      Whether to copy skel files to `/etc/skel` so new users automatically inherit
      the shell configuration.
    enum:
    - value: auto
      description: Copy when privileged and `/etc/skel` already exists on the system.
    - value: 'true'
      description: Always copy to `/etc/skel`, creating the directory if needed.
    - value: 'false'
      description: Never copy to `/etc/skel`.
  setup_bash_env:
    type: string
    default: auto
    description: Whether to set `BASH_ENV` in `/etc/environment` for non-interactive Bash sessions.
    enum:
    - value: auto
      description: Set `BASH_ENV` when Bash configuration is deployed (`setup_bash` is `auto` or `true`).
    - value: 'true'
      description: Always set `BASH_ENV` (even when `setup_bash` is `false`).
    - value: 'false'
      description: Never set `BASH_ENV`.
  bash_env_path:
    type: string
    default: ''
    description: |-
      Override the path written to `BASH_ENV`. Leave empty to use the automatically
      computed path next to the system bashrc (e.g. `/etc/bashenv` or `/etc/bash/bashenv`).
  locale:
    type: string
    default: en_US.UTF-8
    description: |-
      Locale to set as `LANG` and `LC_ALL` in `/etc/shellenv`. Leave empty to skip locale setup.
  umask:
    type: string
    default: '022'
    description: |-
      `umask` value set in `/etc/shellenv`. Controls default permissions for new files and directories.
      The default of `022` means owners can read/write, while group and others can read only.
      Leave empty to skip.
  default_editor:
    type: string
    default: auto
    description: Default `VISUAL`/`EDITOR` set in `/etc/shellenv`.
    enum:
    - value: auto
      description: Prefer `nano`; fall back to `vi` if nano is not available.
    - value: nano
      description: Use `nano`.
    - value: vim
      description: Use `vim`.
    - value: neovim
      description: Use `nvim`.
    - value: emacs
      description: Use `emacs`.
    - value: code
      description: Use VS Code (`code --wait`).
    - value: skip
      description: Do not set `VISUAL`/`EDITOR`.
  user_shellenv:
    type: string
    default: .shellenv
    description: |-
      Filename (relative to `$HOME`) for the user shell environment file.
      Sourced by `~/.zshenv` (for every Zsh invocation) and `~/.bash_profile` (for Bash login shells).
  user_shellrc:
    type: string
    default: .shellrc
    description: |-
      Filename (relative to `$HOME`) for the user interactive shell configuration file.
      Sourced by `~/.bashrc` and `~/.zshrc`.
  bash_theme:
    type: string
    default: '${XDG_CONFIG_HOME:-${HOME}/.config}/bash/bashtheme'
    description: |-
      Path to the Bash theme scaffold file.
      Default: `${XDG_CONFIG_HOME:-$HOME/.config}/bash/bashtheme` (per-user).
      Accepts `~`, `$HOME`, and `${VAR:-default}` expressions, evaluated in each user's
      login environment.
      Downstream features (e.g. `install-starship`) may append their configuration
      to this file via `shell__write_block`.
  zsh_theme:
    type: string
    default: '${ZDOTDIR}/zshtheme'
    description: |-
      Path to the Zsh theme scaffold file. Does not need to be within `ZDOTDIR`.
      Default: `${ZDOTDIR}/zshtheme` (adjacent to other Zsh config files).
      Accepts `~`, `$HOME`, `$ZDOTDIR`, and `${VAR:-default}` expressions, evaluated in
      each user's login environment.
      Downstream features (e.g. `install-ohmyzsh`, `install-starship`) append
      their configuration to this file via `shell__write_block`.
  set_user_shells:
    type: string
    default: zsh
    description: |-
      Whether to set users' default login shell via `chsh`.
      Applies to all users resolved by the `add_current_user`, `add_remote_user`, `add_container_user`, and `add_users` options.
      Raises an error if `zsh` is selected but Zsh is not available.
    enum:
    - value: zsh
      description: Set all resolved users' default login shell to Zsh.
    - value: bash
      description: Set all resolved users' default login shell to Bash.
    - value: none
      description: Do not change any user's default login shell.
  zdotdir:
    default: ''
    description: |-
      Directory where Zsh looks for its per-user config files (`.zshrc`, `.zprofile`, `.zlogin`).
      Corresponds to the `ZDOTDIR` environment variable set in `~/.zshenv`.
      Leave empty to use the default: `${XDG_CONFIG_HOME}/zsh` (i.e. `~/.config/zsh`).
      Accepts paths prefixed with `~` or `$HOME`.
      Only applies when `setup_zsh` is not `false`.
    type: string
  if_exists:
    type: string
    default: skip
    description: How to handle existing per-user dotfiles.
    enum:
    - value: skip
      description: >-
        For each dotfile: create it if absent; leave it untouched if it already exists.
    - value: update
      description: >-
        For each dotfile: create if absent; sync the managed block if markers are present;
        append the managed block at the end if no markers exist.
    - value: reinstall
      description: >-
        Delete and recreate all per-user dotfiles unconditionally.
    - value: uninstall
      description: >-
        Remove all managed blocks from per-user dotfiles; delete files that become empty.
_options:
  configure_users: true
  installer_dir: false
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-zsh
#   - ghcr.io/quantized8/devfeats/setup-user
_dependencies:
  run:
    base:
      packages:
        - when: {plat.pm: apt}
          packages: [locales]
        - when: {plat.pm: apk}
          packages: [musl-locales, musl-locales-lang]
        - when: {plat.pm: [dnf, yum]}
          packages: [glibc-langpack-en]
        - when: {plat.pm: zypper}
          packages: [glibc-i18ndata]
        - when: {plat.pm: pacman}
          packages: [glibc]

      scripts: |
        if command -v dpkg > /dev/null 2>&1; then
          sed -i 's/^# \(en_US\.UTF-8\)/\1/' /etc/locale.gen
          locale-gen
        fi
