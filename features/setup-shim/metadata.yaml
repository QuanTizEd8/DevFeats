version: 0.1.0
name: Shim Setup
description: Install lightweight command shims that delegate to real tools or provide container-friendly fallbacks.
keywords:
- shim
- wrapper
- path
- devcontainer
- tools
_long_description: >-
  Shims are installed into a dedicated directory prepended to PATH so they take priority
  over any real binary of the same name. The code shim forwards to VS Code or
  code-insiders when available. The systemctl shim runs the real systemctl when systemd
  is active, and prints a helpful message suggesting the service command otherwise. The
  devcontainer-info shim reads dev container metadata from the standard environment
  files and displays or returns specific fields on request. Each shim can be individually
  enabled or disabled.
containerEnv:
  PATH: /usr/local/share/setup-shim/bin:$PATH
options:
  code:
    type: boolean
    default: true
    description: Install a `code` shim that delegates to the real `code` CLI or falls back to `code-insiders`.
  devcontainer-info:
    type: boolean
    default: true
    description: Install a `devcontainer-info` shim that queries dev container image metadata from meta.env files.
  systemctl:
    type: boolean
    default: true
    description: Install a `systemctl` shim that delegates to the real systemctl when systemd is running, or prints a helpful message suggesting the `service` command.
