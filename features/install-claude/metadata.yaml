version: 0.1.0
name: Claude Code Installation
description: Install [Claude Code](https://code.claude.com) — Anthropic's terminal-first AI coding assistant.
keywords:
  - claude
  - anthropic
  - ai
  - llm
  - coding-assistant
_long_description: >-
  Installs Claude Code (the claude CLI), Anthropic's AI coding assistant that combines
  conversational AI with direct file editing, shell command execution, git workflows,
  and MCP server integrations.

  Supports four installation methods: a direct binary download from Anthropic's CDN
  (self-contained, no system Node.js or package manager required), the Anthropic OS
  package repositories on Linux (apt/dnf/yum/apk — recommended for devcontainers),
  the standard Homebrew cask on macOS, npm-bundled (self-contained, no system
  Node.js required), and npm (requires Node.js 18+). The default auto method
  selects the best option for the current environment.

  In devcontainers, the Claude config directory (~/.claude) is symlinked to a
  persistent workspace subdirectory so credentials and settings survive container
  rebuilds.

_options:
  verify:
    args: "--version"
    description: Verify the Claude Code CLI is installed and working.
  version:
    resolution: npm
  method:
    binary:
      asset_uri: "https://downloads.claude.ai/claude-code-releases/{feat.version}/{plat.kernel:lower}-{plat.machine_node}{plat.kernel==linux?{plat.libc==musl?-musl:}:}/claude"
      when: {plat.machine_release: [amd64, arm64]}
    package:
      when: {plat.pm: brew}
    upstream-package:
      when: {plat.pm: [apt, apk, dnf, yum]}
    npm-bundled:
      package: "@anthropic-ai/claude-code"
      cmd: claude
    npm:
      package: "@anthropic-ai/claude-code"
  prefix:
    bins: [claude]
    root: /usr/local
    nonroot: "${HOME}/.local"
    applies_when:
      - method: [binary, npm-bundled, npm]

options:
  config_dir:
    type: string
    default: .claude
    description: |-
      Relative path within the workspace to the directory used as the Claude
      config directory and symlinked to ~/.claude on container creation.
      Claude stores credentials, settings, and conversation history under
      ~/.claude; symlinking it to a workspace path makes them persist across
      container rebuilds.
      Set to an empty string to skip the symlink.

onCreateCommand:
  symlink-config-dir:
    description: Symlink the configured workspace directory to ~/.claude on container create.
    args: "${containerWorkspaceFolder}"
    _conf_vars: [CONFIG_DIR]

customizations:
  vscode:
    extensions:
      - anthropic.claude-code

_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    method-package:
      brew:
        casks:
          - "{feat.version_input==latest?claude-code@latest:claude-code}"
    method-upstream-package:
      packages:
        - name: claude-code
          version: "{feat.pm_version}"
          when:
            plat.pm: [apt, apk, dnf, yum]
      apt:
        keys:
          - url: https://downloads.claude.ai/keys/claude-code.asc
            dest: /etc/apt/keyrings/claude-code.asc
            dearmor: false
        repos:
          - deb [signed-by=/etc/apt/keyrings/claude-code.asc]
            https://downloads.claude.ai/claude-code/apt/{feat.version_input==latest?latest:stable} {feat.version_input==latest?latest:stable} main
      dnf:
        repos:
          - |
            [claude-code]
            name=Claude Code
            baseurl=https://downloads.claude.ai/claude-code/rpm/{feat.version_input==latest?latest:stable}
            enabled=1
            gpgcheck=1
            gpgkey=https://downloads.claude.ai/keys/claude-code.asc
      yum:
        repos:
          - |
            [claude-code]
            name=Claude Code
            baseurl=https://downloads.claude.ai/claude-code/rpm/{feat.version_input==latest?latest:stable}
            enabled=1
            gpgcheck=1
            gpgkey=https://downloads.claude.ai/keys/claude-code.asc
      apk:
        keys:
          - url: https://downloads.claude.ai/keys/claude-code.rsa.pub
            dest: /etc/apk/keys/claude-code.rsa.pub
            dearmor: false
        repos:
          - https://downloads.claude.ai/claude-code/apk/{feat.version_input==latest?latest:stable}
