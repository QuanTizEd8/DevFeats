version: 0.1.0
name: Font Installation
description: Install fonts from [Nerd Fonts](https://www.nerdfonts.com/), GitHub releases, or arbitrary URLs.
keywords:
- fonts
- font archive
- nerd-fonts
- typography
- document
_long_description: >-
  Fonts can be sourced from [Nerd Fonts](https://www.nerdfonts.com/) by name, from GitHub
  release assets by repository slug, from the
  [Powerlevel10k MesloLGS NF](https://github.com/romkatv/powerlevel10k-media) bundle, or
  from individual font files and archives at arbitrary URLs — all in a single feature
  invocation. Archives are extracted automatically, and font caches are refreshed after
  installation.
options:
  nerd_fonts:
    default: "Meslo\nJetBrainsMono"
    description: >-
      [Nerd Fonts](https://www.nerdfonts.com/) archive names to install
      (e.g. `Meslo`, `FiraCode`, `Hack`). Leave empty to skip Nerd Font downloads.
    proposals:
    - value: Meslo
      description: MesloLGS Nerd Font.
    - value: JetBrainsMono
      description: JetBrains Mono Nerd Font.
    - value: FiraCode
      description: Fira Code Nerd Font with programming ligatures.
    - value: Hack
      description: Hack Nerd Font — a clean monospace font for source code.
    - value: SourceCodePro
      description: Source Code Pro Nerd Font.
    type: array
  font_urls:
    default: ''
    description: >-
      Direct URLs to download. Font files (`.ttf`, `.otf`, `.woff`, `.woff2`)
      and archives (`.tar.xz`, `.tar.gz`, `.tgz`, `.zip`) are installed under a
      namespaced path derived from the URL. Fonts are deduplicated by PostScript name.
    type: array
  gh_release_fonts:
    default: ''
    description: >-
      GitHub slugs in `owner/repo` or `owner/repo@tag` form. All font and
      archive assets from the release are installed under
      `gh/<owner>/<repo>/<tag>/<id>/`. Without a tag, the latest release is used.
      Fonts are deduplicated by PostScript name.
    type: array
  p10k_fonts:
    default: false
    description: >-
      Install the four [MesloLGS NF](https://github.com/romkatv/powerlevel10k-media)
      fonts required by Powerlevel10k under `p10k/MesloLGS-NF/`.
    type: boolean
  overwrite:
    default: false
    description: When a font with the same PostScript name is already installed, overwrite it instead of skipping.
    type: boolean
  font_dir:
    default: ''
    description: |-
      Font installation directory. Leave empty to auto-detect:
      - Root / container: `/usr/share/fonts`
      - Linux user: `$XDG_DATA_HOME/fonts` (default: `~/.local/share/fonts`)
      - macOS user: `~/Library/Fonts`
    type: string
# installsAfter:
#   - ghcr.io/quantized8/devfeats/setup-user
#   - ghcr.io/quantized8/devfeats/install-jq
#   - ghcr.io/quantized8/devfeats/install-yq
#   - ghcr.io/quantized8/devfeats/setup-shell
_dependencies:
  run:
    base:
      packages:
        - fontconfig
