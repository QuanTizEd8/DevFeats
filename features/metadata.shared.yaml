# Shared Feature Metadata
#
# These are merged into each feature's metadata.yaml at build time.


documentationURL: ${{ _project.docs.website_base_url }}$/features/${{ id }}$
licenseURL: ${{ _project.repo_url }}$/blob/main/LICENSE

_oci_ref: ${{ _project.oci_base }}$/${{ id }}$
_lifecycle_key_prefix: ${{ _project.owner_slug }}$-${{ _project.name_slug }}$--

# Canonical path/filename values merged into every feature. install_script.py
# emits one bash assignment per key: snake_case `foo_bar` → `_FOO_BAR`.
_env_vars:
  share_dir_root: /usr/local/share/${{ _project.namespace }}$/${{ id }}$
  share_dir_nonroot: ${HOME}/.local/share/${{ _project.namespace }}$/${{ id }}$
  lifecycle_script_dir: ${{ _env_vars.share_dir_root }}$/lifecycle-hooks
  shell_profile_d_filename: 99-${{ _project.owner_slug }}$--${{ _project.name_slug }}$--${{ id }}$.sh

_prefix_option_templates:

  prefix:
    type: string
    default: ""
    description: >-
      Installation prefix. Resolved automatically when left empty:
      `{default_root}` (root) or `{default_nonroot}` (non-root).{bin_note}

  discovery:
    type: string
    default: auto
    description: >-
      {disc_intro}
      `auto` (default): if the install directory is already on PATH, does nothing;
      otherwise creates symlinks when viable, or writes a PATH export block.
      `symlink`: create symlinks only (suppresses PATH export).
      `shell`: write PATH export only (suppresses symlinks).
      `all`: both symlinks and PATH export unconditionally.
      `none`: skip everything.
    enum:
      - value: auto
        description: >-
          Smart detection: skip if already on PATH; otherwise use symlinks when viable,
          PATH export as fallback.
      - value: symlink
        description: Create symlinks only; suppress PATH export.
      - value: shell
        description: Write PATH export to shell startup files only; suppress symlinks.
      - value: all
        description: Create symlinks and write PATH export unconditionally.
      - value: none
        description: Skip both symlinks and PATH export.

  symlinks:
    type: array
    default: ""
    description: >-
      {symlink_subject}
      Defaults to `{symlink_root}` (root) or `{symlink_nonroot}` (non-root).
      Provide explicit target directories one per line to override.
      Use `{discovery_key}=none` to skip symlink creation entirely.

  exports:
    type: array
    default: ""
    description: >-
      Shell startup files to write a PATH export block
      (`export PATH="{prefix_var_ref}/{bin_dir}:$PATH"`) to.
      Leave empty (default) to write to standard profiles
      (system-wide as root, user-scoped otherwise),
      or provide explicit file path(s) one per line.
      Use `{discovery_key}=none` to skip PATH export entirely.

  activations:
    type: array
    description: >-
      Shell names to write activation snippets for (e.g. `bash`, `zsh`).
      Leave empty to skip all activation writes.
    enum:
      - value: bash
        description: Write activation snippet for bash.
      - value: zsh
        description: Write activation snippet for zsh.

  write_group:
    type: string
    description: >-
      OS group for shared write access to the installation prefix.
      Non-empty: create this group (if absent), add all resolved users to it,
      and apply group-write bits so group members can install packages.
      Empty: skip group setup.

  write_users:
    type: array
    default: ""
    description: >-
      Users to add to the write-permission group.
      Empty (default): auto-discover (current user, remoteUser, containerUser).
      Non-empty: use exactly these users; auto-discovery is skipped.


options:

  if_exists:
    type: string
    default: skip
    description: >-
      Behaviour when the tool is already present before installation begins.
    enum:
      - value: skip
        description: >-
          Tool present in PATH — skip and exit successfully.
          Tool absent — proceed with installation.
      - value: fail
        description: >-
          Tool present in PATH — exit with an error.
          Tool absent — proceed with installation.
      - value: reinstall
        description: >-
          Tool present — uninstall (method-aware) and reinstall at target prefix.
          Tool absent — proceed with installation.
      - value: update
        description: >-
          Tool present — update to the target version at the target prefix and method;
          no-op if version, location, and method already match.
          Uses the tool's own update command when available; falls back to reinstall.
          Tool absent — proceed with fresh installation.
      - value: uninstall
        description: >-
          Tool present — remove (method-aware) and exit without installing.
          Tool absent — exit successfully (no install performed).

  keep_build_deps:
    type: boolean
    default: false
    description: >-
      Keep install-time-only packages (build tools, download utilities) after installation.
      By default these are removed to reduce image layer size.
      Set to true if you need them at runtime (e.g. compiling native Node.js modules).

  keep_cache:
    type: boolean
    default: false
    description: >-
      Keep the package manager cache after installation.
      By default, the package manager cache is removed after installation to reduce image layer size.
      Set this flag to true to keep the cache, which may speed up subsequent installations at the cost of larger image layers.

  fetch_headers:
    _apply_when: |
      #{{ return get("_options.user_file_fetch") }}#
    type: array
    default: ''
    description: >-
      Additional HTTP headers (one per line, "Name: value") sent with every
      URI fetch performed by this feature (remote environment files, manifests,
      netrc, etc.). Useful for "Authorization: Bearer …" against private GitHub
      raw URLs, OCI registries, or internal mirrors.

  fetch_netrc:
    _apply_when: |
      #{{ return get("_options.user_file_fetch") }}#
    type: string
    default: ''
    description: >-
      Path to a .netrc file used for HTTP basic authentication on URI fetches
      that use netrc (curl/wget --netrc-file). Ignored when empty.
      Does not replace feature-specific credential options (e.g. install-pixi `netrc`
      for the pixi binary download); use together when both apply.

  installer_dir:
    _apply_when: |
      #{{ return get("_options.installer_dir", True) }}#
    type: string
    default: ''
    description: >-
      Working directory for download and archive extraction.
      When empty (default), a private temporary directory is used and removed automatically on exit.
      When set, the directory and its contents are retained after installation.
      The work directory has the following layout:
      ```
      work_dir/
        archive/<basename>      Raw downloaded file (archives only); <basename> is
                                the basename of <uri>, or --filename if set.
        asset/                  Archive extracted verbatim (no path stripping): the
                                archive's internal tree is reproduced exactly under
                                asset/. For non-archives: the downloaded file as
                                <basename>.
        sidecar/<basename>      Basename of --sidecar URI (only when --sidecar given).
        gpg-sig/<basename>      Basename of --gpg-sig URI (only when --gpg-key given).
        gpg-key/<basename>      Basename of --gpg-key URI (only when --gpg-key given).
      ```
      When provided, the five managed subdirectories are
      removed and recreated on each invocation (idempotency).

  log_level:
    type: string
    default: info
    description: >-
      Minimum log level emitted to console (stderr).
    enum: &log_levels
      - value: silent
        description: Only fatal (e.g. non-zero exit summary).
      - value: error
        description: fatal and error (⛔).
      - value: warn
        description: fatal, error, and warning (⚠️).
      - value: info
        description: Above plus info, success, and phase helpers (default).
      - value: debug
        description: Above plus debug (🐞).
      - value: trace
        description: Above plus bash xtrace (`set -x`) for command-level tracing.

  log_file:
    type: string
    default: ""
    description: Log all output (stdout + stderr) to this file in addition to console.

  log_file_level:
    type: string
    default: debug
    description: >-
      Minimum log level to capture in the log file specified by `log_file`.
    enum: *log_levels

  gh_repo:
    _apply_when: |
      #{{ return bool(get("_gh_repo")) }}#
    type: string
    default: ${{ _options.gh_repo }}$
    description: >-
      GitHub repository of ${{ _tool_name }}$ in the format `owner/repo`.
      Used for version resolution and downloading binaries,
      installation scripts, or source code,
      depending on the installation method.
      Set to a fork or alternate repository to use a custom source.

  runtime_path:
    _apply_when: |
      #{{
        prefix_groups = get("_prefix_groups", {})
        return any(
            not (
                g.get("symlink", {}).get("skip", False)
                and g.get("exports", {}).get("skip", False)
            )
            for g in prefix_groups.values()
        )
      }}#
    type: string
    default: ""
    description: |
      Colon-separated directories guaranteed to be on PATH at runtime
      (e.g. `/usr/local/bin:/usr/bin:/bin`).
      When set, the discovery step uses this value to decide whether
      the installation directory is already reachable.
      Leave empty (default) to check `$PATH` at install time instead.
