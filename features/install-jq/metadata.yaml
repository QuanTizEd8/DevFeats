version: 0.1.0
name: jq Installation
description: Install [jqlang/jq](https://github.com/jqlang/jq) — a lightweight command-line JSON processor.
keywords:
  - jq
  - json
  - cli
  - tooling
_long_description: |-
  Installs `jq`, the lightweight command-line JSON processor written in portable C.
  Widely used for filtering, transforming, and validating JSON in shell pipelines,
  CI/CD scripts, and configuration tooling.
_options:
  verify:
    args: "--version"
    description: Verify jq is installed and working.
  gh_repo: jqlang/jq
  version:
    resolution: github_release
    default: stable
    flag: --version
    proposals:
      - value: 1.8.1
        description: jq v1.8.1.
      - value: 1.7.1
        description: jq v1.7.1.
      - value: '1.6'
        description: jq v1.6 (uses legacy release asset naming).
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{feat.tag}/{feat.version>=1.7?jq-{plat.kernel_macos}-{plat.machine_release}:{plat.kernel_osx==linux?jq-linux{plat.machine_bitness}:jq-osx-amd64}}"
      gpg_key_uri: "https://raw.githubusercontent.com/${{ _options.gh_repo }}$/master/sig/jq-release-{feat.version>=1.7?new:old}.key"
      gpg_sig_uri: "https://raw.githubusercontent.com/${{ _options.gh_repo }}$/master/sig/v{feat.version}/{feat.version>=1.7?jq-{plat.kernel_macos}-{plat.machine_release}:{plat.kernel_osx==linux?jq-linux{plat.machine_bitness}:jq-osx-amd64}}.asc"
      when: {plat.machine_release: [amd64, arm64, i386]}
    package: {}
    source:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{feat.tag}/jq-{feat.version}.tar.gz"
      build_system: autotools
      configure_args:
        - "--with-oniguruma=builtin"
      make_targets:
        - "all"
        - "check"
        - "install"
  prefix:
    bins: [jq]
    applies_when:
      - method: [binary, source]
_dependencies:
  run:
    method-package:
      packages:
        - jq
  build:
    method-source:
      packages:
        - make
        - automake
        - autoconf
        - libtool
        - name: gcc
          apt: build-essential
          apk: build-base
# installsAfter: []
