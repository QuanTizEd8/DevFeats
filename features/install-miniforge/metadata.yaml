version: 0.1.0
name: Miniforge Installation
description: Install [Conda](https://conda.io/) and [Mamba](https://github.com/mamba-org/mamba) from [Miniforge](https://github.com/conda-forge/miniforge).
keywords:
- conda
- mamba
- miniforge
- package manager
- python
_long_description: >-
  Miniforge is the community-maintained [Conda](https://conda.io/) and
  [Mamba](https://github.com/mamba-org/mamba) distribution from
  [conda-forge](https://conda-forge.org/), preconfigured to source all base-environment
  packages exclusively from the conda-forge channel. The official Miniforge installer is
  downloaded, optionally verified against a SHA-256 checksum, and run non-interactively.
  Shell activation is written to the appropriate startup files and can be scoped to
  specific users.
options:
  version:
    default: latest
    description: |-
      Conda version to install (e.g. `26.3.1`).
      Accepts a conda version string, not a Miniforge release tag.
      `latest` resolves to the current latest release via the GitHub API.
      For a specific version, the script finds the highest Miniforge build number for that conda version
      (e.g. `24.7.1` resolves to tag `24.7.1-2`).
      If the already-installed conda version matches the resolved version, the install is
      skipped silently regardless of the `if_exists` setting.
    type: string
  if_exists:
    default: skip
    description: What to do when conda is already installed at `prefix`.
    enum:
    - value: skip
      description: Warn and continue to post-install steps (idempotent).
    - value: fail
      description: Print an error and exit non-zero.
    - value: reinstall
      description: Uninstall the existing installation then install fresh.
    - value: update
      description: Update the base conda environment to the resolved version.
    type: string
  preserve_envs:
    default: true
    _applies_when:
      - if_exists: [reinstall]
    description: |-
      Export all non-base conda environments before uninstalling and recreate them after reinstalling.
      Each environment is exported with `--from-history`; on recreation failure the YAML
      is kept at `/tmp/conda-env-preserve` for manual recovery.
    type: boolean
  preserve_config:
    default: true
    _applies_when:
      - if_exists: [reinstall]
    description: |-
      Skip `conda init --reverse` and preserve `.condarc`
      and `.conda` directories during uninstall.
      Set to `false` to perform a full clean uninstall.
    type: boolean
  update_base:
    default: false
    description: |-
      Run `conda update --all` to update the base conda environment after installation.
      Not recommended for images where environment reproducibility matters.
    type: boolean
  shell_activations:
    default: "bash\nzsh"
    description: Shell names to write conda init blocks for. Set to `''` to skip all activation writes.
    enum:
    - value: bash
      description: Write an idempotent conda init block to the system-wide (root) or user-scoped (non-root) Bash RC file.
    - value: zsh
      description: Write an idempotent conda init block to the system-wide (root) or user-scoped (non-root) Zsh RC file.
    type: array
  activate_env:
    default: base
    description: |-
      Conda environment to activate at shell startup.
      `base` sets `auto_activate_base=true` in `~/.condarc` (the conda-native mechanism).
      Any other name appends a `conda activate <env>` line to the rc files.
      `''` (empty) skips activation setup entirely.
      Only takes effect when `shell_activations` is non-empty.
    type: string
  write_group:
    default: conda
    description: |-
      OS group for shared write access to the conda prefix.
      Non-empty — create this group (if absent), add all resolved users to it, and apply group-write bits on the prefix so group members can install packages.
      `''` (empty) — skip group setup; only the install owner has write access.
    type: string
  add_current_user:
    default: true
    description: |-
      Include the current user (the user running the installer, or SUDO_USER if set) in the resolved user list for per-user config writes and write-permission group membership.
      Root is deferred: only included as a fallback when no other non-root user is resolved.
    type: boolean
  add_remote_user:
    default: true
    description: |-
      Include the devcontainer remoteUser (from the _REMOTE_USER env var) in the resolved user list for per-user config writes and write-permission group membership.
      Ignored when _REMOTE_USER is unset or empty. Root is excluded from this path.
    type: boolean
  add_container_user:
    default: true
    description: |-
      Include the devcontainer containerUser (from the _CONTAINER_USER env var) in the resolved user list for per-user config writes and write-permission group membership.
      Ignored when _CONTAINER_USER is unset or empty. Root is excluded from this path.
    type: boolean
  add_users:
    default: ''
    description: |-
      Additional usernames to include in the resolved user list for per-user config writes and write-permission group membership.
      Root is accepted here (unlike the auto-detected paths above).
    type: array
  interactive:
    default: false
    description: Run the Miniforge installer in interactive mode, allowing it to prompt the user.
    type: boolean
  installer_dir:
    default: /tmp/miniforge-installer
    description: Working directory for downloading the Miniforge installer script and checksum sidecar.
    type: string
  keep_installer:
    default: false
    description: Keep the Miniforge installer script and checksum after installation instead of removing them.
    type: boolean
containerEnv:
  PATH: ${HOME}/miniforge3/bin:/opt/conda/bin:${PATH}
postStartCommand:
  install-miniforge-feature-welcome:
    command: conda info
    description: Print conda installation info to confirm Miniforge is active after container start.
# installsAfter: []
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-shell
#   - ghcr.io/quantized8/devfeats/setup-user
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
_prefix_groups:
  "":
    default_root: /opt/conda
    default_nonroot: "${HOME}/miniforge3"
    bin: conda
    dir_symlink: true
