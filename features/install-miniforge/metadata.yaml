version: 0.1.0
name: Miniforge Installation
description: Install [Conda](https://conda.io/) and [Mamba](https://github.com/mamba-org/mamba) from [Miniforge](https://github.com/conda-forge/miniforge).
keywords:
- conda
- mamba
- miniforge
- package manager
- python
_long_description: >-
  Miniforge is the community-maintained [Conda](https://conda.io/) and
  [Mamba](https://github.com/mamba-org/mamba) distribution from
  [conda-forge](https://conda-forge.org/), preconfigured to source all base-environment
  packages exclusively from the conda-forge channel. The official Miniforge installer is
  downloaded, optionally verified against a SHA-256 checksum, and run non-interactively.
  Shell activation is written to the appropriate startup files and can be scoped to
  specific users.
options:
  version:
    default: stable
    description: |-
      Conda version to install. `stable` resolves the latest stable Miniforge release, `latest` resolves the most recently published release (may include pre-releases), or a conda version string like `26.3.1` to find the corresponding Miniforge tag.
      For a specific version, the script finds the matching Miniforge tag (e.g. `26.3.1` resolves to a tag like `26.3.1-0`).
      If the already-installed conda version matches the resolved version, the install is
      skipped silently regardless of the `if_exists` setting.
    proposals:
    - value: stable
      description: Resolve the latest stable (non-pre-release) Miniforge release via the GitHub Releases API.
    - value: latest
      description: Resolve the most recently published Miniforge release via the GitHub Releases API, which may include pre-releases.
    type: string
  if_exists:
    default: skip
    description: What to do when conda is already installed at `prefix`.
    enum:
    - value: skip
      description: Warn and continue to post-install steps (idempotent).
    - value: fail
      description: Print an error and exit non-zero.
    - value: reinstall
      description: Uninstall the existing installation then install fresh.
    - value: update
      description: Update the base conda environment to the resolved version.
    type: string
  preserve_envs:
    default: true
    _applies_when:
      - if_exists: [reinstall]
    description: |-
      Export all non-base conda environments before uninstalling and recreate them after reinstalling.
      Each environment is exported with `--from-history`; on recreation failure the YAML
      is kept at `/tmp/conda-env-preserve` for manual recovery.
    type: boolean
  preserve_config:
    default: true
    _applies_when:
      - if_exists: [reinstall]
    description: |-
      Skip `conda init --reverse` and preserve `.condarc`
      and `.conda` directories during uninstall.
      Set to `false` to perform a full clean uninstall.
    type: boolean
  update_base:
    default: false
    description: |-
      Run `conda update --all` to update the base conda environment after installation.
      Not recommended for images where environment reproducibility matters.
    type: boolean
  activate_env:
    default: base
    description: |-
      Conda environment to activate at shell startup.
      `base` sets `auto_activate_base=true` in each resolved user's `.condarc`.
      Any other name writes `conda activate <env>` to each resolved user's `.bashrc` and `.zshrc`.
      `''` (empty) skips activation setup entirely.
      Note: for activation to take effect, the conda shell hook must be initialized
      (e.g. via `prefix_activations`, or manually via `conda init`).
    type: string
  interactive:
    default: false
    description: Run the Miniforge installer in interactive mode, allowing it to prompt the user.
    type: boolean
  installer_dir:
    default: ''
    description: |-
      Working directory for downloading the Miniforge installer script and checksum sidecar.
      When empty (default), a private temporary directory is used and removed automatically on exit.
      When set, the directory and its contents are retained after installation.
    type: string
onCreateCommand:
  verification:
    description: Verify conda is installed and working by running `conda info`.
    command: '@@_FEAT_SHARE_DIR@@/lifecycle--on-create--verification.sh'
# installsAfter: []
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-shell
#   - ghcr.io/quantized8/devfeats/setup-user
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
_prefix_groups:
  "":
    prefix:
      root: /opt/conda
      nonroot: "${HOME}/miniforge3"
      bins: [conda, mamba]
      bin_dir: condabin
    exports:
      skip: true
    activation:
      shells: [bash, zsh]
      description: |-
        Shells to write conda shell initialisation to RC files for.
        Equivalent to `conda init <shell>` — enables `conda activate` and
        environment auto-activation in interactive shells.
        Set to `''` to skip all activation writes.
    write_group:
      default: conda
