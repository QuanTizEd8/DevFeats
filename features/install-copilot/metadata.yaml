version: 0.1.0
name: GitHub Copilot CLI Installation
description: Install [GitHub Copilot CLI](https://github.com/features/copilot) — an AI-powered agentic command-line interface for working with code and GitHub from the terminal.
keywords:
  - copilot
  - github
  - ai
  - llm
  - cli
_long_description: >-
  GitHub Copilot CLI is an agentic command-line interface that integrates AI
  assistance directly into your terminal. It supports interactive and programmatic
  invocation, can perform code edits, repository operations, and pull request
  workflows, and is extensible via plugins and MCP servers.

  Three installation methods are supported:

  - **binary** (auto-selected on x64/arm64): Downloads and verifies a pre-built
    tarball from GitHub Releases with SHA-256 validation. No Node.js dependency.
  - **npm**: Installs globally via `npm install -g @github/copilot`. Requires
    Node.js 22 or later pre-installed (e.g. via `install-node` or `install-nvm`).
  - **package** (auto-selected on Homebrew): Installs via `brew install --cask copilot-cli`
    (stable) or `brew install --cask copilot-cli@prerelease` when `version: latest`.
    Homebrew manages versioning and PATH; semver pinning has no effect on the cask.

  In devcontainer builds, a lifecycle hook is registered that symlinks the
  workspace `.copilot` directory (configurable via `vscode_user_dir`) to
  `~/.vscode-server/data/User`, preserving VS Code Copilot Chat transcript history
  and VS Code settings across container rebuilds.

  The `copilot_home` option exports `COPILOT_HOME` to all user shells, redirecting
  the Copilot CLI configuration directory (settings, plugins, auth state) from its
  default `~/.copilot`. For devcontainers, point it at a workspace-relative path
  (e.g. `${containerWorkspaceFolder}/.copilot/cli`) to persist CLI configuration
  across rebuilds alongside the VS Code data. The `copilot_model` option exports
  `COPILOT_MODEL` to override the CLI's built-in model selection.
_tool_name: copilot
_options:
  verify:
    args: "--version"
    description: Verify GitHub Copilot CLI is installed and working.
  gh_repo: github/copilot-cli
  version:
    resolution: github_release
    default: stable
    inputs: [stable, latest, semver]
    flag: version
    proposals:
      - value: 1.0.48
        description: Copilot CLI v1.0.48 (latest as of 2026-05-17).
  method:
    binary:
      asset_uri: "https://github.com/github/copilot-cli/releases/download/{TAG}/copilot-{OS}-{ARCH:node}.tar.gz"
      sidecar_uri: "https://github.com/github/copilot-cli/releases/download/{TAG}/SHA256SUMS.txt"
      binary_src: copilot
      when: {arch: [amd64, arm64]}
    npm:
      package: "@github/copilot"
    upstream-package:
      when: {pm: brew}
  prefix:
    bins: [copilot]
    applies_when:
      - method: [binary]
  completions:
    subcmd: "completion"
    shells: [bash, zsh, fish]
options:
  vscode_user_dir:
    type: string
    default: .copilot
    description: |-
      Relative path within the workspace directory to symlink as
      `~/.vscode-server/data/User` (VS Code user settings directory) on container creation.
      This preserves VS Code Copilot Chat transcript history and extension data across
      container rebuilds. Leave empty to skip the symlink.
  copilot_home:
    type: string
    default: ''
    description: |-
      Path exported as `COPILOT_HOME` — redirects the Copilot CLI configuration
      directory (settings, installed plugins, auth state) from its default `~/.copilot`.
      Leave empty to use the CLI default. Supports tilde and environment variable
      expansion (e.g. `~/my-copilot`, `${XDG_CONFIG_HOME}/copilot`).
      For devcontainers, set to `${containerWorkspaceFolder}/.copilot/cli` to persist
      CLI configuration in the workspace across container rebuilds.
  copilot_model:
    type: string
    default: ''
    description: |-
      Model name exported as `COPILOT_MODEL` — overrides the Copilot CLI's built-in
      model selection for all invocations. Leave empty to use the CLI default.
      Example values: `claude-sonnet-4-6`, `gpt-4o`.
  plugins:
    type: array
    default: ''
    description: |-
      Copilot CLI plugins to install for each configured user after the CLI is installed.
      Each entry is passed verbatim to `copilot plugin install`, so any spec that command
      accepts is valid:
      - `PLUGIN-NAME@marketplace` (e.g. `workiq@copilot-plugins`, `database-data-management@awesome-copilot`)
      - `owner/repo` (GitHub repository)
      - A full `https://` Git URL or a local directory path
      Plugin install failures are non-fatal and logged as warnings.
postCreateCommand:
  install-plugins:
    description: Install configured Copilot CLI plugins.
onCreateCommand:
  symlink-vscode-user-dir:
    description: Symlink the specified workspace `.copilot` directory to `~/.vscode-server/data/User`.
    args: "${containerWorkspaceFolder}"
    _conf_vars: [VSCODE_USER_DIR]
customizations:
  vscode:
    extensions:
      - github.copilot
      - ms-vscode.vscode-chat-customizations-evaluations
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    method-upstream-package:
      brew:
        casks:
          - "{VERSION_INPUT==latest?copilot-cli@prerelease:copilot-cli}"
