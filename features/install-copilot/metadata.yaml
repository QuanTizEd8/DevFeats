version: 0.1.0
name: GitHub Copilot CLI Installation
description: Install [GitHub Copilot CLI](https://github.com/features/copilot) — an AI-powered agentic command-line interface for working with code and GitHub from the terminal.
keywords:
  - copilot
  - github
  - ai
  - llm
  - cli
_long_description: >-
  GitHub Copilot CLI is an agentic command-line interface that integrates AI
  assistance directly into your terminal. It supports interactive and programmatic
  invocation, can perform code edits, repository operations, and pull request
  workflows, and is extensible via plugins and MCP servers.

  Two installation methods are supported:

  - **binary** (auto-selected on x64/arm64): Downloads and verifies a pre-built
    tarball from GitHub Releases with SHA-256 validation. No Node.js dependency.
  - **npm**: Installs globally via `npm install -g @github/copilot`. Requires
    Node.js 22 or later pre-installed (e.g. via `install-node` or `install-nvm`).

  In devcontainer builds, a lifecycle hook is registered that symlinks the
  workspace `.copilot` directory (configurable via `vscode_user_dir`) to
  `~/.vscode-server/data/User`, preserving VS Code Copilot settings across
  container rebuilds.
_tool_name: copilot
_options:
  verify:
    args: "--version"
    description: Verify GitHub Copilot CLI is installed and working.
  gh_repo: github/copilot-cli
  version:
    resolution: github_release
    default: stable
    inputs: [stable, latest, semver]
    flag: version
    proposals:
      - value: 1.0.48
        description: Copilot CLI v1.0.48 (latest as of 2026-05-17).
  method:
    binary:
      asset_uri: "https://github.com/github/copilot-cli/releases/download/{TAG}/copilot-{OS}-{ARCH:node}.tar.gz"
      sidecar_uri: "https://github.com/github/copilot-cli/releases/download/{TAG}/SHA256SUMS.txt"
      binary_src: copilot
      when: {arch: [amd64, arm64]}
    npm:
      package: "@github/copilot"
  prefix:
    bins: [copilot]
    applies_when:
      - method: [binary]
  completions:
    subcmd: "completion"
    shells: [bash, zsh, fish]
options:
  vscode_user_dir:
    type: string
    default: .copilot
    description: |-
      Relative path within the workspace directory to symlink as
      `~/.vscode-server/data/User` (VS Code user settings directory) on container creation.
      Leave empty to skip the symlink.
onCreateCommand:
  symlink-vscode-user-dir:
    description: Symlink the specified workspace `.copilot` directory to `~/.vscode-server/data/User`.
    args: "${containerWorkspaceFolder}"
    _conf_vars: [VSCODE_USER_DIR]
customizations:
  vscode:
    extensions:
      - github.copilot
      - ms-vscode.vscode-chat-customizations-evaluations
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
