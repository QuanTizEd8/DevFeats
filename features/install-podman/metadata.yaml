version: 0.1.0
name: Podman Installation
description: Install the [Podman](https://podman.io/) container engine for rootless container execution.
_long_description: >-
  [Podman](https://podman.io/) is a daemonless, rootless container engine implementing
  the OCI runtime specification. Running Podman inside a dev container requires
  privileged mode to support user namespaces and mount propagation. Image and container
  storage is placed on a named volume backed by the host filesystem rather than the
  container's overlayfs root, enabling the native kernel overlay driver for fast,
  space-efficient image management.
keywords:
- podman
- containers
- rootless
- oci
- devcontainer
# Privileged mode is required for rootless Podman inside a container.
# Podman needs to: create user namespaces (blocked by default seccomp),
# run setuid newuidmap/newgidmap (blocked by nosuid root mount), mount
# procfs in child namespaces (blocked by Docker's /proc masks), and
# access /dev/net/tun for networking.  These requirements collectively
# amount to near-privileged access, so using targeted capAdd/securityOpt
# offers no meaningful security benefit over privileged: true.
# This is the same approach used by the docker-in-docker feature.
privileged: true
# Named volume for Podman's image/container storage.  The volume is
# backed by the host's real filesystem (ext4/xfs/btrfs), NOT the
# container's overlayfs root.  This lets Podman use the native kernel
# overlay driver on the volume — avoiding the overlay-on-overlay problem
# and the fuse-overlayfs noexec issue in nested user namespaces.
mounts:
- source: podman-storage-devcontainer-${devcontainerId}
  target: /var/lib/containers/storage
  type: volume
# At container start: marks / as rshared for rootless bind-mount propagation,
# sets up cgroup v2 controller delegation (DinD nesting), and ensures the
# per-user graphRoot parent directory (/var/lib/containers/storage/users/)
# has correct sticky-world-writable permissions.
entrypoint: "@@_FEAT_SHARE_DIR@@/entrypoint.sh"
options:
  add_current_user:
    type: boolean
    default: true
    description: Configure Podman for the current non-root user (`SUDO_USER` if run via `sudo`, otherwise `whoami`). No effect when the current user is root.
  add_remote_user:
    type: boolean
    default: true
    description: Configure Podman for the `_REMOTE_USER` set by the devcontainer tooling. No effect when running standalone.
  add_container_user:
    type: boolean
    default: true
    description: Configure Podman for the `_CONTAINER_USER` set by the devcontainer tooling. No effect when running standalone.
  add_users:
    type: array
    default: ''
    description: |-
      Additional usernames to register subuid/subgid ranges and write Podman storage config for.
postStartCommand:
  install-podman-feature-welcome:
    command: podman run --rm docker.io/library/hello-world
    description: Verify Podman is working by running the hello-world container after the devcontainer starts.
_dependencies:
  run:
    base:
      packages:
        - podman
        - ca-certificates
        # rootless networking — passt is the new default on Fedora; slirp4netns still required on Debian/Ubuntu
        - passt
        - slirp4netns
        # netavark (rootful network backend) calls nft to manage container network rules
        - nftables

      # UID/GID mapping tools — package name varies by distro
        - when: {pm: apt}
          packages: [uidmap]
        - when: {pm: [dnf, yum]}
          packages: [shadow-utils]
        - when: {pm: apk}
          packages: [shadow-uidmap]
        - when: {pm: [zypper, pacman]}
          packages: [shadow]
