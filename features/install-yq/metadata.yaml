version: 0.1.0
name: yq Installation
description: Install [mikefarah/yq](https://github.com/mikefarah/yq) (Go-based yq v4 CLI).
keywords:
  - yq
  - yaml
  - json
  - cli
  - tooling
_long_description: |-
  Installs Mike Farah's `yq` (the Go-based yq v4 CLI) for querying, transforming, and validating
  YAML documents. This feature targets the `mikefarah/yq` implementation specifically (supports flags
  like `-o=json`) and does not install distro packages that provide the Python jq-wrapper variant.

  Installation supports OS package repositories where the mikefarah package is available, or upstream
  release binaries,
  with `auto` mode preferring upstream release binaries for compatibility and falling back to
  repository installation only when compatible packages are declared. On Debian/Ubuntu apt, `method=package`
  is intentionally unsupported because distro `yq` is the Python jq-wrapper implementation.

  Use `method=package` when you want distro-managed packages, or `method=binary` when you need a
  portable upstream binary path. The install is idempotent by default and can be configured with
  `if_exists` behavior.
options:
  version:
    type: string
    _applies_when:
      - method: [auto, binary]
    default: latest
    description: |-
      Version of yq to install. Accepts `latest` (resolved via the GitHub Releases API) or any
      `X.Y.Z` or `vX.Y.Z` version string.
      If the installed yq version at the target prefix already matches the resolved version,
      the install is skipped silently regardless of the `if_exists` setting.
    proposals:
      - value: latest
        description: Resolve the latest release via the GitHub Releases API.
      - value: 4.44.3
        description: yq v4.44.3.
      - value: 4.44.2
        description: yq v4.44.2.
      - value: 4.43.1
        description: yq v4.43.1.
  method:
    type: string
    default: auto
    description: Installation method to use.
    enum:
      - value: auto
        description: Prefer verified upstream release binary, then fallback to package manager.
      - value: package
        description: |-
          Install from the operating system package manager when it provides Mike Farah's yq.
      - value: binary
        description: Install from upstream GitHub release artifacts.
  if_exists:
    type: string
    default: skip
    description: Behavior when a yq binary is already present at the target prefix.
    enum:
      - value: skip
        description: Reuse existing install and exit successfully.
      - value: fail
        description: Exit with an error when yq already exists.
      - value: reinstall
        description: Remove the existing binary then reinstall.
  shell_completions:
    type: array
    default: ''
    description: |-
      Shell names to install yq completions for. Set to `''` to skip all shell completions.
      Completions are generated by running `yq shell-completion <shell>` after installation.
    enum:
      - value: bash
        description: |-
          Write yq bash completions.
          - As root: writes to `/etc/bash_completion.d/yq`.
          - As non-root: writes to `$HOME/.local/share/bash-completion/completions/yq`.
      - value: zsh
        description: |-
          Write yq zsh completions.
          - As root: writes to `<zshdir>/completions/_yq`.
          - As non-root: writes to `$HOME/.zfunc/_yq`.
      - value: fish
        description: Write yq fish completions to `$HOME/.config/fish/completions/yq.fish`.
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    os-pkg:
      brew:
        packages:
          - name: yq
      pacman:
        packages:
          - name: go-yq
      apk:
        packages:
          # Alpine 3.20+ renamed package to yq-go.
          - name: yq-go
            when:
              version_id:
                - "3.20"
                - "3.21"
                - "3.22"
                - "3.23"
          # Alpine <=3.19 used yq for mikefarah/yq.
          - name: yq
            when:
              version_id:
                - "3.16"
                - "3.17"
                - "3.18"
                - "3.19"
      dnf:
        packages:
          - name: yq
            when:
              - id: fedora
              - id_like: rhel
      yum:
        packages:
          - name: yq
            when:
              id_like: rhel
      zypper:
        packages:
          - name: yq
            when:
              id:
                - opensuse-tumbleweed
                - opensuse-leap
                - opensuse-slowroll
# installsAfter: []
_prefix_groups:
  "":
    bin: yq
    _applies_when:
      - method: [release]
