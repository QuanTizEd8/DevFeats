version: 0.1.0
name: yq Installation
description: Install [mikefarah/yq](https://github.com/mikefarah/yq) (Go-based yq v4 CLI).
keywords:
  - yq
  - yaml
  - json
  - cli
  - tooling
_long_description: |-
  Installs Mike Farah's `yq` (the Go-based yq v4 CLI) for querying, transforming, and validating
  YAML documents. This feature targets the `mikefarah/yq` implementation specifically (supports flags
  like `-o=json`) and does not install distro packages that provide the Python jq-wrapper variant.

  Installation supports OS package repositories where the mikefarah package is available, or upstream
  release binaries,
  with `auto` mode preferring upstream release binaries for compatibility and falling back to
  repository installation only when compatible packages are declared. On Debian/Ubuntu apt, `method=package`
  is intentionally unsupported because distro `yq` is the Python jq-wrapper implementation.
_tool_name: yq
_options:
  verify:
    args: "--version"
    description: Verify yq is installed and working.
  gh_repo: mikefarah/yq
  version:
    resolution: github_release
  completions:
    subcmd: "shell-completion"
    shells: [bash, zsh, fish]
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{feat.tag}/yq_{plat.kernel:lower}_{plat.machine_release}"
      when: {plat.machine_release: [amd64, arm64]}
    package:
      when:
        - plat.pm: brew
        - {plat.pm: [dnf, yum], os.id_like: rhel}
        - {plat.pm: dnf, os.id: fedora}
        - plat.pm: pacman
        - {plat.pm: zypper, os.id: [opensuse-tumbleweed, opensuse-leap, opensuse-slowroll]}
        - {plat.pm: apk, os.version_id: {gte: "3.16"}}
  prefix:
    bins: [yq]
    applies_when:
      - method: [binary]
customizations:
  vscode:
    extensions:
      - redhat.vscode-yaml
_dependencies:
  run:
    method-package:
      packages:
        - name: yq
          pacman: go-yq
          version: "{feat.pm_version}"
          when: {plat.pm: {ne: [apt, apk]}}
        - name: yq-go
          version: "{feat.pm_version}"
          when: {plat.pm: apk, os.version_id: {gte: "3.20"}}
        - name: yq
          version: "{feat.pm_version}"
          when: {plat.pm: apk, os.version_id: {lt: "3.20"}}
# installsAfter: []
