name: fzf Installation
version: 0.1.0
description: Install [fzf](https://github.com/junegunn/fzf) (fuzzy finder) and activate it in Zsh and Bash.
keywords:
- fzf
- shell
- fuzzy-finder
_long_description: >-
  Downloads and installs [fzf](https://github.com/junegunn/fzf) from GitHub Releases
  and wires up per-user shell integration by injecting a guarded `eval "$(fzf --<shell>)"`
  block into each user's `zshtheme` and Bash theme file. fzf provides fuzzy-finding
  key bindings (`Ctrl-R` for history, `Ctrl-T` for files, `Alt-C` for directories)
  and shell completion.
options:
  install_fzf:
    type: boolean
    default: false
    description: |-
      Install [fzf](https://github.com/junegunn/fzf) (fuzzy finder) from GitHub Releases.
      Shell key-bindings and completion are injected per-user.
_options:
  gh_repo:
    fzf:
      tool_name: fzf
      slug: junegunn/fzf
_prefix_groups:
  fzf:
    prefix:
      bins: [fzf]
    applies_when:
      - install_fzf: ['true']
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-ohmyzsh
#   - ghcr.io/quantized8/devfeats/install-ohmybash
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
