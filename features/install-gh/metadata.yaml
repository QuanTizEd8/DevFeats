id: install-gh
version: 0.1.0
name: GitHub CLI Installation
description: >-
  Install `gh` – the [GitHub CLI](https://cli.github.com/) from the official package repositories or by downloading the pre-built binary from the GitHub repository.
keywords:
- github
- gh
- cli
- git
- devtool
_long_description: |-
  Install the [GitHub CLI](https://cli.github.com/) (`gh`) using one of two methods:
  `repos` (default) adds the official GitHub CLI package repository for the detected OS
  and installs via the native package manager; `binary` downloads the pre-built statically
  linked binary from GitHub Releases and verifies the SHA-256 checksum.
  After installation the feature optionally configures shell completions, per-user
  git credential helper (`gh auth setup-git`), git protocol, and commit signing
  for all resolved users (current user, devcontainer remoteUser/containerUser, and any
  additional users listed in `add_users`).
  GitHub CLI extensions can be pre-installed via the `extensions` option.
options:
  method:
    type: string
    default: repos
    description: Installation method to use.
    enum:
    - value: repos
      description: |-
        Configure and use the official GitHub CLI package repository.
        - On Debian/Ubuntu adds the apt repo at cli.github.com/packages with GPG keyring.
        - On RHEL/Fedora/CentOS/Amazon Linux adds the official rpm repo via dnf/yum.
        - On SUSE/openSUSE adds the rpm repo via zypper.
        - On Alpine installs via `apk add github-cli` (community package, no version pinning).
        - On Arch installs via `pacman -S github-cli` (community package, no version pinning).
        - On macOS installs via Homebrew (`brew install gh`).
    - value: binary
      description: |-
        Download the pre-built binary archive from https://github.com/cli/cli/releases,
        verify SHA-256 against the release checksums file, and install `gh` to `$prefix/bin`.
        The Linux binaries are statically linked (CGO_ENABLED=0) and work on all
        Linux distributions including Alpine/musl without a compatibility shim.
  version:
    type: string
    default: latest
    description: Version of `gh` to install. Either "latest" or a specific version string.
    proposals:
    - value: latest
      description: |-
        Install the latest available version.
        - When `method=repos`, installs the latest version from the configured repository.
        - When `method=binary`, queries the GitHub Releases API for the newest release.
    - value: 2.89.0
      description: |-
        Install a specific version.
        - When `method=repos`, passes the version to the package manager, if supported, otherwise installs the latest available package.
        - When `method=binary`, downloads exactly that release from https://github.com/cli/cli/releases.
  prefix:
    type: string
    default: auto
    description: |-
      Installation prefix when method=binary. The 'gh' binary is placed at '$prefix/bin/gh'.
      'auto' (default) — resolves to /usr/local when running as root, or $HOME/.local when running as non-root.
      An explicit path — used as-is; the script exits with an error if the path is not writable and cannot be created.
      Ignored when method=repos (the package manager controls the install location, typically /usr/bin).
  symlink:
    type: boolean
    default: true
    description: |-
      Create a symlink from the canonical bin directory to $prefix/bin/gh when prefix resolves to a non-default path (method=binary only).
      The symlink location is determined by whether $prefix falls under any user's home directory (as listed in /etc/passwd):
        System-wide (prefix is not under any user home): creates /usr/local/bin/gh -> $prefix/bin/gh.
        User-scoped  (prefix is under a user home):        creates $HOME/.local/bin/gh -> $prefix/bin/gh.
      Ensures the containerEnv PATH entries always resolve to the installed binary regardless of the chosen prefix.
      No-op when $prefix/bin/gh is already the chosen target path, or when method=repos (gh lands in /usr/bin which is always on PATH).
  shell_completions:
    type: array
    default: "bash\nzsh"
    description: |-
      Shell names to install completions for. Set to '' to skip all shell completions.
      - With method=binary: completion files are taken from the release archive.
      - With method=repos: completions are generated by running 'gh completion -s <shell>' after installation.
    enum:
      - value: bash
        description: |-
          Install bash completions for `gh`.
          - As root: writes to '/etc/bash_completion.d/gh'
          - As non-root: writes to '$HOME/.local/share/bash-completion/completions/gh'
      - value: zsh
        description: |-
          Install zsh completions for `gh`.
          - As root: writes to '<zshdir>/completions/_gh'
          - As non-root: writes to '$HOME/.zfunc/_gh'
  if_exists:
    type: string
    default: skip
    description: |-
      What to do when 'gh' is already present in PATH before installation begins.
      If the installed version matches the resolved target version, installation is always skipped silently regardless of this setting.
    enum:
    - value: skip
      description: Log a notice and exit successfully without making any changes (idempotent).
    - value: fail
      description: Print an error and exit non-zero.
  extensions:
    type: array
    default: ''
    description: |-
      GitHub CLI extensions to install after gh itself is installed.
      Each entry is passed verbatim to 'gh extension install', so any argument that command accepts is valid: a GitHub repository slug ('owner/repo'), a full https:// URL, or a local directory path.
      Extensions are installed for the users resolved by the add_*_user_config and add_users options.
  add_current_user:
    type: boolean
    default: true
    description: |-
      Apply per-user git configuration (git_protocol, setup_git, sign_commits) and install extensions for the current non-root user (SUDO_USER if run via sudo, otherwise the result of whoami).
      No effect when the current user is root and other non-root users are also being targeted.
      Only applies when at least one of 'extensions', 'git_protocol', 'setup_git', or 'sign_commits' is active.
  add_remote_user:
    type: boolean
    default: true
    description: |-
      Apply per-user git configuration (git_protocol, setup_git, sign_commits) and install extensions for the devcontainer remoteUser (the _REMOTE_USER environment variable set by the devcontainer tooling).
      No effect when _REMOTE_USER is not set.
      Only applies when at least one of 'extensions', 'git_protocol', 'setup_git', or 'sign_commits' is active.
  add_container_user:
    type: boolean
    default: true
    description: |-
      Apply per-user git configuration (git_protocol, setup_git, sign_commits) and install extensions for the devcontainer containerUser (the _CONTAINER_USER environment variable set by the devcontainer tooling).
      No effect when _CONTAINER_USER is not set.
      Only applies when at least one of 'extensions', 'git_protocol', 'setup_git', or 'sign_commits' is active.
  add_users:
    type: array
    default: ''
    description: |-
      Additional usernames to apply per-user git configuration and install extensions for.
      Each user must already exist. Root is accepted here if explicitly listed.
      Only applies when at least one of 'extensions', 'git_protocol', 'setup_git', or 'sign_commits' is active.
  git_protocol:
    type: string
    default: ''
    description: >-
      Set the default git protocol in `gh`'s per-user config (`~/.config/gh/config.yml`)
      by running `gh config set git_protocol <value>` for each resolved user.
      Leave empty to use `gh`'s own default (https).
    proposals:
    - value: ''
      description: Leave the config key unset; `gh` uses its own default (https).
    - value: https
      description: Use HTTPS for git clone and push operations (`gh`'s built-in default).
    - value: ssh
      description: Use SSH for git clone and push.
  setup_git:
    type: boolean
    default: false
    description: |-
      Register `gh` as the git credential helper by running `gh auth setup-git --force --hostname <git_hostname>` for each resolved user.
      This writes a credential helper entry to ~/.gitconfig, allowing git operations to authenticate via `gh` without a separate credential store.
      '--force' is used so the command succeeds at container build time even when there is no active `gh` login yet.
      Defaulting to false to avoid unexpected changes to user gitconfig;
      set to true in environments where `gh` will be the primary authentication mechanism.
  sign_commits:
    type: string
    default: ''
    description: Pre-configure commit signing in each resolved user's `~/.gitconfig`.
    enum:
    - value: ''
      description: Skip; make no changes to commit signing config.
    - value: ssh
      description: >-
        Set `gpg.format=ssh` and `commit.gpgsign=true`. Requires git 2.34+.
        Well-suited for devcontainers with SSH agent forwarding: signing is silent
        and needs no TTY or pinentry. Users must still set `user.signingkey`
        (e.g. `~/.ssh/id_ed25519.pub`). The public key must be registered under
        GitHub Settings > SSH and GPG keys > New SSH signing key for commits to
        show as Verified on GitHub.
    - value: gpg
      description: >-
        Set `commit.gpgsign=true` and use the default GPG format.
        Suited for users with an existing GPG key and gpg-agent configured.
        Users must set `user.signingkey` to their GPG key ID.
  git_hostname:
    type: string
    default: github.com
    description: |-
      The hostname to configure as the git credential helper target when setup_git=true.
      Defaults to 'github.com'. Set to your GitHub Enterprise Server hostname (e.g. 'git.corp.example.com') when using GHES.
      Ignored when setup_git=false.
  installer_dir:
    type: string
    default: /tmp/gh-install
    description: |-
      Working directory used for method=binary: the binary archive and checksums file are downloaded and extracted here.
      Removed automatically after a successful install unless keep_installer=true.
      Ignored when method=repos.
  keep_installer:
    type: boolean
    default: false
    description: |-
      Keep the installer_dir after a successful install when method=binary.
      Useful for debugging or inspecting the extracted archive.
      Ignored when method=repos.
containerEnv:
  PATH: ${HOME}/.local/bin:${PATH}
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
  build:
    download:
      packages:
        - curl
