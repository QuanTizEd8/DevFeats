version: 0.1.0
name: Homebrew Installation
description: Install the [Homebrew](https://brew.sh/) package manager.
keywords:
- homebrew
- linuxbrew
- brew
- package manager
- macos
_long_description: |-
  On **macOS** the feature ensures Xcode Command Line Tools are present before
  running the official installer. On **Linux** it installs the required
  build dependencies (git, curl, gcc, make, etc.) via the OS package manager
  first, then invokes the official installer.
  After installation the feature writes an `eval "$(brew shellenv)"` block to
  the appropriate shell startup files so that `brew` and any tools it installs
  are on `PATH` in subsequent shell sessions.
options:
  install_user:
    type: string
    default: ''
    description: |-
      User to own the Homebrew installation.
      Non-root callers cannot set this to a different user.
      On macOS, root is never permitted; the install user is resolved as:
        `SUDO_USER` (if set and non-root) → first non-system user from `dscl` → error.
      On Linux, root is allowed only when explicitly set here (a warning is emitted);
      the install user is resolved as:
        `SUDO_USER` (if set and non-root) → `linuxbrew` (created if absent).
      Note: `_REMOTE_USER` is not used for install ownership because the official
      Homebrew installer hardcodes `/home/linuxbrew/.linuxbrew` on Linux and ignores
      `HOMEBREW_PREFIX`. Shellenv for remoteUser is written by `add_remote_user` instead.
  prefix:
    type: string
    default: ''
    description: |-
      Installation prefix (`HOMEBREW_PREFIX`).
      macOS defaults: `/opt/homebrew` (Apple Silicon) or `/usr/local` (Intel) — selected automatically by the installer.
      Linux default: `/home/linuxbrew/.linuxbrew` — hardcoded by the official Homebrew installer; `HOMEBREW_PREFIX` is ignored on Linux.
      Leave empty to accept the platform default.
  if_exists:
    type: string
    default: skip
    description: What to do when Homebrew is already installed at the resolved prefix.
    enum:
    - value: skip
      description: Continue to post-install steps without re-running the installer (idempotent).
    - value: fail
      description: Print an error and exit non-zero.
    - value: reinstall
      description: Uninstall the existing installation then install fresh.
  update:
    type: boolean
    default: true
    description: Run `brew update` after installation to fetch the latest formula index.
  export_path:
    type: array
    default: auto
    description: |-
      Controls which shell startup files receive `eval "$(brew shellenv)"`.
      - `auto` — writes to all relevant system-wide files (root + Linux) or user-scoped files (macOS / non-root).
      - `''` (empty) — skips all shell-env writes.
      - A list of absolute paths — writes only to those files.
  add_current_user:
    type: boolean
    default: true
    description: |-
      Include the current user (the user running the installer, or SUDO_USER if set) in the resolved user list for shellenv exports and init-file writes.
      Root is deferred: only included as a fallback when no other non-root user is resolved.
  add_remote_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer remoteUser (from the _REMOTE_USER env var) in the resolved user list for shellenv exports and init-file writes.
      Ignored when _REMOTE_USER is unset or empty. Root is excluded from this path.
  add_container_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer containerUser (from the _CONTAINER_USER env var) in the resolved user list for shellenv exports and init-file writes.
      Ignored when _CONTAINER_USER is unset or empty. Root is excluded from this path.
  add_users:
    type: array
    default: ''
    description: |-
      Additional usernames to include in the resolved user list for shellenv exports and init-file writes.
      Root is accepted here (unlike the auto-detected paths above).
  write_group:
    type: string
    default: brew
    description: |-
      OS group for shared write access to the Homebrew prefix (Linux only).
      Non-empty — create this group (if absent), add all resolved users to it, and apply group-write bits on the prefix so group members can install packages.
      `''` (empty) — skip group setup; only the install owner has write access.
  brew_git_remote:
    type: string
    default: ''
    description: |-
      Override `HOMEBREW_BREW_GIT_REMOTE` — the git remote for the `Homebrew/brew` repository.
      Useful for air-gapped environments or mirrors.
  core_git_remote:
    type: string
    default: ''
    description: |-
      Override `HOMEBREW_CORE_GIT_REMOTE` — the git remote for the `homebrew-core` tap.
      Useful for air-gapped environments or mirrors.
  no_install_from_api:
    type: boolean
    default: false
    description: |-
      Set `HOMEBREW_NO_INSTALL_FROM_API=1` during installation.
      Forces `homebrew-core` to be cloned as a full git repository rather than relying on the JSON API.
      Slower but useful in environments where the API endpoint is blocked.
_dependencies:
  run:
    base:
      # Runtime tools required by Homebrew on Linux.
      # ref: https://docs.brew.sh/Homebrew-on-Linux#requirements
      #
      # Not needed on macOS — Xcode Command Line Tools provide these, and the
      # installer checks / installs CLT directly in the script.

      # Common packages — same name on all package managers
      packages:
        - git
        - curl
        - file
        - gzip
  build:
    linux-build:
      # Build tools — names differ by ecosystem. Build-time only on Linux;
      # macOS provides these via Xcode CLT which is handled separately.
      #
      # Primary reference: https://docs.brew.sh/Homebrew-on-Linux#requirements
      # The upstream install.sh post-install hint also lists package groups /
      # packages per PM (apt-get, dnf, yum, pacman, apk). Homebrew does **not**
      # document openSUSE (zypper); the zypper list below is an explicit minimal
      # toolchain analogous to the usual `pattern(devel_basis)` bundle, without
      # installing that pattern (some `opensuse/leap:latest` images hit zypper
      # solver conflicts on `devel_basis`, breaking non-interactive CI).
      #
      # Together with `run.base` (git, curl, file, gzip), each PM block matches
      # the doc one-liners where they exist:
      #   • apt:   build-essential procps  (+ run.base ≈ curl file git; gzip extra)
      #   • dnf:   group development-tools + procps-ng  (+ run.base)
      #   • pacman: base-devel + procps-ng  (+ run.base)
      #   • apk:   build-base  (+ run.base); procps added for ps/top parity with procps on apt/dnf.
      # zypper adds procps plus gcc/make/patch/headers/binutils/pkgconf/perl so
      # bottles and formula builds have a typical C/C++ build environment.

      apt:
        packages:
          - build-essential
          - procps
      dnf:
        packages:
          - procps-ng
      zypper:
        packages:
          - procps
          # Explicit RPMs (see linux-build comment above), not pattern(devel_basis).
          - binutils
          - gcc
          - gcc-c++
          - make
          - patch
          - glibc-devel
          - libstdc++-devel
          - perl
          - pkgconf
      pacman:
        packages:
          - procps-ng
      apk:
        packages:
          - build-base
          - procps

      # Package groups for build toolchains
      groups:
        - name: development-tools
          when: {pm: dnf}
        - name: base-devel
          when: {pm: pacman}
