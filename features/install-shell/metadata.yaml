version: 0.1.0
name: Shell Installation
description: Install and configure [Zsh](https://www.zsh.org/) and Bash with [Oh My Zsh](https://ohmyz.sh/), [Oh My Bash](https://ohmybash.nntoan.com/), and the [Starship](https://starship.rs/) prompt.
keywords:
- shell
- zsh
- bash
- oh-my-zsh
- starship
_long_description: >-
  A layered set of system-wide and per-user configuration files is deployed to ensure
  correct shell behavior across all invocation modes — login, interactive,
  non-interactive, scripts, cron, devcontainer exec, CI runners, and VS Code tasks.
  Both Zsh and Bash can be extended with their respective framework ecosystems (themes,
  plugins, completions), and [Starship](https://starship.rs/) provides a fast,
  context-aware prompt that works across all configured shells.
options:
  install_zsh:
    type: boolean
    default: true
    description: Install Zsh. Bash is always installed.
  add_current_user:
    default: true
    description: Whether to add configuration for the current non-root user (`SUDO_USER` if run via `sudo`, otherwise `whoami`). No effect when the current user is root.
    type: boolean
  add_container_user:
    default: true
    description: Whether to add configuration for the `containerUser` set in the devcontainer.json file, which becomes the `_CONTAINER_USER` environment variable set by the devcontainer tooling. No effect when `_CONTAINER_USER` is not set.
    type: boolean
  add_remote_user:
    default: true
    description: Whether to add configuration for the `remoteUser` set in the devcontainer.json file, which becomes the `_REMOTE_USER` environment variable set by the devcontainer tooling. No effect when `_REMOTE_USER` is not set.
    type: boolean
  add_users:
    default: ''
    description: |-
      Additional usernames to add shell configuration for, in addition to the users resolved by
      `add_current_user`, `add_remote_user`, and `add_container_user`.
    type: array
  set_user_shells:
    type: string
    default: zsh
    description: |-
      Whether to set users' default login shell via `chsh`.
      Applies to all users resolved by `add_current_user`, `add_remote_user`, `add_container_user`, and `add_users`.
      Raises an error if `zsh` is selected but Zsh is not available or being installed.
    enum:
    - value: zsh
      description: Set all resolved users' default login shell to Zsh.
    - value: bash
      description: Set all resolved users' default login shell to Bash.
    - value: none
      description: Do not change any user's default login shell.
  zdotdir:
    default: ''
    description: |-
      Directory where Zsh looks for its per-user config files (`.zshrc`, `.zprofile`, `.zlogin`).
      Corresponds to the `ZDOTDIR` environment variable set in `~/.zshenv`.
      Leave empty to use the default: `${XDG_CONFIG_HOME}/zsh` (i.e. `~/.config/zsh`).
      Accepts paths prefixed with `~` or `$HOME`.
    type: string
  user_config_mode:
    default: overwrite
    description: How to handle existing user dotfiles when configuring users.
    enum:
    - value: overwrite
      description: Replace all dotfiles from skel and re-inject framework blocks.
    - value: augment
      description: Copy skel files only if they do not already exist; always refresh framework blocks.
    - value: skip
      description: Do nothing if dotfiles already exist.
    type: string
_options:
  gh_repo:
# installsAfter:
#   - ghcr.io/quantized8/devfeats/setup-user
_dependencies:
  run:
    base:
      packages:
        - git
        - ca-certificates
        - when: {pm: apt}
          packages: [locales]
        - when: {pm: apk}
          packages: [musl-locales, musl-locales-lang]
        - when: {pm: [dnf, yum]}
          packages: [glibc-langpack-en]
        - when: {pm: zypper}
          packages: [glibc-i18ndata]
        - when: {pm: pacman}
          packages: [glibc]

      scripts: |
        if command -v dpkg > /dev/null 2>&1; then
          sed -i 's/^# \(en_US\.UTF-8\)/\1/' /etc/locale.gen
          locale-gen
        fi
_prefix_groups:
