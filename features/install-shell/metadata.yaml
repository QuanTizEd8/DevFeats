version: 0.1.0
name: Shell Installation
description: Install and configure [Zsh](https://www.zsh.org/) and Bash with [Oh My Zsh](https://ohmyz.sh/), [Oh My Bash](https://ohmybash.nntoan.com/), and the [Starship](https://starship.rs/) prompt.
keywords:
- shell
- zsh
- bash
- oh-my-zsh
- starship
_long_description: >-
  A layered set of system-wide and per-user configuration files is deployed to ensure
  correct shell behavior across all invocation modes — login, interactive,
  non-interactive, scripts, cron, devcontainer exec, CI runners, and VS Code tasks.
  Both Zsh and Bash can be extended with their respective framework ecosystems (themes,
  plugins, completions), and [Starship](https://starship.rs/) provides a fast,
  context-aware prompt that works across all configured shells.
options:
  install_zsh:
    type: boolean
    default: true
    description: Install Zsh. Bash is always installed.
  install_ohmyzsh:
    type: boolean
    default: true
    description: Install Oh My Zsh when installing Zsh. Ignored if Zsh is not available or being installed.
  install_ohmybash:
    type: boolean
    default: true
    description: Install [Oh My Bash](https://ohmybash.nntoan.com/).
  install_starship:
    type: boolean
    default: true
    description: Install the [Starship](https://starship.rs/) prompt binary.
  starship_prefix:
    type: string
    default: ''
    description: |-
      Installation prefix for Starship. The binary is placed at `$starship_prefix/bin/starship`.
      Leave empty to use the default: `/usr/local` as root, or `$HOME/.local` as non-root.
  starship_shells:
    type: array
    default: zsh
    description: |-
      Shells to activate the Starship prompt in. Leave empty to install the binary without activating it.
      Ignored if `install_starship=false` and `starship` is not already on PATH.
      When a shell's framework theme (`ohmyzsh_theme` / `ohmybash_theme`) is also set, the
      framework still loads but Starship owns the prompt (`ZSH_THEME` / `OSH_THEME` is forced
      to empty with a warning).
    enum:
    - value: bash
      description: Activate Starship in Bash by appending `eval "$(starship init bash)"` to the Bash RC.
    - value: zsh
      description: Activate Starship in Zsh by appending `eval "$(starship init zsh)"` to the Zsh RC.
  ohmyzsh_plugins:
    type: array
    default: "git\nzsh-users/zsh-syntax-highlighting"
    description: |-
      Oh My Zsh plugins to install, each as an `owner/repo` GitHub slug or a plain built-in name.
      Custom plugins are cloned into `<ohmyzsh_custom_dir>/plugins/<repo>`.
      Plain names without a `/` (e.g. `git`) are treated as built-in Oh My Zsh plugins and are not cloned.
      Set to `''` to install no custom plugins.
      Ignored if Oh My Zsh is not available or being installed.
  ohmybash_plugins:
    default: git
    description: |-
      Oh My Bash plugins to install, each as an `owner/repo` GitHub slug or a plain built-in name.
      Custom plugins are cloned into `<ohmybash_install_dir>/custom/plugins/<repo>`.
      Plain names without a `/` (e.g. `git`) are treated as built-in Oh My Bash plugins and are not cloned.
      Set to `''` to install no custom plugins.
      Ignored if Oh My Bash is not available or being installed.
    type: array
  ohmyzsh_theme:
    default: ''
    description: |-
      Oh My Zsh custom theme to install, as an `owner/repo` GitHub slug.
      The repository is cloned into `<ohmyzsh_custom_dir>/themes/<repo>`.
      Set to `''` to install no custom theme.
      Ignored if Oh My Zsh is not available or being installed.
    type: string
    proposals:
      - value: romkatv/powerlevel10k
        description: >-
          [Powerlevel10k](https://github.com/romkatv/powerlevel10k) theme
          (see the [install-fonts](#features/install-fonts) feature
          for installation of the recommended Powerlevel10k-compatible Nerd Font).
  ohmybash_theme:
    default: ''
    description: |-
      Oh My Bash custom theme to install, as an `owner/repo` GitHub slug.
      The repository is cloned into `<ohmybash_install_dir>/custom/themes/<repo>`.
      Ignored if Oh My Bash is not available or being installed.
    type: string
  ohmyzsh_install_dir:
    default: /usr/local/share/oh-my-zsh
    description: |-
      Path to the Oh My Zsh installation directory.
      Corresponds to the [`ZSH`](https://github.com/ohmyzsh/ohmyzsh/wiki/Settings#zsh) config variable.
    type: string
  ohmybash_install_dir:
    default: /usr/local/share/oh-my-bash
    description: Path to the Oh My Bash installation directory.
    type: string
  ohmyzsh_branch:
    default: master
    description: |-
      Git branch/tag of [ohmyzsh/ohmyzsh](https://github.com/ohmyzsh/ohmyzsh) to clone.
      Also recorded as `oh-my-zsh.branch` in the git config so `omz update` works correctly.
    type: string
  ohmybash_branch:
    default: master
    description: Git branch/tag of [ohmybash/oh-my-bash](https://github.com/ohmybash/oh-my-bash) to clone.
    type: string
  add_current_user:
    default: true
    description: Whether to add configuration for the current non-root user (`SUDO_USER` if run via `sudo`, otherwise `whoami`). No effect when the current user is root.
    type: boolean
  add_container_user:
    default: true
    description: Whether to add configuration for the `containerUser` set in the devcontainer.json file, which becomes the `_CONTAINER_USER` environment variable set by the devcontainer tooling. No effect when `_CONTAINER_USER` is not set.
    type: boolean
  add_remote_user:
    default: true
    description: Whether to add configuration for the `remoteUser` set in the devcontainer.json file, which becomes the `_REMOTE_USER` environment variable set by the devcontainer tooling. No effect when `_REMOTE_USER` is not set.
    type: boolean
  add_users:
    default: ''
    description: |-
      Additional usernames to add shell configuration for, in addition to the users resolved by
      `add_current_user`, `add_remote_user`, and `add_container_user`.
    type: array
  set_user_shells:
    type: string
    default: zsh
    description: |-
      Whether to set users' default login shell via `chsh`.
      Applies to all users resolved by `add_current_user`, `add_remote_user`, `add_container_user`, and `add_users`.
      Raises an error if `zsh` is selected but Zsh is not available or being installed.
    enum:
    - value: zsh
      description: Set all resolved users' default login shell to Zsh.
    - value: bash
      description: Set all resolved users' default login shell to Bash.
    - value: none
      description: Do not change any user's default login shell.
  zdotdir:
    default: ''
    description: |-
      Directory where Zsh looks for its per-user config files (`.zshrc`, `.zprofile`, `.zlogin`).
      Corresponds to the `ZDOTDIR` environment variable set in `~/.zshenv`.
      Leave empty to use the default: `${XDG_CONFIG_HOME}/zsh` (i.e. `~/.config/zsh`).
      Accepts paths prefixed with `~` or `$HOME`.
    type: string
  ohmyzsh_custom_dir:
    default: ''
    description: |-
      ZSH_CUSTOM directory for Oh My Zsh.
      Leave empty to use `${ZDOTDIR}/custom` (i.e. `~/.config/zsh/custom`) — per-user, themes and plugins are symlinked there from the system install.
      Set to an explicit path to override; paths prefixed with `~` or `$HOME` are expanded per user.
    type: string
  ohmybash_custom_dir:
    default: ''
    description: |-
      OSH_CUSTOM directory for Oh My Bash.
      Leave empty to use `${XDG_CONFIG_HOME}/bash/custom` (i.e. `~/.config/bash/custom`) — per-user, themes and plugins are symlinked there from the system install.
      Set to an explicit path to override; paths prefixed with `~` or `$HOME` are expanded per user.
    type: string
  user_config_mode:
    default: overwrite
    description: How to handle existing user dotfiles when configuring users.
    enum:
    - value: overwrite
      description: Replace all dotfiles from skel and re-inject framework blocks.
    - value: augment
      description: Copy skel files only if they do not already exist; always refresh framework blocks.
    - value: skip
      description: Do nothing if dotfiles already exist.
    type: string
  install_bash_completion:
    type: boolean
    default: true
    description: |-
      Install [bash-completion](https://github.com/scop/bash-completion) (v2).
      Provides programmable tab-completion for Bash commands and arguments.
  install_zsh_completions:
    type: boolean
    default: true
    description: |-
      Install [zsh-completions](https://github.com/zsh-users/zsh-completions).
      Adds extra completion definitions not yet in the zsh core.
      With Homebrew this uses the `zsh-completions` formula. Otherwise the
      repository is shallow-cloned to `/usr/local/share/zsh-completions` and
      `fpath` includes its `src/` tree (matching upstream manual install).
      Debian and Ubuntu packages are published via the project's
      [Open Build Service repository](https://software.opensuse.org/download.html?project=shells%3Azsh-users%3Azsh-completions&package=zsh-completions),
      which is not the same as default `apt` archives; this feature does not add that repo.
  install_direnv:
    type: boolean
    default: false
    description: |-
      Install [direnv](https://direnv.net/).
      Automatically loads and unloads environment variables when entering a directory.
      Shell hooks are injected per-user.
  install_fzf:
    type: boolean
    default: false
    description: |-
      Install [fzf](https://github.com/junegunn/fzf) (fuzzy finder) from GitHub Releases.
      Shell key-bindings and completion are injected per-user.
  fzf_prefix:
    type: string
    default: ''
    description: |-
      Installation prefix for fzf. The binary is placed at `$fzf_prefix/bin/fzf`.
      Leave empty to use the default: `/usr/local` as root, or `$HOME/.local` as non-root.
# installsAfter:
#   - ghcr.io/quantized8/devfeats/setup-user
_dependencies:
  run:
    base:
      packages:
        - git
        - ca-certificates
        - when: {pm: apt}
          packages: [locales]
        - when: {pm: apk}
          packages: [musl-locales, musl-locales-lang]
        - when: {pm: [dnf, yum]}
          packages: [glibc-langpack-en]
        - when: {pm: zypper}
          packages: [glibc-i18ndata]
        - when: {pm: pacman}
          packages: [glibc]

      scripts: |
        if command -v dpkg > /dev/null 2>&1; then
          sed -i 's/^# \(en_US\.UTF-8\)/\1/' /etc/locale.gen
          locale-gen
        fi
