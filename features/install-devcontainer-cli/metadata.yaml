version: 0.1.0
name: Dev Container CLI Installation
description: Install the [Dev Container CLI](https://github.com/devcontainers/cli).
keywords:
  - devcontainer
  - devcontainers
  - cli
  - containers
  - tooling
_long_description: |-
  Installs the Dev Container CLI (`devcontainer`) using either a self-contained
  bundled Node.js runtime (`method=npm-bundled`, default on supported platforms)
  or a globally installed npm package (`method=npm`, fallback or explicit choice).
_options:
  gh_repo: devcontainers/cli
  version:
    resolution: npm
    default: latest
  method:
    npm-bundled:
      package: "@devcontainers/cli"
      cmd: devcontainer
      node_version: "20"
    npm:
      package: "@devcontainers/cli"
  prefix:
    root: /opt/devcontainers
    nonroot: "${HOME}/.devcontainers"
    bins: [devcontainer]
  verify:
    args: "--help"
    description: Verify `devcontainer` is installed and working.
customizations:
  vscode:
    extensions:
      - GitHub.codespaces
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
