version: 0.1.0
name: Dev Container CLI Installation
description: Install the [Dev Container CLI](https://github.com/devcontainers/cli).
keywords:
  - devcontainer
  - devcontainers
  - cli
  - containers
  - tooling
_long_description: |-
  Installs the Dev Container CLI (`devcontainer`) using either the upstream standalone
  installer script (bundled Node.js runtime) or npm (`@devcontainers/cli`).

  The default `method=auto` selects the upstream script on supported Linux/macOS
  architectures and falls back to npm otherwise. `if_exists` controls idempotency
  behavior when `devcontainer` is already present.
options:
  method:
    type: string
    default: auto
    description: Installation method.
    enum:
      - value: auto
        description: Prefer upstream install script on supported platforms; fallback to npm.
      - value: script
        description: Use upstream `scripts/install.sh` (bundled Node.js).
      - value: npm
        description: Install via `npm install -g @devcontainers/cli`.
  version:
    type: string
    default: latest
    description: Version to install.
    proposals:
      - value: latest
        description: Install the latest available version.
      - value: 0.86.1
        description: Install a specific version.
  if_exists:
    type: string
    default: skip
    description: Behavior when `devcontainer` already exists in PATH.
    enum:
      - value: skip
        description: Reuse existing install and exit successfully.
      - value: fail
        description: Exit non-zero when an existing install is detected.
      - value: reinstall
        description: Reinstall using the selected method.
  node_version:
    type: string
    default: "20"
    description: Node.js major version passed to upstream install script (`method=script`).
    proposals:
      - value: "20"
        description: Node.js 20 LTS line.
      - value: "22"
        description: Node.js 22 LTS line.
  update:
    type: boolean
    default: false
    description: Run the updater mode when supported (`method=script`).
  uninstall:
    type: boolean
    default: false
    description: Uninstall instead of install (supported for `method=script` and npm).
# installsAfter:
#   - ghcr.io/quantized8/devfeats/setup-user
#   - ghcr.io/quantized8/devfeats/install-jq
#   - ghcr.io/quantized8/devfeats/install-yq
#   - ghcr.io/quantized8/devfeats/install-shell
#   - ghcr.io/quantized8/devfeats/install-node
customizations:
  vscode:
    extensions:
      - GitHub.codespaces
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
  build:
    download:
      packages:
        - name: xz
          apt: xz-utils
_prefix_groups:
  "":
    prefix:
      root: /opt/devcontainers
      nonroot: "${HOME}/.devcontainers"
      bins: [devcontainer]
