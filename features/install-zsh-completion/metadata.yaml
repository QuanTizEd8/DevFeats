name: Zsh Completions Installation
version: 0.1.0
description: Install [zsh-completions](https://github.com/zsh-users/zsh-completions) and wire up the completion `fpath`.
keywords:
- zsh
- completion
- shell
_long_description: >-
  Installs [zsh-completions](https://github.com/zsh-users/zsh-completions), which
  provides extra completion definitions not yet in the Zsh core. On Homebrew, uses
  the `zsh-completions` formula; otherwise shallow-clones the repository into
  `/usr/local/share/zsh-completions`. The completion sources directory is prepended
  to `fpath` in the system-wide Zsh config so completions are available to all users.
options:
  install_zsh_completions:
    type: boolean
    default: true
    description: |-
      Install [zsh-completions](https://github.com/zsh-users/zsh-completions).
      Adds extra completion definitions not yet in the zsh core.
      With Homebrew this uses the `zsh-completions` formula. Otherwise the
      repository is shallow-cloned to `/usr/local/share/zsh-completions` and
      `fpath` includes its `src/` tree (matching upstream manual install).
      Debian and Ubuntu packages are published via the project's
      [Open Build Service repository](https://software.opensuse.org/download.html?project=shells%3Azsh-users%3Azsh-completions&package=zsh-completions),
      which is not the same as default `apt` archives; this feature does not add that repo.
_options:
  gh_repo:
    zsh_completions:
      tool_name: zsh-completions
      slug: zsh-users/zsh-completions
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-shell
_dependencies:
  run:
    base:
      packages:
        - git
        - ca-certificates
