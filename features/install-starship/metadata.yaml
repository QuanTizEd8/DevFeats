version: 0.1.0
name: Starship
description: Install the [Starship](https://starship.rs/) prompt and activate it in Zsh and/or Bash.
keywords:
- shell
- prompt
- starship
_long_description: >-
  Downloads and installs the [Starship](https://starship.rs/) prompt binary using
  the official installer script and wires up per-user shell activation by injecting
  a guarded `eval "$(starship init <shell>)"` block into each user's `zshtheme`
  and/or `bashtheme` file (or directly into the shell rc file when no theme file is
  present). Starship's init hook overrides the shell's prompt function, taking
  precedence over any framework theme set by install-ohmyzsh or install-ohmybash.
options:
  starship_shells:
    type: array
    default: zsh
    description: |-
      Shells to activate the Starship prompt in. Leave empty to install the binary without activating it.
      Starship's init hook overrides the shell's prompt function, so it takes precedence over any
      Oh My Zsh or Oh My Bash theme without requiring those features to be disabled.
    enum:
    - value: bash
      description: Activate Starship in Bash by injecting `eval "$(starship init bash)"` into the Bash theme file.
    - value: zsh
      description: Activate Starship in Zsh by injecting `eval "$(starship init zsh)"` into the Zsh theme file.
_prefix_groups:
  starship:
    prefix:
      bins: [starship]
installsAfter:
  - ghcr.io/quantized8/devfeats/install-ohmyzsh
  - ghcr.io/quantized8/devfeats/install-ohmybash
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
