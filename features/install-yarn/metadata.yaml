version: 0.1.0
name: Yarn Installation
description: Install [Yarn](https://yarnpkg.com/) globally.
keywords:
  - yarn
  - npm
  - node
  - javascript
  - package-manager
_long_description: |-
  Installs Yarn using `npm install -g yarn[@VERSION]`.
  When `version=latest` and corepack is available, uses `corepack enable` instead
  (corepack ships with Node.js 16+ and is the recommended way to manage Yarn).
  Requires Node.js to be installed first (via install-node or install-nvm).
_tool_name: Yarn
options:
  version:
    type: string
    default: latest
    description: |-
      Version of Yarn to install.
      Set to `latest` to use `corepack enable` (when available) or `npm install -g yarn`.
      An explicit version string (e.g. `1.22.22`) always uses `npm install -g yarn@VERSION`.
    proposals:
      - value: latest
        description: Use `corepack enable` (preferred) or `npm install -g yarn`.
      - value: 1.22.22
        description: Yarn Classic v1.22.22, installed via npm.
installsAfter:
  - ghcr.io/quantized8/devfeats/install-node
  - ghcr.io/quantized8/devfeats/install-nvm
_options:
  method:
    npm:
      package: yarn
  prefix:
    bins: [yarn, yarnpkg]
