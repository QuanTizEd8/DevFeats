version: 0.1.0
name: just Installation
description: Install [just](https://just.systems/) via release assets, package repositories, or Cargo.
keywords:
  - just
  - task-runner
  - build
  - cli
_long_description: |-
  Installs the `just` command runner with configurable installation methods:
  GitHub release assets, distro package repositories, and Cargo-based installation.
options: {}
_options:
  verify:
    args: "--version"
    description: Verify just is installed and working.
  gh_repo: casey/just
  version:
    resolution: github_release
    default: stable
    inputs: [stable, latest, semver]
    proposals:
      - value: "1.50.0"
        description: Install just v1.50.0.
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/just-{VERSION}-{RUST_TRIPLE}.tar.gz"
      binary_src: just
      sidecar_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/SHA256SUMS"
    package:
      when: {pm: [apt, dnf, apk, brew]}
    cargo:
      crate: just
  prefix:
    bins: [just]
    applies_when:
      - method: [binary, cargo]
customizations:
  vscode:
    extensions:
      - nefrob.vscode-just-syntax
_dependencies:
  run:
    os-pkg:
      packages:
        - just
# installsAfter: []
