version: 0.1.0
name: Node.js Installation
description: Install [Node.js](https://nodejs.org/) from an official prebuilt binary tarball.
keywords:
  - node
  - nodejs
  - npm
  - javascript
_long_description: |-
  Downloads the official prebuilt Node.js tarball from nodejs.org and verifies
  its integrity against the official SHASUMS256.txt file.
  Supports Linux glibc (x64, arm64, armv7l) and macOS (x64, arm64).
  Not compatible with Alpine Linux (musl); use install-nvm for Alpine.

  Version aliases such as `lts/*` or a major version number are resolved against
  the nodejs.org release index before install.
_tool_name: Node.js
options:
  node_gyp_deps:
    type: boolean
    default: true
    description: |-
      Install OS build dependencies required to compile native Node.js modules via node-gyp:
      `make`, `gcc`/`g++`, and `python3`.
      On Alpine Linux, these tools are excluded via manifest conditions.
      Set to `false` to skip if you do not need to compile native modules.
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    option-node_gyp_deps:
      when: {plat.pm: [apt, dnf, yum, zypper, pacman, brew]}
      packages:
        - make
        - when: {plat.pm: [apt, dnf, yum, zypper, pacman]}
          packages: [gcc]
        - when: {plat.pm: apt}
          packages: [g++, python3-minimal]
        - when: {plat.pm: [dnf, yum, zypper]}
          packages: [gcc-c++, python3]
        - when: {plat.pm: pacman}
          packages: [python]
_options:
  verify:
    args: "--version"
    description: Verify Node.js is installed and working.
  version:
    resolution: none
    default: lts/*
    inputs: [major, semver]
    proposals:
      - value: lts/*
        description: Latest Active LTS release (resolved from nodejs.org/dist/index.json).
      - value: '24'
        description: Latest stable release in the Node.js 24.x line.
      - value: '22'
        description: Latest stable release in the Node.js 22.x line.
      - value: '20'
        description: Latest stable release in the Node.js 20.x line.
      - value: '18'
        description: Latest stable release in the Node.js 18.x line.
      - value: 24.11.1
        description: An exact semver string — installs that specific version.
  method:
    binary:
      asset_uri: "https://nodejs.org/dist/{feat.version}/node-{feat.version}-{plat.kernel:lower}-{plat.machine_node}.tar.xz"
      sidecar_uri: "https://nodejs.org/dist/{feat.version}/SHASUMS256.txt"
      binary_src:
        - bin/node
  prefix:
    bins: [node, npm, npx, corepack]
    symlink: {}
customizations:
  vscode:
    extensions:
      - dbaeumer.vscode-eslint
    settings:
      github.copilot.chat.codeGeneration.instructions:
        - text: This dev container includes 'node' and 'npm' pre-installed and available on the PATH for Node.js development.
