id: install-node
version: 2.0.0
name: Node.js Installation
description: Install [Node.js](https://nodejs.org/) via [nvm](https://github.com/nvm-sh/nvm) or from a prebuilt binary tarball.
keywords:
- node
- nodejs
- npm
- nvm
- javascript
_long_description: |-
  Node.js can be installed via nvm (Node Version Manager) or from an official prebuilt
  tarball. The nvm method supports Linux (glibc and musl/Alpine), macOS, and any POSIX
  platform; on Alpine Linux, Node.js is compiled from source when needed, with build
  dependencies resolved automatically.

  The binary method downloads the official prebuilt tarball from nodejs.org and verifies
  its integrity against the official SHASUMS256.txt file. It supports Linux glibc (x64,
  arm64, armv7l) and macOS (x64, arm64), but is not compatible with Alpine Linux (musl).

  Version aliases such as lts/*, --lts, or a major version number are supported alongside
  exact semver strings; the default installs the latest Active LTS release.
options:
  method:
    type: string
    default: nvm
    description: Installation method to use.
    enum:
    - value: nvm
      description: |-
        Install via nvm (Node Version Manager). Installs nvm itself to `nvm_dir`,
        then uses it to install the requested Node.js version. Supports all platforms
        including Alpine (via source compilation with `nvm install -s`).
        The nvm shell function is available after sourcing `$nvm_dir/nvm.sh`;
        node/npm/npx binaries are symlinked to `/usr/local/bin` when running as root and `symlink=true`.
    - value: binary
      description: |-
        Download and extract the official prebuilt Node.js tarball from nodejs.org/dist
        to `prefix`. Fast and dependency-free. Does NOT support Alpine Linux
        (glibc-only binaries). Exits with a clear error on Alpine; use `method=nvm` instead.
  version:
    type: string
    default: lts/*
    description: |-
      Version of Node.js to install.
      Accepts nvm-style aliases (`lts/*`, major number) and exact semver strings
      (e.g. `24.11.1` or `v24.11.1`) for both `method=nvm` and `method=binary`.
    proposals:
    - value: lts/*
      description: |-
        Latest Active LTS release (nvm alias; resolved from nodejs.org/dist/index.json for method=binary).
        With `method=nvm`, the shell form `lts/*` is passed to `nvm install` (always quoted internally to prevent glob expansion).
    - value: lts
      description: Alias for `lts/*`; normalized internally.
    - value: latest
      description: Very latest release (may be a non-LTS Current release). `node` is a nvm alias for the same thing.
    - value: none
      description: |-
        Install nvm itself but do not install any Node.js version (method=nvm only).
        Useful when a `.nvmrc` or lifecycle script manages node version selection.
    - value: '24'
      description: Latest stable release in the Node.js 24.x line.
    - value: '22'
      description: Latest stable release in the Node.js 22.x line.
    - value: '20'
      description: Latest stable release in the Node.js 20.x line.
    - value: '18'
      description: Latest stable release in the Node.js 18.x line.
    - value: 24.11.1
      description: |-
        An exact semver string — installs that specific version.
        Also accepts the `v`-prefixed form (e.g. `v24.11.1`).
        With `method=nvm`, passes the version directly to `nvm install`.
        With `method=binary`, fetches exactly that release from nodejs.org/dist.
  additional_versions:
    type: array
    default: ''
    description: |-
      Additional Node.js versions to install via nvm alongside the primary `version`,
      without setting them as the nvm default. Only applies when method=nvm.
      Uses the same version syntax as `version` (major number, exact semver, or LTS alias).
      Useful for testing across multiple Node.js versions in a single container or satisfying `.nvmrc` lookups for sub-projects.
    proposals:
    - value: ''
      description: Install no additional versions.
    - value: '20'
      description: Also install Node.js 20.x.
    - value: '18'
      description: Also install Node.js 18.x.
    - value: "22\n20"
      description: Also install Node.js 22 and 20.
    - value: "22\n20\n18"
      description: Also install Node.js 22, 20, and 18.
  nvm_version:
    type: string
    default: latest
    description: |-
      Version of nvm to install. Only used when method=nvm.
      An explicit tag (e.g. `0.40.4` or `v0.40.4`) pins nvm to that exact release;
      the installer downloads `nvm install.sh` from the tagged commit URL.
      `latest` resolves the newest tag via the GitHub Releases API.
    proposals:
    - value: latest
      description: Resolve the newest nvm release tag via the GitHub Releases API at install time.
    - value: 0.40.4
      description: nvm v0.40.4.
    - value: 0.40.3
      description: nvm v0.40.3.
  nvm_dir:
    type: string
    default: auto
    description: |-
      Directory where nvm is installed (`$NVM_DIR`). Only used when `method=nvm`.
      `auto` resolves to `/usr/local/share/nvm` (root) or `${HOME}/.nvm` (non-root).
      An explicit path (e.g. `/opt/nvm`) is used as-is; the resolved value is written as
      `export NVM_DIR=...` into shell startup files so all sessions see the correct path.
      Note: `containerEnv.NVM_DIR` is statically set to `/usr/local/share/nvm`; for non-root
      installs, shell RC files override this. For non-interactive processes (CI, Docker RUN),
      set `remoteEnv.NVM_DIR` in `devcontainer.json` if needed.
      When running as root and `symlink=true`, a bridge
      symlink `/usr/local/share/nvm` → `nvm_dir` is created if the two paths differ, keeping
      the `containerEnv` value valid.
    proposals:
    - value: auto
      description: Resolve to `/usr/local/share/nvm` when root, `${HOME}/.nvm` when non-root.
    - value: /usr/local/share/nvm
      description: System-wide nvm installation (root default).
    - value: ${localEnv:HOME}/.nvm
      description: Per-user nvm installation.
    - value: /opt/nvm
      description: Custom system-wide path.
  prefix:
    type: string
    default: auto
    description: |-
      Installation prefix for method=binary (Node.js binaries land in $prefix/bin). Only used when method=binary.
      'auto' (default) — resolves to /usr/local when running as root, or $HOME/.local when running as non-root.
      An explicit absolute path (e.g. '/opt/node') — used as-is; the script exits with an error if the path is not writable and cannot be created.
  arch:
    type: string
    default: ''
    description: |-
      Override the CPU architecture used when selecting a prebuilt binary (method=binary only).
      Accepted values: 'x86_64', 'aarch64' (mapped to linux-x64 / linux-arm64 for Linux; darwin-arm64 for macOS).
      When empty (default), the architecture is detected automatically from uname -m.
      Useful for cross-arch scenarios or forced emulation. Ignored when method=nvm.
  installer_dir:
    type: string
    default: /tmp/node-installer
    description: |-
      Temporary directory for downloading the Node.js tarball and checksum sidecar (method=binary) or the nvm install script (method=nvm).
      All downloaded files are removed after a successful install.
  if_exists:
    type: string
    default: skip
    description: |-
      What to do when a `node` binary is already found in PATH before installation begins.
      If the installed version already matches the resolved target version, installation is always skipped silently regardless of this setting.
    enum:
    - value: skip
      description: Log a notice and exit successfully without making any changes (idempotent).
    - value: fail
      description: Print an error and exit non-zero.
    - value: reinstall
      description: |-
        Remove the existing Node.js installation and install fresh using the selected method.
        With `method=nvm`, runs `nvm uninstall <version>` then reinstalls.
        With `method=binary`, overwrites the extracted files.
  export_path:
    type: array
    default: auto
    description: |-
      Controls which shell startup files receive PATH export blocks for the Node.js binary directory.
      - `auto` (default) — as root, writes to all system-wide shell startup files: `/etc/environment` (`BASH_ENV` and `PATH`), `/etc/profile.d/install-node.sh` (login shells), the system-wide bashrc (non-login interactive bash), and the zsh env file (`zshenv`). Covers login, interactive, non-interactive, Docker RUN, SSH exec, and PAM invocation scenarios.
      - `''` (empty) — skips all PATH writes (e.g. when `prefix=/usr/local` which is already on PATH, or when using symlinks only).
      - A list of absolute file paths — writes only to those specific files.
  add_current_user:
    type: boolean
    default: true
    description: |-
      Include the current user (the user running the installer, or SUDO_USER if set) in the resolved user list.
      Resolved users are added to the nvm group (when set_permissions=true) and receive per-user shell RC PATH exports.
      Root is deferred: only included as a fallback when no other non-root user is resolved.
  add_remote_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer remoteUser (from the _REMOTE_USER env var) in the resolved user list.
      Resolved users are added to the nvm group (when set_permissions=true) and receive per-user shell RC PATH exports.
      Ignored when _REMOTE_USER is unset or empty. Root is excluded from this path.
  add_container_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer containerUser (from the _CONTAINER_USER env var) in the resolved user list.
      Resolved users are added to the nvm group (when set_permissions=true) and receive per-user shell RC PATH exports.
      Ignored when _CONTAINER_USER is unset or empty. Root is excluded from this path.
  add_users:
    type: array
    default: ''
    description: |-
      Additional usernames to include in the resolved user list.
      Resolved users are added to the nvm group (when set_permissions=true) and receive per-user shell RC PATH exports.
      Root is accepted here (unlike the auto-detected paths above).
  set_permissions:
    type: boolean
    default: true
    description: |-
      Create a dedicated group (name set by 'group', default 'nvm'), set group-write and setgid bits on 'nvm_dir', add all resolved users to that group, and run the nvm installer as the first resolved user rather than root.
      This allows non-root container users to run 'nvm install', 'nvm use', and 'nvm ls' without sudo inside the running container.
      Only applies when method=nvm and running as root. No-op when method=binary or running as non-root.
  group:
    type: string
    default: nvm
    description: |-
      Name of the group created to own 'nvm_dir' when set_permissions=true.
      All resolved users are added to this group.
      Only applies when method=nvm and set_permissions=true.
  symlink:
    type: boolean
    default: true
    description: |-
      Create symlinks that ensure the containerEnv-declared paths always resolve to the actual installation.

      For `method=nvm` (root only):
      - The feature sets `NVM_SYMLINK_CURRENT=true` (both in `containerEnv` and during install), which causes nvm to maintain a `$NVM_DIR/current` symlink always pointing to the active Node.js version. The `containerEnv` PATH includes `$NVM_DIR/current/bin`, so `nvm use` version switching works automatically for all container processes.
      - When `nvm_dir` resolves to a value other than `/usr/local/share/nvm` (the `containerEnv` `NVM_DIR` value), creates a directory symlink `/usr/local/share/nvm` → `nvm_dir` so that the `containerEnv` `NVM_DIR` and PATH entry remain valid.
      - No-op when running as non-root (cannot write to `/usr/local/share`).

      For `method=binary`:
      - Root: symlinks `node`, `npm`, `npx`, and `corepack` from `$prefix/bin/` into `/usr/local/bin` when `prefix` is not `/usr/local`.
      - Non-root: symlinks `node`, `npm`, `npx`, and `corepack` from `$prefix/bin/` into `$HOME/.local/bin` when `prefix` is not `$HOME/.local`.
  node_gyp_deps:
    type: boolean
    default: true
    description: |-
      Install OS build dependencies required to compile native Node.js modules via node-gyp: 'make', 'gcc'/'g++', and 'python3'.
      On Alpine Linux with method=nvm, these tools are already provided by the nvm source-build toolchain (nvm.yaml manifest) and this option is a no-op.
      Set to false to skip installation of build tools if you do not need to compile native modules and prefer a smaller image.
  pnpm_version:
    type: string
    default: none
    description: |-
      Version of pnpm to install globally after Node.js is installed.
      Explicit versions (e.g. `9.15.0`) are installed via `npm install -g pnpm@VERSION`.
    proposals:
    - value: none
      description: Skip pnpm installation.
    - value: latest
      description: Install the latest pnpm release via `npm install -g pnpm@latest`.
    - value: 9.15.0
      description: pnpm v9.15.0.
    - value: 8.15.9
      description: pnpm v8.15.9.
  yarn_version:
    type: string
    default: none
    description: |-
      Version of Yarn to install globally after Node.js is installed.
      Explicit version strings (e.g. `1.22.22`) are installed via `npm install -g yarn@VERSION`.
    proposals:
    - value: none
      description: Skip Yarn installation.
    - value: latest
      description: |-
        Enable Yarn via `corepack enable` (ships with Node.js 16+);
        falls back to `npm install -g yarn` if corepack is unavailable.
    - value: 1.22.22
      description: |-
        Yarn v1.22.22 (Classic), installed via `npm install -g yarn@1.22.22`.
_dependencies:
  run:
    base:
      packages:
        - ca-certificates
    nvm-runtime:
      # Runtime dependencies required by Node.js and nvm on Alpine Linux.
      # bash is sourced in every shell session by nvm.sh; libgcc/ncurses/openssl
      # are shared libraries linked by the nvm-compiled Node.js binary.
      # These must not be removed as build-only packages.
      apk:
        packages:
          - bash
          - libgcc
          - ncurses
          - openssl
    node-gyp:
      # Build tools for compiling native Node.js add-ons via node-gyp.
      # On Alpine with method=nvm, make/gcc/g++/python3 are already provided
      # by the nvm manifest and this manifest is skipped.
      # These are runtime dependencies: needed whenever a user runs
      # 'npm install' with native modules inside the container.
      packages:
        - make
      apt:
        packages:
          - g++
          - gcc
          - python3-minimal
      apk:
        packages: []
      dnf:
        packages:
          - gcc
          - gcc-c++
          - python3
      brew:
        packages: []
  build:
    download:
      packages:
        - curl
    binary:
      # Dependencies for extracting Node.js .tar.xz archives (method=binary).
      packages:
        - tar
      apt:
        packages:
          - xz-utils
      apk:
        packages:
          - xz
      dnf:
        packages:
          - xz
      brew:
        packages: []
    nvm:
      # nvm build prerequisites on Alpine Linux.
      # Installs the full build toolchain required by nvm to compile Node.js
      # from source (nvm install -s). Runtime libs are in run.nvm-runtime.
      apk:
        packages:
          - binutils
          - coreutils
          - findutils
          - g++
          - gcc
          - grep
          - linux-headers
          - make
          - python3
          - util-linux
containerEnv:
  NVM_DIR: /usr/local/share/nvm
  NVM_SYMLINK_CURRENT: 'true'
  PATH: ${HOME}/.local/bin:${HOME}/.nvm/current/bin:/usr/local/share/nvm/current/bin:${PATH}
customizations:
  vscode:
    extensions:
    - dbaeumer.vscode-eslint
    settings:
      github.copilot.chat.codeGeneration.instructions:
      - text: This dev container includes 'node', 'npm', and optionally 'pnpm'/'yarn' pre-installed and available on the PATH for Node.js development.
installsAfter:
- ghcr.io/devcontainers/features/common-utils
