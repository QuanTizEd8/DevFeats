name: Oh My Zsh Installation
version: 0.1.0
description: Install [Oh My Zsh](https://ohmyz.sh/) with custom themes and plugins and configure per-user Zsh.
keywords:
- zsh
- oh-my-zsh
- shell
- prompt
_long_description: >-
  Clones [Oh My Zsh](https://ohmyz.sh/) to a shared system directory, optionally
  clones a custom theme (e.g. [Powerlevel10k](https://github.com/romkatv/powerlevel10k))
  and custom plugins from GitHub, and wires up per-user Zsh configuration by injecting
  a guarded block via `shell__write_block()` into each user's `zshtheme` file (when
  present) or directly into `.zshrc`. When a per-user `ZSH_CUSTOM` directory is used,
  themes and plugins are symlinked there from the shared system install so updates stay
  consistent.
options:
  plugins:
    type: array
    default: "git\nzsh-users/zsh-syntax-highlighting"
    description: |-
      Oh My Zsh plugins to activate, each as an `owner/repo` GitHub slug, a full git repository
      URI (e.g. `https://github.com/owner/repo`), or a plain built-in plugin name.
      Custom plugins (slugs or URIs) are cloned into the system custom directory
      (`<prefix>/custom/plugins/<repo>` by default; `<custom_dir>/plugins/<repo>` when
      `custom_dir` is set to an absolute system path).
      Plain names without a `/` (e.g. `git`) are treated as built-in Oh My Zsh plugins and are not cloned.
      Set to `''` to activate no plugins.
  theme:
    default: ''
    description: |-
      Oh My Zsh theme to use.
      Use a plain name (e.g. `robbyrussell`) to activate a built-in Oh My Zsh theme without cloning.
      Use an `owner/repo` GitHub slug or a full git repository URI to clone a custom theme into
      the system custom directory (`<prefix>/custom/themes/<repo>` by default;
      `<custom_dir>/themes/<repo>` when `custom_dir` is set to an absolute system path).
      Set to `''` to disable theming (`ZSH_THEME=""`).
    type: string
    proposals:
      - value: romkatv/powerlevel10k
        description: >-
          [Powerlevel10k](https://github.com/romkatv/powerlevel10k) theme
          (see the [install-fonts](#features/install-fonts) feature
          for installation of the recommended Powerlevel10k-compatible Nerd Font).
  custom_dir:
    default: ''
    description: |-
      `ZSH_CUSTOM` directory for Oh My Zsh.
      Leave empty to use `${ZDOTDIR:-$HOME}/custom` — per-user, themes and plugins are symlinked
      there from the system install.
      Set to an explicit path to override; evaluated in each user's login environment at configure
      time, so `~`, `$HOME`, and `${VAR:-default}` expressions are all supported.
    type: string
  zdotdir:
    default: ''
    description: |-
      Directory where Zsh looks for per-user config files (`.zshrc`, `.zprofile`, `.zlogin`).
      Leave empty to read `ZDOTDIR` from the user's running zsh at configure time; falls back
      to `$HOME` if zsh is not available or `ZDOTDIR` is unset.
      Evaluated in each user's login environment at configure time, so `~`, `$HOME`, and
      `${VAR:-default}` expressions are all supported.
    type: string
  rcfile:
    default: ''
    description: |-
      Full path to the per-user Zsh theme file that Oh My Zsh configuration is injected into.
      Leave empty to resolve automatically: uses `zdotdir` (if set) or reads `ZDOTDIR` from the
      user's running zsh, falling back to `$HOME`. The injection target is then chosen as:
      `$ZDOTDIR/zshtheme` if it exists; otherwise `$ZDOTDIR/zshtheme` (created, with a source
      line injected into `.zshrc`) if `.zshrc` exists; otherwise `.zshrc` directly.
      Evaluated in each user's login environment at configure time, so `~`, `$HOME`, and
      `${VAR:-default}` expressions are all supported.
    type: string
  zsh_cache_dir:
    default: '${XDG_CACHE_HOME:-$HOME/.cache}/oh-my-zsh'
    description: |-
      Value written to `ZSH_CACHE_DIR` in the user's shell config block.
      The default respects `$XDG_CACHE_HOME` at runtime. Override with any absolute path or
      shell expression (written verbatim — not expanded at install time).
    type: string
  zsh_compdump:
    default: '${ZSH_CACHE_DIR}/.zcompdump-${SHORT_HOST}-${ZSH_VERSION}'
    description: |-
      Value written to `ZSH_COMPDUMP` in the user's shell config block.
      The default follows Oh My Zsh conventions and uses `$ZSH_CACHE_DIR` set by `zsh_cache_dir`.
      Override with any absolute path or shell expression (written verbatim — not expanded at install time).
    type: string
  update_mode:
    default: disabled
    description: |-
      Oh My Zsh auto-update mode, written as `zstyle ':omz:update' mode <value>`.
      - `disabled` — never prompt or update automatically.
      - `reminder` — print a reminder when updates are available but do not update.
      - `auto` — update automatically without prompting.
    type: string
    enum:
      - value: disabled
        description: Never prompt or update automatically.
      - value: reminder
        description: Print a reminder when updates are available but do not update.
      - value: auto
        description: Update automatically without prompting.
_options:
  gh_repo: ohmyzsh/ohmyzsh
  version:
    resolution: git_ref
    default: master
  method:
    git-clone:
      uri: "https://github.com/ohmyzsh/ohmyzsh"
      config:
        oh-my-zsh.remote: origin
        oh-my-zsh.branch: "{VERSION}"
  prefix:
    root: /usr/local/share/oh-my-zsh
    nonroot: "${HOME}/.oh-my-zsh"
    symlink:
      skip: true
    exports:
      skip: true
# installsAfter:
#   - ghcr.io/quantized8/devfeats/install-shell
_dependencies:
  run:
    base:
      packages:
        - git
        - ca-certificates
