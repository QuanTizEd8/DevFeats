version: 0.1.0
name: Lefthook Installation
description: Install [Lefthook](https://lefthook.dev/) — a fast, polyglot Git hooks manager.
keywords:
  - lefthook
  - git
  - hooks
  - git-hooks
  - cli
_long_description: |-
  Installs Lefthook, a fast Git hooks manager implemented as a single Go binary.
  Lefthook installs small hook entrypoint scripts into `.git/hooks/` and executes
  jobs defined in `lefthook.yml`, providing a polyglot alternative to
  language-specific hook managers such as Husky.
_tool_name: Lefthook
_options:
  verify:
    args: "version"
    description: Verify lefthook is installed and working.
  gh_repo: evilmartians/lefthook
  version:
    resolution: github_release
    default: stable
    inputs: [stable, latest, semver]
    flag: "version"
    proposals:
      - value: "2.1.6"
        description: Install lefthook v2.1.6.
  method:
    binary:
      asset_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/lefthook_{VERSION}_{OS==linux?Linux:MacOS}_{ARCH==amd64?x86_64:{ARCH}}"
      sidecar_uri: "https://github.com/${{ _options.gh_repo }}$/releases/download/{TAG}/lefthook_checksums.txt"
      when:
        - {kernel: linux, arch: amd64}
        - {kernel: linux, arch: arm64}
        - {kernel: darwin, arch: amd64}
        - {kernel: darwin, arch: arm64}
    npm:
      package: "lefthook"
      args:
        - "--ignore-scripts"
    upstream-package:
      when: {pm: [apt, apk, dnf, zypper, brew]}
  prefix:
    bins: [lefthook]
    applies_when:
      - method: [binary, npm]
_dependencies:
  run:
    upstream-package:
      packages:
        - name: lefthook
          when:
            pm: [apt, apk, dnf, yum, zypper]
      apt:
        keys:
          - url: "https://dl.cloudsmith.io/public/evilmartians/lefthook/gpg.A05F5DDE3A0BB1D2.key"
            dest: "/usr/share/keyrings/evilmartians-lefthook-archive-keyring.gpg"
        repos:
          - "deb [signed-by=/usr/share/keyrings/evilmartians-lefthook-archive-keyring.gpg] https://dl.cloudsmith.io/public/evilmartians/lefthook/deb/{id} {version_codename} main"
      apk:
        keys:
          - url: "https://dl.cloudsmith.io/public/evilmartians/lefthook/rsa.CCA91DF99AD351FF.key"
            dest: "/etc/apk/keys/lefthook@evilmartians-CCA91DF99AD351FF.rsa.pub"
            dearmor: false
        repos:
          - "https://dl.cloudsmith.io/public/evilmartians/lefthook/alpine/v{version_id_mm}/main"
      dnf:
        repos:
          - |
            [evilmartians-lefthook]
            name=evilmartians-lefthook
            baseurl=https://dl.cloudsmith.io/public/evilmartians/lefthook/rpm/{id==fedora?fedora:el}/{id==fedora?{version_id}:{version_id_major}}/$basearch
            repo_gpgcheck=1
            enabled=1
            skip_if_unavailable=1
            gpgkey=https://dl.cloudsmith.io/public/evilmartians/lefthook/gpg.A05F5DDE3A0BB1D2.key
            gpgcheck=1
            sslverify=1
            sslcacert=/etc/pki/tls/certs/ca-bundle.crt
            metadata_expire=300
            type=rpm-md
      yum:
        repos:
          - |
            [evilmartians-lefthook]
            name=evilmartians-lefthook
            baseurl=https://dl.cloudsmith.io/public/evilmartians/lefthook/rpm/el/{version_id_major}/$basearch
            repo_gpgcheck=1
            enabled=1
            skip_if_unavailable=1
            gpgkey=https://dl.cloudsmith.io/public/evilmartians/lefthook/gpg.A05F5DDE3A0BB1D2.key
            gpgcheck=1
            sslverify=1
            sslcacert=/etc/pki/tls/certs/ca-bundle.crt
            metadata_expire=300
            type=rpm-md
      zypper:
        repos:
          - |
            [evilmartians-lefthook]
            name=evilmartians-lefthook
            baseurl=https://dl.cloudsmith.io/public/evilmartians/lefthook/rpm/opensuse/{version_id}/$basearch
            repo_gpgcheck=1
            enabled=1
            skip_if_unavailable=1
            gpgkey=https://dl.cloudsmith.io/public/evilmartians/lefthook/gpg.A05F5DDE3A0BB1D2.key
            gpgcheck=1
            sslverify=1
            sslcacert=/etc/pki/tls/certs/ca-bundle.crt
            metadata_expire=300
            type=rpm-md
      brew:
        packages:
          - lefthook
# installsAfter: []
