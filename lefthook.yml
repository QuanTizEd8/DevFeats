env:
  PATH: "/opt/homebrew/bin:/usr/local/bin:$PATH"

pre-commit:
  commands:
    sync-src:
      glob: "{lib/**/*,features/**/*}"
      run: just sync-src
    format-sh:
      glob: "**/*.{sh,bash,bats}"
      run: just format-sh {staged_files} && git add {staged_files}
    lint-format-py:
      glob: "**/*.py"
      run: >
        just lint-py {staged_files}
        && just format-py {staged_files}
        && git add {staged_files}
