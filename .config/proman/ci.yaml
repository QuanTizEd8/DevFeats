image:
  suffix: "-devcontainer"
  config_dir: ".devcontainer/.dev"
  userdata_dir: "/tmp/devcontainer-userdata"
  cache_ref_prefix: cache
  build_matrix:
    - runner: ubuntu-latest
      platform: linux/amd64
      platform_tag: linux-amd64
    - runner: ubuntu-24.04-arm
      platform: linux/arm64
      platform_tag: linux-arm64

artifacts:
  retention_days: 7
  src:
    name: ${{ name_slug }}$-src
    path: src/
  dist:
    name: ${{ name_slug }}$-dist
    path: dist/
  pages:
    name: github-pages
    path: .local/build/docs/website.tar

publish:
  registry: ghcr.io
  git_bot:
    name: "github-actions[bot]"
    email: "41898282+github-actions[bot]@users.noreply.github.com"
  pages_environment: github-pages

runner:
  free_disk_space:
    tool_cache: true
    swap_storage: true
    docker_images: true
    android: true
    dotnet: true
    haskell: true
    large_packages: true

scripts:
  features_src: "./src"

triggers:
  lint:
    - "**/*.sh"
    - "**/*.bash"
    - "**/*.bats"
  validate:
    - "**/metadata.yaml"
    - "**/*.schema.json"
  unit_test:
    - "lib/*.sh"
    - "lib/*.bash"
    - "lib/*.json"
    - "test/lib/**"
    - "test/support/**"
  install_test:
    - "features/install.tmpl.bash"
    - "features/install.sh"
    - "features/*/install.bash"
    - ".dev/lib/proman/sync/install_script.py"
    - "test/install/**"
    - "test/support/**"
  scenario_test:
    - "features/install.sh"
    - "lib/**"
  devcontainer:
    - ".devcontainer/.dev/**"
    - ".github/workflows/cm-devcontainer.yaml"
  docs:
    - "docs/**"
    - "features/**"
    - "lib/**"
    - ".config/proman/docs.yaml"
    - ".github/workflows/docs.yaml"
  python_test:
    - ".dev/lib/**"
    - ".config/proman/**"
    - "test/proman/**"
