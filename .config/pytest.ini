[pytest]
# cache_dir is resolved relative to pytest rootdir (repo root via --rootdir=. in pixi test-py).
cache_dir = .local/cache/pytest
addopts = -v --color=yes
# Default capture can hit "I/O operation on closed file" with jsonschema on some
# filesystems (e.g. external drives). Prefer `pixi run test-py` or add --capture=no here.
